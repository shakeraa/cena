extracted_tasks:
  - title: "Mother tongue = declared-only, not inferred (Feature 6)"
    priority: P1
    estimate: XS
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Student profile has explicit language preferences. Feature 6 MUST read from
      profile preference only; never infer from typing patterns, response times, or
      hint-language selections. No language-proficiency profile built from behavior.

      ## Files
      - Feature 6 implementation (future)
      - StudentPreferencesDocument — ensure LanguagePreference field
      - Lint/test: no service reads "inferred_mother_tongue" or similar

      ## Definition of Done
      - Convention documented
      - Code-review checklist updated

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: ["L16"]

  - title: "Classify cultural/ethnic cohort tag as GDPR Art 9 special-category"
    priority: P1
    estimate: S
    suggested_assignee: claude-subagent-compliance
    queue_body: |
      ## Goal
      Feature 5 cohort tag (Arab/Ethiopian/Russian/Jewish) is ethnic-origin data = Art 9.
      Mirror accommodation-data classification task from Axis 3.

      ## Files
      - src/actors/Cena.Actors/Events/StudentProfileSnapshot.cs (add [Pii(SpecialCategory)])
      - src/shared/Cena.Infrastructure/Compliance/ProcessingPurpose.cs
      - Review board policy for cultural content (docs/content/culturally-contextualized-review-board.md)

      ## Definition of Done
      - Field classified
      - Consent purpose ContentContextualization (default deny)
      - Review board policy published

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-compliance --result "<branch>"
    source_doc_lines: ["L15"]

  - title: "Consolidate self-efficacy / confidence profile storage (Axis 8 F7 + Axis 6 F8)"
    priority: P1
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Two docs propose overlapping self-efficacy/confidence profiles. Decide one store,
      one consent purpose, one retention window before implementation.

      ## Definition of Done
      - ADR: single SelfEfficacyState aggregate field
      - Axis 6 F8 + Axis 8 F7 roadmap consolidated

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: ["L17"]

verdict: adopt
verdict_reason: |
  Content-authoring features are the lowest-privacy-risk in the corpus — most operate
  on item bank, not student data. Features 1, 2, 3, 4, 8 shippable as-is. Features 5, 6, 7
  ship after the 3 tasks above consolidate special-category classification and
  behavioral-profile storage.

