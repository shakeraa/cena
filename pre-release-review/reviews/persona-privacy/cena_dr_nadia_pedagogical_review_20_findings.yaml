    - ADR-0002 (CAS oracle enforcement affirmed in FD-002)
  violated: []
  missing_adr_needed:
    - "ADR for community review board (FD-011 cultural contextualization)"

non_negotiable_violations: []

persona_findings:
  - severity: P1
    finding: |
      FD-003 "Required Guardrails" list (L81): "Redis-only with TTL; no cross-session
      knowledge tracing; class overview shows only real-time session-active tags;
      the student starts each session with a clean slate." This is BOTH architectural
      and privacy guidance — it mandates Redis over Marten for misconception data.
      But existing code (MisconceptionEvents.cs) uses Marten event streams. Same
      reconciliation issue as AXIS 6 F6.
    evidence: "cena_dr_nadia_pedagogical_review_20_findings.md:81 + src/actors/Cena.Actors/Events/MisconceptionEvents.cs"
    lens_note: |
      Two authoritative sources (Dr. Nadia, axis-6 doc) both say Redis-only. Existing
      code is Marten. Decision needed and ADR update.

  - severity: P1
    finding: |
      FD-011 "stereotyping risk; require community review board" — same special-category
      (ethnic origin) concern as Axis 8 review. Cohort tagging (Arab/Ethiopian/Russian)
      is Art 9. Dr. Nadia asks for a review board; privacy lens asks for Art 9
      classification + consent purpose. Both needed.
    evidence: "cena_dr_nadia_pedagogical_review_20_findings.md:20 + :L11 (verdict table)"
    lens_note: |
      Pedagogy + privacy concerns align; combined task.

  - severity: P1
    finding: |
      FD-013 "Do not track language proficiency profiles" — same as Axis 8 F6 finding.
      Confirms cross-lens agreement.
    evidence: "cena_dr_nadia_pedagogical_review_20_findings.md:22"
    lens_note: |
      Cross-lens consensus.

  - severity: P2
    finding: |
      FD-015 "Auto-deletion architecture must be audited" — privacy lens agrees.
      Audit should verify: (a) session misconception purge is actually hard-delete;
      (b) export filter for [MlExcluded] applied; (c) erasure cascade complete.
    evidence: "cena_dr_nadia_pedagogical_review_20_findings.md:24"
    lens_note: |
      Audit scope = "every per-student data store has documented retention + erasure
      coverage". Useful checklist item.

  - severity: P2
    finding: |
      FD-014 WARNING — "thin research base; potential UI clutter". Privacy lens agrees
      FD-014 (Why This Problem XAI) UI surface introduces more information per student
      interaction = more audit/consent surface. Trade-off.
    evidence: "cena_dr_nadia_pedagogical_review_20_findings.md:23"
    lens_note: |
      MVP scope (top 5 inferences only) reduces the audit surface.

  - severity: P2
    finding: |
      FD-007 Crisis Mode + FD-005 Formative-Summative signal split — teacher/parent-facing
      readiness data. Each is per-student profile. Readiness retention + erasure coverage
      needed per Axis 6 review.
    evidence: "cena_dr_nadia_pedagogical_review_20_findings.md:14-16"
    lens_note: |
      Cross-ref to Axis 6 tasks.

