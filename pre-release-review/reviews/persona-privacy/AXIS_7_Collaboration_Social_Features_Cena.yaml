extracted_tasks:
  - title: "Ban voice-capture for under-16 + biometric consent for 16+ (Feature 1)"
    priority: P0
    estimate: S
    suggested_assignee: claude-subagent-compliance
    queue_body: |
      ## Goal
      Text-only default for peer explanations. Voice-capture only for 16+ with explicit
      ProcessingPurpose.BiometricVoiceCollaboration consent + ZDR on voice processing.
      Voice distortion is NOT a compliant anonymization for COPPA 2025.

      ## Files
      - src/shared/Cena.Infrastructure/Compliance/ProcessingPurpose.cs
      - ADR: docs/adr/NNNN-biometric-data-policy.md
      - Feature 1 implementation (future): voice disabled for <16

      ## Definition of Done
      - ADR bans biometric collection for <16
      - 16+ requires explicit opt-in with parent co-consent if <18
      - Privacy page lists voice processing vendor (if any)

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-compliance --result "<branch>"
    source_doc_lines: ["L95-97"]

  - title: "Tenant-scope-by-default for peer matching + explicit cross-tenant opt-in"
    priority: P0
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Peer-matching queries scoped to tenant (institute) by default. Cross-tenant match
      requires explicit ProcessingPurpose.CrossTenantPeerMatching + parent co-consent.

      ## Files
      - Feature 1-7 matching services (future)
      - src/shared/Cena.Infrastructure/Compliance/ProcessingPurpose.cs
      - Tenant scope middleware

      ## Definition of Done
      - Default match scope = institute_id = student.institute_id
      - Cross-tenant requires explicit consent + tenant-admin approval
      - Test for cross-tenant accidental match

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: ["L59-71"]

  - title: "k-anonymity floor for classroom anonymous signals (Feature 5)"
    priority: P1
    estimate: XS
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      "I'm confused too" signal display to teacher requires minimum N signals (default 5)
