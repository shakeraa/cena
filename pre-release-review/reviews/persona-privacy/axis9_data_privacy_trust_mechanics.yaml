extracted_tasks:
  - title: "Hard-delete misconception events on erasure (not read-filter)"
    priority: P0
    estimate: M
    suggested_assignee: claude-subagent-compliance
    queue_body: |
      ## Goal
      Close GDPR Art 17 / PPL §14 gap: StudentId-linked MisconceptionDetected_V1 /
      MisconceptionRemediated_V1 events currently remain in Marten event streams after
      erasure; only read paths filter them. Regulator-verifiable erasure requires
      actual removal of StudentAnswer free-text PII from the append-only store.

      ## Files
      - src/actors/Cena.Actors/Events/MisconceptionEvents.cs (event definitions)
      - src/shared/Cena.Infrastructure/Compliance/RightToErasureService.cs (add step 8 for event-stream scrub)
      - src/shared/Cena.Infrastructure/Compliance/RetentionWorker.cs:334 (replace logging with marten stream archive)
      - src/actors/Cena.Actors.Tests/Compliance/ErasureEventStreamTests.cs (new)

      ## Definition of Done
      - ErasureManifest gains new store "MisconceptionEvents" with count + Action.Deleted
      - After ProcessErasureAsync, no MisconceptionDetected_V1 remains queryable by StudentId
      - RetentionWorker actually deletes (or replaces with tombstone) events past 30-day cutoff
      - Test proves event with StudentAnswer="foo" cannot be retrieved after erasure + retention
      - ADR-0003 Decision 2 language updated from "filtered out of reads" to "deleted from store"

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-compliance --result "<branch>"
    source_doc_lines: ["L105-139"]

