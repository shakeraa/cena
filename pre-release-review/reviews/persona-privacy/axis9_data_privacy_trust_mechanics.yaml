doc_path: pre-release-review/axis9_data_privacy_trust_mechanics.md
reviewer: persona-privacy
reviewed_at: 2026-04-20
doc_summary: |
  Proposes 8 privacy/trust features: explainable-AI "why this problem", student data dashboard,
  self-service erasure, consent-revocation UX, age-appropriate privacy copy, inference-trail
  provenance, differential-privacy analytics, and a public transparency report.
  Positioned as parent-NPS and compliance differentiators against COPPA 2025, GDPR, and
  Israeli PPL Amendment 13 (effective Jan 2025).

system_purpose_fit: 5
  rationale:
    - Non-negotiable #2 (ADR-0003 session-scope) is explicitly honored throughout
    - Non-negotiable #3 (no dark-patterns) honored — Feature 4 enforces symmetric accept/reject
    - Non-negotiable #1 (SymPy oracle) not in scope, no risk
    - Correctly rejects silent under-13 collection, cross-session misconception retention, ML training on student data
    - Feature 7 (DP analytics) correctly notes k-anonymity threshold, aligning with ADR-0003 Decision 2

code_reality_check:
  claims_verified_in_code:
    - "Self-service GDPR portal exists -> src/api/Cena.Student.Api.Host/Endpoints/MeGdprEndpoints.cs:35-91 (consents, export, erasure, DSAR all wired)"
    - "Right-to-erasure with 30-day cooling period is real, not stub -> src/shared/Cena.Infrastructure/Compliance/RightToErasureService.cs:230 (CoolingPeriod const), :289-489 (ProcessErasureAsync does real cascade across 7 data stores)"
    - "Misconception events carry [MlExcluded] attribute -> src/actors/Cena.Actors/Events/MisconceptionEvents.cs:22,38,53"
    - "GDPR export filters out [MlExcluded] events (Feature 2 + 3 compatible) -> src/shared/Cena.Infrastructure/Compliance/StudentDataExporter.cs:154-160, :211"
    - "30-day / 90-day hard cap on session misconception retention enforced in policy -> src/shared/Cena.Infrastructure/Compliance/DataRetentionPolicy.cs:58,65 + RetentionWorker:492-500 (tenant override clamped)"
    - "Consent change audit log exists with previous/new/changedBy -> src/shared/Cena.Infrastructure/Compliance/GdprConsentManager.cs:15-25 (ConsentChangeLog), :147-203"
    - "Age-based default consents correctly deny all non-contract-necessity for <16 -> MeGdprEndpoints.cs:552-569"
    - "Parental-consent-step UI stub + COPPA documentation -> src/student/full-version/src/components/onboarding/ParentalConsentStep.vue:1-16"
    - "LLM prompts explicitly exclude PII by design -> src/actors/Cena.Actors/Services/PersonalizedExplanationService.cs:23 'PRIVACY: No student ID, name, or PII is ever included in LLM prompts'"
  claims_contradicted_by_code:
    - "Feature 3 claims 'deletion scope is simplified because we delete all session data after each session' but RightToErasureService ANONYMIZES rather than DELETES StudentProfileSnapshot (FullName HMAC-hashed, not removed) -> RightToErasureService.cs:321-347. Doc oversimplifies erasure surface."
    - "Feature 7 assumes no existing DP/k-anonymity implementation, but aggregate analytics code paths are not verified either way (no DP module exists in src/)."
    - "RetentionWorker session-misconception purge is soft — it does NOT actually delete events, it logs a SIEM entry and relies on read-path filtering (RetentionWorker.cs:334-357). This is acceptable per ADR-0003 but the doc's 'retention horizon' claim of hard delete is weaker in practice."
  claims_unverifiable:
    - "Feature 8 transparency report scope — no existing equivalent in src/; greenfield"
    - "Feature 6 'inference trail' - ExplanationCacheService exists but no inference_log / evidence_chain table confirmed"
    - "Feature 5 age-banded privacy copy — privacy.vue page exists but age-band tiering unverified"

adr_alignment:
  honored:
    - ADR-0003 (session-scope misconception — features 2/3/6 correctly scope data)
    - ADR-0001 (tenancy — Feature 7 k-anonymity respects per-institute cohort boundaries)
  violated: []
  missing_adr_needed:
    - "ADR for PII-in-LLM-prompts policy — currently only a source-code comment (PersonalizedExplanationService.cs:23); needs a lint rule + ADR documenting the exclusion principle"
    - "ADR for transparency-report governance — Feature 8 proposes public report with bias metrics; needs review-board ADR"
    - "ADR for DP epsilon budget — Feature 7 needs explicit epsilon-ledger policy before implementation"

non_negotiable_violations: []

persona_findings:
  - severity: P0
    finding: |
      Feature 2 ("My Cena Profile" dashboard) risks exposing [MlExcluded] misconception tags
      to the student UI. Dashboard API must NOT re-expose MisconceptionDetected_V1 data that
      StudentDataExporter.cs:154 explicitly strips from GDPR export. If the student can see
      it in the dashboard but not the export, that's a subject-access-right inconsistency
      under GDPR Art 15 vs Art 20.
    evidence: "axis9_data_privacy_trust_mechanics.md:67-100 + src/shared/Cena.Infrastructure/Compliance/StudentDataExporter.cs:154-160"
    lens_note: |
      Privacy right-exposure surfaces must be consistent — a dashboard-visible item the
      export omits creates a defensible-disclosure problem for DPO during a DSAR audit.

  - severity: P0
    finding: |
      Feature 3 deletion workflow assumes cascade across session stores but the current
      RightToErasureService does NOT touch LearningSessionState documents, projections
      (ClassMasteryHeatmapProjection, LearningSessionQueueProjection), or misconception
      event streams. Verifiable-erasure gap: event streams carry MisconceptionDetected_V1
      with StudentId + BuggyRuleId + StudentAnswer (free-text PII per MisconceptionEvents.cs:29)
      and those events are NOT hard-deleted — only filtered on read per RetentionWorker.cs:340-357.
      GDPR Art 17 requires erasure that an audit can verify, not just read-path hiding.
    evidence: "src/actors/Cena.Actors/Events/MisconceptionEvents.cs:23-32 + src/shared/Cena.Infrastructure/Compliance/RetentionWorker.cs:334-357 + src/shared/Cena.Infrastructure/Compliance/RightToErasureService.cs:318-480"
    lens_note: |
      "Read-filter = deletion" is not defensible to a regulator. A 14-year-old's wrong-answer
      string sitting in an append-only Marten stream 2 years after erasure is a textbook
      PPL §14 / GDPR Art 17 violation.

  - severity: P1
    finding: |
      Feature 4 consent-revocation UX is proposed as a new feature, but MeGdprEndpoints.cs
      already implements full consent CRUD (get/record/revoke/bulk). Retire the "build new
      consent backend" part of this proposal — only the UX/floating-link frontend work
      remains. Doc overstates the surface area.
    evidence: "axis9_data_privacy_trust_mechanics.md:160-164 + src/api/Cena.Student.Api.Host/Endpoints/MeGdprEndpoints.cs:42-55,313-475"
    lens_note: |
      Product prioritization risk: backend team would duplicate a shipped capability.

  - severity: P1
    finding: |
      Feature 6 inference trail must not reintroduce cross-session misconception retention
      under a new label. "Evidence chain" log linking a student to specific inferences
      over time is exactly the "per-student behavioral profile" banned by ADR-0003 and
      ICO v. Reddit (£14.47M, Feb 2026). MVP scope must be session-bounded — evidence
      references "THIS session" only — which the doc acknowledges at L251 but the data
      model (inference_log table) as drafted suggests persistent storage.
    evidence: "axis9_data_privacy_trust_mechanics.md:240-252 + docs/adr/0003-misconception-session-scope.md:41-67"
    lens_note: |
      Naming the table "inference_log" instead of "misconception_log" does not launder
      the data category; the regulator reads by data shape, not by column name.

  - severity: P1
    finding: |
      Feature 5 age-appropriate privacy copy should be gated on an under-16 test — the
      current IsMinor helper in MeGdprEndpoints.cs:529-544 uses <16 (GDPR-K / Israel PPL),
      while COPPA 2025 uses <13. Dual-threshold messaging needed; a single minor flag loses
      the COPPA-specific "verifiable parental consent" signal for 13-year-olds.
    evidence: "axis9_data_privacy_trust_mechanics.md:212-214 + src/api/Cena.Student.Api.Host/Endpoints/MeGdprEndpoints.cs:529-544"
    lens_note: |
      Under-13 triggers VPC (verifiable parental consent) separate from GDPR-K 16-cutoff
      parental responsibility. A single ageBand enum is the right fix.

  - severity: P1
    finding: |
      Feature 7 DP analytics proposes cohort insights with k-anonymity ≥10. For Israeli
      schools, an Arab-medium class may have <10 students per grade per track (4-unit /
      5-unit). This would suppress legitimate teacher insights AND disproportionately affect
      Arab cohorts. The proposal's fixed k≥10 threshold has a fairness impact it does not acknowledge.
    evidence: "axis9_data_privacy_trust_mechanics.md:80 + axis9_data_privacy_trust_mechanics.md:262-266"
    lens_note: |
      Privacy-preserving techniques with universal thresholds often hide smaller
      minority cohorts from teacher support — documented harm pattern in DP-for-education
      literature. ε-budget tuning needed per-tenant, not global.

  - severity: P2
    finding: |
      Feature 8 transparency report is listed as L effort; in practice it needs data-governance
      owner + legal sign-off + translated drafts. No such role exists in the project (no
      DPO role found in src/). Treat as a hire-then-build, not an engineering task.
    evidence: "axis9_data_privacy_trust_mechanics.md:315-332"
    lens_note: |
      Publishing "fairness metrics by gender/SES" without a named DPO reviewing each report
      is itself a Section 8A PPL disclosure risk.

  - severity: P2
    finding: |
      Doc does not address sub-processor disclosure. LLM calls go to Anthropic (ClaudeTutorLlmService.cs,
      ClaudeStuckClassifierLlm.cs) — this must be in the Feature 8 report AND in consent
      copy per PPL Section 11 duty of disclosure.
    evidence: "axis9_data_privacy_trust_mechanics.md whole doc (no mention of Anthropic/OpenAI sub-processor) + src/actors/Cena.Actors/Tutor/ClaudeTutorLlmService.cs"
    lens_note: |
      Israeli PPL Regulations (Data from EEA) require sub-processor transparency;
      DPA §7 no-training-on-student-data needs to be MATCHED by an Anthropic zero-data-retention
      enterprise agreement, not just a promise in docs.

