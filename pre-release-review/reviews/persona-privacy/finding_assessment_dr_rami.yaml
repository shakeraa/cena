persona_findings:
  - severity: P0
    finding: |
      FD-003 REJECT: Dr. Rami notes "95% misconception resolution" implies persistent
      misconception tracking — direct ADR-0003 violation. Privacy lens concurs. Even the
      "eventual" 95% framing (multi-session) would require cross-session retention.
      Any feature proposal citing 95% in marketing/planning docs must be struck.
    evidence: "finding_assessment_dr_rami.md:19, :52-53"
    lens_note: |
      Statistical dishonesty + privacy violation in one fabricated number.

  - severity: P0
    finding: |
      FD-008 REJECT: "Yu et al. 2026" unverifiable + DPA §7 violation via AI grading
      training pipeline. Privacy lens already raised this as P0 in AXIS 6 review.
      Cross-confirmation: do not build AI grading until DPIA + ZDR confirmed + vendor
      agreement bans training on student work.
    evidence: "finding_assessment_dr_rami.md:24, :55-56"
    lens_note: |
      Double-flag = double-priority. DPIA is the gate.

  - severity: P1
    finding: |
      FD-009 WARNING: Socratic tutor prompt logging + fine-tuning pipelines. Privacy
      lens raised as P0 in competitive-analysis review. Cross-confirmation that Anthropic
      ZDR + data-governance clarity required before ship.
    evidence: "finding_assessment_dr_rami.md:25"
    lens_note: |
      Existing code (ClaudeTutorLlmService) already ships; confirm vendor posture
      immediately.

  - severity: P2
    finding: |
      FD-004 WARNING RDY-080 — readiness scores as implicit prediction. Privacy lens
      concerns: a "Bagrut readiness score" per student becomes a follow-the-student
      profile for 7 years (StudentRecord retention). Must be disclaimed + student
      right-to-object + teacher-view audit-logged.
    evidence: "finding_assessment_dr_rami.md:20"
    lens_note: |
      Same privacy concerns as AXIS 6 F2 IRT-CAT.

  - severity: P2
    finding: |
      FD-011 REJECT (cherry-picked ES 1.16) + stereotyping risk (Dr. Nadia). Privacy
      lens adds: cohort-based content selection uses ethnic-origin tag (Art 9). Triple-flag.
    evidence: "finding_assessment_dr_rami.md:27, :58-59"
    lens_note: |
      Triple cross-lens flag = retire or substantially revise.

