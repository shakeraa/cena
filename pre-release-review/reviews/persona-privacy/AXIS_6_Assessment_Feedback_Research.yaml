extracted_tasks:
  - title: "Reconcile misconception persistence: Marten events vs Feature 6 Redis-only"
    priority: P0
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Existing code (MisconceptionEvents.cs) emits Misconception events to Marten event
      streams (durable, retention-filtered). Feature 6 proposes Redis-only + auto-purge.
      Decide which is the system of record; both cannot claim ADR-0003 compliance
      independently.

      ## Files
      - docs/adr/0003-misconception-session-scope.md (add Decision 7: single store)
      - src/actors/Cena.Actors/Events/MisconceptionEvents.cs

      ## Definition of Done
      - ADR Decision 7 documents: "misconception events live in X; Y is a derived cache"
      - If Marten: ensure hard-delete (see axis9 task)
      - If Redis: remove Marten emit path
      - Test confirms only one durable store

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: []

  - title: "LLM-PII + ZDR posture for student-work AI grading (Features 3/4)"
    priority: P0
    estimate: M
    suggested_assignee: claude-subagent-compliance
    queue_body: |
      ## Goal
      AI grading sends free-text student work to LLM. Pre-build: (a) ZDR/no-retention
      contract with chosen LLM vendor; (b) PII scrubber on student work;
      (c) ProcessingPurpose.AiGrading with VPC for <13, opt-in 13+;
      (d) DPIA per Israeli PPL / GDPR Art 35 since AI grading + minor = high-risk profiling.

      ## Files
      - docs/compliance/dpia-ai-grading.md (new DPIA doc)
      - src/shared/Cena.Infrastructure/Privacy/FreeTextPiiScrubber.cs (shared with Axis 1 task)
      - src/shared/Cena.Infrastructure/Compliance/ProcessingPurpose.cs (new purpose)

      ## Definition of Done
      - DPIA completed and signed by DPO
      - PII scrubber applied before every LLM call
      - Consent check in AI grading path
      - Vendor ZDR agreement in place

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-compliance --result "<branch>"
    source_doc_lines: ["L7"]

  - title: "Retention window for summative attempts (Feature 1)"
    priority: P1
    estimate: XS
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Map summative_attempts to DataCategory.StudentRecord (7-year FERPA) or new SummativeAssessment
      category. Document in ADR + DataRetentionPolicy.cs.

      ## Definition of Done
      - Summative attempts have explicit retention constant
      - RetentionWorker covers the category
      - ADR cross-reference

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: ["L51"]

  - title: "Lint rule: no inference-of-misconception-from-knowledge-state (Feature 2 boundary)"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Knowledge state (P(mastered) per topic) is persistent-allowed. Inferring
      specific misconceptions from knowledge state crosses ADR-0003 Decision 6. Add
      test/lint preventing code paths that produce misconception tags from theta.

      ## Files
      - New test: AdrComplianceBoundaryTests
      - Possible analyzer/rule

      ## Definition of Done
      - Test fails if any code in Cena.Actors reads knowledge_state and emits MisconceptionDetected_V1
      - Review checklist updated

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: ["L93-94"]

verdict: revise
verdict_reason: |
  Strong ADR awareness; Features 1/2/5/6/7/8 shippable after the 4 tasks above land.
  Features 3/4 (AI grading) are P0-risk until the DPIA + ZDR work completes — defer
  those specifically. Feature 6 architecture reconciliation is the top priority.

