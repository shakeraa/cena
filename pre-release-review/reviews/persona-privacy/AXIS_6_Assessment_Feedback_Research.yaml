    evidence: src/actors/Cena.Actors/Events/MisconceptionEvents.cs + src/shared/Cena.Infrastructure/Compliance/DataRetentionPolicy.cs:58
    note: |
      Feature 6 architecture DIFFERS from existing (Redis vs Marten events) — doc must
      reconcile rather than build in parallel.
  - feature: Stuck classifier + hint-level adjuster (used by Feature 5)
    evidence: src/actors/Cena.Actors/Diagnosis/
    note: Per-session error analysis extends existing diagnosis.

