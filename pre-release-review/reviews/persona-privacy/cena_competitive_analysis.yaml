verdict: revise
verdict_reason: |
  Competitive features are useful but several import US/EU privacy patterns unsuitable for
  Israeli minors. Feature 1 LLM tutor already exists — ZDR confirmation is the only gate.
  Feature 4 at-risk alerts need DPIA before build. Feature 6 duplicate of AXIS 4.

