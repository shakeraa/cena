extracted_tasks:
  - title: "PII-scrub pipeline for free-text student responses before persist + LLM"
    priority: P0
    estimate: M
    suggested_assignee: claude-subagent-privacy
    queue_body: |
      ## Goal
      Free-text retrieval prompts / elaboration responses / self-explanation answers may
      contain PII (names, addresses, classmates). Before persistence in any
      retrieval_responses / elaboration_responses / self_explanation_responses table
      AND before any LLM call, run through a PII scrubber.

      ## Files
      - New: src/shared/Cena.Infrastructure/Privacy/FreeTextPiiScrubber.cs
      - New: src/shared/Cena.Infrastructure.Tests/Privacy/PiiScrubberTests.cs
      - ADR: docs/adr/NNNN-free-text-student-pii.md

      ## Definition of Done
      - Scrubber detects Israeli phone (+972), email, full-name patterns (Hebrew/Arabic/English)
      - Scrubber produces original+scrubbed pair; only scrubbed persists; original discarded in-memory
      - LLM-call helpers wrap scrubber by default (opt-out requires [LlmRawOk] attribute)
      - Test corpus of 50 synthetic Israeli student responses

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-privacy --result "<branch>"
    source_doc_lines: ["L156-158", "L221-227", "L461-463"]

  - title: "Add new per-student projections to erasure cascade"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Every new per-student table proposed in Axis 1 (skill_mastery_state,
      hint_dependency_score, transfer_mastery_log, fading_state) must be added to
      RightToErasureService cascade when built. Make this a repo convention.

      ## Files
      - docs/adr/NNNN-erasure-cascade-convention.md
      - src/shared/Cena.Infrastructure.Tests/Compliance/ErasureCompletenessTests.cs (new)
      - src/shared/Cena.Infrastructure/Compliance/RightToErasureService.cs (future hook)

      ## Definition of Done
      - ADR lists every per-student-indexed document type and its erasure action
      - Convention test scans for [StudentScoped] attribute and fails if not in manifest
      - CI blocks PRs adding per-student tables without erasure coverage

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: ["L110-114", "L278-281"]

verdict: adopt
verdict_reason: |
  Pedagogy features are privacy-aware in design and correctly cite ADR-0003/DPA §7 tensions.
  The P0 gap is uniformly about free-text PII leaking to LLM / persistent tables —
  solvable with one scrubber + one cascade-convention test. Otherwise ship.

cross_lens_handoff:
  - to: persona-cogsci
    about: |
      Are the effect sizes cited (d=1.05 interleaving, g=0.28 spacing) representative of
      meta-analytic mean or cherry-picked? Dr. Rami's assessment suggests concerns.
  - to: persona-educator
    about: |
      Features 5/6 borderline flags on anxiety/frustration — pedagogical soundness check needed.
  - to: persona-enterprise
    about: |
      Every new per-student projection adds to aggregate decomposition (ADR-0012) load;
      mastery vs misconception boundary must be respected in aggregate design.
