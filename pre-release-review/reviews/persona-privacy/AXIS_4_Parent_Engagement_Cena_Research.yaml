non_negotiable_violations: []

persona_findings:
  - severity: P0
    finding: |
      Every parent-visible feature (1, 2, 5, 6, 7, 8) assumes unilateral parent-access
      by virtue of parent account. For 16+ students, Israeli PPA draft opinion (Feb 2025)
      + GDPR-K practice emphasize student dignity — parent-share must be student-opt-in
      at 16+ (unless exceptional circumstances). Doc does not gate any feature on
      student age-band.
    evidence: "AXIS_4_Parent_Engagement_Cena_Research.md:19-22 (summary) + L103-119 (feature 3) + L307-310 (study plan)"
    lens_note: |
      Bagrut students span 12-18; a 17-year-old's math struggles being broadcast to
      parent via SMS without the student's ongoing consent is a dignity/autonomy violation.
      Under-13 defaults are fine (parent-gated); 13-15 should be parent-access-with-notice;
      16+ should be student-grants.

  - severity: P0
    finding: |
      Feature 6 (Encouragement SMS nudges) sends messages about a child's study behavior
      to parent phone. Twilio sub-processor (RDY-069 in-flight). Message content like
      "Yael hasn't studied for 3 days" is per-student behavioral data transmitted via
      a third-party carrier. Needs: (a) Twilio DPA with ZDR / minimal retention;
      (b) explicit separate consent purpose; (c) content scrubbing (no specific struggle);
      (d) SMS regulator compliance (Israeli Communications Ministry).
    evidence: "AXIS_4_Parent_Engagement_Cena_Research.md (Feature 6 summary L20) + src/actors/Cena.Actors/ParentDigest/ParentDigestShipgateTests.cs (banned terms)"
    lens_note: |
      "Growth-framed" wording does not neutralize the data-export-via-SMS surface.
      Twilio message logs are a known PII surface.

  - severity: P1
    finding: |
      Feature 4 (Privacy-Preserving Cohort Context) is the only feature explicitly addressing
      k-anonymity for peer-comparison. Doc gives it SHORTLIST but all other features (1, 5, 7, 8)
      implicitly expose cohort signals. Feature 4 should be a PRE-REQUISITE for 1/5/7/8, not a
      peer feature.
    evidence: "AXIS_4_Parent_Engagement_Cena_Research.md:17"
    lens_note: |
      You cannot ship cohort-comparison features without the DP/k-anonymity infrastructure.
      Ordering dependency is reversed in the doc.

  - severity: P1
    finding: |
      Feature 2 bilingual dashboard in Russian/Amharic requires professionally translated
      privacy notices. Current src/ only shows he/ar/en locale files. Privacy notices in
      Russian/Amharic MUST be validated translations — auto-translation = defective disclosure
      under PPL §11.
    evidence: "AXIS_4_Parent_Engagement_Cena_Research.md:68-70 + src/admin/full-version/src/plugins/i18n/locales/ (he/ar/en/fr only)"
    lens_note: |
      Adding a locale without validated privacy/consent copy creates a PPL §11 violation the
      moment the language selector exposes it.

  - severity: P2
    finding: |
      Feature 3 (Parent-Teacher Bridge Messages) sends child's analytics snippet to teacher.
      Teacher is a third party. Even though teacher has legitimate interest, this routes
      student performance data via parent through messaging layer — audit log needed.
    evidence: "AXIS_4_Parent_Engagement_Cena_Research.md:107-111"
    lens_note: |
      StudentRecordAccessLog already tracks teacher reads; ensure parent-initiated sends
      also log.

  - severity: P2
    finding: |
      Feature 8 (Crisis Mode Bagrut Countdown) triggers alerts to parent near exam date.
      Risk of amplifying exam anxiety on child; must be student-opt-in for 13+. Doc does
      not gate on student age or mood.
    evidence: "AXIS_4_Parent_Engagement_Cena_Research.md:21"
    lens_note: |
      Privacy + wellbeing overlap — parent alerts about crisis can harm rather than help.

