extracted_tasks:
  - title: "Age-band-gated parent-visible data policy + student-opt-in at 16+"
    priority: P0
    estimate: M
    suggested_assignee: claude-subagent-compliance
    queue_body: |
      ## Goal
      Current parent surfaces assume unilateral access. Implement age-band gate:
      - Under 13: parent VPC grants full access; student notified
      - 13-15: parent access by default; student can set scope (which topics visible)
      - 16-17: student-opt-in; parent sees only what student grants
      - 18+: parent sees nothing without account holder consent (adult)

      ## Files
      - src/shared/Cena.Infrastructure/Compliance/ProcessingPurpose.cs (ParentSharing)
      - src/actors/Cena.Actors/ParentDigest/ParentDigestAggregator.cs (age-band filter)
      - New ADR: docs/adr/NNNN-parent-visible-student-data.md
      - src/student/full-version/src/pages/settings/privacy.vue (student-grants UI for 16+)

      ## Definition of Done
      - ADR documents the 4 bands and rationale
      - Aggregator honors band; 16+ emits empty payload without student-grant
      - UI shows student "what your parent sees" view
      - Test for each band

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-compliance --result "<branch>"
    source_doc_lines: ["L17-22"]

  - title: "Twilio sub-processor DPA + ZDR + consent purpose for SMS/WhatsApp nudges"
    priority: P0
    estimate: M
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Feature 6 parent SMS nudges rely on Twilio (already in-flight per RDY-069). Before
      ship: (a) confirm Twilio DPA with zero/minimal retention, (b) add
      ProcessingPurpose.ParentEngagementMessaging, (c) scrub specific struggle content
      from message body, (d) rate-limit to prevent SMS storms, (e) Israeli SMS
      regulatory review.

      ## Files
      - Legal: Twilio Israel DPA
      - src/shared/Cena.Infrastructure/Compliance/ProcessingPurpose.cs
      - RDY-069 (F5b WhatsApp phase 1B) — intersect with this task
      - Privacy page: add Twilio to sub-processor list

      ## Definition of Done
      - DPA executed
      - Purpose added, default-deny for minors
      - Message template bank reviewed; no specific skill-failure text
      - Rate limit per parent/day
      - Privacy page lists Twilio

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: ["L20"]

  - title: "Gate Feature 4 (privacy-preserving cohort) as pre-requisite for 1/5/7/8"
    priority: P1
    estimate: XS
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Feature 4's k-anonymity/DP infrastructure must exist before other parent features
      expose cohort context. Re-sequence roadmap.

      ## Definition of Done
      - Roadmap updated
      - ADR records pre-requisite relationship

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: ["L17"]

verdict: revise
verdict_reason: |
  Good intent but parent features assume unilateral access inappropriate for 16+ students.
  SMS nudges need sub-processor + consent work. Reorder so DP/k-anonymity ships first.
  Once age-band gating + Twilio DPA land, features 1/3/5 are shippable.

cross_lens_handoff:
  - to: persona-ethics
    about: |
      Feature 6 SMS nudges sit on the parent-manipulation boundary. "Growth-framed" does
      not preempt ethical-persuasion concerns about messaging parents about a minor's habits.
  - to: persona-sre
    about: |
      SMS delivery SLO, retry semantics, silent-fail (minor not reached) behavior.
  - to: persona-a11y
    about: |
      Russian/Amharic RTL (Amharic is LTR; Russian Cyrillic has no RTL issue but does need
      Cyrillic font in KaTeX if math terms transliterated).
  - to: persona-enterprise
    about: |
      Parent digest aggregation crosses StudentState + ParentState — aggregate boundary
      implication for ADR-0012.
