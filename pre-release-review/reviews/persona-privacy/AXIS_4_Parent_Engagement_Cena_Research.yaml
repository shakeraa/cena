doc_path: pre-release-review/AXIS_4_Parent_Engagement_Cena_Research.md
reviewer: persona-privacy
reviewed_at: 2026-04-20
doc_summary: |
  Proposes 8 parent-engagement features: "Why this topic" explainability, bilingual
  parent dashboard, parent-teacher bridge messages, privacy-preserving cohort context,
  weekly chapter snapshot, growth-framed SMS nudges, culturally-localized views,
  crisis-mode Bagrut countdown. Explicitly multi-language (Hebrew/Arabic/Russian/Amharic).

system_purpose_fit: 3
  rationale:
    - Several features expose student data to parents without explicit student consent gate
    - SMS nudges (Feature 6) = Twilio sub-processor, not disclosed
    - Feature 4 (Privacy-Preserving Cohort Context) addresses k-anonymity but details thin
    - Non-negotiable #3 honored (explicit "no comparative percentile shame" statements)
    - Israeli PPL minor = under 18 — parental access rights broad, but student dignity/agency still applies (PPA Feb 2025 opinion)

