      ## Goal
      Rami FD-009 flags DPA §7 exposure from prompt logging / fine-tune
      pipeline. routing-config.yaml:548 has log_prompts:false; formalize
      a runtime assertion + code fence that blocks any future code path
      from enabling prompt logging or fine-tune submission.

      ## Files
      - src/llm-acl/Cena.LlmAcl/Compliance/PromptLoggingGuard.cs (new)
      - src/llm-acl/Cena.LlmAcl/Compliance/NoFineTuneAssertion.cs (new)
      - tests/compliance/no-prompt-log.test.ts (new)

      ## Definition of Done
      - Startup assertion: log_prompts MUST be false in non-dev
      - Any call to OpenAI/Anthropic fine-tune endpoints fails at compile time (no import)
      - Grep CI check: banned tokens ["fine_tune", "fine-tune", "training_file"]
      - Docs entry: docs/engineering/compliance-fences.md

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
