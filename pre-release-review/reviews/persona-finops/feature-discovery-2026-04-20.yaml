    - "ADR for per-feature daily $ projection requirement at PR time"
non_negotiable_violations: []
persona_findings:
  - severity: P0
    finding: |
      The 18 SHIP-ready findings include at least 5 LLM-heavy items that
      will BLOW THE BUDGET at 10k concurrent if shipped with default
      Sonnet routing:
        * FD-003 Real-Time Misconception Tagging (mitigable w/ cache+Haiku, ~$75/day)
        * FD-008 AI Partial-Credit Grading (mitigable w/ CAS-first, ~$200/day)
        * FD-009 Socratic AI Tutor (MUST cap to 30 min/day/student + Haiku, else 16x global cap)
        * FD-011 Culturally-Contextualized Problem Generator (MUST be authoring-time batch)
        * FD-014 "Why This Problem" XAI (must cache at selection time)
      Current routing-config.yaml defaults socratic_question, answer_evaluation,
      feynman_explanation to claude_sonnet_4_6 — at 10k concurrency these hit
      $30k-480k/month if naive. Caching + tier-downgrade is not optional.
    evidence: feature-discovery-2026-04-20.md (FD-003, FD-008, FD-009, FD-011, FD-014); contracts/llm/routing-config.yaml:112,121,167,167
    lens_note: These five features determine whether Cena is economically viable at 10k students. Must tier-down + cache before SHIP.
  - severity: P0
    finding: |
      Doc/superprompt reference "ADR-026 3-tier model routing (Agent Booster
      WASM / Haiku / Sonnet-Opus)" but docs/adr/ contains no such file and
      Agent Booster WASM is not implemented (Grep: no "agent.?booster" in
      src/). The actual routing authority is contracts/llm/routing-config.yaml
      task_routing. FinOps-critical: promote the YAML to an ADR so compliance
      tooling can reference it and new LLM features are gated by it.
    evidence: docs/adr/ directory listing; Grep results for agent.?booster
    lens_note: Without ADR-026 existing, "honors 3-tier routing" is an unenforced norm. Make it enforced.
  - severity: P0
    finding: |
      Quick-wins list (Google SSO, Focus Ritual, TTS-highlighting, Confidence
      Calibration, CSV Roster, Auto-Translate Parents, Learning Energy, I'm-
      Confused-Too, Session Type Menu, Explainable Recs) — aggregate runtime
      LLM cost projection is UNDER $100/month at 10k students IF each honors
      the static/template pattern. Ship these first; they prove the cost
      model before LLM-heavy features land.
    evidence: feature-discovery-2026-04-20.md (quick-wins list ~L32)
    lens_note: Stage rollout — cheap wins first validate unit economics before LLM-heavy features commit budget.
  - severity: P1
    finding: |
      Prompt caching configured but target hit rate 60% (routing-config.yaml:345)
      is aspirational. Without production metric it's unknown whether claude
      cache_control blocks achieve that. Cost impact: every 10% miss = ~$500
      -$1000/month extra at Sonnet volumes.
    evidence: contracts/llm/routing-config.yaml:345,371
    lens_note: Production dashboard for prompt-cache hit rate must ship before we rely on 60% figure for cost projections.
  - severity: P1
    finding: |
      Batch API 50% discount for knowledge_graph_extraction (routing-config.
      yaml:200) — extend this pattern to ALL one-time authoring jobs (cultural
      variants, mother-tongue hints, lesson-plan templates). Potential savings:
      $500-2000/month on authoring runs.
    evidence: contracts/llm/routing-config.yaml:200
    lens_note: Batch API is underused; expand coverage.
  - severity: P1
    finding: |
      Per-model monthly caps set conservatively (Sonnet 4.6 $15k, Opus 4.6
      $5k, Haiku 4.5 $3k, Kimi $500-1000 each). Total = ~$30k matches global
      cap. Good. BUT: no inter-model fallback-when-cap-hit logic observed.
      If Sonnet cap exhausts mid-month, fallback_chain should auto-route
      new traffic to Haiku — verify.
    evidence: contracts/llm/routing-config.yaml:291,301
    lens_note: Cap-exhaustion fallback behavior should be explicit test case.
  - severity: P1
    finding: |
      12 DEFER findings — zero cost implication (not built). 3 REJECT
      findings = cost savings realized. Index doc doing FinOps work implicitly.
    evidence: feature-discovery-2026-04-20.md (summary section)
    lens_note: REJECT discipline is the most cost-positive act in this doc.
  - severity: P2
    finding: |
      22 SHORTLIST findings — each needs individual FinOps review before
      promotion to SHIP. Create a checklist item: "FinOps cost projection
      at 10k concurrent + tier assignment + caching strategy" as gate.
    evidence: feature-discovery-2026-04-20.md (SHORTLIST section)
    lens_note: Gate promotion on FinOps review.
