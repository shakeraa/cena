doc_summary: |
  1727-line INDEX/MEGA-DOC consolidating 55 findings (FD-001..FD-055+) across
  10 axes + competitive + cross-domain. 18 SHIP-ready, 22 SHORTLIST, 12 DEFER,
  3 REJECT. Top-10 shortlist + quick-wins list. This doc drives the actual
  roadmap so FinOps scrutiny is highest-leverage here.
system_purpose_fit: 4
  rationale:
    - Index correctly flags ADR-0003/GD-004/RDY-080 tensions.
    - Quick-wins list is heavily front-loaded with zero-runtime-cost features (GOOD).
    - Several SHIP items are hidden cost bombs if not tier-routed (F1 Socratic tutor, F3 misconception tagging, F8 grading).
