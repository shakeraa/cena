verdict: revise
verdict_reason: |
  The mega-index is the roadmap. FinOps verdict: SHIP the quick-wins first
  (they prove unit economics cheaply), then staged rollout of LLM-heavy
  features ONLY after each has explicit tier + cache + per-student cap.
  Promote routing-config.yaml to ADR-026 and add CI scanner. Without these
  guardrails, the 18 SHIP-ready list includes features that individually
  breach the global monthly cap.
