  honored:
    - "Non-dark-pattern (F2 breathing optional, F3 no streak mechanics)"
  violated: []
  missing_adr_needed: []
non_negotiable_violations: []
persona_findings:
  - severity: P1
    finding: |
      F1 Math Concept Map — storage: 150 nodes x ~2KB metadata + student
      mastery overlay = ~5KB/student. 100k students = 500MB total. Trivial.
      But: rendering force-directed graph on client for 150 nodes is fine;
      if it grows to 1000+ nodes, client perf degrades (WebGL needed).
    evidence: cena_cross_domain_feature_innovation.md (F1)
    lens_note: Storage cheap; keep node count bounded.
  - severity: P2
    finding: |
      F2 Pre-Session Focus Ritual — CSS + breath timer. Zero cost.
    evidence: cena_cross_domain_feature_innovation.md (F2)
    lens_note: Fastest ship. Duplicate of feature-discovery FD-017.
  - severity: P2
    finding: |
      F3 Learning Journeys — curriculum authoring (one-time). Runtime is DB
      queries. Zero LLM.
    evidence: cena_cross_domain_feature_innovation.md (F3)
    lens_note: Authoring-hour cost. Ship.
  - severity: P2
    finding: |
      F4 Adaptive Flow Sessions (dynamic difficulty) — builds on existing
      FlowStateService. Pure algorithmic. Zero LLM cost.
    evidence: cena_cross_domain_feature_innovation.md (F4); src/actors/Cena.Actors/Services/FlowStateService.cs
    lens_note: Extension of existing work.
  - severity: P2
    finding: |
      Remaining features (F5-F8) — doc content not fully captured in my read;
      all presented as low-complexity UI/UX adaptations. Flag for per-feature
      cost review if any propose LLM/ML at runtime.
    evidence: cena_cross_domain_feature_innovation.md (F5-F8)
    lens_note: Default-assume cheap; flag any LLM dependency at PR time.
already_built:
  - feature: "FlowStateService (F4 substrate)"
    evidence: src/actors/Cena.Actors/Services/FlowStateService.cs
    note: F4 is extension.
  - feature: "Gamification endpoints (F3 delivery surface)"
    evidence: src/api/Cena.Student.Api.Host/Endpoints/GamificationEndpoints.cs
    note: Journey completion events can land here.
duplicates_of_other_docs:
  - "feature-discovery-2026-04-20.md: FD-017 (Focus Ritual) = F2"
  - "feature-discovery-2026-04-20.md: FD-018 (Learning Energy) adjacent to F4"
extracted_tasks:
  - title: "Pre-author Bagrut concept-map graph JSON (one-time authoring)"
    priority: P1
    estimate: M
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      F1 concept map requires a curated 100-150 node graph of Bagrut math
      concepts + prerequisite edges + Bagrut-unit alignment. One-time
      authoring by domain expert; zero runtime LLM cost.

      ## Files
      - src/shared/Cena.Infrastructure/Content/BagrutConceptGraph.json (new)
      - src/shared/Cena.Infrastructure/Content/BagrutConceptGraphLoader.cs (new)
      - tests/unit/bagrut-concept-graph.spec.ts

      ## Definition of Done
      - JSON schema: {nodes:[{id,label_he,label_ar,label_en,bagrut_unit}], edges:[{from,to,type}]}
      - Expert-authored by Prof. Nadia / Prof. Amjad / Dr. Rami review
      - 100-150 nodes covering 3/4/5-unit Bagrut
      - Loader validates graph is DAG
      - Zero runtime LLM dependency

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: [L10-L40]
verdict: adopt
verdict_reason: |
  Cross-domain features are cost-advantaged (mostly UI). Ship freely.
  Only flag: keep concept map node count bounded; keep F3 journeys static-
  authored (no runtime LLM).
cross_lens_handoff:
  - to: persona-ethics
    about: "F3 'journeys' UX — ensure no streak/loss mechanics, just progress."
  - to: persona-educator
    about: "Bagrut concept graph structure — does prof panel approve?"
