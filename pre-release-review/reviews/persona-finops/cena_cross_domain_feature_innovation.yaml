doc_summary: |
  Eight cross-domain feature adaptations: Obsidian-style concept map,
  breathing focus ritual, Fabulous learning journeys, adaptive flow sessions,
  + 4 others. Mix of client-side UI and analytics; mostly low-cost.
system_purpose_fit: 3
  rationale:
    - Most are client-side UX additions with zero runtime cost.
    - Concept map (F1) graph storage is fine at scale.
    - No heavy LLM dependency.
code_reality_check:
  claims_verified_in_code:
    - "Gamification endpoints exist -> src/api/Cena.Student.Api.Host/Endpoints/GamificationEndpoints.cs"
    - "Flow state service -> src/actors/Cena.Actors/Services/FlowStateService.cs"
    - "Fatigue computation -> src/actors/Cena.Actors.Tests/Sessions/FatigueComputationTests.cs"
  claims_contradicted_by_code: []
