extracted_tasks:
  - title: "Implement CAS-first partial credit pipeline; LLM for explanation only"
    priority: P0
    estimate: L
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Implement F3/F4 partial-credit grading as CAS-first. SymPy checks each
      step's algebraic equivalence to the canonical solution path. LLM is
      invoked ONLY to produce human-readable explanation when CAS says wrong,
      not to grade correctness. Integrates with existing CasRouterService.

      ## Files
      - src/actors/Cena.Actors/Grading/PartialCreditGrader.cs (new)
      - src/actors/Cena.Actors/Grading/StepEquivalenceChecker.cs (new)
      - src/actors/Cena.Actors/Grading/StepExplanationGenerator.cs (new, LLM, cached)
      - src/actors/Cena.Actors.Tests/Grading/PartialCreditGraderTests.cs

      ## Definition of Done
      - CAS (MathNet->SymPy) verifies each step; correct steps get full credit w/ no LLM
      - LLM invoked only for incorrect-step explanations; routed to Haiku
      - Explanation cached keyed on (canonical_step_id, student_step_hash)
      - Target: <=20% LLM invocation rate per answer (80%+ CAS-only)
      - Metric: cena.grading.llm_invocation_rate (alert if > 30%)
      - Metric: cena.grading.cost_usd_per_answer (alert if > $0.01)

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L100-L200]
  - title: "Add misconception-tag cache reusing SAI-003 Redis pattern"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Cache F6 session-scoped misconception tags keyed on (question_id,
      wrong_answer_hash). ADR-0003 compliant: stored under cena:tag:* with
      per-session TTL <=24h, not on student profile.

      ## Files
      - src/actors/Cena.Actors/Misconceptions/MisconceptionTagCache.cs (new)
      - src/actors/Cena.Actors/Misconceptions/IMisconceptionClassifier.cs (new)

      ## Definition of Done
      - Redis cache with 24h TTL (ADR-0003 session-scope)
      - Hit rate metric cena.misconception.cache_hit_rate (target >= 80%)
      - Tier: Haiku (tier listed as 'sonnet' fallback in routing-config.yaml:84 but use direct Haiku routing)
      - Load test 10k students x 15 wrong answers/day = cost < $100/day

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L240-L310]
verdict: adopt
verdict_reason: |
  CAS-gated grading is the cost sweet spot — SymPy verifies for $0, LLM reserved
  for explanation. F2/F5/F7/F8 are analytics features with no cost concern. Only
  F3 risks runaway spend if naively implemented; the extracted task bounds it.
cross_lens_handoff:
  - to: persona-educator
    about: "Is 20% LLM invocation rate (80% CAS-only) acceptable pedagogically, or do more steps need human-language feedback?"
  - to: persona-redteam
    about: "Can adversarial answers reliably produce CAS-inconclusive + LLM invocation to attack cost?"
