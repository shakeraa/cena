doc_path: pre-release-review/AXIS_4_Parent_Engagement_Cena_Research.md
reviewer: persona-finops
reviewed_at: 2026-04-20
doc_summary: |
  Eight parent-engagement features: Why-this-topic card, bilingual dashboard,
  parent-teacher bridge messages, cohort context, weekly snapshot,
  encouragement SMS nudges, culturally-localized views, crisis countdown.
  Mix of SMS/WhatsApp send costs and LLM generation for personalized content.
system_purpose_fit: 4
  rationale:
    - Parent engagement is critical but adds per-parent-day cost (SMS + LLM).
    - Several features explicitly state "template-based" (good) vs "LLM" (watch).
    - WhatsApp adapter already scaffolded (RDY-069) — ongoing vendor cost.
code_reality_check:
  claims_verified_in_code:
    - "WhatsApp Twilio adapter scaffolded -> recent commit e0c2b21 feat(rdy-069) and src/actors/Cena.Actors/ParentDigest/TwilioWhatsAppSender.cs"
    - "Parent console endpoints present -> src/api/Cena.Admin.Api/Features/ParentConsole/"
    - "LLM judge sidecar exists -> src/actors/Cena.Actors/Pedagogy/LlmJudgeSidecar.cs"
  claims_contradicted_by_code: []
  claims_unverifiable:
    - "SMS vendor costs in Israel — doc doesn't specify Twilio vs 019 Telecom; pricing differs materially"
adr_alignment:
  honored:
    - "ADR-0003 — parent views on aggregate, not misconception data"
  violated: []
  missing_adr_needed:
    - "ADR for parent-channel cost ceiling (per-parent monthly SMS/WhatsApp budget)"
non_negotiable_violations: []
persona_findings:
  - severity: P0
    finding: |
      F6 Encouragement Nudges (SMS) — SMS to Israel via Twilio is ~$0.06/msg.
      At 3 nudges/week x 100k parents = 1.2M msg/month = ~$72k/month. This
      exceeds the ENTIRE global LLM cap ($30k/month, routing-config.yaml:301).
      Must switch to WhatsApp (free/cheap for Israel) or in-app push
      notifications only. Doc is silent on channel cost.
    evidence: AXIS_4_Parent_Engagement_Cena_Research.md (F6); contracts/llm/routing-config.yaml:301
    lens_note: Channel choice is THE cost driver. SMS-as-default breaks unit economics.
  - severity: P0
    finding: |
      F1 "Why This Topic" Card — doc explicitly says "template-based, NOT LLM"
      (line ~L48). EXCELLENT. Ship as-is. Contrast with F5 and F8 which do
      not commit to template-only approach.
    evidence: AXIS_4_Parent_Engagement_Cena_Research.md:48
    lens_note: Doc author did the right thing here — others should follow the pattern.
  - severity: P1
    finding: |
      F3 Parent-Teacher Bridge Messages and F7 Culturally-Localized Parent Views
      — if messages are LLM-generated per parent per week, cost = ~100k parents
      x $0.01/msg = $1k/week = $4k/month. Acceptable IF capped. Doc does not
      specify cap.
    evidence: AXIS_4_Parent_Engagement_Cena_Research.md (F3, F7)
    lens_note: Quota per parent per week (1-2 max) essential to avoid cost spiral.
  - severity: P1
    finding: |
      F4 Privacy-Preserving Cohort Context — differential privacy analytics
      are compute-expensive (noise sampling, laplace mechanism). At 10k
      students x daily queries, DP compute is non-trivial. Batch overnight
      to avoid per-request cost.
    evidence: AXIS_4_Parent_Engagement_Cena_Research.md (F4)
    lens_note: Make this a nightly batch job; cache results 24h.
  - severity: P2
    finding: |
      F8 Crisis Mode Bagrut Countdown — pure UI (date math + scheduling).
      Zero LLM cost if rendered from existing mastery aggregates.
    evidence: AXIS_4_Parent_Engagement_Cena_Research.md (F8)
    lens_note: Ship cheap.
