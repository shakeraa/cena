extracted_tasks:
  - title: "Gate all parent messaging to WhatsApp first, SMS fallback with cost cap"
    priority: P0
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Enforce WhatsApp (existing TwilioWhatsAppSender) as primary parent channel;
      SMS only on opt-in or WhatsApp delivery failure. Add per-parent monthly
      SMS cap of 20 messages (~$1.20/month/parent max) to keep channel costs
      under control.

      ## Files
      - src/actors/Cena.Actors/ParentDigest/ParentChannelRouter.cs (new)
      - src/actors/Cena.Actors/ParentDigest/SmsCostCircuitBreaker.cs (new, model on RedisCostCircuitBreaker)
      - src/actors/Cena.Actors.Tests/ParentDigest/ParentChannelRouterTests.cs

      ## Definition of Done
      - Router selects WhatsApp when phone has WA and opt-in; SMS fallback
      - Per-parent monthly cap enforced (count + $ budget)
      - Metric: cena.parent.channel.cost_usd{channel=whatsapp|sms}
      - Alert at 70% of global monthly SMS budget
      - Per-message cost projection at enqueue time; refuse if projected monthly > cap

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L200-L260]
  - title: "Cap LLM-generated parent bridge messages to 1/parent/week"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Prevent runaway LLM cost on F3 bridge messages by enforcing a 1-per-week
      generation quota per parent. Use Sonnet for initial generation but cache
      verbatim for the week; do not regenerate on read.

      ## Files
      - src/actors/Cena.Actors/ParentDigest/ParentMessageGenerator.cs
      - src/actors/Cena.Actors/ParentDigest/WeeklyMessageQuota.cs (new)

      ## Definition of Done
      - Max 1 LLM-generated message per (parent_id, week) tuple
      - Redis key: cena:parent:weekly:{parent_id}:{yyyy-ww} with 8-day TTL
      - Metric: cena.parent.llm.generations_total, cena.parent.llm.cache_hits_total

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L120-L180]
verdict: revise
verdict_reason: |
  F1 and F8 are ship-ready at zero runtime cost. F6 in proposed form (SMS
  default) would single-handedly exceed the global monthly LLM budget; must be
  revised to WhatsApp-first with SMS cap. F3/F7 need explicit per-parent
  weekly quota before commitment.
