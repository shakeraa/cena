  - "axis1: F4 Elaborative Interrogation — overlaps with F1 self-explanation"
extracted_tasks:
  - title: "Cap Socratic self-explanation validation to 3 LLM calls/student/session"
    priority: P0
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Prevent unbounded LLM spend on per-step self-explanation validation by
      enforcing a per-session quota matching SAI-003.4's existing pattern
      (3 LLM calls/student/minute). Beyond quota, degrade to rubric-based
      template validation (regex keyword match against expected concepts).

      ## Files
      - src/actors/Cena.Actors/Explanations/SelfExplanationQuota.cs (new)
      - src/actors/Cena.Actors/Sessions/LearningSessionActor.cs (integrate)
      - src/actors/Cena.Actors.Tests/Explanations/SelfExplanationQuotaTests.cs

      ## Definition of Done
      - Per-student quota: 3 LLM validations per 10-minute window (configurable)
      - On quota exhaustion, return rubric-only feedback (no LLM)
      - Metric: cena.selfexplain.quota_exceeded_total
      - Existing SAI-003 rate limiter reused (no new circuit breaker)

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L40-L90]
  - title: "Ship static i18n bundle for Wise Feedback phrases (zero runtime LLM)"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Author 50-100 growth-framed feedback phrases in Hebrew/Arabic/English once
      (optional Russian/Amharic) and ship as static i18n bundle. Avoid all runtime
      translation LLM cost.

      ## Files
      - src/student/full-version/src/plugins/i18n/locales/he.json (extend)
      - src/student/full-version/src/plugins/i18n/locales/ar.json (extend)
      - src/student/full-version/src/plugins/i18n/locales/en.json (extend)
      - src/student/full-version/src/composables/useWiseFeedback.ts (new)

      ## Definition of Done
      - Hebrew/Arabic/English ship; Russian/Amharic marked deferred
      - Template picks phrase by (mastery_delta, error_type, session_context) triple
      - NO runtime LLM call in this feature
      - A11y: RTL preserved, math in <bdi dir="ltr">

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L140-L200]
verdict: revise
verdict_reason: |
  F1 (per-step Socratic validation) is unshippable at proposed cadence; must be
  quota-capped + tier-downgraded. F3 is miscategorized as LLM feature (should be
  static). F5/F7 ship as-is with zero LLM cost. F8 ship with weekly hard cap.
