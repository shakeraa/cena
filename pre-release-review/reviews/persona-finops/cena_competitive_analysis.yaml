extracted_tasks:
  - title: "Enforce per-student daily Socratic tutor minute cap (default 30 min/day)"
    priority: P0
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F1 Socratic tutor at 10k concurrent students is 16x the global monthly
      LLM cap unless explicitly bounded. Enforce a per-student daily minute
      cap with soft degradation: first 30 min/day on Haiku with caching,
      beyond cap redirects to static hint ladder (no LLM).

      ## Files
      - src/actors/Cena.Actors/Tutoring/TutorDailyBudget.cs (new)
      - src/actors/Cena.Actors/Tutoring/TutorActor.cs (integrate)
      - src/actors/Cena.Actors.Tests/Tutoring/TutorDailyBudgetTests.cs

      ## Definition of Done
      - Per-student daily cap: 30 tutor-minutes OR 15 LLM calls (whichever first)
      - Reset at 00:00 student-timezone (Jerusalem)
      - Degrade to static hint ladder when cap hit
      - Metric: cena.tutor.daily_cap_exhausted_total
      - Metric: cena.tutor.cost_usd_per_student_day (p95 < $0.30)
      - Downgrade socratic_question primary to claude_haiku_4_5 in routing-config.yaml

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L80-L180]
  - title: "Retire F8 Bagrut Engine proposal — already built, author extension task only"
    priority: P1
    estimate: S
    suggested_assignee: claude-subagent-docs
    queue_body: |
      ## Goal
      Update cena_competitive_analysis.md to cite existing AiGenerationService
      + CorpusExpander + CasRouterService instead of proposing greenfield.
      Extract extension task: what's missing vs existing impl.

      ## Files
      - pre-release-review/cena_competitive_analysis.md (edit F8 section)

      ## Definition of Done
      - F8 section reframed as "extension to existing engine"
      - Gaps enumerated vs src/api/Cena.Admin.Api/AiGenerationService.cs
      - Link to existing ADR-0032 cas-gated ingestion

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-docs --result "<branch>"
    source_doc_lines: [L400-L450]
verdict: revise
verdict_reason: |
  F1 at default routing is economically catastrophic (16x global cap). F2
  trigger model undefined = unbounded cost. F3/F4/F5/F7/F9/F10 are fine. F6
  should be static. F8 is already built. Revise to tier down F1, pin F2
  trigger, retire F8 as greenfield.
