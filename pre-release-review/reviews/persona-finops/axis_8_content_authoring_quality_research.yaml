      - Runtime hint delivery: cache read, zero LLM
      - Authoring-time one-time cost budget: ~$50 per 500 questions x 3 langs

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L310-L360]
verdict: revise
verdict_reason: |
  F2 already built — retire greenfield proposal, extract only extension tasks.
  F5 MUST be batch-authoring (one-time cost), not runtime (catastrophic cost).
  F6 MUST be static, not runtime. F1/F3/F4/F7/F8 all have favorable economics.
