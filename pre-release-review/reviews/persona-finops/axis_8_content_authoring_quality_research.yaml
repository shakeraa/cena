      Implement F5 as an AUTHORING-TIME batch job (not runtime) that generates
      ~1000 Arab/Ethiopian/Russian-contextualized problem variants per Bagrut
      unit, CAS-validates each, stores in question bank. Uses Anthropic Batch
      API for 50% discount on authoring cost.

      ## Files
      - src/api/Cena.Admin.Api/Authoring/CulturalVariantGenerator.cs (new)
      - src/api/Cena.Admin.Api/Authoring/BatchAuthoringJob.cs (new)
