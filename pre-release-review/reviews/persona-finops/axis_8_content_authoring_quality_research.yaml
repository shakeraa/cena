  - title: "Mother-tongue hints: pre-author static per-question Hebrew/Arabic/English"
    priority: P1
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Implement F6 as static pre-authored hints (3 levels x 3 languages x N
      questions) stored in question bank. Avoid runtime LLM. Reuse existing
      QuestionBankArabicTranslations patterns.

      ## Files
      - src/api/Cena.Admin.Api/QuestionBankHintLadderAuthoring.cs (new)
      - src/api/Cena.Admin.Api/QuestionBankService.cs (extend)
      - src/api/Cena.Admin.Api.Tests/QuestionBankHintLadderTests.cs

      ## Definition of Done
