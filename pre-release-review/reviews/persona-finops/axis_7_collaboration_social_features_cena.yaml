extracted_tasks:
  - title: "Rate-limit collaborative whiteboard to 30 concurrent sessions, compress strokes"
    priority: P0
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Cap F7 whiteboard bandwidth cost by (a) admitting max 30 concurrent
      teacher-mediated sessions platform-wide, (b) compressing stroke data
      (delta encoding + deflate) to reduce bandwidth 80%+, (c) storing only
      summary snapshots, not full stroke replay.

      ## Files
      - src/actors/Cena.Actors/Whiteboard/WhiteboardAdmissionControl.cs (new)
      - src/actors/Cena.Actors/Whiteboard/StrokeCompressor.cs (new)
      - src/actors/Cena.Actors.Tests/Whiteboard/WhiteboardLoadTests.cs

      ## Definition of Done
      - Admission control gate: reject new sessions beyond 30 concurrent with backpressure
      - Stroke delta encoding cuts bandwidth 80%+ (load-test verified)
      - Session artifacts: final snapshot PNG + last-10-min JSON, not full stream
      - Bandwidth metric: cena.whiteboard.bandwidth_gb_per_day (alert > 50GB/day)
      - Cost projection: < $500/month at 30 concurrent

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L480-L560]
  - title: "Use local Whisper tiny for peer-clip transcription (zero runtime API cost)"
    priority: P1
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Eliminate per-clip transcription API cost for F1 by running Whisper
      tiny/base model in a sidecar (similar pattern to existing SymPySidecar).
      Accuracy trade-off acceptable for moderation-only use.

      ## Files
      - contracts/infra/whisper-sidecar.md (new)
      - src/actors/Cena.Actors/Moderation/WhisperSidecarClient.cs (new)
      - docker/whisper-sidecar/Dockerfile (new)

      ## Definition of Done
      - Sidecar image with whisper-tiny or base (English + Hebrew + Arabic)
      - gRPC interface mirroring SymPySidecarClient pattern
      - Transcription cost per clip: $0 runtime (only container compute)
      - Accuracy spot-check: >= 85% WER on Hebrew/Arabic math terms
      - Circuit breaker + fallback to cloud API (hard-capped at $20/day)

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L60-L150]
verdict: revise
verdict_reason: |
  F1/F3/F4/F5/F6 economics are favorable. F7 whiteboard at proposed scope is
  the most expensive feature in the entire 15-doc set ($2k+/month bandwidth);
  must be admission-controlled or scoped to teacher-mediated sessions only.
  Transcription for F1 should use local Whisper, not cloud.
