doc_path: pre-release-review/axis9_data_privacy_trust_mechanics.md
reviewer: persona-finops
reviewed_at: 2026-04-20
doc_summary: |
  Eight privacy/trust features: Why-this-problem explainer, student profile
  dashboard, data erasure, consent UX, plain-language privacy, inference
  trail, differential-privacy cohort analytics, transparency report. Most
  are UI/data-export features with near-zero runtime cost.
system_purpose_fit: 5
  rationale:
    - Privacy features are mostly static UI, data exports, and batch jobs.
    - Differential privacy is the one compute hotspot.
    - LLM-generated explanations (F1, F6) are cost-controllable via caching.
code_reality_check:
  claims_verified_in_code:
