non_negotiable_violations: []
persona_findings:
  - severity: P1
    finding: |
      F1 "Why This Problem?" Explainable AI — if rationale is generated per
      problem view per student, cost = 10k x 20 views/day x $0.002 Haiku =
      $400/day. Must cache rationale per (student_mastery_state, problem_id)
      tuple. OR precompute a rationale template when the adaptive engine
      selects the problem (one call per selection, not per view).
    evidence: axis9_data_privacy_trust_mechanics.md (F1)
    lens_note: Cache at selection time, not render time. Reuse L1/L2 explanation cache pattern.
  - severity: P1
    finding: |
      F7 Differential Privacy Cohort Analytics — DP queries are compute-
      intensive (noise sampling, query composition tracking). At daily
      aggregation with epsilon<1 per tenant, compute cost is moderate
      ($50-100/month). But MUST batch — per-request DP computation is
      prohibitively expensive and dangerous (epsilon leak per query).
    evidence: axis9_data_privacy_trust_mechanics.md (F7)
    lens_note: Nightly batch + 24h result cache; epsilon budget tracked in dedicated table.
  - severity: P1
    finding: |
      F8 Transparency Report — periodic (quarterly?), not real-time. Cost
      negligible. But if auto-generated via LLM summarization, cap at one
      generation per quarter per tenant — pin the cadence.
    evidence: axis9_data_privacy_trust_mechanics.md (F8)
    lens_note: Quarterly cadence is natural cost cap.
  - severity: P2
    finding: |
      F2 Student Profile Dashboard, F3 Delete My Journey, F4 Consent UX —
      pure data query / state mutation. Zero LLM. Cheap.
    evidence: axis9_data_privacy_trust_mechanics.md (F2, F3, F4)
    lens_note: Ship cheap.
  - severity: P2
    finding: |
      F5 Privacy in Your Language — age-appropriate static copy in he/ar/en
      (and maybe ru/am). One-time authoring, static bundle. Zero runtime cost.
    evidence: axis9_data_privacy_trust_mechanics.md (F5)
    lens_note: i18n bundle; ship.
  - severity: P2
    finding: |
      F6 Data Provenance / Inference Trail — read-only view over existing
      event store. Zero LLM unless rationale text is LLM-generated, in which
      case reuse F1 cache.
    evidence: axis9_data_privacy_trust_mechanics.md (F6)
    lens_note: Reuse F1 rationale cache.
