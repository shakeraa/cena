extracted_tasks:
  - title: "Generate problem rationale at selection time (not view time), cache per state"
    priority: P1
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F1 "Why This Problem" rationale should be generated ONCE when the
      adaptive engine selects the problem for a student, keyed to the
      selection context (mastery snapshot hash + problem_id). Cached until
      student's mastery state materially changes.

      ## Files
      - src/actors/Cena.Actors/Explainability/ProblemRationaleCache.cs (new)
      - src/actors/Cena.Actors/Explainability/ProblemRationaleGenerator.cs (new)
      - src/actors/Cena.Actors.Tests/Explainability/ProblemRationaleTests.cs

      ## Definition of Done
      - Generated at selection time, not view
      - Redis cached keyed on sha256(student_mastery_hash + problem_id)
      - 24h TTL; invalidated on mastery-state-changed event
      - Tier: Haiku (rationale is short, deterministic)
      - Metric: cena.rationale.cache_hit_rate (target >= 85%)
      - Cost target: < $50/day at 10k students

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L40-L100]
  - title: "Implement DP cohort analytics as nightly batch with epsilon ledger"
    priority: P1
    estimate: L
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      F7 differential-privacy analytics MUST be nightly batch (not per-query).
      Track epsilon spend per tenant per month in a dedicated ledger table;
      refuse further queries when budget exhausted.

      ## Files
      - src/api/Cena.Admin.Api/DpAnalytics/DpEpsilonLedger.cs (new)
      - src/api/Cena.Admin.Api/DpAnalytics/DpNightlyAggregateJob.cs (new)
      - docs/adr/00XX-dp-epsilon-budget.md (new ADR)

      ## Definition of Done
      - Epsilon budget per tenant: configurable, default epsilon<=1/month
      - Ledger: query_id, epsilon_consumed, cumulative, tenant_id
      - Query execution via IBM DPL or Google DP library (audited)
      - Nightly batch 2am UTC; results cached 24h
      - Metric: cena.dp.epsilon_remaining{tenant}

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: [L280-L360]
verdict: adopt
verdict_reason: |
  Excellent unit economics across the board. F1 and F7 need caching/batching
  patterns enforced but are within budget. Privacy features are a cost sink
  only if naively implemented; the extracted tasks contain them.
cross_lens_handoff:
  - to: persona-privacy
    about: "F7 epsilon budget sizing (is 1/month/tenant right, or finer granularity needed?)"
  - to: persona-enterprise
    about: "F3 erasure across event-sourced aggregates — tombstone strategy + storage cost."
