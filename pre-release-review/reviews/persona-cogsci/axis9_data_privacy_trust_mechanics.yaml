  - "AXIS_4_Parent_Engagement_Cena_Research.md: Feature 4 Privacy-Preserving Cohort Context = F7 here"
  - "AXIS_10_Operational_Integration_Features.md: Feature 8 Student Data Portability Export = F2/F3 here"
extracted_tasks:
  - title: "F1 XAI: ship rule-based explanation templates, not personalized cogtrait XAI"
    priority: P1
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Implement rule-based explanation surface for each adaptive recommendation
      (why this topic, why this item). Scope: session-local inputs only. No
      cognitive-trait personalization. Template tone varies only by declared
      grade level.

      ## Files
      - src/actors/Cena.Actors/Explainability/RecommendationExplainer.cs (new)
      - src/student-web/src/components/WhyThisTopic.vue (new)

      ## Definition of Done
      - Rules come from the same source as the adaptive decision, not re-derived.
      - No cognitive-trait profile ever consulted.
      - Student can always dismiss.
      - Copy review against ship-gate banned terms.

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "branch: kimi-coder/<id>-xai-rule-based"
    source_doc_lines: [L28-L62]
  - title: "Ship F5 privacy copy at 12-year-old reading level with progressive disclosure"
    priority: P2
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Rewrite first-touch privacy notice + consent copy to ≤40 words primary
      surface, with "More details" expander. Follow docs/cognitive-load-progressive-disclosure-research.md.

      ## Files
      - src/student-web/src/features/privacy/FirstTouchPrivacy.vue
      - Localizations in he/ar/ru/am

      ## Definition of Done
      - Primary copy reading-age ≤ 12.
      - All progressive-disclosure panels indexed by keyword for screen readers.
      - Legal review signs off.

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "branch: kimi-coder/<id>-privacy-copy-progressive"
    source_doc_lines: [Feature 5 section]
verdict: adopt
verdict_reason: |
  From the cogsci lens, F1 (rule-based not cogtrait XAI), F5 (progressive
  disclosure for privacy copy), and F6 (audited provenance) are the only direct
  contributions. The rest is privacy/compliance engineering handed off to the
  privacy lens.
cross_lens_handoff:
  - to: persona-privacy
    about: "All 8 features are primarily privacy-counsel lens. This cogsci review is secondary."
  - to: persona-a11y
    about: "F5 privacy copy must meet WCAG + plain-language + RTL requirements."
  - to: persona-ethics
    about: "F7 DP cohort insights framing risk (see axis4 F4 parallel)."
  - to: persona-finops
    about: "F8 transparency report publishing cadence + infra cost."
