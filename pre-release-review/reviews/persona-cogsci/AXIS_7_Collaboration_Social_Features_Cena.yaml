doc_path: pre-release-review/AXIS_7_Collaboration_Social_Features_Cena.md
reviewer: persona-cogsci
reviewed_at: 2026-04-20
doc_summary: |
  Seven collaboration features: anonymised peer explanation circles, teacher-
  mediated micro-groups, cooperative competitions, async anonymous Q&A, "I'm
  confused too" signal, reciprocal peer tutoring matcher, collaborative math
  whiteboard. Two-sided consent + ephemerality emphasized throughout.
system_purpose_fit: 3
  rationale:
    - Peer Instruction (Crouch & Mazur 2001) and self-explanation (Chi 1989) are
      cogsci-warranted mechanisms for F1; the other features are primarily
      social/moderation engineering with weak cogsci warrants.
    - Anonymous ephemeral peer-explanation is ADR-0003-adjacent: even a 24h
      retained voice recording of a student's explanation is a behavioral
      artifact. Architecture in doc addresses this but the storage surface is
      bigger than Redis-only misconception tags.
    - F3 "Team vs Challenge cooperative competitions" imports a social-comparison
      mechanic into a product whose ship-gate forbids comparative shame. The
      doc's own mitigations require Dr. Rami-style honesty about what changes
      when the comparison is "team" not "individual" — comparative pressure
      persists at the cohort level.
code_reality_check:
  claims_verified_in_code: []
  claims_contradicted_by_code: []
  claims_unverifiable:
    - "'Nearpod Collaborate Board' competitive claim (AXIS_7:118) — verified as a real product, but the teacher-moderation evidence is marketing, not peer-reviewed outcome data."
  claims_unsupported_in_literature:
    - "AXIS_7:38 cites Crouch & Mazur 2001 'correct responses increase from ~59% to ~80% after peer discussion'. This is from a physics concept-inventory context (Force Concept Inventory). Transfer of the specific lift to (a) asynchronous digital explanation circles, (b) secondary-school math, (c) Hebrew/Arabic cross-cohort pairs — is a cogsci leap. Doc should frame as 'Peer Instruction substrate, not predicted lift.'"
adr_alignment:
  honored:
    - ADR-0003 (F1 explanation content 24h TTL, metadata purged after 7d)
    - Non-negotiable 3 (opt-in participation; no coerced peer pairing)
  violated:
    - "Potentially non-neg 3 for F3 'Team vs Challenge Cooperative Competitions'. Ship-gate banned terms include variable-ratio rewards and comparative shame; team-level competition preserves comparative structure even if individual identities are hidden. Needs explicit ship-gate review."
  missing_adr_needed:
    - "Peer-content retention ADR: F1 voice recordings, F7 whiteboard strokes — all are student-produced artifacts that *could* encode PII or misconceptions. Need ADR defining retention, purpose, and deletion triggers for peer-produced content."
non_negotiable_violations:
  - "3 (no dark patterns): F3 team competitions risk re-introducing comparative shame at cohort level, even with individual anonymisation. Requires ship-gate review before SHIP verdict stands."
persona_findings:
  - severity: P1
    finding: |
      F1 (Anonymized Peer Explanation Circles) is the cogsci-strongest feature
      in the doc — self-explanation (Chi 1989) + Peer Instruction (Crouch & Mazur
      2001) are real mechanisms. But effect sizes for *asynchronous digital*
      peer explanation in mixed-ability classrooms are much weaker than the
      Mazur-style synchronous PI in a concept-inventory context. The
      "~59%→80% correct" lift is not a Cena prediction. Reframe as "low-cost
      social scaffold; effect size uncertain in Cena context; pilot".
    evidence: AXIS_7_Collaboration_Social_Features_Cena.md:38
    lens_note: |
      Mechanism mismatch is the standard cogsci critique here. Worth building;
      don't promise the Mazur lift.
  - severity: P1
    finding: |
      F3 (Team vs Challenge Cooperative Competitions) relies on "cooperative
      competition" research (Ke & Grabowski 2007, Slavin). Dr. Kenji concurs
      with Dr. Rami's PASS verdict on that citation's pedigree but notes: Ke &
      Grabowski studied *in-classroom* cooperative games, not a multi-week
      async digital team vs team competition. The mechanism transfer is weaker
      than the citation class suggests, and team-vs-team structures activate
      the same social-comparison circuitry that the ship-gate bans for individuals.
      Recommend ship-gate review or retire.
    evidence: AXIS_7_Collaboration_Social_Features_Cena.md:(feature 3 section; doc prose)
    lens_note: |
      Cogsci lens reading of "comparative shame" — it's about the evaluative
      comparison mechanism, not the unit of comparison (individual vs team).
      Team-level still produces social-evaluative threat (Steele's work).
  - severity: P2
    finding: |
      F5 "I'm Confused Too" anonymous signal — a clean cogsci feature
      (metacognitive monitoring made social without shame). Cheap, safe, and
      the doc architects it correctly. Ships cleanly.
    evidence: AXIS_7_Collaboration_Social_Features_Cena.md:Feature 5 section
    lens_note: "No concerns; this is the low-risk win of the doc."
  - severity: P2
    finding: |
      F6 (Reciprocal Peer Tutoring Matcher) requires learner-profile matching
      ("knows skill X, doesn't know skill Y"). Even if implemented on aggregate
      mastery snapshots (ADR-0003-clean), the *fact of matching* reveals inter-
      student ability differences to the system. Add explicit ADR: matcher uses
      only coarse buckets (familiar / proficient) not fine-grained mastery
      probabilities.
    evidence: AXIS_7_Collaboration_Social_Features_Cena.md:Feature 6 section
    lens_note: "Transfer-of-learning concern: peer tutoring produces larger gains for the tutor than the tutee (Fuchs et al. 2001) — feature framing should emphasise benefits for both."
  - severity: P2
    finding: |
      F1 / F7 voice and whiteboard artifacts: session content is essentially
      student-created derivative work. Cogsci-adjacent privacy risk: a student
      explaining their misconception out loud is producing richer error-pattern
      data than the session-scoped misconception tag Cena already rejected in
      ADR-0003. The 24h TTL is adequate *if* the architecture can prove the
      artifact is never ingested by any ML training pipeline (DPA §7). Needs
      explicit safeguard in DoD.
    evidence: AXIS_7_Collaboration_Social_Features_Cena.md:73-91
    lens_note: "Misconception-data-shaped content leaking via the social surface is the subtlest ADR-0003 risk in the corpus."
already_built:
  - feature: "Session-scoped ephemeral content pattern (F1 voice, F7 whiteboard)"
    evidence: docs/adr/0003-misconception-session-scope.md:49-52 (session aggregate pattern)
    note: "The session-scoped + TTL pattern is already the Cena norm; F1/F7 should reuse the same enforcement infrastructure, not invent their own."
