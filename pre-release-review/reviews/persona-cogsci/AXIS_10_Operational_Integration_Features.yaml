doc_path: pre-release-review/AXIS_10_Operational_Integration_Features.md
reviewer: persona-cogsci
reviewed_at: 2026-04-20
doc_summary: |
  Eight operational/integration features: Google SSO, Mashov sync, CSV roster,
  offline-first mode, multi-device session continuity, IT admin dashboard,
  Google Classroom grade passback, Israeli-compliant data portability export.
  Purely infrastructure — almost no cogsci claims to evaluate.
system_purpose_fit: 2
  rationale:
    - Only F4 (offline-first practice with optimistic progress) has cogsci
      relevance: context-switch cost, ambient-distraction cost, and the
      cognitive burden of sync failures on the learning session.
    - Everything else is auth/integration/deployment engineering; cogsci has
      essentially nothing to add beyond general usability heuristics.
code_reality_check:
  claims_verified_in_code: []
  claims_contradicted_by_code: []
  claims_unverifiable:
    - "Clever '85% reduction in login support requests, 40% usage lift' (AXIS_10:26) — vendor marketing statistic. Not peer-reviewed. Frame as operational hypothesis, not evidence."
  claims_unsupported_in_literature: []
adr_alignment:
  honored: []
  violated: []
  missing_adr_needed:
    - "F4 offline-first optimistic progress — needs an ADR on conflict resolution when offline session state diverges from server. From a cogsci angle: what does the student see when their 'completed' session gets rolled back on sync?"
non_negotiable_violations: []
persona_findings:
  - severity: P2
    finding: |
      F4 (Offline-First Practice Mode) is sound operationally but cogsci view
      flags the failure mode: if a student completes a 30-min session offline
      and the sync later rolls it back (conflict, duplicate, actor-domain
      validation failure), the student experiences a phantom-progress event.
      That is more cognitively damaging than never having the offline mode at
      all — learned-helplessness / trust-erosion research is clear on
      unpredictable-system-state effects. DoD must require: (a) no server-
      side rollback of completed session state, (b) conflict resolution is
      "both session results kept, user-visible", (c) offline sessions preserve
      full CAS verification (cannot mark correct without CAS — ADR-0002).
    evidence: AXIS_10_Operational_Integration_Features.md:(Feature 4 section)
    lens_note: |
      Cogsci angle on infra: unreliable progress feedback is a direct hit to
      the competence support that SDT-motivation relies on.
  - severity: P2
    finding: |
      F5 (Multi-Device Session Continuity) — cogsci concern: context-switch
      cost (15-25s on mobile per Mark et al. cited in cognitive-load research)
      means resumed sessions on a new device should preserve the *cognitive*
      context, not just the last-problem-id. Include 'you were working on X
      with hint Y showing' on resume screen. Minor nicety, not a ship-blocker.
    evidence: AXIS_10_Operational_Integration_Features.md:(Feature 5 section)
    lens_note: "Reduces extraneous load on device switch."
  - severity: P2
    finding: |
      F8 (Israel Privacy Law Compliant Data Portability Export) — if the export
      includes misconception or error-pattern data, that would violate ADR-0003.
      Doc doesn't specify scope. Must be constrained to: mastery snapshot,
      completed-session summaries, user-authored content; NOT error patterns
      or misconception tags.
    evidence: AXIS_10_Operational_Integration_Features.md:(Feature 8 section)
    lens_note: "ADR-0003 extends to exports — not just internal storage."
already_built:
  - feature: "Nothing cogsci-adjacent — infra doc"
    evidence: N/A
    note: "Primary code paths are auth/SSO/sync — not in cogsci lens."
