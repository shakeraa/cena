extracted_tasks:
  - title: "F4 offline-first: define conflict-resolution UX so progress is never rolled back"
    priority: P1
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Design + implement conflict resolution for offline session sync such that
      (a) completed work is never rolled back, (b) CAS verification runs client-
      side AND server-side (double-check), (c) user sees clear 'synced' indicator.

      ## Files
      - src/student-web/src/features/offline/ConflictResolver.ts (new)
      - src/actors/Cena.Actors/Sync/OfflineSessionReconciler.cs (new)
      - docs/adr/00XX-offline-sync-conflict-resolution.md (new)

      ## Definition of Done
      - Completed offline sessions cannot be silently deleted by server.
      - CAS validation runs on server-side acceptance (ADR-0002).
      - Phantom-progress rollback is architecturally impossible.

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "branch: kimi-coder/<id>-offline-sync-safety"
    source_doc_lines: [Feature 4 section]
  - title: "F8 portability export scope: mastery + summary, NOT misconception/error data"
    priority: P1
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Explicit ADR / policy doc constraining F8 export to: mastery snapshots,
      completed-session summaries, user-authored free text. Explicitly excludes
      error-pattern tags / misconception data (ADR-0003 scope extends to export).

      ## Files
      - docs/adr/00XX-data-export-scope.md

      ## Definition of Done
      - ADR written.
      - AXIS_10 F8 section references it.

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "branch: human-architect/<id>-export-scope-adr"
    source_doc_lines: [Feature 8 section]
verdict: adopt
verdict_reason: |
  Pure infrastructure. From cogsci lens only F4 (offline-sync rollback risk) and
  F8 (export scope must match ADR-0003) have persona-specific findings. The rest
  is fine — handed off to enterprise/sre/privacy.
