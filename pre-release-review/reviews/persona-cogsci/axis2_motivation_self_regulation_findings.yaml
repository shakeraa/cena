extracted_tasks:
  - title: "Ship F2 If-Then Session Planner reading onboarding affective tags"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Implement implementation-intentions planner that stores 1-2 student-authored
      if-then plans per session; surface the relevant plan when trigger fires
      (e.g., 3 wrong on geometry proof → show student's own "I will watch hint
      video" plan). Reads existing onboarding self-assessment; does not create
      new affective profile.

      ## Files
      - src/actors/Cena.Actors/SelfRegulation/ImplementationIntentionStore.cs (new)
      - src/student-web/src/features/session-planner/*.vue (new)
      - Plans scoped per session; TTL 90 days max per ADR-0003 alignment.

      ## Definition of Done
      - Plan appears at session end as 1-tap dropdown + short text.
      - Plan is surfaced (at most once per problem) on matching triggers.
      - Plan never influences BKT / mastery model (ADR-0037 tie-breaker only).
      - Framing copy is "your plan", never "you failed to follow your plan".

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "branch: kimi-coder/<id>-if-then-planner"
    source_doc_lines: [L64-L98]
  - title: "Retire F8 Reflective Study Plan Generator citation of Hattie d=1.44"
    priority: P0
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Remove Hattie self-reported-grades d=1.44 citation from F8. Either re-warrant
      using Winne nStudy / Dignath SRL evidence at realistic effect sizes, or mark
      feature DEFER. This is a ship-blocker for evidence hygiene.

      ## Files
      - pre-release-review/axis2_motivation_self_regulation_findings.md (edit F8 section)
      - SYNTHESIS.md should capture the retire-or-revise decision.

      ## Definition of Done
      - Hattie d=1.44 is removed as warrant.
      - Feature either has a defensible effect-size claim or is explicitly downgraded.

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "branch: human-architect/<id>-f8-citation-fix"
    source_doc_lines: [L311-L316]
  - title: "Ship F5 Metacognitive Confidence Check-in session-scoped with Redis TTL"
    priority: P1
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Pre-problem 3-point confidence (😐 low/med/high), post-problem calibration
      message, session-end calibration chart. Per-item data Redis-only; only an
      aggregate calibration_r may be retained (aggregate, non-identifying).

      ## Files
      - src/actors/Cena.Actors/Metacognition/ConfidenceScorer.cs (new)
      - src/student-web/src/features/confidence/*.vue (new)
      - Redis key: session:{id}:confidence:{problemId} with TTL = session lifetime.

      ## Definition of Done
      - No SQL table storing per-item confidence ratings.
      - Calibration feedback always includes an encouraging frame for under-confident students.
      - Feature flag to disable per cohort for anxious-cohort pilots.
      - Bare-prompts-no-feedback anti-pattern (Klar 2023) is NOT shipped — every
        rating is paired with a calibration message.

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "branch: kimi-coder/<id>-confidence-calibration"
    source_doc_lines: [L180-L217]
  - title: "F1 Socratic SE prompt — enforce Redis-only storage for responses"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      If F1 ships, ensure `SelfExplanationAttempt` is a session-scoped Redis record,
      not a SQL table. Aggregate-only counters may be retained for engagement metrics.

      ## Files
      - src/actors/Cena.Actors/Metacognition/SelfExplanationStore.cs (new, Redis-backed)
      - Remove SQL persistence from axis2 F1 sketch (L52-L54)

      ## Definition of Done
      - No PII-adjacent free-text stored longer than session TTL.
      - LLM coherence scoring is one-shot; score not retained per-item.
      - ADR-0037 referenced in code comments.

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "branch: kimi-coder/<id>-se-redis"
    source_doc_lines: [L52-L54]
verdict: revise
verdict_reason: |
  F1, F2, F4, F5 are solid and ship-ready with the data-architecture fixes noted.
  F3, F6 need the growth-mindset-null meta-analyses reflected in their framing.
  F7 needs its d=1.00 claim re-scoped to single-prompt effect sizes. F8 must
  strip the Hattie d=1.44 citation or DEFER. The doc is honest enough to
  acknowledge many of these tensions itself — the revision is making the framing
  match the evidence everywhere, not just in the "Research Gaps" section.
cross_lens_handoff:
  - to: persona-privacy
    about: |
      F8 parent-share of study plans, F5 calibration aggregate retention, F2 reminders
      via WhatsApp — all need explicit COPPA/Israel-PPL review.
  - to: persona-ethics
    about: |
      F4 goal-gradient framing could slide into loss-aversion if "almost mastered"
      copy is too urgent. Ship-gate review needed.
  - to: persona-educator
    about: |
      F7 SRL prompts risk feeling interruptive to Bagrut-pressured students. Pilot
      UX test before scaling.
  - to: persona-finops
    about: |
      F1 LLM per-response coherence scoring = 1 Haiku-class call per SE prompt.
      At high frequency this is the biggest per-student marginal cost in axis2.
