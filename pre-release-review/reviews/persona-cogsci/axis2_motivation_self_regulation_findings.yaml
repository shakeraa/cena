  - "axis1_pedagogy_mechanics_cena.md: F4 (Elaborative Interrogation) overlaps F1 here (Socratic SE)"
  - "AXIS_6_Assessment_Feedback_Research.md: F8 (Confidence Calibration CBM) is the stronger version of F5 here"
