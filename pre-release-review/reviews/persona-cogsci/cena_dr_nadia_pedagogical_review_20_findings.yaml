doc_summary: |
  Dr. Nadia's cross-examination of the 20 SHIP-recommended findings (FD-001 through
  FD-020). Adjudication doc — reads every feature through a pedagogy + Arab-cohort
  equity + motivation-design lens. 17 PASS, 3 WARNING, 0 REJECT. This is itself a
  review doc; the cogsci lens cross-checks Dr. Nadia's adjudications.
system_purpose_fit: 5
  rationale:
    - Dr. Nadia's framing closely matches the cogsci + ADR-constraint framing and
      is internally consistent (she calls out ADR-0003 compliance, ADR-0002 CAS
      dependency, non-neg 3 ship-gate alignment).
    - Her three WARNINGs (FD-009 Socratic AI, FD-014 XAI, FD-016 Team Competitions)
      align with the cogsci concerns I independently raised in axis1, axis7, axis9.
    - Where the cogsci lens and Dr. Nadia's verdict diverge is on evidence-level
      honesty for FD-011 (she calls d=1.16 "extraordinary"; Dr. Rami + cogsci
      view: cherry-picked upper tail).
