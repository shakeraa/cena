  claims_verified_in_code:
    - "Dr. Nadia correctly cites ADR-0003 for FD-003 and FD-015 Redis-only architecture requirement"
    - "HLR / Ebbinghaus, BKT + HLR + FSRS in Mastery/ match her claim at FD-001 spaced mastery cross-ref"
