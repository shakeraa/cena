persona_findings:
  - severity: P1
    finding: |
      Dr. Nadia's FD-011 verdict disagrees with Dr. Rami's REJECT. She acknowledges
      "ES=1.16 is extraordinary" and then SHIPs with a cultural-review-board
      guardrail. Cogsci lens sides with Dr. Rami: a d=1.16 meta-analytic claim for
      instructional interventions is almost certainly publication-bias inflation.
      The feature should ship on the honest d=0.4-0.6 range (still large) — but
      the "extraordinary" framing misrepresents the evidence base and sets up
      stakeholder over-promise. Recommend aligning Dr. Nadia's writeup with
      Dr. Rami's finding at SYNTHESIS.md level.
    evidence: cena_dr_nadia_pedagogical_review_20_findings.md:187-193 (FD-011); finding_assessment_dr_rami.md:27
    lens_note: |
      When two personas disagree on evidence, the honesty lens (Dr. Rami) should
      win. Citing the upper-tail estimate as "the" effect size is a corpus-wide
      anti-pattern that SYNTHESIS.md must resolve.
  - severity: P1
    finding: |
      Dr. Nadia's FD-009 (Socratic Tutor) WARNING with required revisions is
      exactly right from cogsci lens: (1) opt-in per session, (2) always
      "show me the solution" escape hatch, (3) structured sentence starters
      not open dialogue, (4) "why" questions not "how", (5) A/B test first.
      Treat these as **mandatory DoD items** for any Socratic-tutor ticket,
      not just "recommended".
    evidence: cena_dr_nadia_pedagogical_review_20_findings.md:155-167
    lens_note: "No disagreement; concurring + elevating to DoD requirements."
  - severity: P2
    finding: |
      Dr. Nadia's FD-014 WARNING on XAI "Why This Problem?" notes "thin research
      base; potential UI clutter". Cogsci addition: as flagged in axis9, Conati's
      XAI personalization requires a cognitive-trait profile we cannot build
      under ADR-0003/0037. Cena's XAI must be rule-based + age-level-tone only.
      Dr. Nadia's warning understates this — it's not UI clutter, it's a
      scope/privacy constraint.
    evidence: cena_dr_nadia_pedagogical_review_20_findings.md:23
    lens_note: "Amplify Dr. Nadia's WARNING with the scope-constraint rationale from axis9."
  - severity: P2
    finding: |
      Dr. Nadia's FD-016 (Team Competitions) WARNING on moderation burden is
      secondary to the cogsci concern (axis7): team-level comparison activates
      the same social-evaluative circuitry as individual leaderboards. The
      WARNING should be upgraded to ship-gate-review-before-build, not just
      post-build moderation.
    evidence: cena_dr_nadia_pedagogical_review_20_findings.md:25
    lens_note: "Primary risk is the mechanic, not the moderation tooling."
  - severity: P2
    finding: |
      Dr. Nadia's FD-002 (CAS-Gated Variation) PASS framing is strong and I
      concur. Her "template quality control" guardrail at L29 is correct.
      Add: distractor shapes should come from the existing MisconceptionCatalog
      (ADR-0031), not a fresh taxonomy.
    evidence: cena_dr_nadia_pedagogical_review_20_findings.md:22, 65
    lens_note: "Complement, not disagree."
