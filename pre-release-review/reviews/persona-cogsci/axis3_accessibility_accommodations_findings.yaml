  - to: persona-a11y
    about: "F3 (graph paper), F5 (palette), F6 (MathML/SRE), F7 (Arabic RTL) — all primary a11y lens."
  - to: persona-privacy
    about: "F1 'ans_strength_estimate' persistence; F6 'aria_label' localization may encode student language preference."
  - to: persona-educator
