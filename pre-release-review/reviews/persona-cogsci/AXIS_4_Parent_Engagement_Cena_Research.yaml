extracted_tasks:
  - title: "Ship F5 Weekly 3-2-1 Snapshot using existing progress metrics only"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Weekly cron composes a 3-2-1 (accomplishments, current topics, support tip)
      email/SMS for parents from existing aggregate progress data. No misconception
      content ever included (ADR-0003). Language from parent profile.

      ## Files
      - src/admin/api/ParentDigestJob.cs (new)
      - src/actors/Cena.Actors/Outreach/WeeklyDigestBuilder.cs (new)

      ## Definition of Done
      - No per-error-type data in digest body.
      - Celebration-only framing; no percentile comparisons.
      - Parent opt-in; send frequency capped.
      - He/ar/ru/am translation pipeline used.

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "branch: kimi-coder/<id>-weekly-321-snapshot"
    source_doc_lines: [L186-L223]
  - title: "Pilot F6 SMS Nudges with effect-size-honest framing + hard opt-out"
    priority: P2
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Ship first 20 Hebrew/Arabic nudge templates with 2-3x/week cap and hard opt-out.
      Remove the Berkowitz 2015 "0.5-1.1 month" claim from framing; replace with
      "pilot; uncalibrated effect in Cena context."

      ## Files
      - src/actors/Cena.Actors/Outreach/ParentNudgeScheduler.cs
      - Content packs under data/nudge-templates/{he,ar,ru,am}/ (20 each)

      ## Definition of Done
      - Parent can opt out in 1 tap; opt-out state never lost.
      - Template text reviewed for no-shame / no-loss-aversion.
      - No student PII in SMS body.

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "branch: kimi-coder/<id>-parent-nudges"
    source_doc_lines: [L227-L266]
  - title: "ADR: parent 'cultural view' must be self-selected, never auto-classified"
    priority: P1
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Write ADR banning any auto-classification of parent or student into
      'collectivist/individualist' or cultural dashboard variants. If F7 ships,
      profile must be explicit parent selection only.

      ## Files
      - docs/adr/00XX-no-cultural-auto-classification.md

      ## Definition of Done
      - ADR accepted and linked from F7 feature doc.

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "branch: human-architect/<id>-cultural-adr"
    source_doc_lines: [L269-L305]
verdict: adopt
verdict_reason: |
  From the cogsci lens, only F4, F5, F6 have substantive cogsci claims to evaluate;
  the rest are parent-UX/a11y/privacy. F5 is ship-ready. F6 needs citation-honesty
  revision. F4 needs the anxiety-interaction mitigation baked into DoD. Other
  features are adopt-with-handoff to the right lens.
cross_lens_handoff:
  - to: persona-privacy
    about: "F1 transparency, F4 differential privacy, F8 bagrut-exam-date storage — all privacy-first."
  - to: persona-a11y
    about: "F2 bilingual dashboard RTL, F7 cultural localization — a11y lens core."
  - to: persona-ethics
    about: "F8 countdown timer — dark-pattern-adjacent; ship-gate review."
  - to: persona-ministry
    about: "F8 Bagrut-date accuracy + F4 reference data claims need Bagrut-examiner lens review."
