extracted_tasks:
  - title: "Synthesizer: enforce canonical effect-size figures from this mega-doc into axis docs"
    priority: P0
    estimate: M
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      For each finding where feature-discovery-2026-04-20.md uses honest figures
      (FD-001 d=0.34, FD-003 60-80%, FD-011 d=0.4-0.6) and a downstream axis
      doc inflates them (axis1 d=1.05, AXIS_6 95.4%, AXIS_8 d=1.16), produce
      a SYNTHESIS.md table of standardized figures and require the axis docs
      to match before any queue task is enqueued.

      ## Files
      - pre-release-review/reviews/SYNTHESIS.md (citation-discipline section)

      ## Definition of Done
      - Standardized figure table in SYNTHESIS.md.
      - retired.md lists all inflated figures retired.
      - Downstream axis docs revised (or queue-body guidance imposes the honest figure regardless).

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "branch: human-architect/<id>-effect-size-canon"
    source_doc_lines: [L7, L15, L19, L65-L66, L123-L144]
  - title: "Constrain FD-018 Learning Energy Tracker to ADR-0037 scope"
    priority: P1
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Override FD-018 SHIP status in SYNTHESIS.md: no weekly mood-performance
      correlation report, no persistent per-student energy profile. Mood
      emoji may serve as session-opener tie-breaker only.

      ## Files
      - pre-release-review/reviews/SYNTHESIS.md (FD-018 entry)
      - Optionally amend feature-discovery-2026-04-20.md with a dated footnote.

      ## Definition of Done
      - FD-018 scope explicitly bounded by ADR-0037.

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "branch: human-architect/<id>-fd018-adr0037"
    source_doc_lines: [FD-018 entry]
  - title: "Re-bucket 'Top-10 Quick Wins' by evidence-quality tier"
    priority: P2
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Separate the L19 "Quick Wins" list into (a) Tier 1: low effort + strong
      evidence (SSO, CSV roster, Auto-Translation, Confidence Calibration with
      feedback pairing), (b) Tier 2: low effort + cheap experiment status
      (Focus Ritual, Learning Energy, Explainable Recs, I'm Confused Too,
      Session Type Menu).

      ## Files
      - pre-release-review/reviews/SYNTHESIS.md (bucketing table)

      ## Definition of Done
      - Two-tier bucketing with rationale per entry.

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "branch: human-architect/<id>-quickwins-rebucket"
    source_doc_lines: [L19]
verdict: adopt
verdict_reason: |
  This is the corpus spine and its synthesis discipline is high-quality. The
  cogsci-relevant issues are (a) citation-propagation failures to downstream
  axis docs (the synthesizer should fix this), (b) FD-018 pre-dates ADR-0037
  and must be retroactively scope-constrained, (c) "Quick Wins" bucketing
  should separate evidence-solid from cheap-experiment. No features need to
  be retired at this doc level beyond what Dr. Rami already REJECTed.
