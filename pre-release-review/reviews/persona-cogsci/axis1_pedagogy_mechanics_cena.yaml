extracted_tasks:
  - title: "Adopt interleaving scheduler with meta-analytic d=0.34 framing + time-on-task control"
    priority: P1
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Ship F1 (Adaptive Interleaving Scheduler) with Brunmair & Richter 2019 d=0.34
      as headline effect, disclose time-on-task confound, and require problem stem
      to NOT reveal topic label (core mechanism for strategy discrimination).

      ## Files
      - src/actors/Cena.Actors/Scheduling/InterleavingScheduler.cs (new)
      - src/actors/Cena.Actors/LearningSessionActor.cs (wire scheduler into session init)
      - docs/adr/00XX-interleaving-scheduler.md (new ADR: session-only discrimination scores, no student profile)

      ## Definition of Done
      - Scheduler returns a ~10-item packet mixing 3-5 active topics by recency + discrimination score
      - Problem stem has no topic label in UI
      - Strategy-discrimination scores are session-scoped (ADR-0003 compliant) and never written to StudentState
      - Unit tests cover: 3-topic mix, expertise-reversal fade, edge case where only 1 topic is active
      - ADR written and linked from axis1 doc

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "branch: kimi-coder/<id>-interleaving-scheduler"
    source_doc_lines: [L20-L68]
  - title: "Pre-problem retrieval prompts (F3) as session-local low-stakes recall"
    priority: P2
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Ship F3 Embedded Retrieval Micro-Checks with explicit low-stakes framing;
      responses session-scoped, no grading, no cross-session retention.

      ## Files
      - src/actors/Cena.Actors/Retrieval/RetrievalPromptService.cs (new)
      - src/student-web/src/components/RetrievalPromptModal.vue (new)
      - Cena.Admin API: GET/POST /retrieval-prompts (session-scoped only)

      ## Definition of Done
      - Prompt appears before worked example for a configurable subset of problems
      - Student free-text stored in Redis session cache only; purged on session end
      - CAS validates formula equivalence if prompt asks for a formula; no grade displayed
      - Framing copy explicitly says "memory builder" not "quiz"; P1 anxiety finding mitigated
      - Feature flag allows per-cohort opt-out (for anxious-cohort pilot)

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "branch: kimi-coder/<id>-retrieval-microchecks"
    source_doc_lines: [L129-L181]
  - title: "Lock BKT fixed-parameter policy via ADR before F8 worked-example fading"
    priority: P1
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Write ADR documenting that Cena uses fixed BKT parameters (literature values)
      — no per-student parameter fitting, no ML training on response data, no
      self-explanation-quality signal feeding mastery posteriors. Locks the cogsci
      boundary before F8 ships.

      ## Files
      - docs/adr/00XX-bkt-fixed-parameter-policy.md (new)

      ## Definition of Done
      - ADR explicitly forbids (a) per-student BKT parameter learning, (b) LLM-derived
        mastery updates from free-text explanations, (c) affective-signal leakage into
        mastery (cross-ref ADR-0037).
      - Links axis1 F8 tension (L459-L463) and the F1/F4/F8 shared self-explanation
        scoring risk.

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "branch: human-architect/<id>-bkt-policy-adr"
    source_doc_lines: [L459-L463]
  - title: "Re-scope F6 Desirable Difficulty Targeting from global knob to per-concept bounds"
    priority: P1
    estimate: M
    suggested_assignee: claude-subagent-pedagogy
    queue_body: |
      ## Goal
      Replace the single 60/65/70% session-target with per-concept ZPD bounds driven
      by recent HLR recall + discrimination score. No student sees a "success rate"
      percentage. Add cohort A/B harness that is opt-in, not default.

      ## Files
      - src/actors/Cena.Actors/Difficulty/DifficultyAdjuster.cs
      - src/actors/Cena.Actors/LearningSessionActor.cs
      - Cena.Admin experiments UI (opt-in flag)

      ## Definition of Done
      - Target success band is computed from (current HLR recall, concept
        discrimination, most recent 5 session accuracies on that concept).
      - No global 60% knob; no student-facing percentage.
      - Anxious-cohort students (self-reported per ADR-0037) get a tighter lower
        bound — never looser.
      - A/B flag is explicit and auditable.

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-pedagogy --result "branch: claude-subagent-pedagogy/<id>-per-concept-zpd"
    source_doc_lines: [L297-L349]
verdict: revise
verdict_reason: |
  The research base is the strongest in the corpus, but three features (F5, F6, F8)
  leak from their actual mechanism onto richer theoretical warrants than the
  evidence supports, and F6 + F8 touch ADR-0003/ADR-0037 boundaries that need
  explicit ADRs before code. Revise with narrower effect-size claims, per-concept
  DDA bounds, and a BKT-fixed-parameter ADR; then ship F1, F2, F3, F4.
cross_lens_handoff:
  - to: persona-educator
    about: |
      Is the "no topic label on problem stem" (F1 core mechanism) acceptable for
      Israeli Bagrut prep where students benefit from *knowing* the exam unit?
      Pure cognitive-science says hide the label; pedagogy-in-context may disagree.
  - to: persona-privacy
    about: |
      F1 "strategy discrimination matrix" and F8 "self-explanation responses" — even
      session-local, both are rich enough to constitute behavioral profiles if logs
      persist. Need privacy review of the Redis TTL story and log-scrubbing.
  - to: persona-ethics
    about: |
      F5 hint-delay and F6 DDA 40% failure target both risk student frustration for
      vulnerable cohorts. Ship-gate review of "desirable difficulty" copy to avoid
      sliding into variable-ratio-adjacent territory.
  - to: persona-finops
    about: |
      F4 (menu-based SE), F8 (LLM-evaluated SE quality), and F1 (LLM strategy
      auto-classifier axis1:61) all introduce per-problem LLM calls. Confirm
      ADR-026 tier routing (Haiku acceptable for coherence scoring; Sonnet not
      required).
  - to: persona-enterprise
    about: |
      F1's "skill_discrimination_matrix" is a new aggregate. Is it a new aggregate
      root or part of LearningSessionState (ADR-0012)? Cross-check before coding.
