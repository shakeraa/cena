doc_path: pre-release-review/axis1_pedagogy_mechanics_cena.md
reviewer: persona-cogsci
reviewed_at: 2026-04-20
doc_summary: |
  Eight cognitive-science features for Cena: adaptive interleaving, spaced mastery,
  embedded retrieval, elaborative interrogation, productive-struggle hint governor,
  desirable difficulty targeting, near-to-far transfer, and adaptive worked-example
  fading. Strongest citation base of any doc in the corpus.
system_purpose_fit: 5
  rationale:
    - All 8 features map directly to cognitive-load / retrieval / transfer theory
      and to the existing Cena mastery/hint/worked-example infrastructure
      (docs/learning-science-srs-research.md:58-62, docs/cognitive-load-progressive-disclosure-research.md:93-113).
    - Every feature is framed as complement to the CAS oracle, not a replacement
      (axis1:44, 59, 115, 226, 286, 345, 396, 462) — respects non-negotiable 1.
    - No streak/variable-ratio/loss-aversion mechanics proposed; wording is explicitly
      "mastery/retention/desirable difficulty" — honors non-negotiable 3.
code_reality_check:
  claims_verified_in_code:
    - "HLR / Ebbinghaus decay is live -> src/actors/Cena.Actors/Mastery/HlrCalculator.cs (referenced in docs/learning-science-srs-research.md:58-62)"
    - "Hint ladder exists in LearningSessionActor.HintRequest -> docs/adr/0036-stuck-type-ontology.md:17-21"
    - "BKT + HLR + FSRS fields on ConceptMasteryState are already implemented -> docs/learning-science-srs-research.md:8"
    - "CAS router (MathNet + SymPy) locked by ADR-0002 -> docs/adr/0031-error-pattern-matching-approach.md:14-16"
  claims_contradicted_by_code: []
  claims_unverifiable:
    - "Schadenberg et al. EDM 2023 DOI 10.5281/zenodo.8115316 — verifiable in principle but Cena has no code-side DDA yet; feature is truly new"
    - "'Strategy discrimination' auto-classifier via LLM (axis1:61) — no such service in tree; would be net-new LLM call subject to ADR-026 routing"
  claims_unsupported_in_literature:
    - "axis1:27 cites Rohrer 2014 d=1.05 alongside Brunmair 2019 d=0.34 meta-analytic mean. Dr. Rami (finding_assessment_dr_rami.md:17) flags this as cherry-picking the upper tail; doc must lead with d=0.34 and disclose time-on-task confound."
    - "axis1:304 claims DDA targeting 60-70% success maximizes learning rate 'based on EDM research' but cites only one primary study (Schadenberg 2023) — thin evidence for a headline design decision."
adr_alignment:
  honored:
    - ADR-0002 (CAS remains oracle — axis1:341, 464)
    - ADR-0003 (session-scoped data — axis1:58, 114, 168, 223, 279, 337, 392, 453)
    - ADR-0026 (model routing — feature 8 uses LLM for self-explanation quality, must be tiered)
  violated: []
  missing_adr_needed:
    - "Interleaving 'strategy discrimination' scoring — is it session-only or aggregate? Needs explicit ADR, especially if LLM classifies student strategy (axis1:61)."
    - "DDA target success rate (60% vs 65% vs 70%) — this is a pedagogy policy choice with equity implications and deserves an ADR before A/B testing starts."
    - "BKT parameter policy — ADR needed to lock 'no student-data fitting; literature defaults only' (axis1:462) so later refactors cannot silently turn it into an ML model subject to DPA §7."
non_negotiable_violations: []
persona_findings:
  - severity: P1
    finding: |
      Feature 5 (Productive Struggle Hint Governor) cites Kapur's Productive Failure
      literature as the warrant. Kapur's PF is a *group generation without scaffolding*
      manipulation; transferring d to an individual-adaptive hint-delay system is a
      conceptual stretch that the doc itself half-acknowledges (axis1:245). Claim
      should be softened: PF supports "struggle before help" as a design heuristic,
      but the hint-delay intervention has no direct RCT evidence in this doc.
    evidence: axis1_pedagogy_mechanics_cena.md:245-251
    lens_note: |
      Cognitive-science warrant review: d-claims must match the intervention mechanism,
      not the ancestral theory. Dunlosky 2013 also rates productive-failure-style
      "desirable difficulties" as only *moderate* utility on their own.
  - severity: P1
    finding: |
      Feature 6 (Desirable Difficulty Targeting) hands a 60% target to all students
      by default, with 65% for "anxious". This conflates Vygotsky ZPD (a per-learner
      construct varying by concept and moment) with a session-level success-rate
      knob. The flow-theory citation (Csikszentmihalyi 1990) is not a warrant for
      a *specific* numeric target. Without per-concept calibration, 40% failure rate
      will amplify math anxiety for the LD/anxious cohorts the doc claims to help.
    evidence: axis1_pedagogy_mechanics_cena.md:300-306, 344-347
    lens_note: |
      Cognitive load budget: intrinsic load on Bagrut-level material is already high
      (docs/cognitive-load-progressive-disclosure-research.md:36-42). A 40% extrinsic
      failure rate pushes total load over capacity for exactly the students who most
      need scaffolding. DDA must be bounded *per concept* and *per session history*,
      not a global knob.
  - severity: P1
    finding: |
      Feature 8 (Adaptive Worked-Example Fading) acknowledges ML-training tension
      at axis1:462 and suggests "fixed BKT parameters (literature values)" as
      mitigation. Good — but the doc then also proposes using an LLM to "evaluate
      self-explanation quality for mastery estimation" (axis1:459). If that LLM
      output drives fade decisions, the student's free text becomes an input to
      mastery inference — which is the exact pattern ADR-0003 and ADR-0037 are
      built to prevent (affective/metacognitive signal leaking into mastery model).
      This must be explicitly scoped: self-explanation quality may inform UI
      (show model explanation next) but must NOT update any mastery posterior.
    evidence: axis1_pedagogy_mechanics_cena.md:459-463
    lens_note: |
      Cogsci view: self-explanation elicitation is a germane-load intervention;
      scoring it and feeding that into a model is a different construct. The doc
      blurs the two. Aleven & Koedinger's classic finding on menu-based SE was a
      learning gain, not a mastery-estimation input.
  - severity: P2
    finding: |
      Feature 3 (Embedded Retrieval Micro-Checks) cites Murray 2025 meta-analysis
      g=0.18 with CI crossing zero for math retrieval practice (axis1:136). Doc then
      leans on Dunlosky 2013 "high utility" framing and Agarwal 2017 "narrows gap".
      The CI-crossing-zero fact is buried; a cogsci-clean framing would lead with
      "evidence in math specifically is modest and heterogeneous" and position the
      feature as low-cost-so-worth-it rather than big-lever.
    evidence: axis1_pedagogy_mechanics_cena.md:136
    lens_note: |
      Citation hygiene. Dunlosky rates *practice testing* as high utility in general,
      but the doc's feature is *pre-problem formula recall*, a narrower intervention.
  - severity: P2
    finding: |
      Feature 4 (Elaborative Interrogation) and Feature 8 both rely on menu-based
      self-explanation. The doc does not discuss the expertise-reversal risk — once
      a student crosses ~P(known)=0.7, forcing menu-based SE adds extraneous load
      (cognitive-load-progressive-disclosure-research.md:99-101). Fading is mentioned
      in F8 but not in F4; F4 should inherit the same fade rule or document why not.
    evidence: axis1_pedagogy_mechanics_cena.md:219-223
    lens_note: |
      Expertise reversal (Kalyuga et al. 2003) is a first-order cogsci constraint.
      Any SE feature must plan for fade-out or it actively harms advanced learners.
already_built:
  - feature: "Spacing / HLR recall computation (Feature 2's core math)"
    evidence: src/actors/Cena.Actors/Mastery/HlrCalculator.cs (per docs/learning-science-srs-research.md:58-62)
    note: |
      F2's "Spaced Mastery Challenge with Adaptive Intervals" proposes building what
      already exists. The novel piece is the *interval-per-difficulty-tier* policy
      (axis1:99-103), not the decay math. Scope the task to the scheduling policy only.
  - feature: "Hint ladder / hint governor substrate (Feature 5)"
    evidence: docs/adr/0036-stuck-type-ontology.md:17-21 (LearningSessionActor.HintRequest)
    note: |
      The hint ladder exists; F5 adds timing/throttling on top. The feature should be
      re-scoped as "hint-timing governor built on existing ladder + ADR-0036 stuck-type
      router", not a greenfield hint system.
  - feature: "CAS-gated validation for any step (Features 3, 4, 8)"
    evidence: docs/adr/0002-sympy-correctness-oracle.md
    note: "Already locked. Features must route through ICasRouterService."
