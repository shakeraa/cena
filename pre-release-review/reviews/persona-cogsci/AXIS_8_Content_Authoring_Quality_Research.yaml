verdict_reason: |
  F2 ship-ready (IS the ADR-0002 enforcement). F4 is reassertion of existing policy.
  F3 adopts at downstream-of-CAS scoring. F5 ships only with honest effect-size and
  cultural-review ADR. F7 needs explicit ADR pinning its scope to presentation-only
  per ADR-0037. F1, F6, F8 need Dr. Rami citation corrections.
