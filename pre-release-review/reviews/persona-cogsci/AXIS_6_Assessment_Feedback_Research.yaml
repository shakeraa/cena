verdict: revise
verdict_reason: |
  Architecturally one of the two strongest docs in the corpus (along with axis1).
  The citation inflation in F3/F4/F6 is the only blocker; once corrected, F1, F5,
  F6, F7, F8 are all ship-ready. F2 needs a placement-snapshot ADR. F3/F4 need
  the Yu 2026 citation addressed before any quantitative claim enters product
  messaging.
