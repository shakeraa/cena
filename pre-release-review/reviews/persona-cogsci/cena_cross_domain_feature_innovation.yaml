    priority: P0
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Rewrite F7 to strict session-scoped mood tracking with no cross-session
      correlation of mood and performance, or retire. 'Weekly Learning Energy
      Report' as currently framed violates ADR-0037 (affective correlation
      creates behavioral profile).

      ## Files
      - pre-release-review/cena_cross_domain_feature_innovation.md (F7 rewrite)

      ## Definition of Done
      - Either (a) revised scope: session-only, no retained mood-performance correlation, OR (b) RETIRE entry in retired.md.

