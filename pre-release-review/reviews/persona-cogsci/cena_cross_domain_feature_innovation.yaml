      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "branch: human-architect/<id>-f7-retire-or-revise"
    source_doc_lines: [L142-L160]
verdict: revise
verdict_reason: |
  Innovation-by-analogy doc. F1 + F8 ship cleanly on existing infrastructure.
  F2 needs ADR-0037 scope-pinning and citation fix. F4 dedupes to axis1 F6.
  F5 must DEFER until therapy-scope ADR. F7 must either scope to session-only
  or retire.
