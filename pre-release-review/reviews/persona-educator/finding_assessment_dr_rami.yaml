verdict: adopt
verdict_reason: |
  Dr Rami's three REJECTs (FD-003, FD-008, FD-011) identify real
  integrity risks that must be fixed before any teacher-facing
  communication. The five WARNINGs are either citation hygiene or
  framing issues with concrete fixes. None of these require retiring
  features — only correcting the effect-size/citation language around
  them.

