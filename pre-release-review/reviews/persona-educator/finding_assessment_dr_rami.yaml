    priority: P0
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Sweep all Cena internal docs (ADRs, research, marketing drafts,
      roadmaps, onboarding) and replace "95% misconception resolution"
      with "60-80% retry success (DeepMind/Eedi 2025)." Prevents
      teacher-facing claims built on a fabricated figure.
      ## Files
      - grep -r "95%" docs/ pre-release-review/ — replace or remove
      - Each ADR referencing misconception resolution rate
      ## Definition of Done
      - grep "95%.*misconception" returns no results outside this task's
        own history.
      - Replacement figures cite the DeepMind/Eedi 2025 arXiv paper.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: correct-misconception-resolution-figure"
    source_doc_lines: [finding_assessment_dr_rami.md FD-003 + cross-cutting]
  - title: "Replace FD-008 fabricated 'Yu et al. 2026' citations"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
