non_negotiable_violations: []

persona_findings:
  - severity: P0
    finding: |
      Dr Rami's FD-003 REJECT — "95% misconception resolution" is
      fabricated or misattributed. From a pedagogue standpoint this is
      serious: the 95% figure appears in internal team communication
      and motivates the whole misconception-tagging investment.
      Correcting it to 60-80% (actual DeepMind/Eedi range) doesn't kill
      the feature (Cena's implementation is already code-complete and
      ADR-0003 compliant) but *does* change the expected-impact framing
      for teachers. Before any teacher-facing demo or marketing mentions
      this feature, the effect-size must be corrected internally.
    evidence: finding_assessment_dr_rami.md FD-003 REJECT, src/actors/Cena.Actors/Services/MisconceptionDetectionService.cs (feature exists and is compliant; only the ES claim is wrong)
    lens_note: |
      Honest expected-outcome framing is pedagogical ethics. A teacher
      who hears "95% resolution!" and sees 70% in their class loses
      trust in the platform.
  - severity: P1
    finding: |
      Dr Rami's FD-008 REJECT notes "Yu et al. 2026" is unverifiable
      (the year is in the future or doesn't exist). The feature
      (partial-credit grading) is still valuable — CAS-first grading is
      architecturally sound. The fix: replace the fabricated citation
      with real grading-research sources (Yu et al. 2024 arXiv:2408.11728
      is real; the 2026 reference is the fabrication). Do not build
      internal communication on unverifiable claims.
    evidence: finding_assessment_dr_rami.md FD-008 REJECT
    lens_note: |
      Citation hygiene is pedagogical hygiene. We publish to teachers
      who check references.
  - severity: P1
    finding: |
      Dr Rami's FD-006 WARNING on Foster 2021 null effect on math
      achievement is critical. The CBM mechanism improves *calibration*
      but not *achievement*. Shipping the feature framed as an
      achievement booster mis-sets expectations. Frame as a metacognitive-
      awareness tool and scale internal success metrics accordingly (we'd
      expect calibration-accuracy improvement, NOT Bagrut-outcome delta).
    evidence: finding_assessment_dr_rami.md FD-006 WARNING
    lens_note: |
      Foster 2021 is the definitive word on CBM + math. Omitting it is
      cherry-picking.
  - severity: P1
    finding: |
      Dr Rami's FD-011 REJECT on ES=1.16 cherry-picking aligns with my
      axis8 review. A meta-analysis ES above 1.0 in education is almost
      always either a small-study bias artifact or methodology issue.
      Use d=0.3-0.6 in all internal communication; do not build roadmap
      or marketing commitments on 1.16.
    evidence: finding_assessment_dr_rami.md FD-011 REJECT
    lens_note: |
      Dr Nadia and I agree; the three-way resolution is: ship the
      feature, honest about the effect size.
  - severity: P2
    finding: |
      Dr Rami's FD-015 WARNING on Kehrer citation year (2013 vs 2021) is
      minor citation hygiene. Effect size (d=0.37) is correctly cited;
      fix the year and move on.
    evidence: finding_assessment_dr_rami.md FD-015 WARNING
    lens_note: |
      Not a blocker, but should be fixed in the next research doc pass.

