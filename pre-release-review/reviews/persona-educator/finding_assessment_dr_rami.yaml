doc_path: pre-release-review/finding_assessment_dr_rami.md
reviewer: persona-educator
reviewed_at: 2026-04-20
doc_summary: |
  Dr Rami's statistical-honesty assessment of the same 20 SHIP-recommended
  findings. 9 PASS, 8 WARNING, 3 REJECT (FD-003 fabricated 95% misconception
  resolution, FD-008 "Yu et al. 2026" unverifiable citation + DPA§7 issue,
  FD-011 ES=1.16 cherry-picked). Also flags FD-006 Foster 2021 null on math
  achievement and FD-004 RDY-080 implicit Bagrut prediction.

system_purpose_fit: 4
  rationale:
    - Not a pedagogical doc per se — it's a statistical-honesty audit.
      But honest effect-size communication is a pedagogical necessity:
      we don't lie to teachers about what the system will deliver.
    - Dr Rami's three REJECTs + five WARNINGs expose real risks that
      Dr Nadia's review largely passed through.
    - Minus because some WARNINGs (FD-015 Kehrer misdated) are minor
      citation hygiene, while others (FD-003 fabricated 95%) are
      ship-blockers — the doc doesn't differentiate severities clearly.

code_reality_check:
  claims_verified_in_code:
    - "MisconceptionDetectionService enforces ADR-0003 (FD-003 compliance already in code)" -> src/actors/Cena.Actors/Services/MisconceptionDetectionService.cs + src/actors/Cena.Actors.Tests/Compliance/MlExclusionEnforcementTests.cs
    - "CAS step verifier (FD-008 CAS-first architecture for grading)" -> src/actors/Cena.Actors/Cas/StepVerifierService.cs
    - "IRT + Elo (FD-004)" -> src/actors/Cena.Actors/Services/IrtCalibrationPipeline.cs
  claims_contradicted_by_code: []
  claims_unverifiable: []

adr_alignment:
  honored:
    - ADR-0002 (Dr Rami validates CAS-oracle framing in FD-002, FD-005)
    - ADR-0003 (Dr Rami raises the 95% resolution claim as an ADR-0003
