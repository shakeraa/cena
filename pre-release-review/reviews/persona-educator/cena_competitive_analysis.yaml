adr_alignment:
  honored:
    - ADR-0002 (F1 Socratic tutor must CAS-verify every mathematical claim)
    - Ship-gate banned terms (F5 manipulatives explicitly no leaderboards)
    - ADR-0003 (F7 portfolio must be student-controlled + session-scoped
      aggregates)
  violated: []
  missing_adr_needed: []

non_negotiable_violations: []

persona_findings:
  - severity: P1
    finding: |
      Feature 1 (Socratic AI Tutor No-Answer Mode) — Khanmigo's "Socratic
      only" pedagogy earned Dr Nadia's WARNING (FD-009) for exactly the
      right reason: for time-pressured Bagrut students, a tutor that
      refuses to give an answer after 2 exchanges is an enemy, not a
      teacher. The doc correctly cites the Stanford/NBER 2025 d≈0.2 but
      underweights the dropout risk. Cena's TutorMessageService already
      has a turn-budget per ADR-0002 Decision 6; the extracted task
      should be surfacing the "show me the solution" escape hatch
      prominently, not building new Socratic logic.
    evidence: cena_competitive_analysis.md:L39-L74, docs/adr/0002-sympy-correctness-oracle.md Decision 6, src/actors/Cena.Actors/Tutor/TutorMessageService.cs
    lens_note: |
      Socratic is beautiful when the student has time. In week 4 before
      Bagrut? Give them the answer and walk them through it.
  - severity: P1
    finding: |
      Feature 3 (AI-Powered "Stuck? Ask" Button with pulse animation when
      idle) — the pulse animation when student has been idle >2 minutes is
      a nudge mechanism. For anxious students, "the app noticed I'm stuck"
      is shame-triggering, not helpful. Make the idle-detection silent
      (the button is always visible); no pulsing.
    evidence: cena_competitive_analysis.md:L140-L146
    lens_note: |
      Don't draw attention to the student's struggle with UI animation.
      Struggling is normal; showcasing it is humiliating.
  - severity: P2
    finding: |
      Feature 4 (At-Risk Student Alert System) — ALEKS's "unusual learning
      (possible cheating)" signal is the one concerning pattern. Flagging
      a student as possibly cheating based on sudden accuracy jump is a
      false-positive machine — students learn, students get tutoring
      outside Cena. Drop that specific alert; keep the other three
      (stuck-on-topic, decreased-learning, procrastination).
    evidence: cena_competitive_analysis.md:L153-L173
    lens_note: |
      Cheating accusations from an algorithm destroy teacher-student
      trust. I've seen the tutors in every town in Israel — students DO
      get sudden jumps, and it's almost never cheating.
  - severity: P2
    finding: |
      Feature 7 (Student Learning Portfolio) — portfolios are pedagogy
      gold if they include student-annotated work ("this is my best
      factoring solution"), and bureaucratic weight if they just
      accumulate auto-graded scores. Require student reflection attached
      to every portfolio-submitted piece. Optional: teacher can comment.
    evidence: cena_competitive_analysis.md Feature 7 section
    lens_note: |
      Show, don't tell. A portfolio of *scores* is a transcript; a
      portfolio of *annotated work + reflection* is a pedagogical tool.

already_built:
  - feature: "Socratic AI tutor infrastructure (F1)"
    evidence: src/actors/Cena.Actors/Tutor/ClaudeTutorLlmService.cs, TutorMessageService.cs, TutorPromptScrubber.cs
    note: |
      F1's backend substantially exists (Claude LLM wiring, Socratic
      prompt scrubber, safeguarding classifier). The CAS verification
      gate (src/actors/Cena.Actors/Cas/CasVerificationGate.cs) is
      exactly the ADR-0002 enforcement the doc implies is needed. Retire
      "build F1" framing; scope to escape-hatch UX surfacing.
  - feature: "Hint generation / stuck? ask (F3)"
    evidence: src/actors/Cena.Actors/Services/HintGenerator.cs + HintGenerationService.cs, src/actors/Cena.Actors/Diagnosis/HintStuckDecisionService.cs
    note: |
      Hint + stuck detection exist. F3 is a UI surfacing (the help
      button), not new backend.
  - feature: "At-risk alert candidates (F4)"
    evidence: src/actors/Cena.Actors/Services/DisengagementClassifier.cs, StagnationDetector.cs (in Mastery/)
    note: |
      Disengagement + stagnation detectors exist. F4 is a teacher-
      notification + dashboard build on top; not from scratch.

