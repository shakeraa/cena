  claims_verified_in_code:
    - "Claude tutor LLM service" -> src/actors/Cena.Actors/Tutor/ClaudeTutorLlmService.cs
    - "Tutor message service with Socratic guardrails" -> src/actors/Cena.Actors/Tutor/TutorMessageService.cs, TutorPromptScrubber.cs
    - "Safeguarding classifier + escalation" -> src/actors/Cena.Actors/Tutor/SafeguardingClassifier.cs + SafeguardingEscalation.cs
    - "Hint generator + adjustment" -> src/actors/Cena.Actors/Services/HintGenerator.cs + HintGenerationService.cs + HintAdjustedBktService.cs
    - "CAS verification gate stops LLM claims" -> src/actors/Cena.Actors/Cas/CasVerificationGate.cs + CasLlmOutputVerifier.cs
  claims_contradicted_by_code: []
