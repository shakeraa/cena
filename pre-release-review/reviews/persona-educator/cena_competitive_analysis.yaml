doc_path: pre-release-review/cena_competitive_analysis.md
reviewer: persona-educator
reviewed_at: 2026-04-20
doc_summary: |
  10 features adapted from competitive EdTech landscape: Socratic AI tutor,
  real-time in-lesson scaffolding, AI-powered "stuck? ask" button, at-risk
  student alerts, interactive virtual manipulatives, auto-translation parent
  comms, student learning portfolio, Bagrut-aligned practice engine, TTS +
  highlighting, context-aware math keyboard.

system_purpose_fit: 4
  rationale:
    - Grounded in real competitors (Khanmigo, DreamBox, GOOL, ALEKS,
      ClassDojo) and the IL market context. Useful calibration.
    - Most features are covered more thoroughly by the axis docs; this one
      is a dedup/sanity-check layer.
    - F1 Socratic tutor + F3 "stuck? ask" both require strict ADR-0002
      adherence (CAS validates every hint).
    - Minus because several "easy wins" (F9 TTS, F10 math keyboard) are
      treated as one-off sprint items when they actually require
      pedagogue review (RTL math, Ministry-vocabulary alignment — covered
      in AXIS_8).

