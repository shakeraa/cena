extracted_tasks:
  - title: "Surface 'show me the solution' escape hatch prominently in tutor UI"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Cena's TutorMessageService already enforces ADR-0002 turn-budget
      (12 turns standard, 20 boss). The Socratic flow needs a visible
      "show me the full solution" button *from turn 1*, not hidden until
      turn 5. Reduces Bagrut-prep frustration without breaking ADR-0002.
      ## Files
      - src/student/student-web/ (tutor chat surface)
      - src/actors/Cena.Actors/Tutor/TutorMessageService.cs (expose
        "can-reveal-solution" state)
      ## Definition of Done
      - Button always visible, copy reflects gate state (locked for
        first N attempts per ADR-0002 reveal gate, unlocked thereafter).
      - Unlock condition: student attempted problem ≥1 OR ≥2 hint ladder
        rungs consumed.
      - No UI animation/pulsing.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: solution-escape-hatch-visible"
    source_doc_lines: [cena_competitive_analysis.md:L39-L74, docs/adr/0002-sympy-correctness-oracle.md]
  - title: "Remove 'possible cheating' alert from at-risk alert system"
    priority: P2
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Policy-level decision: F4 at-risk alert system will NOT include
      "unusual learning (possible cheating)" signal. High false-positive
      rate; damages teacher-student trust. ADR records the rejection.
      ## Files
      - docs/adr/ (new ADR: "no-cheating-inference-alerts")
      - src/actors/Cena.Actors/Services/DisengagementClassifier.cs
      ## Definition of Done
      - ADR locks the policy.
      - Classifier enumeration does not include a cheating signal.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>: no-cheating-alert-policy"
    source_doc_lines: [L153-L173]

verdict: revise
verdict_reason: |
  Good competitive-landscape calibration. Most features map to already-
  built backends (Socratic tutor, hints, disengagement classifier). The
  reviser notes: drop pulsing UI (shame risk), drop cheating-inference
  alert (trust risk), require portfolio reflection.

cross_lens_handoff:
  - to: persona-ministry
    about: |
      F8 "Bagrut-aligned practice engine" — ministry should confirm the
      practice engine respects Bagrut curriculum versioning.
  - to: persona-a11y
    about: |
      F9 TTS + highlighting — a11y owns RTL, Arabic pronunciation, math
      spoken-expression (MathJax speech-rule-engine output).
  - to: persona-redteam
    about: |
      F6 auto-translation parent comms: redteam should probe translation
      injection attacks (malicious student text causing a translation
      that tricks a parent into a dangerous action).
  - to: persona-finops
    about: |
      Many of these features call LLMs repeatedly (F1, F2, F3); finops
      should ensure 3-tier routing (ADR-026) is honored — simple hints
      ≠ Opus.
