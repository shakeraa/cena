doc_path: pre-release-review/AXIS_8_Content_Authoring_Quality_Research.md
reviewer: persona-educator
reviewed_at: 2026-04-20
doc_summary: |
  8 content-authoring + quality features: Bayesian IRT small-sample
  calibration, SymPy CAS-gated problem variation engine, Bagrut-aligned
  partial-credit rubric engine, Arabic RTL math renderer with notation
  localization, culturally-contextualized problem generator, mother-tongue
  mediated hints, self-efficacy-calibrated difficulty presentation, hybrid
  Elo + expert-judgment difficulty calibration.

system_purpose_fit: 5
  rationale:
    - This doc is the backbone of content correctness + equity. Every
      feature strengthens ADR-0002 or directly serves the Arab cohort.
    - SymPy CAS-gated variation engine (F2) is Cena's soul. Already
      exists (CasGatedQuestionPersister).
    - Cultural-context generator (F5) is the highest-leverage Arab-cohort
      equity feature — but ES=1.16 is cherry-picked per Dr Rami. Use
      d=0.4-0.6 in internal communication.
    - Mother-tongue-mediated hints (F6) is pragmatic translanguaging that
      respects "Hebrew is Bagrut language" reality.

code_reality_check:
  claims_verified_in_code:
    - "CAS-gated question persister exists" -> src/actors/Cena.Actors/Cas/CasGatedQuestionPersister.cs
    - "CAS router + LaTeX validator" -> src/actors/Cena.Actors/Cas/CasRouterLatexValidator.cs, CasRouterService.cs
    - "SymPy sidecar client + MathNet fallback" -> src/actors/Cena.Actors/Cas/SymPySidecarClient.cs, MathNetVerifier.cs
    - "CAS conformance baseline + suite + runner" -> src/actors/Cena.Actors/Cas/CasConformanceSuite.cs + CasConformanceSuiteRunner.cs + CasConformanceBaseline.cs
    - "CasGateMode + CasGateExceptions" -> src/actors/Cena.Actors/Cas/CasGateMode.cs + CasGateExceptions.cs
    - "IRT calibration pipeline" -> src/actors/Cena.Actors/Services/IrtCalibrationPipeline.cs
    - "Elo difficulty + Irt-Elo conversion" -> src/actors/Cena.Actors/Services/EloDifficultyService.cs + IrtEloConversion.cs
    - "Cultural context service" -> src/actors/Cena.Actors/Services/CulturalContextService.cs
  claims_contradicted_by_code: []
  claims_unverifiable:
    - "Arabic RTL math renderer" — SymPy + canonical rendering exist, but
      Arabic-notation profile + Arabic-Indic numerals toggle not apparent.
    - "Mother-tongue hint system" — hints exist; bilingual/translanguaging
      version not apparent.
    - "Bayesian small-sample correction (PyMC/Stan)" — not apparent; IRT
      pipeline uses standard EAP/MLE from what code indicates.
    - "Bagrut partial-credit rubric engine" — step verifier exists, rubric
      layer not apparent (shared gap with AXIS_5 / AXIS_6).

adr_alignment:
  honored:
    - ADR-0002 (F2 is the ADR-0002 enforcement mechanism)
    - ADR-0032 (cas-gated-question-ingestion) — F2 aligns tightly
    - ADR-0003 (F2 distractors generated algebraically from misconception
      categories, not from student data)
  violated: []
  missing_adr_needed:
    - Cultural-context validation ADR — the "community review board"
      guardrail Dr Nadia calls out (FD-011) should be ADR-locked, not
      left to feature-level documentation.

non_negotiable_violations: []

persona_findings:
  - severity: P1
    finding: |
      Feature 5 (Culturally-Contextualized Problem Generator) — Dr Rami
      correctly flagged ES=1.16 as likely cherry-picked. In my
      pedagogue experience, culturally-relevant problems move engagement
      and some conceptual understanding (likely d=0.3-0.6) but they do
      *not* substitute for Bagrut-exam-structure problems. Ship the
      feature, but:
      - internal metrics language uses d=0.3-0.6 (not 1.16)
      - every culturally-contextualized problem must have an equivalent
        "Bagrut-structure" variant for exam transfer
      - community review board is non-optional (ADR-lock it)
      - stereotyping risk: "olive harvest ratios" is fine; ensure no
        problems stereotype by religion, gender, or sect.
    evidence: AXIS_8_Content_Authoring_Quality_Research.md:L193-L236, finding_assessment_dr_rami.md FD-011 REJECT
    lens_note: |
      Bedouin folklore math is pedagogically authentic. "All Arab students
      live in villages and harvest olives" is not. The review board is
      the difference.
  - severity: P1
    finding: |
      Feature 6 (Mother-Tongue-Mediated Hint System) — the proposed model
      (hint body in mother tongue, mathematical terms preserved in Hebrew
      as the language of the Bagrut) is pragmatically correct. But:
      "Clickable mathematical terms show Hebrew equivalents" creates a
      vocabulary-learning bridge only if the Hebrew term is the *official
      Ministry-approved* term, not a machine translation. Build the term
      glossary against the Ministry curriculum document, not LLM output.
    evidence: AXIS_8_Content_Authoring_Quality_Research.md:L216-L240
    lens_note: |
      Arab-Israeli students need the *right* Hebrew word to pass the Bagrut.
      Vague synonyms lose marks on the exam.
  - severity: P1
    finding: |
      Feature 3 (Bagrut-Aligned Partial Credit Rubric Engine) — this is
      the feature that Bagrut teachers have been asking for since the
      first Cena demo. Already covered by axis5/axis6 extract tasks;
      deduplicate. The Ministry scoring rules evolve every 2-3 years —
      version pinning per rubric is non-negotiable.
    evidence: AXIS_8_Content_Authoring_Quality_Research.md:L104-L142
    lens_note: |
      Same feature proposed three times (axis5 F5, axis6 F3, axis8 F3).
      Ship it once, well.
  - severity: P2
    finding: |
      Feature 4 (Arabic RTL Math Renderer) — already covered by axis3 F7
      task. Dedupe. Ministry of Education curriculum for Arab-sector 4/5-
      unit math does *not* use Arabic-Indic numerals for the answer key;
      be careful: students can read Arabic-Indic numerals comfortably but
      must produce Hindu-Arabic on the Bagrut exam. Renderer toggle must
      default to Hindu-Arabic for *answer* entry even when display is
      Arabic-notation.
    evidence: AXIS_8_Content_Authoring_Quality_Research.md:L147-L187
    lens_note: |
      Students must write answers in the script the exam accepts. Display
      ≠ input. Critical subtle detail.
  - severity: P2
    finding: |
      Feature 2 (SymPy CAS-Gated Variation Engine) is already substantially
      built (CasGatedQuestionPersister, CasConformanceSuite, CasRouter
      exist). What's missing per doc: template-DSL for authors + automated
      distractor generation. Those are valuable incremental builds, not
      a from-scratch "feature." Doc should retire the "build F2" framing.
    evidence: AXIS_8_Content_Authoring_Quality_Research.md:L61-L102, src/actors/Cena.Actors/Cas/CasGatedQuestionPersister.cs
    lens_note: |
      Good — the foundation is already there. Scope correctly.

