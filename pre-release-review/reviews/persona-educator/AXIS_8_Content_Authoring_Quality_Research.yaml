extracted_tasks:
  - title: "Template DSL + algebraic distractor generator on top of CAS gate"
    priority: P1
    estimate: L
    suggested_assignee: claude-subagent-content
    queue_body: |
      ## Goal
      Extend CAS-gate with a template DSL for content authors (parameterized
      problem schemas, solution expression, distractor rules derived from
      MisconceptionCatalog) and an automated distractor generator that
      produces ≥3 plausible wrong answers per item, all CAS-validated.
      ## Files
      - src/actors/Cena.Actors/Cas/ (new TemplateDsl.cs, DistractorGenerator.cs)
      - src/actors/Cena.Actors/Services/MisconceptionCatalog.cs (reuse as
        source of misconception categories → distractor rules; no student data)
      - src/admin/full-version/src/views/apps/content-authoring/ (author UI)
      ## Definition of Done
      - Template DSL produces parametrized problem variants.
      - Distractor generator outputs ≥3 CAS-validated wrong answers per
        item, tagged with the misconception category (static catalog, not
        student-learned).
      - Authoring UI: author writes template → live CAS validation → commit.
      - Test: 50 seed templates each produce ≥10 distinct CAS-validated
        variants with ≥3 valid distractors.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-content --result "<branch>: template-dsl-distractor-gen"
    source_doc_lines: [L61-L102]
  - title: "Ministry-vocabulary glossary for mother-tongue hint bridge"
    priority: P1
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Build the Hebrew ↔ Arabic math vocabulary bridge for F6 mother-tongue
      hints. Source terms exclusively from the Ministry of Education
      Arab-sector math curriculum document (לא תרגום חופשי, רק המונחים
      הרשמיים). Ship as a static, curriculum-authored glossary, not LLM.
      ## Files
      - content/math-vocabulary-glossary/ (he-ar JSON keyed by Ministry
        topic code)
      - src/actors/Cena.Actors/Services/ (new MathVocabularyService.cs)
      - src/actors/Cena.Actors/Services/HintGenerationService.cs (consumes
        glossary)
      ## Definition of Done
      - ≥300 terms covering the 3/4/5-unit syllabi.
      - Each term has Ministry-curriculum citation.
      - Reviewed by ≥1 Arab-sector math teacher.
      - No LLM generation of glossary entries.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: ministry-math-glossary"
    source_doc_lines: [L215-L240]
  - title: "Cultural-context community review board + stereotype-guard ADR"
    priority: P1
    estimate: M
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      F5 culturally-contextualized problems require a community-review
      board with cohort representatives (Arab, Ethiopian, Russian, Druze,
      Bedouin teachers). Every cultural context goes through board
      approval before deployment. Also author stereotype-guard criteria:
      no religion-specific, gender-specific, or sect-specific assumptions.
      ## Files
      - docs/adr/ (new ADR: "cultural-context-community-review-board")
      - content/cultural-contexts/ (versioned per cohort, with review
        status field)
      - src/actors/Cena.Actors/Services/CulturalContextService.cs
      ## Definition of Done
      - ADR locks the board + stereotype-guard criteria.
      - Every context has: cohort tag, review-board approver, approval date.
      - Contexts without approval cannot be activated.
      - Effect-size internal comms use d=0.3-0.6 range, not 1.16.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>: cultural-context-review-board"
    source_doc_lines: [L193-L236]

verdict: adopt
verdict_reason: |
  Strong content-infrastructure doc. Most features either already exist
  (F2, F4-partial, F5-partial) or ship cleanly with pedagogue guardrails
  (F3 rubric versioning, F5 community board + stereotype guard, F6
  Ministry vocabulary). Defer the cherry-picked effect-size language;
  retire "build F2" framing since foundation exists.

