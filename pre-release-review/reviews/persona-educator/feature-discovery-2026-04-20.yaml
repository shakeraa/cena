  - to: persona-cogsci
    about: |
      The whole evidence-base section (peer-reviewed, meta-analyses) is
      cogsci territory. Confirm the index's effect-size communication
      aligns with honest meta-analytic estimates.
  - to: persona-ministry
    about: |
      Cross-verify every "Bagrut-aligned" claim across the 55 findings
      does not violate RDY-080.
  - to: persona-privacy
    about: |
      The 8 BORDERLINE guardrail tensions include ADR-0003 (misconception
      data) concerns — privacy owns the resolution audit.
  - to: persona-enterprise
    about: |
      The "Paired-Implementation" matrix (from Dr Nadia's review, also
      implied here) has cross-aggregate implications; enterprise should
      sequence the releases around bounded-context dependencies.
  - to: persona-ethics
    about: |
      The 8 BORDERLINE findings include some loss-aversion / variable-
      ratio tensions that ethics should be the authority on resolving.
