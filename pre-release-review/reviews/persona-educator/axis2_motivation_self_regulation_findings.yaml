extracted_tasks:
  - title: "Add sentence-starter surface to ExplainItBack for L-D/Arabic students"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Add structured sentence-starter buttons ("כי...", "זה דומה ל...", "القاعدة هي...")
      next to the free-text input in ExplainItBack surface. Reduces language
      barrier for Arabic-dominant students and executive-function load for LD
      students. Backend already supports free-text; this is a UI-only task.
      ## Files
      - src/student/student-web/src/components/explain-it-back/ (frontend)
      - src/actors/Cena.Actors/Pedagogy/ExplainItBack.cs (no backend change needed)
      ## Definition of Done
      - 6 Hebrew + 6 Arabic sentence starters per rubric category.
      - Tap-to-insert into the free-text field (students still type the
        continuation).
      - Works RTL with <bdi dir="ltr"> for any embedded math.
      - A11y: keyboard-reachable.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: explain-it-back sentence starters"
    source_doc_lines: [L27-L61]
  - title: "Build if-then implementation-intentions planner (F2) with preview reminders"
    priority: P1
    estimate: M
    suggested_assignee: claude-subagent-pedagogy
    queue_body: |
      ## Goal
      Ship a simple end-of-session planner where students set 1-2 if-then
      plans ("if it's Tuesday 4pm, then I will open Cena and do a 15-minute
      quadratics set"). Reminders delivered via WhatsApp/SMS must embed a
      *preview* of the planned first problem, not just a link. Student self-
      generated plans, not ML-inferred.
      ## Files
      - src/actors/Cena.Actors/Students/ (new ImplementationIntentionState.cs)
      - src/api/Cena.Student.Api.Host/Endpoints/ (new intention endpoints)
      - src/actors/Cena.Actors/Outreach/ (reminder channel wiring)
      - src/student/student-web/ (plan form UI)
      ## Definition of Done
      - Plan storage is student-scoped (not session-scoped) — plans persist.
      - Reminder messages include first-problem preview (concept, est time).
      - Reminder frequency cap: max 1/day/student.
      - Test: plan + reminder + fire + open-session integration path.
      - Compliant with ADR-0003 (no misconception tags in plan).
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-pedagogy --result "<branch>: if-then planner"
    source_doc_lines: [L64-L98]
  - title: "Wise-feedback template library keyed by error type + locale"
    priority: P1
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Build a feedback-template library: for each ErrorType (from
      ErrorClassificationService) x locale (he/ar/en), supply a 2-sentence
      wise-feedback template (high-standards sentence + assurance sentence).
      Default to individual-respect framing; no collective-framing variants
      unless field-tested with Arab-Israeli teachers.
      ## Files
      - src/actors/Cena.Actors/Services/ErrorClassificationService.cs
      - src/actors/Cena.Actors/Services/ (new WiseFeedbackTemplateLibrary.cs)
      - content/wise-feedback-templates/ (he.json, ar.json, en.json)
      - docs/adr/ (new ADR: feedback-design-principles)
      ## Definition of Done
      - ≥20 error types covered.
      - All templates reviewed by ≥1 IL classroom teacher per locale.
      - ADR locks "no collective-achievement framing by default."
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: wise-feedback library"
    source_doc_lines: [L102-L139]
  - title: "Throttle confidence check-ins to ≤1 per 5 problems, high-leverage only"
    priority: P2
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      If F5 confidence calibration is shipped, fire the pre-problem confidence
      rating on at most 1 of every 5 problems and only on items flagged as
      "calibration-eligible" (i.e., high-leverage Bagrut concepts where
      over/under-confidence is known to predict study choices). Reduces
      non-compliance cascade documented by Klar et al. 2023.
      ## Files
      - src/actors/Cena.Actors/Pedagogy/ (new ConfidenceCalibrationGate.cs)
      - src/actors/Cena.Actors.Tests/Pedagogy/ConfidenceCalibrationGateTests.cs
      ## Definition of Done
      - Per-session counter + eligibility flag on items.
      - Default rate ≤ 1 in 5.
      - Tests: student is prompted at most once in first 5 items of a session.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: confidence-check-in throttle"
    source_doc_lines: [L181-L216]

verdict: revise
verdict_reason: |
  Strong research base and mostly compliant, but three shipping-level details
  (reminder preview-vs-link, confidence-check-in frequency, Arab-Israeli
  cultural framing) need pedagogue revision before the features hit students.
  F1 is already mostly built — retire the "build from scratch" framing and
  extract the sentence-starter surface only.

cross_lens_handoff:
  - to: persona-privacy
    about: |
      F8 (Reflective Study Plan Generator) proposes parent-shareable plans
      with student-controlled sharing. privacy should review the under-16
      consent flow + what exactly is shared (topic names vs. accuracy
      metrics).
  - to: persona-ethics
    about: |
      F4 Mastery Path explicitly avoids streaks, but "micro-milestones"
      ("you're over halfway!") could accidentally become variable-ratio
      rewards if celebration cadence isn't deterministic. Ethics should
      audit the milestone trigger rules.
  - to: persona-ministry
    about: |
      F2 reminder framing should avoid anything that implies a guaranteed
      pass rate or score on the Bagrut (RDY-080). Verify reminder copy.
  - to: persona-a11y
    about: |
      F6 process-praise frequency and visual animation intensity needs
      a11y review (reduced-motion preference, no flashing).
