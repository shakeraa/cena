doc_path: pre-release-review/axis2_motivation_self_regulation_findings.md
reviewer: persona-educator
reviewed_at: 2026-04-20
doc_summary: |
  8 motivation + SRL features: Socratic self-explanation prompts, if-then
  session planner, wise-feedback engine, non-loss mastery path, confidence
  check-ins, process-praise, SRL micro-prompts, reflective study plan.
  Recommends SHIP for F1-F4, SHORTLIST for F5-F7, DEFER F8.

system_purpose_fit: 4
  rationale:
    - Motivation/SRL for 16-year-olds preparing for high-stakes Bagrut is
      arguably the biggest unmet need — the research base the doc cites is
      strong (Breitwieser 2026 implementation intentions g=0.31, Dignath
      2008 SRL d=0.69-1.00).
    - Respects non-negotiable #3 (no dark patterns) — F4 explicitly forbids
      streaks / decay / fire emojis.
    - Respects ADR-0003 — all reflection text proposed as ephemeral,
      stored only as aggregate scores.
    - Minus one because the proposed "Arabic-cohort sentence starters"
      and Ramadan-scheduling nuance in F2 is welcome but buried under
      generic research citations; needs field-validation with actual Arab-
      Israeli teachers before shipping.

code_reality_check:
  claims_verified_in_code:
    - "Self-explanation infrastructure (F1) already exists" -> src/actors/Cena.Actors/Pedagogy/ExplainItBack.cs:20-172
    - "LLM judge sidecar for coherence scoring pattern exists (RDY-074 Phase 1B)" -> src/actors/Cena.Actors/Pedagogy/LlmJudgeSidecar.cs
    - "Explanation-cache keyed by (question, errorType, language) — not student — supporting F1/F3 without violating ADR-0003" -> src/actors/Cena.Actors/Services/ExplanationCacheService.cs
    - "Mastery path (F4) scaffolding" -> src/actors/Cena.Actors/Mastery/MasteryPipeline.cs, src/actors/Cena.Actors/Graph/ (concept graph)
  claims_contradicted_by_code: []
  claims_unverifiable:
    - "Wise feedback (F3) — no evidence that error-type-specific feedback templates exist yet; likely new" -> src/actors/Cena.Actors/Services/ErrorClassificationService.cs exists but a *wise-feedback template library* keyed by error type + locale is not apparent.
    - "If-then planner (F2)" -> no code found; appears to be fully new feature.

adr_alignment:
  honored:
    - ADR-0003 — explicit session-locality on self-explanation responses and
      confidence judgments; aggregate-only for calibration scores.
    - Ship-gate banned terms — F4 explicitly forbids streaks and loss-
      aversion, consistent with docs/engineering/shipgate.md.
  violated: []
  missing_adr_needed:
    - Process-praise / feedback-design ADR. Several features (F3 wise
      feedback, F6 process praise) prescribe feedback-template structure as
      core product behavior; this should be ADR-locked like ADR-0002 rather
      than left as per-feature configuration.

non_negotiable_violations: []

persona_findings:
  - severity: P1
    finding: |
      Feature 2 (If-Then Session Planner) uses WhatsApp/SMS reminders. From a
      classroom teacher's standpoint, the reminder voice matters enormously:
      IL Bagrut students already get WhatsApp-bombarded by teachers, private
      tutors, and parents. Another SMS will be silenced within 2 weeks. The
      doc's framing "Your study time is ready!" is fine copy but insufficient
      as a design principle. Recommend: bundle the trigger with a *concrete
      single-problem-preview* ("תרגיל מחכה לך — פונקציה ריבועית, 3 דקות") so
      the message is *the session*, not a link *to* the session. Reduces
      intention-action gap by 100%.
    evidence: axis2_motivation_self_regulation_findings.md:L87-L90
    lens_note: |
      Decades of watching students get reminded to study vs. actually study.
      The gap is always the click. Remove the click.
  - severity: P1
    finding: |
      Feature 5 (Metacognitive Confidence Check-ins) proposes a 3-point
      pre-problem confidence rating. Klar et al. 2023 (which the doc cites)
      found high non-compliance with bare prompts. Asking a 16-year-old
      Bagrut student to rate confidence before *every* problem will cause
      them to click low/medium/high at random within 3 problems. The prompt
      should fire ≤1 in 5 problems, and only on flagged "high-leverage"
      items — otherwise we're training the exact opposite of calibration.
    evidence: axis2_motivation_self_regulation_findings.md:L181-L217, L212-L214
    lens_note: |
      Any prompt a student can auto-dismiss *will* be auto-dismissed. The
      doc's own mitigation (cite 4 "key is pairing with feedback") isn't
      enough — frequency control is more important than feedback design.
  - severity: P1
    finding: |
      Feature 3 (Wise Feedback Engine) proposes cultural framing for Arab-
      speaking students: "Your preparation matters for your future and your
      community." In Israeli classroom reality, many Arab-Israeli students
      (especially girls in traditional communities) experience collective-
      achievement framing as *more* pressure, not less. Yeager's US-
      African-American research does not automatically transfer. Must
      field-test with Arab-Israeli teachers before deploying collective-
      framing variants — default to individual-respect framing ("אתה מסוגל
      להגיע לזה") as the Hebrew/Arabic baseline.
    evidence: axis2_motivation_self_regulation_findings.md:L105, L346
    lens_note: |
      Cultural sensitivity is not the same as cultural competence. Borrowing
      the Yeager frame directly into Arab-Israeli context is a research
      import that needs pedagogue review.
  - severity: P2
    finding: |
      Feature 1 (Socratic Self-Explanation Prompts) — the doc says "mandatory
      but low-stakes." For an anxious student already self-explaining is
      cognitively loaded. "Mandatory" language is the wrong commitment — make
      it the default with a one-tap "skip" that the LLM judge sees and
      factors into fatigue tracking. ExplainItBack's PromptFatigueGate
      (src/actors/Cena.Actors/Pedagogy/ExplainItBack.cs:149) already limits
      to ≤1 prompt/session — the doc should acknowledge that guardrail exists
      and defer to it rather than proposing mandatory prompts.
    evidence: axis2_motivation_self_regulation_findings.md:L28, src/actors/Cena.Actors/Pedagogy/ExplainItBack.cs:149-172
    lens_note: |
      Prompt fatigue is real. The system already handles it. Don't re-propose.
  - severity: P2
    finding: |
      Feature 7 (SRL Micro-Strategy Prompts) pre/mid/post session triplet is
      pedagogically beautiful and practically intrusive. A session that's 20
      minutes gets 3 interruptions plus the learning content. Recommend:
      pre-session prompt is opt-in weekly (not per session); mid-session
      prompt fires only when struggle signal detected; post-session prompt is
      shown only if student completed ≥50% of planned items.
    evidence: axis2_motivation_self_regulation_findings.md:L263-L302
    lens_note: |
      Three prompts in a 20-minute session is the equivalent of a teacher
      interrupting four times during independent practice. No 16-year-old
      tolerates that.

already_built:
  - feature: "Socratic self-explanation prompt (F1)"
    evidence: src/actors/Cena.Actors/Pedagogy/ExplainItBack.cs (RDY-074 Phase 1A+1B shipped)
    note: |
      F1 is ~70% built. The interface, prompt-fatigue gate, LLM-judge sidecar,
      and rubric category enum (ExplainRubricCategory) already exist. What is
      missing is the step-level (not problem-level) surface and the
      structured-sentence-starter UI. Retire F1-from-scratch, extract only
      the UI/surface sub-task.

