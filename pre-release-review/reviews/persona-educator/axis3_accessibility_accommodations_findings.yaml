extracted_tasks:
  - title: "Ship Arabic RTL math renderer with <bdi dir=ltr> and notation profile"
    priority: P0
    estimate: M
    suggested_assignee: claude-subagent-a11y
    queue_body: |
      ## Goal
      Render KaTeX math respecting student notation profile: RTL flow for
      Arabic-medium students; mirrored sigma/sqrt where canonical; Arabic-
      Indic numerals as optional toggle; variable letters follow profile.
      Canonical CAS calculations remain LTR; rendering layer translates.
      ## Files
      - src/student/student-web/ (KaTeX wrapper)
      - src/actors/Cena.Actors/Cas/ (no change — CAS stays canonical)
      - notation profile schema (new)
      ## Definition of Done
      - Arabic student sees RTL math with <bdi dir="ltr"> isolating embedded
        non-Arabic tokens.
      - Toggle between "Arab-Israeli notation" and "Hebrew/English notation."
      - Visual regression tests for at least 10 canonical Bagrut expressions
        in both directions.
      - Math-always-LTR memory rule explicitly addressed (LTR for Hebrew
        pages; RTL for Arabic pages only on user-selected notation profile).
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-a11y --result "<branch>: RTL math renderer"
    source_doc_lines: [L145-L165 (AXIS_8 feature 4), axis3 F7 section]
  - title: "Interactive number line with training/exam modes"
    priority: P1
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Ship the interactive number line (F2) with two modes: training (audio/
      haptic, adaptive zoom) and exam (static, paper-like). Student UI
      progressively shifts from training to exam mode based on weeks-to-
      Bagrut. Placement accuracy feeds into formative signals, not
      misconception tags.
      ## Files
      - src/student/student-web/ (new NumberLine component)
      - src/actors/Cena.Actors/Cas/ (reuse CasRouterLatexValidator for
        fraction/expression placement validation)
      ## Definition of Done
      - Training + exam modes switchable per student; default = training.
      - Session-scoped placement data only; no persistent misconception tag.
      - A11y: keyboard placement, screen-reader output, colour-blind-safe
        magnitude bands with pattern fill.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: number-line training+exam"
    source_doc_lines: [L109-L163]
  - title: "Defer subitizing trainer (F1); scope to diagnostic-only"
    priority: P2
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Write an ADR rejecting the subitizing *intervention* for ages 15-18,
      while accepting its use as a brief *diagnostic* to flag students who
      may benefit from human-tutor referral rather than in-app intervention.
      Saves 3-4 sprints of misplaced investment.
      ## Files
      - docs/adr/ (new ADR: "subitizing-training-out-of-age-band")
      ## Definition of Done
      - ADR cites Kucian 2020 age band (7-10) vs Cena target (15-18).
      - ADR describes the diagnostic-only alternative.
      - No engineering work until ADR is approved.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>: subitizing-age-band ADR"
    source_doc_lines: [L49-L106]

verdict: revise
verdict_reason: |
  Feature 7 (RTL math) should be a blocker, not a SHIP-verdict feature.
  Feature 2 (number line) is great but needs exam-mode for transfer.
  Feature 1 (subitizing) is age-inappropriate for Bagrut cohort and should
  be rescoped or retired. Most other features are solid with small revisions.

cross_lens_handoff:
  - to: persona-a11y
    about: |
      This whole doc is primarily your lens — please validate WCAG 2.2 AA
      compliance details (contrast without hue change, keyboard reachability,
      reduced-motion respected across F4 timer and F8 predictable-UI).
  - to: persona-privacy
    about: |
      F1's "anonymize after 90 days" is longer than ADR-0003's 30-day
      active window. Review whether 90d is justifiable even for subitizing
      training data.
  - to: persona-enterprise
    about: |
      MathML screen-reader pipeline (F6) implies a standardized MathML
      representation from the question-bank source of truth — needs
      alignment with the Cas/CasRouterLatexValidator pipeline to avoid a
      second math-AST.
  - to: persona-ministry
    about: |
      Confirm which exam-accommodation tools (number line, calc, scribe)
      IL Ministry permits on 3/4/5-unit Bagrut, so the "exam mode" surface
      matches the actual allowed affordances.
