extracted_tasks:
  - title: "Enforce k≥10 minimum-anonymity for class-level teacher aggregates"
    priority: P1
    estimate: S
    suggested_assignee: claude-subagent-privacy
    queue_body: |
      ## Goal
      Every class-aggregate teacher view (Features 1, 3, 4, 8) must suppress
      skill-level breakdowns when fewer than 10 students have attempted the
      skill. Replace with "insufficient data — wait for more responses."
      Protects small-class students from implicit misconception profiling.
      ## Files
      - src/actors/Cena.Actors/Projections/ (aggregate computation)
      - docs/adr/ (new ADR: "minimum-anonymity-for-teacher-aggregates")
      - src/actors/Cena.Actors.Tests/Projections/KAnonymityEnforcementTests.cs
      ## Definition of Done
      - k≥10 threshold enforced at projection layer, not UI.
      - ADR records decision and rationale.
      - Tests: class of 9 students → aggregate suppressed; class of 10 → shown.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-privacy --result "<branch>: k-anon teacher aggregates"
    source_doc_lines: [L50-L54, L83-L87]
  - title: "Bagrut rubric engine with version pinning"
    priority: P1
    estimate: L
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Build the Bagrut partial-credit rubric engine (F5 / FD-020). Every
      rubric is versioned against a Ministry document version. Student work
      is scored against the rubric version *active at authoring time*, not
      retroactively. Deterministic rule engine (not LLM) on top of CAS step
      verification.
      ## Files
      - src/actors/Cena.Actors/Cas/ (new BagrutRubricEngine.cs + BagrutRubricVersion.cs)
      - src/actors/Cena.Actors/Assessment/
      - content/bagrut-rubrics/ (versioned JSON rubrics, seed with 3-unit + 4-unit current)
      - docs/adr/ (new ADR: "bagrut-rubric-versioning-policy")
      ## Definition of Done
      - Rubric engine decomposes solution path into scorable steps with
        Ministry penalty structure.
      - Version pinned per authored item; never retroactively re-scored.
      - ADR for rubric versioning decision.
      - SymPy validates each step; rubric decides penalty. Never LLM-only.
      - Seed content: 20 past Bagrut items with expert-assigned rubrics.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>: bagrut-rubric-engine"
    source_doc_lines: [L166-L195]
  - title: "Hide differentiation stream labels from student view"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F2 homework auto-generator three-stream model (Core/Progress/Stretch)
      must never expose stream labels to the student UI. Student sees only
      "your homework" — a personalized set. Teacher sees streams on their
      dashboard. Prevents ability-tracking perception.
      ## Files
      - src/actors/Cena.Actors/Assessment/ (homework assignment)
      - src/student/student-web/ (homework UI)
      ## Definition of Done
      - Stream attribute exists on assignment but never exposed to student API.
      - Admin/teacher sees stream label; student does not.
      - Test: student-scope API never returns 'stream' field.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: hide-differentiation-stream-labels"
    source_doc_lines: [L58-L88]

verdict: revise
verdict_reason: |
  Features are largely well-designed for teacher productivity, but three
  pedagogue-sensitive details (k-anonymity for small classes, stream-label
  hiding, Bagrut rubric versioning) need explicit guardrails before
  shipping.

cross_lens_handoff:
  - to: persona-privacy
    about: |
      F4 exit-ticket sharing with students, F1 class-weakness aggregation
      — privacy should fully own the k-anonymity design and the parent-
      view of conference talking points.
  - to: persona-ministry
    about: |
      F5 Bagrut rubric engine — ministry should be the source of truth on
      current scoring rules; F7 readiness tracking must avoid RDY-080
      violation.
  - to: persona-enterprise
    about: |
      F1 class weakness profile + F2 homework generator share an underlying
      "class state" aggregate — recommend enterprise review the aggregate
      as a first-class domain event / projection for consistency.
  - to: persona-ministry
    about: |
      Claim "AES scores 0.93-0.96 correlation" (L170) is medical-education
      data, not Bagrut. Ministry should verify no Bagrut-specific accuracy
      claim reaches marketing until Cena runs its own concordance study.
