extracted_tasks:
  - title: "Retire Bagrut countdown timer; replace with rolling week-focus card"
    priority: P0
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Explicitly retire F8 "Crisis Mode Bagrut Countdown Dashboard" as
      violating non-negotiable #3 (no dark-pattern engagement — loss-
      aversion mechanic). Replace with a "this week's focus" rolling view
      that does not surface days-to-exam as a countdown.
      ## Files
      - docs/adr/ (new ADR: "no-countdown-timers")
      - pre-release-review/reviews/retired.md (append)
      ## Definition of Done
      - ADR locks the retirement with reference to shipgate.md + GD-004.
      - Replacement card design brief: 3 topics this week, no countdown.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>: retire-bagrut-countdown"
    source_doc_lines: [L21 summary row F8]
  - title: "Gate parent-teacher bridge messages behind teacher opt-in"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F3 bridge-messages must not surface "discuss gaps" templates to a
      parent unless the teacher has enabled that teacher-facing feature.
      Default parent templates are "celebrate progress" only. Teacher can
      opt-in to receiving gap/discussion messages.
      ## Files
      - src/actors/Cena.Actors/Outreach/ (new BridgeMessageGate.cs)
      - src/admin/full-version/ (teacher settings page for bridge-message
        opt-in)
      ## Definition of Done
      - Teacher-scope opt-in persisted per class.
      - Parent UI only shows gap-discussion templates when teacher opted in.
      - Test: opt-out teacher → parent sees only celebration templates.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: bridge-message-teacher-opt-in"
    source_doc_lines: [L108-L142]
  - title: "Constrain weekly 3-2-1 'support at home' suggestions to non-math"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F5 weekly snapshot "1 way to support at home" template library must
      never suggest a math teaching action. Options limited to: (a) ask
      child what they're proud of, (b) schedule-support, (c) sleep/
      nutrition-support, (d) celebrate effort.
      ## Files
      - content/parent-snapshot-templates/ (new)
      - src/actors/Cena.Actors/ParentDigest/ (template loader)
      ## Definition of Done
      - No "help them practice X" or "try Y method" templates.
      - Template library reviewed by IL classroom teacher.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: non-math-parent-support-templates"
    source_doc_lines: [L188-L199]

verdict: revise
verdict_reason: |
  F8 Bagrut countdown must be retired (violates ship-gate dark-pattern
  rules). F3 bridge messages and F5 parent support suggestions need
  pedagogue-level guardrails to prevent parent-teacher friction and wrong-
  method teaching at home. The rest are workable.

cross_lens_handoff:
  - to: persona-ethics
    about: |
      F8 Bagrut countdown — primary ethics review. F5 micro-milestone
      celebrations frequency also needs ethics-lens review for variable-
      ratio risk.
  - to: persona-privacy
    about: |
      F4 differential-privacy cohort context — privacy should validate
      the proposed epsilon=1.0 budget against ADR-0003 and the k≥10
      anonymity rule; also F3 message privacy (parent sees child's gaps
      — consent + student's age-of-reason).
  - to: persona-a11y
    about: |
      F2 Bilingual RTL dashboard — a11y should validate RTL mirroring,
      contrast for age-appropriate reading, and WCAG for parents who may be
      older/low-literacy.
  - to: persona-ministry
    about: |
      F1 Why-this-topic card must not imply a guaranteed Bagrut outcome
      (RDY-080) when explaining "this topic connects to Bagrut requirements."
