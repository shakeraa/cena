  - feature: "CAS-LLM verification pipeline (F4)"
    evidence: src/actors/Cena.Actors/Cas/CasLlmOutputVerifier.cs + StepVerifierService.cs + CasConformanceSuite.cs
    note: |
      F4's "dual-validation architecture" (LLM reasoning, CAS truth) is
      partially built. The step-verifier ships (RDY-073 phase 1B done).
      What's missing: the rubric-scoring layer on top (F3).
  - feature: "IRT calibration + Elo + BKT infrastructure"
    evidence: src/actors/Cena.Actors/Services/IrtCalibrationPipeline.cs, Mastery/EloScoring.cs, Mastery/BktService.cs
    note: |
      F2's IRT-CAT backend foundation partially exists. The adaptive
      item selector + Bayesian EAP is not apparent yet. Not a from-
      scratch build; scope to the selector + stopping-rule layer.

