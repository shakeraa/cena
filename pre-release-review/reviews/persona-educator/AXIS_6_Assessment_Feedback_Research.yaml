    - "Session misconception detection (session-scoped)" -> src/actors/Cena.Actors/Services/MisconceptionDetectionService.cs + MisconceptionCatalog.cs
    - "ML exclusion enforcement tests for misconception pipeline" -> src/actors/Cena.Actors.Tests/Compliance/MlExclusionEnforcementTests.cs
    - "Retention worker + data retention policy" -> src/shared/Cena.Infrastructure/Compliance/RetentionWorker.cs, DataRetentionPolicy.cs
    - "Session misconception tests" -> src/actors/Cena.Actors.Tests/Session/SessionMisconceptionDetectionTests.cs
    - "IRT calibration pipeline + BKT + Elo scoring" -> src/actors/Cena.Actors/Services/IrtCalibrationPipeline.cs, IrtEloConversion.cs, Mastery/BktService.cs, Mastery/EloScoring.cs
    - "Confusion detector" -> src/actors/Cena.Actors/Services/ConfusionDetector.cs + ConfusionResolutionTracker.cs
