extracted_tasks:
  - title: "Architectural purge of teacher dashboard misconception-view on session-end"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F6 session-scoped misconception tags are stored in the session actor
      and expire with it. The teacher-dashboard "class active misconceptions"
      view must purge tags as sessions end — no overnight aggregation of
      misconception tags across students. Aggregate stats allowed only at
      k≥10 anonymity threshold per axis5 review.
      ## Files
      - src/actors/Cena.Actors/Services/MisconceptionDetectionService.cs
      - src/admin/full-version/src/views/apps/pedagogy/ (teacher dashboard)
      - src/actors/Cena.Actors.Tests/Compliance/ (new DashboardMisconceptionPurgeTests.cs)
      ## Definition of Done
      - Teacher view queries live session actors, not a rolled-up table.
      - When session ends, its misconceptions disappear from view.
      - Test: simulate 2 sessions ending, verify teacher view no longer
        displays their tags.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: teacher-dashboard-misconception-purge"
    source_doc_lines: [L185-L199 (F6 section), Dr Rami FD-003]
  - title: "Crisis-mode schedule branches by weeks-to-exam"
    priority: P1
    estimate: M
    suggested_assignee: claude-subagent-pedagogy
    queue_body: |
      ## Goal
      F7 crisis mode must route by time remaining: >4 weeks = gap-fill
      priority algorithm; 2-4 weeks = mixed with exam-format practice; <2
      weeks = confidence-consolidation on already-mastered topics + test-
      taking strategy. Reject the one-size compression schedule.
      ## Files
      - src/actors/Cena.Actors/Advancement/ (new CrisisModeScheduler.cs)
      - docs/adr/ (new ADR: "crisis-mode-routing-by-weeks-to-exam")
      ## Definition of Done
      - Three routing branches with distinct item selectors.
      - Student-facing copy reflects the mode ("your focus this week is X").
      - ADR records the pedagogue rationale + rejects flat compression.
      - Test: 2-week-remaining student gets consolidation items, not
        new-topic items.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-pedagogy --result "<branch>: crisis-mode-weeks-branch"
    source_doc_lines: [AXIS_6_Assessment_Feedback_Research.md Feature 7 section]
  - title: "Reframe confidence calibration as insight, not score penalty"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F8 certainty-based marking. Student-facing scores DO NOT include
      confidence penalties. Calibration reported separately in a personal
      calibration insight panel only. Avoids the Foster 2021 null-effect
      risk of pretending CBM is an achievement tool.
      ## Files
      - src/actors/Cena.Actors/Pedagogy/ (new ConfidenceInsightService.cs)
      - src/actors/Cena.Actors/Assessment/ (scoring unchanged)
      ## Definition of Done
      - Confidence data collected, but scoring engine ignores it.
      - Calibration chart visible to student in insight panel.
      - No negative-marking in any student-facing score display.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: confidence-insight-not-penalty"
    source_doc_lines: [AXIS_6_Assessment_Feedback_Research.md Feature 8, finding_assessment_dr_rami.md FD-006]

verdict: adopt
verdict_reason: |
  The strongest doc in the corpus from a pedagogue perspective. Most
  features align tightly with ADR-0002/0003/RDY-080. Three shipping-time
  revisions (teacher-dashboard purge, crisis-mode routing, calibration
  not-a-score-penalty) address real risks. F3/F4 partial-credit grading
  needs pairing with F5 rubric engine from axis5.

