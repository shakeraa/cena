    evidence: src/actors/Cena.Actors/Services/MisconceptionDetectionService.cs, MisconceptionCatalog.cs, src/actors/Cena.Actors.Tests/Compliance/MlExclusionEnforcementTests.cs, src/shared/Cena.Infrastructure/Compliance/RetentionWorker.cs
    note: |
      F6 is the clearest "already built" in the whole corpus. ML exclusion
