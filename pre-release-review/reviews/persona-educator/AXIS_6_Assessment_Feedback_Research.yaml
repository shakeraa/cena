doc_path: pre-release-review/AXIS_6_Assessment_Feedback_Research.md
reviewer: persona-educator
reviewed_at: 2026-04-20
doc_summary: |
  8 assessment/feedback features: formative-summative signal split, IRT 2PL-CAT
  placement engine, AI partial-credit grading with step rubrics, free-response
  CAS-validated AI grading, per-session error analysis report, real-time
  session-scoped misconception tagging, crisis-mode compression schedule,
  confidence calibration with certainty-based marking.

system_purpose_fit: 5
  rationale:
    - This is the deepest pedagogue-relevant doc. Every feature either hardens
      the CAS-as-oracle architecture (ADR-0002) or protects ADR-0003 scope.
    - Formative-summative split, step-level rubrics, session-scoped mis-
      conception tagging are exactly what a veteran teacher would design.
    - Explicit RDY-080 awareness throughout ("exam readiness is not a Bagrut
      prediction").
    - Confidence calibration (F8) is a gem if implemented correctly — but
      see Dr Rami's note on Foster 2021 null effect.

