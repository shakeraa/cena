  claims_verified_in_code:
    - "CAS-verified LLM output pipeline exists" -> src/actors/Cena.Actors/Cas/CasLlmOutputVerifier.cs
    - "Step verifier service" -> src/actors/Cena.Actors/Cas/StepVerifierService.cs
