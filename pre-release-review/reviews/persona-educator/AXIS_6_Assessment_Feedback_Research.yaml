      calibration pipeline exists but item-bank maturity unclear.
    - "AI partial-credit grading with step-level rubrics" — step verifier
      exists but the rubric-scoring layer is not apparent.

adr_alignment:
  honored:
    - ADR-0002 (CAS-first for every feature; F3/F4 explicitly note "LLM
      cannot override CAS on mathematical truth")
    - ADR-0003 (F5 "all error pattern data is session-scoped and discarded
      after the session ends"; F6 is literally named "session-scoped")
    - RDY-080 (F1 "Exam Readiness score is NOT a Bagrut prediction"; F2
      theta-to-Bagrut concordance requires separate calibration)
  violated: []
  missing_adr_needed:
    - Rubric-versioning ADR (shared with axis5) — partial-credit rubric
      engine needs version pinning so old scores aren't retroactively
      changed.
    - "Crisis mode honesty" ADR — F7 compression schedule shouldn't over-
      promise outcomes for students starting <4 weeks before exam.

non_negotiable_violations: []

persona_findings:
  - severity: P1
    finding: |
      Feature 6 (Real-Time Misconception Tagging Session-Scoped) is the
      highest-leverage pedagogical feature in the whole doc, AND the one
      most likely to leak beyond ADR-0003 if implementation is sloppy. I
      have verified the code already uses MisconceptionDetectionService
      (session-scoped) and there are ML exclusion tests. Good. The extra
      guardrail: the *admin dashboard* that shows "class-active misconceptions"
      to a teacher in real time must purge when the session ends, not
      aggregate overnight. The doc says "session-scoped" but a teacher
      dashboard that collates session tags across students across hours is
      a soft profile.
    evidence: AXIS_6_Assessment_Feedback_Research.md Feature 6 section; src/actors/Cena.Actors/Services/MisconceptionDetectionService.cs; src/actors/Cena.Actors.Tests/Compliance/MlExclusionEnforcementTests.cs
    lens_note: |
      Teachers will ask for this view. The answer must be: "you see
      misconceptions live during class; after 24h the view resets." Lock
      that behavior architecturally, not via setting.
  - severity: P1
    finding: |
      Feature 7 (Crisis Mode Compression Schedule) — the priority scoring
      "exam frequency × point weight × gap severity" is sound pedagogy for
      students with 4-8 weeks. For students with <2 weeks, this becomes
      false hope. A veteran teacher knows: with <2 weeks, the best
      intervention is confidence-consolidation on topics *already mastered*,
      not frantic new-topic cramming. Make the time-remaining a routing
      variable: >4w = gap-fill mode; 2-4w = mixed; <2w = consolidation-only.
    evidence: AXIS_6_Assessment_Feedback_Research.md Feature 7 section
    lens_note: |
      A student with 10 days left who is told "focus on your worst topics"
      fails the exam and quits math forever. Ten-day crisis is emotional,
      not cognitive — reinforce what they know.
  - severity: P1
    finding: |
      Feature 8 (Confidence Calibration with Certainty-Based Marking) —
      dr_rami assessment notes Foster 2021 found NO effect on math achievement.
      CBM is a calibration tool, not a learning booster. Must be framed
      accordingly: surface it as "know what you know" insight, not as a
      score-improvement mechanic. Certainty-based *scoring* (penalize
      overconfident wrong answers more than cautious wrong answers) must
      stay out of the student-facing score, only the post-problem
      reflection panel.
    evidence: AXIS_6_Assessment_Feedback_Research.md Feature 8 section; finding_assessment_dr_rami.md FD-006 WARNING
    lens_note: |
      Negative-marking schemes in high-stakes test prep destroy willingness
      to attempt hard problems. Keep the calibration insight, drop the
      penalty.
  - severity: P2
    finding: |
      Feature 2 (IRT 2PL-CAT Placement) — the "Bayesian EAP ability
      estimator" requires a well-calibrated item bank. Doc XL effort
      estimate is realistic. But the sub-requirement the doc implies
      but doesn't state: items need ongoing calibration as student pool
      grows (online calibration), and parameters change per cohort (Arab
      vs Hebrew medium). Per AXIS_8 F1 Bayesian small-sample correction,
      these features *must* ship together or not at all for Arab cohort
      equity.
    evidence: AXIS_6_Assessment_Feedback_Research.md F2, AXIS_8_Content_Authoring_Quality_Research.md F1
    lens_note: |
      Doc order matters here — don't ship IRT-CAT without Bayesian small-
      sample correction; Arab students will get mistargeted difficulty on
      day one.
  - severity: P2
    finding: |
      Feature 3/4 (AI Partial-Credit Grading) — the architecture (LLM
      evaluates reasoning, CAS confirms truth) is correct. Two pedagogue
      concerns: (1) for multi-step problems, *order* of operations often
      matters for Bagrut partial credit (e.g., calculus: differentiate
      before substituting is a specific rubric requirement) — the LLM
      reasoning eval must include order checking; (2) Arab-Israeli
      students writing solutions in Arabic need the LLM to read Arabic
      math prose without translating it to Hebrew first (translation
      drift is a grading-accuracy risk).
    evidence: AXIS_6_Assessment_Feedback_Research.md F3, F4
    lens_note: |
      Bagrut "method marks" are specific. A vague rubric approach like
      "award credit for correct approach" will mis-award. Needs step-order
      sensitivity.

