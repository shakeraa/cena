doc_path: pre-release-review/axis1_pedagogy_mechanics_cena.md
reviewer: persona-educator
reviewed_at: 2026-04-20
doc_summary: |
  Proposes 8 pedagogy-mechanics features (interleaving, spaced mastery challenge,
  retrieval micro-checks, elaborative interrogation, productive-struggle hint governor,
  desirable-difficulty targeting, near-to-far transfer sequencing, adaptive worked-
  example fading). Recommends SHIP for features 1-4, SHORTLIST for 5-8.

system_purpose_fit: 4
  rationale:
    - Direct fit with Bagrut prep: interleaving, spacing, worked-examples all target
      the exact skills the matriculation exam measures (far transfer, strategy
      discrimination under mixed conditions).
    - Respects CAS oracle (ADR-0002) — most features explicitly defer mathematical
      correctness to CAS and use LLM only for scaffolding wrapper.
    - Respects ADR-0003 by scoping discrimination scores and self-explanation
      responses to session or aggregate, never to student misconception profile.
    - Minus one point because hint-governor (F5) and desirable-difficulty (F6)
      conflate "60% success rate" targets with anxious/LD cohort reality — a
      veteran classroom teacher would insist on 70-80% for those students.

