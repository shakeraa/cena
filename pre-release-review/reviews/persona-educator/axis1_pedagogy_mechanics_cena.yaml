adr_alignment:
  honored:
    - ADR-0002 (CAS oracle validates answers in all features)
    - ADR-0003 (discrimination scores, retrieval responses, self-explanation
      responses all explicitly session-scoped in every feature section)
    - ADR-0037 (affective signal in pedagogy) — F5 hint governor aligns with
      affective-signal-aware hint delay
  violated: []
  missing_adr_needed:
    - Worked-example fading policy — when fading is adaptive (F8) and uses
      BKT estimates, the fading cadence + reveal-gate rules warrant an ADR
      similar in spirit to ADR-0002's turn-budget section.

non_negotiable_violations: []

persona_findings:
  - severity: P1
    finding: |
      Feature 5 (Productive Struggle Hint Governor) hardcodes 30/60/90s delays
      with a "penalty factor" up to +120s for chronic hint-seekers. In a real
      classroom, an LD student who hits a wall at second 10 will not endure a
      30s countdown — they will close the tab. The doc mitigates with a "skip
      to example" escape, but making that *primary* rather than a footnote is
      essential. A classroom teacher would recommend: hint available
      immediately, *quality* of hint degrades toward Level 1 unless student
      works through N seconds.
    evidence: axis1_pedagogy_mechanics_cena.md:L267-271
    lens_note: |
      30 years in the classroom teaches you that "productive struggle" is not
      the same as "forced struggle." Kapur's PF research happened in tightly
      facilitated small groups with rich discussion, not in front of a lonely
      student staring at a locked hint button. Translating PF to a solo-web
      context needs much gentler parameters than the doc suggests.
  - severity: P1
    finding: |
      Feature 6 (Desirable Difficulty) fixes 60% success rate as target and
      proposes 65% "for flagged anxious students." This is upside-down. A
      student who fails 4/10 problems in a session leaves feeling defeated,
      regardless of the research label "desirable difficulty." In IL
      Bagrut prep, where the exam itself is high-stress, practice should be
      at 75-85% success with occasional stretch items flagged as "challenge" —
      the student's sense of progress is the engagement variable, not the
      raw success rate.
    evidence: axis1_pedagogy_mechanics_cena.md:L300, L346
    lens_note: |
      The EDM 2023 paper's "60% maintained" was observed outcome, not intended
      target. Turning an observation into a design target is a common research-
      to-product error. For Bagrut students close to exam date, the target must
      move up, not be A/B tested in both directions.
  - severity: P2
    finding: |
      Feature 3 (Retrieval Micro-Checks) frames prompts as "Before you see the
      solution, write the formula for [concept] from memory." For 4-unit/5-unit
      Israeli students who have a very specific formula-sheet policy on the
      Bagrut exam, the framing should be: "on the Bagrut you'll have this in
      the formula sheet — but try to recall the key condition that tells you
      to use it." Active recall of application conditions >>> rote formula
      recall.
    evidence: axis1_pedagogy_mechanics_cena.md:L161-163
    lens_note: |
      In Israel the formula sheet (דף נוסחאות) is the exam reality. Asking
      students to memorize formulas we know they'll have on the exam sheet is
      training for a world that doesn't exist. Retrieval should target the
      *trigger* ("this problem wants the product-to-sum identity because...")
      not the formula itself.
  - severity: P2
    finding: |
      Feature 4 (Elaborative Interrogation) suggests menu-based "why" prompts
      after worked-example step 2 of 4. Menu options narrow the explanation
      space and can short-circuit real elaboration. For the top-leverage
      concepts (quadratic discriminant sign, chain-rule recognition, unit-
      circle angle addition), a hybrid — 2-3 menu options + optional free-text
      "or explain in your own words" — is what the CAS-gated + ExplainItBack
      pipeline (src/actors/Cena.Actors/Pedagogy/ExplainItBack.cs) was built for
      and already supports.
    evidence: axis1_pedagogy_mechanics_cena.md:L213, src/actors/Cena.Actors/Pedagogy/ExplainItBack.cs
    lens_note: |
      The doc's own Aleven et al. (2002) citation shows menu-based helps some
      contexts, not all. For conceptual anchors, free text with LLM-judged
      rubric (which Cena already has) is richer.
  - severity: P2
    finding: |
      Feature 8 (Adaptive worked-example fading) thresholds P>0.7 fade / P<0.5
      re-introduce are too tight. In my classroom experience students can
      hover at P=0.6 for weeks — the fading needs hysteresis (e.g., 3
      consecutive sessions at ≥0.7 before a step is faded, 2 sessions at ≤0.5
      before re-introduction). Otherwise the UI oscillates and students feel
      the scaffolding is "flickering."
    evidence: axis1_pedagogy_mechanics_cena.md:L441-443
    lens_note: |
      Students lose trust in the system if scaffolding appears and disappears
      within a single session. Hysteresis is basic ITS practice (Corbett &
      Anderson 1995 BKT literature) and worth calling out.

already_built:
  - feature: "Adaptive interleaving scheduler (F1)"
    evidence: src/actors/Cena.Actors/Mastery/AdaptiveScheduler.cs, src/actors/Cena.Actors/Tutoring/TutorActor.cs, src/mobile/lib/core/services/adaptive_interleaving.dart
    note: |
      Doc treats F1 as a proposal but the adaptive scheduler + interleaving
      exists. What may NOT exist is the *strategy-discrimination score* layer
      the doc proposes (per-skill-pair tracking). That sub-feature is the
      only novel piece — retire the "build interleaving" framing, keep only
      the strategy-discrimination sub-proposal.
  - feature: "Self-explanation / elaborative interrogation (partial F4)"
    evidence: src/actors/Cena.Actors/Pedagogy/ExplainItBack.cs (RDY-074)
    note: |
      The Pedagogy/ExplainItBack pipeline already ships with rubric
      categories, prompt-fatigue gate, and LLM-judge sidecar. F4's proposal
      to "add menu-based self-explanation" is a UI variant on a backend that
      already exists. Retire the "new feature" framing; scope to the
      worked-example menu-option surface only.
  - feature: "Scaffolding / worked-example support (partial F8)"
    evidence: src/actors/Cena.Actors/Mastery/ScaffoldingService.cs:43, src/actors/Cena.Actors/Mastery/ScaffoldingLevel.cs
    note: |
      ScaffoldingService with scaffolding-level enum exists. The *adaptive
      fading* wiring to BKT is the new piece, not scaffolding itself.

