extracted_tasks:
  - title: "Add strategy-discrimination scores to adaptive scheduler"
    priority: P1
    estimate: M
    suggested_assignee: claude-subagent-pedagogy
    queue_body: |
      ## Goal
      Extend AdaptiveScheduler to track per-skill-pair strategy-discrimination
      scores (e.g., "can student distinguish quadratic-formula problems from
      completing-the-square problems?"). Scores update after each problem from
      (a) correct-strategy-selected, (b) time-to-strategy-selection, (c)
      subsequent correctness. Scheduler uses these to weight the interleaving
      mix: high-discrimination students get more blocked practice on weak
      sub-skills; low-discrimination get more interleaved practice.
      ## Files
      - src/actors/Cena.Actors/Mastery/AdaptiveScheduler.cs
      - src/actors/Cena.Actors/Mastery/ItemSelector.cs
      - src/actors/Cena.Actors.Tests/Mastery/AdaptiveSchedulerInterleavingTests.cs (new)
      ## Definition of Done
      - Scores stored session-scoped only (ADR-0003) — no SQL persistence
        under StudentState.
      - Tests: two synthetic students with different discrimination profiles
        receive different mix ratios.
      - Integration test: scheduler output threads through LearningSessionActor
        without breaking existing session replays.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-pedagogy --result "<branch>: strategy-discrimination scheduler layer"
    source_doc_lines: [L46-L66]
  - title: "Soften hint-governor delays for LD/anxious cohort"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Revise the hint-availability timing in the proposed hint-governor
      (Feature 5) so that hints are *always* available immediately at Level 1
      (conceptual pointer) and the delay gate applies only to Level 2/3
      (procedural + full walkthrough). Frame the delay as "work a bit before
      the next hint unlocks" rather than "hint locked." Ensure an always-visible
      "show me the solution" escape hatch on every problem.
      ## Files
      - docs/adr/ (new ADR "hint-governor-delay-policy")
      - src/actors/Cena.Actors/Hints/DeliveryGate.cs
      - src/actors/Cena.Actors/Services/HintGenerationService.cs
      - src/actors/Cena.Actors.Tests/Hints/DeliveryGateLDFriendlyTests.cs (new)
      ## Definition of Done
      - Level 1 hint never delayed.
      - Level 2/3 delay configurable per student cohort (default anxious/LD: 10s, others: 45s).
      - "Show me the solution" CTA visible on every problem screen at all times.
      - ADR records the policy decision.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: LD-friendly hint-governor"
    source_doc_lines: [L267-L294]
  - title: "Raise desirable-difficulty default to 75% for IL Bagrut cohort"
    priority: P1
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Cap desirable-difficulty target at 75% default (not 60% as proposed),
      with 85% opt-in for "confidence-building" mode on anxious students
      within 60 days of the Bagrut exam. Update DifficultyAdjuster defaults.
      ## Files
      - src/actors/Cena.Actors/Mastery/EloScoring.cs
      - src/actors/Cena.Actors/Services/EloDifficultyService.cs
      - docs/adr/ (new ADR "desirable-difficulty-targets-by-cohort")
      ## Definition of Done
      - Configurable target success rate per cohort, default 0.75.
      - "Pre-Bagrut confidence mode" toggle at 0.85 for students with
        <60d-to-exam and self-declared anxious.
      - ADR records rationale + rejects the 60% target.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>: desirable-difficulty cohort defaults"
    source_doc_lines: [L300, L346]
  - title: "Reframe retrieval prompts from formulas to application triggers"
    priority: P2
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      When building retrieval-micro-check prompts (Feature 3), target the
      *application condition* ("what in this problem told you to use the
      quadratic formula?") rather than the formula itself, since IL Bagrut
      provides a formula sheet. The prompt library should be seeded with 3
      prompts per top-20 Bagrut formulas, all in trigger-recognition form.
      ## Files
      - src/actors/Cena.Actors/Pedagogy/ (new RetrievalPromptLibrary.cs)
      - content seed data (top-20 Bagrut formulas with trigger-condition prompts)
      ## Definition of Done
      - Prompt library seeded, 60 prompts (3 x 20), Hebrew + Arabic.
      - No formula-recall-from-memory prompts (since students have the sheet).
      - Session-scoped response storage (ADR-0003).
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: trigger-based retrieval prompts"
    source_doc_lines: [L131-L180]
  - title: "Add hysteresis to adaptive worked-example fading thresholds"
    priority: P2
    estimate: S
    suggested_assignee: claude-subagent-pedagogy
    queue_body: |
      ## Goal
      Before shipping Feature 8 adaptive fading, add hysteresis: fade only
      after 3 consecutive sessions at P(mastered) ≥ 0.7 for the step; re-
      introduce scaffolding only after 2 consecutive sessions at P ≤ 0.5.
      Prevents within-session flicker.
      ## Files
      - src/actors/Cena.Actors/Mastery/ScaffoldingService.cs
      - src/actors/Cena.Actors/Mastery/BktTracer.cs
      - src/actors/Cena.Actors.Tests/Mastery/FadingHysteresisTests.cs (new)
      ## Definition of Done
      - Consecutive-session counter wired into scaffolding decisions.
      - Tests verify no oscillation for a student in the 0.5-0.7 band.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-pedagogy --result "<branch>: fading-hysteresis"
    source_doc_lines: [L441-L443]

verdict: revise
verdict_reason: |
  The 8 features as a set are pedagogically sound and largely compliant, but
  three parameter choices (hint delays, 60% difficulty target, step-fading
  thresholds) misread what actually helps the struggling 16-year-old sitting
  in front of us. Extract the strategy-discrimination and hysteresis pieces;
  revise parameters; retire the "build interleaving from scratch" framing
  because the scheduler already exists.

cross_lens_handoff:
  - to: persona-a11y
    about: |
      Feature 3's "Free-text input (not multiple choice — active recall, not
      recognition)" interaction model needs RTL + IME review for Arabic
      students entering mathematical text; also audio-input accessibility for
      dyscalculic students.
  - to: persona-cogsci
    about: |
      The doc cites Rohrer 2014 d=1.05 prominently for interleaving; persona-
      cogsci should validate whether the Brunmair & Richter 2019 meta-analytic
      d=0.34 is the right effect-size to communicate internally (matches
      finding_assessment_dr_rami.md concern on FD-001).
  - to: persona-privacy
    about: |
      "skill_discrimination_matrix" (doc L58) and "fading_state" (doc L451)
      are proposed as persistent data. persona-privacy should verify whether
      storing these *per student* (even without raw misconception tags) runs
      afoul of ADR-0003's "never on student profile" rule when combined with
      student ID.
  - to: persona-ministry
    about: |
      The retrieval-micro-check reframing I propose (trigger recognition, not
      formula recall) depends on the formula-sheet policy being stable across
      3/4/5-unit Bagrut tracks. persona-ministry should confirm formula-sheet
      coverage for each track before the prompts are authored.
