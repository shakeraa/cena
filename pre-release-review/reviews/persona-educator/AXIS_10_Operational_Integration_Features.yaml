doc_path: pre-release-review/AXIS_10_Operational_Integration_Features.md
reviewer: persona-educator
reviewed_at: 2026-04-20
doc_summary: |
  8 operational/integration features: Google SSO one-click, Mashov gradebook
  read-only sync, CSV bulk roster import, offline-first practice mode, multi-
  device session continuity, school IT admin deployment dashboard, Google
  Classroom assignment + grade passback, Israel-privacy-law-compliant student
  data portability export.

system_purpose_fit: 2
  rationale:
    - Infrastructure doc. Pedagogue lens has limited surface here.
    - Relevant angles: Mashov (IL classroom reality), Google Classroom
      grade passback (affects teacher workflow + student grades that
      feed the classroom report card), offline-first (access for periphery
      students).
    - Minus because the doc treats grade-passback as purely operational,
      but a passback of Cena-generated scores to a school gradebook crosses
      into pedagogue territory — those scores will affect student transcripts.

