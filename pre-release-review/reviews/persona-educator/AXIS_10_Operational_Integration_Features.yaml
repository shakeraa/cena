adr_alignment:
  honored:
    - ADR-0001 (multi-institute enrollment, tenant-scoped features aligned)
    - Non-negotiable #5 (multi-tenant, tenant isolation required for Mashov
      credentials, roster import)
    - PPL Amendment 13 referenced for data portability + roster import
  violated: []
  missing_adr_needed:
    - Grade-passback policy ADR: what Cena scores get written to school
      gradebooks, whether passback is teacher-triggered or automatic,
      dispute resolution when Cena disagrees with teacher grading.

non_negotiable_violations: []

persona_findings:
  - severity: P1
    finding: |
      Feature 7 (Google Classroom Assignment + Grade Passback) — Cena
      writing scores into Google Classroom's gradebook affects student
      report cards. Three pedagogue concerns:
      (1) Cena formative scores (practice, hint-assisted) are *not*
      equivalent to summative exam scores — passing practice scores to
      the gradebook distorts the academic record.
      (2) Teacher must always have a veto before passback executes.
      (3) For multi-tenancy (ADR-0001), passback credentials must be
      per-class-teacher, not per-school.
    evidence: AXIS_10_Operational_Integration_Features.md Feature 7 section
    lens_note: |
      I've seen schools where an EdTech tool auto-wrote practice grades
      into the LMS, and parents called panicking about "failures" that
      were just practice attempts. Teacher opt-in + summative-only is the
      only safe policy.
  - severity: P2
    finding: |
      Feature 4 (Offline-First Practice Mode) — valuable for periphery
      students (Galilee, Negev, West Bank settlements). Pedagogue concern:
      offline practice should *not* include timed mock-Bagrut exams,
      because score-integrity depends on timing honesty. Restrict offline
      mode to untimed practice + worked-example study; timed assessments
      require online + proctoring context.
    evidence: AXIS_10_Operational_Integration_Features.md:L192-L200
    lens_note: |
      Offline ≠ exam-grade. Good for practice and review; not for
      summative assessment.
  - severity: P2
    finding: |
      Feature 2 (Mashov Read-Only Sync) — Mashov is the reality of IL
      schools. Read-only is the right default. However, the doc claims
      sync runs daily at 02:30; pedagogue angle: sync should be teacher-
      triggerable on-demand before a parent-teacher conference so the
      displayed Mashov grades are fresh. Add a "sync now" teacher button
      in addition to the scheduled job.
    evidence: AXIS_10_Operational_Integration_Features.md:L72-L128
    lens_note: |
      Teachers prepare for parent conferences the hour before. "24-hour-
      old grades" is a quick credibility hit.

already_built:
  - feature: "Offline sync ledger (F4 foundation)"
    evidence: src/actors/Cena.Actors/Sessions/MartenOfflineSyncLedger.cs
    note: |
      Infrastructure for offline→online sync exists. F4 is primarily a
      client-side (PWA service worker, IndexedDB) build on top of this
      ledger. Not from-scratch.

