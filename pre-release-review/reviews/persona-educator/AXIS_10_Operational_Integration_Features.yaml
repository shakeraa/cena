extracted_tasks:
  - title: "Grade-passback policy ADR + teacher-opt-in veto flow"
    priority: P1
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Write ADR for Google Classroom grade-passback policy: only summative
      assessment scores (mock Bagrut, proctored tests) eligible for
      passback; teacher must opt in per assignment; teacher has explicit
      "do not write to gradebook" toggle; passback happens only on
      teacher-review confirmation.
      ## Files
      - docs/adr/ (new ADR: "classroom-grade-passback-policy")
      - src/actors/Cena.Actors/Assessment/ (new PassbackPolicyService.cs)
      ## Definition of Done
      - ADR locks summative-only + teacher-approval rule.
      - PassbackPolicyService enforces in code.
      - Tests: practice session grade is NOT eligible for passback; mock
        Bagrut grade is, only after teacher confirmation.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>: grade-passback-policy-ADR"
    source_doc_lines: [AXIS_10_Operational_Integration_Features.md Feature 7]
  - title: "Offline mode restricts to untimed practice (no summative)"
    priority: P2
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F4 offline mode must refuse timed summative assessments (mock Bagrut).
      Only untimed practice + worked-example study can be queued for offline.
      ## Files
      - src/actors/Cena.Actors/Sessions/MartenOfflineSyncLedger.cs
      - src/student/student-web/ (offline queue)
      ## Definition of Done
      - Session metadata includes assessment-type flag.
      - Queue-for-offline rejects summative sessions.
      - Test: mock Bagrut session cannot be queued offline.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: offline-no-summative"
    source_doc_lines: [L192-L200]
  - title: "Teacher 'sync Mashov now' button + rate-limited endpoint"
    priority: P2
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F2 Mashov sync — add a teacher-triggered on-demand sync button
      (rate-limited 1/hour) in addition to the scheduled daily job.
      Helps teachers freshly prep for parent conferences.
      ## Files
      - src/api/Cena.Admin.Api/ (new MashovSyncEndpoint.cs)
      - src/admin/full-version/src/views/apps/teacher/mashov-sync.vue
      ## Definition of Done
      - Endpoint rate-limited per teacher to 1/hour.
      - UI button with "synced X minutes ago" indicator.
      - Test: teacher triggers sync; second call within hour returns 429.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: mashov-sync-on-demand"
    source_doc_lines: [L72-L128]

verdict: adopt
verdict_reason: |
  Sensible operational doc. Pedagogue-relevant revisions: grade-passback
  policy (summative-only, teacher-approval), offline-mode scope (no
  summative), Mashov on-demand sync for teacher workflow. Most other
  features are straight infrastructure.

cross_lens_handoff:
  - to: persona-sre
    about: |
      F2 Mashov API is unofficial — SRE ownership of circuit-breakers,
      graceful-degradation, credential encryption, health checks.
      Primary lens on operational features.
  - to: persona-redteam
    about: |
      F1 OAuth token storage, F2 Mashov credential encryption,
      F7 Classroom grade-passback authorization — redteam owns.
  - to: persona-privacy
    about: |
      F8 data-portability export (PPL compliance), F3 CSV bulk roster
      (under-13 silent creation risk if not teacher-certified).
  - to: persona-enterprise
    about: |
      Multi-tenant scoping of all integrations (per ADR-0001) — Mashov
      credentials per school, Classroom tokens per teacher-class.
