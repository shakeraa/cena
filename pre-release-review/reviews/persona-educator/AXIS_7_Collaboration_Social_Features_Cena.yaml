extracted_tasks:
  - title: "Ship I'm-Confused-Too anonymous class-period signal"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F5 "I'm Confused Too" button during live class sessions. Student taps
      → anonymous aggregate counter visible only to teacher. Auto-resets
      on class end. No per-student record retained.
      ## Files
      - src/actors/Cena.Actors/Sessions/ (new ConfusionSignalTracker.cs)
      - src/admin/full-version/src/views/apps/classroom/ (teacher live view)
      - src/student/student-web/ (confusion-signal button)
      ## Definition of Done
      - Aggregate counter only (no student identity).
      - Auto-clears at session end; no DB persistence.
      - Works over SignalR for real-time teacher view.
      - Test: 5 students tap → teacher sees "5 students confused"; no
        SQL row remains after session end.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: confusion-signal"
    source_doc_lines: [AXIS_7_Collaboration_Social_Features_Cena.md Feature 5 section]
  - title: "Defer F1 anonymized peer explanation circles pending CAS-gate design"
    priority: P1
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      ADR deferring F1 peer-explanation circles. Rationale: wrong
      explanations propagated between students can *degrade* Bagrut
      outcomes. Revisit only when a CAS-or-teacher-approval gate is
      designed and acceptance tested.
      ## Files
      - docs/adr/ (new ADR: "peer-explanation-requires-correctness-gate")
      - pre-release-review/reviews/retired.md (append as deferred-with-reason)
      ## Definition of Done
      - ADR explicit on the defer condition.
      - Condition: "when CAS verifies or teacher approves every peer
        explanation before it's shown to a recipient."
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>: peer-explanation-defer-ADR"
    source_doc_lines: [AXIS_7_Collaboration_Social_Features_Cena.md Feature 1 section]
  - title: "Default teacher-micro-group moderation to post-hoc + flagged alerts"
    priority: P2
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F2 teacher-moderated groups. Default moderation = post-hoc with
      automated profanity/PII scan + teacher alert on flagged content.
      Pre-approval moderation is opt-in (for teachers who want it).
      ## Files
      - src/actors/Cena.Actors/Outreach/ (new GroupMessageModerationPipeline.cs)
      - src/actors/Cena.Actors/Safeguarding/ (reuse existing classifier)
      - src/admin/full-version/src/views/apps/classroom/group-moderation.vue
      ## Definition of Done
      - Two modes: post-hoc (default) + pre-approval (opt-in).
      - PII/profanity auto-scan; flag→ teacher push notification.
      - Test: flagged message not visible to other students until teacher
        reviews (pre-approval) or remains visible with teacher flag
        notification (post-hoc).
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: group-moderation-default-post-hoc"
    source_doc_lines: [L126-L170]

verdict: revise
verdict_reason: |
  Most features are defensible with tightened guardrails; F1 peer-explanation
  should be deferred until a correctness gate is designed; F3 cooperative
  competitions is poor ROI relative to core Bagrut-prep work; F5 confusion
  signal is a clear ship-soon. The consent/privacy architecture is sound
  across all features.

cross_lens_handoff:
  - to: persona-privacy
    about: |
      RDY-076 / two-sided consent / under-16 parent consent → primary
      privacy-lens review territory for all 7 features.
  - to: persona-redteam
    about: |
      F1 voice-recording de-anonymization risk (doc mentions voice
      distortion as mitigation — redteam should verify that's adequate);
      F4 anonymous Q&A abuse potential.
  - to: persona-ethics
    about: |
      F3 cooperative challenges milestone design — must not slip into
      variable-ratio rewards.
  - to: persona-a11y
    about: |
      F7 collaborative math whiteboard — multi-user RTL + math input for
      Arabic students; F1 voice + text fallback for hearing-impaired.
