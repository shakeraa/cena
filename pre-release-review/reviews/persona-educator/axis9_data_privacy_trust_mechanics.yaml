extracted_tasks:
  - title: "Scope 'Why this problem' to ≤15-word single-sentence header"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Reject F1 standalone panel. Instead, embed a ≤15-word one-sentence
      explanation at the top of each problem card: "You're practicing this
      because your last session showed gaps in [topic]." Generated from
      the existing ExplanationGenerator with a strict length clamp.
      ## Files
      - src/student/student-web/ (problem-card component)
      - src/actors/Cena.Actors/Services/ExplanationGenerator.cs (one-line mode)
      ## Definition of Done
      - Single sentence, ≤15 words.
      - Session-scoped data source only (no cross-session misconception
        leakage — unit test required).
      - Shipped on student problem-card header; no separate panel.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: why-this-problem-one-line"
    source_doc_lines: [L26-L61]
  - title: "Architectural test: provenance trail never leaks misconception tags"
    priority: P1
    estimate: S
    suggested_assignee: claude-subagent-privacy
    queue_body: |
      ## Goal
      Add a test that any user-facing or audit-facing "why this was
      recommended" trail contains only mastery signals (BKT, Elo) and
      session-event IDs, never misconception_tag fields. Protects ADR-
      0003 across the transparency feature set.
      ## Files
      - src/actors/Cena.Actors.Tests/Compliance/ProvenanceTrailLeakageTests.cs (new)
      - src/actors/Cena.Actors/Audit/
      ## Definition of Done
      - Test iterates all provenance payloads, asserts no MisconceptionTag
        fields present.
      - CI-blocking on fail.
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-privacy --result "<branch>: provenance-no-misconception-leak"
    source_doc_lines: [axis9 F6 section]

verdict: adopt
verdict_reason: |
  Doc is outside my lens for most features. Pedagogue-relevant notes:
  scope "why this problem" to a one-liner, not a panel; validate reading
  level of privacy notices with target-age students in each language;
  architectural test for provenance trail.

