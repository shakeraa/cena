persona_findings:
  - severity: P1
    finding: |
      Dr Nadia ranks FD-011 Culturally-Contextualized Problem Generator as
      "highest-impact equity feature" (ES=1.16). Dr Rami REJECTS the 1.16
      figure as cherry-picked. I agree with Dr Rami on the number but with
      Dr Nadia on the feature's priority. The resolution: ship the
      feature, communicate internally at d=0.3-0.6, and do not build
      marketing or roadmap commitments on the 1.16 figure. This split
      between honest-ES and still-ship deserves an explicit ADR decision
      so future teams don't re-argue it.
    evidence: cena_dr_nadia_pedagogical_review_20_findings.md FD-011 section, finding_assessment_dr_rami.md FD-011 REJECT
    lens_note: |
      Two experts reviewing one feature disagreeing on effect size is
      normal. What's not normal is leaving that disagreement in flight
      indefinitely.
  - severity: P1
    finding: |
      Dr Nadia's FD-009 Socratic Tutor WARNING correctly requires escape-
      hatch + opt-in. I go further: Cena's TutorMessageService already
      enforces turn-budget (ADR-0002 Decision 6). The "escape hatch" is
      already designed architecturally; the work is surfacing it in the
      UI. Retire the "required revision: make Socratic mode OPT-IN per
      session" framing because the system already gates answer-reveal —
      the revision is a UX surfacing task, not a pedagogical change.
    evidence: cena_dr_nadia_pedagogical_review_20_findings.md FD-009 section, docs/adr/0002-sympy-correctness-oracle.md Decision 5 + 6
    lens_note: |
      Architectural gate exists; surfacing it to the student is the
      remaining work. Don't re-propose the underlying pedagogy.
  - severity: P1
    finding: |
      Dr Nadia flags FD-014 Explainable AI as "thin research base." I
      agree. But the review recommends "embed minimal explanation (one
      sentence)" — I'd scope even tighter: embed only on recommendation-
      disagreement moments ("Why is Cena giving me this instead of what
      my teacher assigned?"), not on every problem. Cuts cognitive load
      to zero on 90% of problems while preserving the trust function.
    evidence: cena_dr_nadia_pedagogical_review_20_findings.md FD-014 section
    lens_note: |
      Minimal ≠ omnipresent. Explain only when explanation is genuinely
      needed.
  - severity: P2
    finding: |
      Dr Nadia's "effect size realism check" table on FD-001 suggests
      d=0.34-0.50 is realistic for interleaving. My axis1 review goes
      slightly more conservative (30-year classroom experience: well-
      implemented interleaving gets d=0.20-0.35 in IL-Bagrut-age cohorts
      because students already interleave across problem sets from
      multiple teachers). Not a blocker; just a note that internal
      metrics language should reflect the lower end.
    evidence: cena_dr_nadia_pedagogical_review_20_findings.md Cross-Cutting → Effect Size Realism Check row FD-001
    lens_note: |
      Interleaving is a real but modest gain for Bagrut-age students.
  - severity: P2
    finding: |
      Dr Nadia's FD-016 Cooperative Competitions WARNING ("defer to Phase
      3") is correct. I additionally note: even in Phase 3, mixed
      Jewish-Arab class dynamics make this a social-design problem, not
      just a gamification problem. Teacher must have full control over
      team composition, and "shared-victory celebration" copy must be
      trialed with IL-mixed-schools educators before shipping. This
      nuance is worth preserving in any Phase-3 scope doc.
    evidence: cena_dr_nadia_pedagogical_review_20_findings.md FD-016 section
    lens_note: |
      Israeli classroom cooperation features are not value-neutral
      mechanics.

