doc_path: pre-release-review/axis3_accessibility_accommodations_findings.md
reviewer: persona-a11y
reviewed_at: 2026-04-20
doc_summary: |
  Proposes 8 accessibility features: subitizing trainer, audio-haptic number line,
  digital graph paper, ADHD focus sessions, color-blind palette, MathML screen-reader
  pipeline, Arabic RTL math renderer, and anxiety-reducing UI. Three SHIP, three
  SHORTLIST, two DEFER. This is the primary a11y/l10n doc in the corpus.
system_purpose_fit: 5
  rationale:
    - Hits non-negotiable 6 (math LTR in RTL) directly via Feature 7
    - Honors non-negotiable 9 (no hue change of #7367F0) — contrast via palette additions not primary recolor
    - Feature 5 (color-blind) and 6 (MathML) are WCAG 2.2 AA gap closures
    - Feature 7 (Arabic RTL math) is core wedge requirement
    - No dark-pattern proposals; COPPA/ADR-0003 respected
code_reality_check:
  claims_verified_in_code:
    - "Arabic RTL renderer (F7) — already partially built via <bdi dir=\"ltr\"> wrapper: src/student/full-version/tests/a11y/math-ltr-wrapper.spec.ts:1-40"
    - "MathML aria-labels (F6) — partial skeleton exists: src/shared/Cena.Infrastructure/Accessibility/MathAriaLabels.cs:1-50"
    - "KaTeX deployed in student-web: src/student/full-version/package.json, src/student/full-version/src/components/session/WorkedExamplePanel.vue:17-22"
    - "Arabic-first locale inference already shipped (F7-adjacent): src/student/full-version/src/composables/useLocaleInference.ts:62-80"
    - "Hebrew gate (hideable outside IL) already in LanguagePicker: src/student/full-version/src/components/onboarding/LanguagePicker.vue:21-60"
    - "RTL visual regression test exists: src/student/full-version/tests/e2e/rtl-visual-regression.spec.ts"
    - "Reduced-motion, touch-target, color-contrast, aria-live a11y tests already run: src/student/full-version/tests/a11y/*.spec.ts"
  claims_contradicted_by_code:
    - "Doc (F7, L418) claims `.katex { direction: ltr !important; unicode-bidi: isolate; }` needed — code uses <bdi dir=\"ltr\"> element wrapping instead (cleaner, preferred by ADR memory). Doc's CSS-only approach is weaker."
    - "Doc (F6, L383-388) proposes MathJax server-side; Cena ships KaTeX, not MathJax. Stack mismatch: src/student/full-version/package.json"
  claims_unverifiable:
    - "Feature 1 (subitizing) effect sizes — no Cena code to compare; dyscalculia cohort data not collected"
    - "Eastern Arabic numeral toggle (F7) — not visible in current locale JSON: src/student/full-version/src/plugins/i18n/locales/ar.json"
    - "Audio-haptic feedback (F2) — Web Audio API / Vibration API not present in current student-web"
adr_alignment:
  honored:
    - "ADR-0004 (figure rendering stack) — F2 number line and F7 Arabic math align with KaTeX/SVG direction"
    - "ADR-0001 (multi-institute) — F8 per-student UI preferences must respect tenant scoping"
  violated:
    - "None directly — but F6 proposes MathJax while ADR-0004 standardizes on KaTeX. Needs ADR amendment or renderer swap."
  missing_adr_needed:
    - "ADR for screen-reader math pipeline (MathML vs KaTeX aria-label vs SRE) — Cena currently ships partial aria-label utility without an architectural decision"
    - "ADR for Eastern Arabic numeral policy (display Western-only vs configurable) — doc proposes toggle but no product decision exists"
non_negotiable_violations: []
persona_findings:
  - severity: P0
    finding: "Feature 7 (Arabic RTL Math) duplicates partially-built work; doc proposes greenfield CSS approach but code already uses <bdi dir=\"ltr\"> element wrapping. Without reconciling, we risk a second, competing RTL strategy."
    evidence: "src/student/full-version/src/components/session/WorkedExamplePanel.vue:17; axis3...md:L418 (.katex !important CSS)"
    lens_note: "<bdi> is semantically stronger than CSS !important; the scanner test at tests/a11y/math-ltr-wrapper.spec.ts enforces <bdi>. Doc's approach would regress coverage."
  - severity: P0
    finding: "Feature 6 (MathML pipeline) proposes MathJax but production stack is KaTeX. Picking MathJax forces a second math engine (bundle cost, double maintenance) or a KaTeX-to-MathML fork. No ADR covers this."
    evidence: "src/student/full-version/package.json (katex dep); axis3...md:L383"
    lens_note: "KaTeX 0.16+ supports output: 'mathml' alongside HTML — cheaper than switching. Must be specified in the extracted task."
  - severity: P0
    finding: "Feature 5 (color-blind palette) proposes viridis/cividis as defaults, which would recolor #7367F0. Non-negotiable 9 (Vuexy primary locked) says fix contrast via usage pattern only, not by hue change."
    evidence: "axis3...md:L320-330; docs/accessibility/WCAG-AA-Primary-Color-Analysis.md:1-40"
    lens_note: "The palette additions must be scoped to charts/data-viz only. Primary #7367F0 already passes 5.83:1 on white; don't swap it out. Extracted task must fence this."
  - severity: P1
    finding: "Feature 7 does not mention the existing Hebrew build-flag gate (VITE_ENABLE_HEBREW) — implementation must preserve 'Hebrew hideable outside Israel' policy."
    evidence: "axis3...md:L414-478; src/student/full-version/src/components/onboarding/LanguagePicker.vue:21-60"
    lens_note: "If F7 ships Arabic RTL and also re-enables Hebrew in non-IL builds, it violates language-strategy memory."
  - severity: P1
    finding: "Feature 6 spec mandates aria-labels in Hebrew/Arabic, but the existing MathAriaLabels.cs only has English strings (just 'plus', 'over', 'squared')."
    evidence: "src/shared/Cena.Infrastructure/Accessibility/MathAriaLabels.cs:18-50"
    lens_note: "This is a real gap: blind Hebrew/Arabic students currently hear English math. Extracted task must localize this utility."
  - severity: P1
    finding: "Feature 3 (digital graph paper) proposes PDF export via Puppeteer — no a11y requirement that the PDF carry MathML or tagged structure. Exported PDFs would be inaccessible to screen readers."
    evidence: "axis3...md:L198-211"
    lens_note: "If we build this, PDF must be tagged (PDF/UA) or we fail the very users it claims to serve."
  - severity: P1
    finding: "Feature 8 (anxiety-reducing UI) mentions amber (#f59e0b) for errors — contrast against white is only 2.1:1 for normal text, fails WCAG AA 4.5:1."
    evidence: "axis3...md:L520 (--error-amber: #f59e0b)"
    lens_note: "Must pair amber with darker text (#b45309 or darker) or use amber only as icon/border, not as foreground text color."
  - severity: P2
    finding: "Feature 4 (ADHD focus sessions) uses CSS filter blur() on non-essential elements — can interact poorly with reduced-motion preference and magnifier users."
    evidence: "axis3...md:L263"
    lens_note: "Must honor prefers-reduced-motion; blur animation transitions should be disabled."
  - severity: P2
    finding: "Feature 2 audio-haptic pitch feedback must have a non-audio alternative (WCAG 1.1.1) — dyscalculia users with hearing impairments need visual/haptic redundancy."
    evidence: "axis3...md:L113-155"
    lens_note: "Doc mentions haptic on mobile but desktop-only users without vibration need visible position marker."
already_built:
  - feature: "Arabic RTL Math Renderer (Feature 7) — <bdi dir=\"ltr\"> wrapping, RTL visual regression tests, Arabic-first locale inference"
    evidence: "src/student/full-version/src/composables/useLocaleInference.ts; src/student/full-version/tests/a11y/math-ltr-wrapper.spec.ts; src/student/full-version/tests/e2e/rtl-visual-regression.spec.ts"
    note: "Partially built — retire the 'new CSS direction isolation' proposal and extract only the missing pieces (Eastern Arabic numerals toggle, Arabic function name aliases جا/تا/ظا, font stack Noto Naskh)"
  - feature: "MathML/ARIA skeleton (Feature 6)"
    evidence: "src/shared/Cena.Infrastructure/Accessibility/MathAriaLabels.cs"
    note: "Exists but English-only and incomplete — localize and wire into KaTeX output, don't greenfield"
  - feature: "Vuexy color-contrast audit (Feature 5 adjacent)"
    evidence: "docs/accessibility/WCAG-AA-Primary-Color-Analysis.md"
    note: "Primary color already audited; don't recolor — add a separate data-viz palette for charts only"
  - feature: "Hebrew gate (hideable outside IL)"
    evidence: "src/student/full-version/src/components/onboarding/LanguagePicker.vue:21-60"
    note: "Don't re-litigate; preserve build flag across any F7 rework"
