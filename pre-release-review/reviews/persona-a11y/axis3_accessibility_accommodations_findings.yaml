extracted_tasks:
  - title: "Localize MathAriaLabels.cs for he/ar speech rules"
    priority: P0
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Extend src/shared/Cena.Infrastructure/Accessibility/MathAriaLabels.cs from English-only spoken math to Hebrew and Arabic. Blind students on he/ar locales currently hear English words ("squared", "pi") over RTL Hebrew/Arabic UI — a WCAG 1.1.1 and 3.1.1 violation.
      ## Files
      - src/shared/Cena.Infrastructure/Accessibility/MathAriaLabels.cs (extend; keep <500 LOC)
      - src/shared/Cena.Infrastructure/Accessibility/MathAriaLabels.he.cs (new, if clean split needed)
      - src/shared/Cena.Infrastructure/Accessibility/MathAriaLabels.ar.cs (new, if clean split needed)
      - tests under Cena.Infrastructure.Tests/Accessibility/
      - wire into QuestionCard.vue aria-label generation (student-web side needs companion task)
      ## Definition of Done
      - `ToAriaLabel(latex, "he")` returns Hebrew spoken math for the top-30 LaTeX tokens in the Bagrut corpus
      - Same for `"ar"` with Levantine Arabic terminology (جا for sin, تا for cos, ظا for tan)
      - Unit tests cover fractions, radicals, powers, trig, logs in all three locales
      - No new dependencies
      - Files stay <500 LOC
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>: spoken math localized"
    source_doc_lines: [L350-L410]
  - title: "Close the KaTeX->MathML gap for screen-reader math"
    priority: P0
    estimate: M
    suggested_assignee: claude-subagent-a11y
    queue_body: |
      ## Goal
      Configure KaTeX to emit MathML alongside HTML so NVDA/JAWS/VoiceOver can navigate equations element-by-element. Do NOT switch to MathJax — it would double our math engine footprint and conflict with ADR-0004. Extend QuestionCard.vue / WorkedExamplePanel.vue to pass `output: 'htmlAndMathml'` and attach an aria-label from MathAriaLabels output.
      ## Files
      - src/student/full-version/src/components/session/QuestionCard.vue
      - src/student/full-version/src/components/session/WorkedExamplePanel.vue
      - src/student/full-version/src/components/session/StepInput.vue
      - new: src/student/full-version/src/composables/useMathAccessibility.ts
      - tests/a11y/math-mathml-output.spec.ts (new)
      ## Definition of Done
      - Every katex.render / katex-rendered element carries a MathML sibling node
      - Every math element has an aria-label from backend MathAriaLabels (localized he/ar/en)
      - New scanner test: every .katex node has either a MathML child or an aria-label
      - Passes existing math-ltr-wrapper.spec.ts (no regressions)
      - No MathJax dependency added
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-a11y --result "<branch>"
    source_doc_lines: [L350-L410]
  - title: "Ship Eastern Arabic numeral toggle + Arabic math function names"
    priority: P1
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Feature 7 residual: add a per-student toggle for Eastern Arabic numerals (٠١٢٣٤٥٦٧٨٩) and Arabic math function glyphs (جا/تا/ظا/لو) on the rendering layer only. SymPy keeps canonical Western form; the display profile is client-side.
      ## Files
      - src/student/full-version/src/stores/onboardingStore.ts (add numeralSystem field)
      - src/student/full-version/src/composables/useNumeralDisplay.ts (new)
      - src/student/full-version/src/plugins/i18n/locales/ar.json (add math.sin→جا etc.)
      - src/student/full-version/src/components/session/QuestionCard.vue (apply profile)
      ## Definition of Done
      - Student profile stores numeralSystem: 'western'|'eastern'|'both'
      - Display converter wraps KaTeX output without altering underlying LaTeX/SymPy payload
      - No change to answer validation path (CAS still gets canonical Western)
      - E2E test: RTL page with Eastern-numeral toggle renders ٢x+٣=٧ in LTR <bdi>
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L414-L478]
  - title: "Introduce chart-only color-blind palette without touching primary #7367F0"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Add a scoped data-viz palette (e.g., Okabe-Ito 8-color) for charts and progress bars only. Primary brand color stays #7367F0 (ADR-locked). Feature 5 in doc wants viridis as default app color — that violates non-negotiable 9; fence the palette to chart components.
      ## Files
      - src/student/full-version/src/plugins/vuetify/theme.ts (add viz.* tokens, leave primary untouched)
      - src/student/full-version/src/components/progress/*.vue (consume viz tokens)
      - docs/accessibility/data-viz-palette.md (new, one page)
      ## Definition of Done
      - primary remains #7367F0; no change to theme.ts primary
      - charts use 8-color Okabe-Ito palette + pattern differentiation
      - Contrast check: every pair of adjacent series hits 3:1 non-text contrast
      - Scanner test flags any new CSS that reassigns --v-theme-primary
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L288-L346]
  - title: "Fix amber-on-white contrast in proposed CalmAlert"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F8 proposes #f59e0b for amber errors; that's 2.1:1 on white, fails AA. Pair amber with #b45309 text or deeper border. This is a guardrail for any 'calm UI' adoption.
      ## Files
      - src/student/full-version/src/plugins/vuetify/theme.ts
      - src/student/full-version/tests/a11y/color-contrast.spec.ts (extend)
      ## Definition of Done
      - amber tokens split into surface vs. text/icon pairs
      - Existing color-contrast scanner covers warning tokens at 4.5:1
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L483-L541]
verdict: revise
verdict_reason: |
  The doc's intent is correct and 3 of its SHIP items are already partially built in the codebase.
  Revise to drop greenfield proposals that duplicate existing work, scope color palette change so
  #7367F0 is untouched, and pick KaTeX->MathML over MathJax to honor ADR-0004. Extract 5 tasks
  that close real gaps (he/ar speech, KaTeX MathML, Eastern numerals, viz palette, amber contrast).
cross_lens_handoff:
  - to: persona-educator
    about: "Feature 1 subitizing trainer's pedagogical fit for Bagrut-age students (12-18) — most dyscalculia research is K-3"
  - to: persona-cogsci
    about: "Feature 4 ADHD chunking effect sizes and cognitive-load framing"
  - to: persona-privacy
    about: "Feature 5 'CVD type self-reported or detected' — detection of disability type is special-category data; detection path must be removed or gated by explicit consent"
  - to: persona-finops
    about: "Feature 6 MathJax vs KaTeX MathML choice has bundle-size and CDN cost implications"
  - to: persona-ministry
    about: "Feature 7 Arabic math function glyph localization (جا/تا/ظا) — confirm Ministry/Bagrut marker acceptance for student-submitted work"
