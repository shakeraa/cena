      ## Goal
      Add Hebrew/Arabic medical/therapeutic-language blocklist to ship-gate scanner. Translations for wellness features (breathing ritual, energy tracker) must not use words like 'טיפול' (treatment), 'علاج' (cure), 'therapy' etc.
