  - "finding_assessment_dr_rami.md: FD-006 confidence calibration WARNING, FD-008 REJECT"
extracted_tasks:
  - title: "Shape/pattern differentiation for readiness/error dashboards"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F1 dual progress bars and F5 error analysis must not rely on color alone. Add shape/icon (e.g., checkmark, triangle, cross) and pattern (solid/dashed/dotted) for every state so CVD users can interpret status.
      ## Files
      - src/student/full-version/src/components/progress/*.vue
      - src/student/full-version/src/components/session/AnswerFeedback.vue
      - extend tests/a11y/color-contrast.spec.ts to assert non-color redundancy
      ## Definition of Done
      - Every state in readiness/feedback UI has a non-color channel (shape or pattern)
      - Scanner asserts presence of aria-label or icon per state
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L50-L51, F5 section]
  - title: "Ship-gate language sweep on confidence-calibration (F8) microcopy"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Before F8 ships, ensure all three locale translations avoid loss-aversion framing. Microcopy should say 'calibrate your confidence' not 'lose points for overconfidence'.
      ## Files
      - src/student/full-version/src/plugins/i18n/locales/{he,ar,en}.json (confidenceCalibration namespace)
      - tests/shipgate/banned-terms.spec.ts (ensure coverage)
      ## Definition of Done
      - All three locale keys pass ship-gate
      - No 'lose', 'penalty', 'deduction' synonyms in he/ar translations
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [F8 section]
  - title: "aria-live='polite' for F6 real-time misconception tags"
    priority: P2
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Ensure misconception tags appearing mid-session use aria-live='polite' not assertive; assertive interrupts screen readers and elevates anxiety.
      ## Files
      - F6 component when built
      - extend tests/a11y/aria-live-on-dynamic.spec.ts to assert politeness
      ## Definition of Done
      - All dynamic misconception tags carry aria-live='polite'
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [F6 section]
verdict: revise
verdict_reason: "Assessment dashboards need non-color redundancy and localized RTL math handling. F8 framing risk requires ship-gate scrub before build."
