doc_path: pre-release-review/AXIS_8_Content_Authoring_Quality_Research.md
reviewer: persona-a11y
reviewed_at: 2026-04-20
doc_summary: |
  8 content authoring/quality features: Bayesian IRT small-sample calibration,
  SymPy CAS variation engine, Bagrut partial-credit rubric, Arabic RTL math
  renderer (F4), culturally-contextualized problem generator (F5), mother-tongue
  hint system (F6), self-efficacy difficulty presentation, Elo+expert difficulty
  calibration.
system_purpose_fit: 4
  rationale:
    - F4 is core for non-negotiable 6 (math LTR in RTL)
    - F5/F6 directly support Arabic-first wedge
    - F2 CAS-gated variation honors ADR-0002
    - F6 mother-tongue hints raise translanguaging + a11y considerations
code_reality_check:
  claims_verified_in_code:
    - "Arabic RTL math partial implementation: src/student/full-version/tests/a11y/math-ltr-wrapper.spec.ts; src/student/full-version/src/components/session/WorkedExamplePanel.vue:17"
    - "Arabic locale file: src/student/full-version/src/plugins/i18n/locales/ar.json"
    - "Arabic math normalizer referenced: useLocaleInference.ts:25 (comment mentions ArabicMathNormalizer.cs)"
  claims_contradicted_by_code:
    - "Doc Feature 4 duplicates AXIS 3 Feature 7 — both propose Arabic RTL renderer. Cena code already has a partial impl."
  claims_unverifiable:
    - "Mother-tongue hint system (F6) — no hint-switching infrastructure"
    - "Per-country Arabic notation profiles — not visible in code"
adr_alignment:
  honored:
    - "ADR-0002 (SymPy oracle) via F2"
    - "ADR-0003 via F6 session-scoped hints"
  violated: []
  missing_adr_needed:
    - "ADR for per-country Arabic math notation profiles (Palestinian, Lebanese, Egyptian conventions differ)"
    - "ADR for translanguaging policy (when to switch between ar and he for hints)"
non_negotiable_violations: []
persona_findings:
  - severity: P0
    finding: "F4 Arabic RTL Math Renderer is a near-exact duplicate of AXIS 3 F7. Both docs proposing the same feature without cross-reference risks double-building or conflicting architectures."
    evidence: "AXIS_8...md:F4 section; axis3...md:F7 section; src/student/full-version/tests/a11y/math-ltr-wrapper.spec.ts already enforces <bdi>"
    lens_note: "Synthesizer must dedup; this belongs in a single task with one architecture (<bdi> element wrapping per existing code)."
  - severity: P1
    finding: "F6 mother-tongue hints — if student UI is Arabic but hint arrives in Hebrew, each hint paragraph needs correct lang attribute and dir (text-level dir='ltr' / lang='he' / lang='ar'). Otherwise screen readers read with wrong voice."
    evidence: "AXIS_8...md:F6 section"
    lens_note: "Critical for blind Arabic students hearing a Hebrew hint — voice-pack switching requires lang attribute per paragraph."
  - severity: P1
    finding: "F5 culturally-contextualized problems risk stereotyping (Dr. Nadia flagged this). From an a11y/l10n angle: proper-noun transliteration (Arabic names in Hebrew text, Hebrew names in Arabic text) needs <bdi> isolation and font stack that covers both scripts."
    evidence: "AXIS_8...md:F5 section; cena_dr_nadia_pedagogical_review_20_findings.md:FD-011"
    lens_note: "e.g., 'אחמד קנה 3 תפוחים' must wrap the name correctly in RTL."
  - severity: P1
    finding: "F7 self-efficacy difficulty presentation — if difficulty shown by stars/fire/etc., may drift into gamification. A11y concern: star counts must have explicit aria-label ('difficulty 3 of 5')."
    evidence: "AXIS_8...md:F7 section"
    lens_note: "Screen readers often read star characters inconsistently."
  - severity: P1
    finding: "F4 specifies mirrored integral/summation symbols per MathML 4.0. KaTeX's built-in mirroring support is partial; implementer must verify font fallbacks include a font that carries mirrored glyphs (Amiri, Noto Naskh) — or ship an SVG polyfill."
    evidence: "AXIS_8...md:F4 section; ADR-0004 figure stack"
    lens_note: "Missing font = tofu (boxes). The impl task must pin font stack."
  - severity: P2
    finding: "F8 Elo+expert difficulty calibration — expert reviewers annotating items need an admin-side UI. That admin UI must honor admin/full-version a11y scanners (see AXIS 5 task)."
    evidence: "AXIS_8...md:F8 section"
    lens_note: "Content authoring UIs are often overlooked for a11y."
