extracted_tasks:
  - title: "Dedup F4 Arabic RTL against AXIS 3 F7 into single roadmap"
    priority: P0
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Merge AXIS 8 F4 and AXIS 3 F7 into one feature spec. Existing code already uses <bdi dir="ltr">; do not introduce a second CSS-based approach. The dedup must list: residual gaps (Eastern numerals toggle, Arabic function names, font stack, mirrored glyphs) as the actual deliverable.
      ## Files
      - updated ADR or PRD that pins <bdi> approach
      - merged task body combining best of both docs' implementation sketches
      ## Definition of Done
      - Single source of truth for Arabic RTL math work
      - Existing tests (math-ltr-wrapper, rtl-visual-regression) green
      ## Reporting
      decision committed; update synthesizer conflict log
    source_doc_lines: [F4 section]
  - title: "Mother-tongue hint per-paragraph lang/dir attribute contract (F6)"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F6 switches hint language. Every hint paragraph rendered in a language different from the UI locale must have lang='xx' and, where applicable, dir='rtl'/'ltr'. This lets screen readers switch voice packs correctly.
      ## Files
      - hint rendering component (to be identified when F6 is built)
      - tests/a11y/hint-lang-attribute.spec.ts (new scanner)
      ## Definition of Done
      - Every rendered hint carries a lang attribute matching its content
      - Scanner fails if a hint text node lacks lang or conflicts with parent's lang
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [F6 section]
  - title: "Pin Arabic math font stack (Amiri + Noto Naskh) with mirrored glyph coverage"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Before F4 ships mirrored symbols (integral, summation), pin the font stack and verify glyph coverage on target devices. Missing glyphs render as tofu.
      ## Files
      - src/student/full-version/src/plugins/vuetify/theme.ts (font-family additions)
      - src/student/full-version/src/@core/scss/**/_font.scss (if present)
      - public/fonts/ (subsetted Amiri + Noto Naskh)
      ## Definition of Done
      - Font stack includes Amiri and Noto Naskh Arabic with fallback to Noto Sans Arabic
      - Visual regression screenshot for RTL math includes mirrored integral sign rendered correctly
      - Subsetted font bundles <50KB each to respect low-bandwidth
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [F4 section]
verdict: revise
