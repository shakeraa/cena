    about: "Feature 4 privacy-preserving cohort context — minimum cohort size to prevent re-identification"
  - to: persona-ethics
    about: "Feature 8 Bagrut countdown framing risk (loss-aversion)"
  - to: persona-enterprise
    about: "Multi-language pipeline for SMS and push; glossary storage and tenant scoping"
