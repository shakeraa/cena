persona_findings:
  - severity: P0
    finding: "FD-014 Arabic RTL Math Renderer is listed as SHIP but existing repo has a partial impl using <bdi dir=\"ltr\"> element wrapping with scanner enforcement. Index must reflect 'extend, don't greenfield' — otherwise coordinator may assign a new build that regresses existing work."
    evidence: "feature-discovery...md:FD-014; src/student/full-version/tests/a11y/math-ltr-wrapper.spec.ts; WorkedExamplePanel.vue:17"
    lens_note: "Single largest a11y risk in the full corpus: parallel re-implementation of an existing feature."
  - severity: P0
    finding: "FD-016 MathML screen reader listed as SHORTLIST 'specialized audience'. Per WCAG 2.2 AA and Israeli public-sector accessibility requirements, math a11y is not 'specialized' — it's required. Should be SHIP-tier alongside FD-014."
    evidence: "feature-discovery...md:FD-016"
    lens_note: "De-prioritizing MathML leaves blind Bagrut students without independent access; upgrade priority."
  - severity: P1
    finding: "FD-013 color-blind safe charts listed as quick-win SHIP — good. But index doesn't call out that Vuexy primary #7367F0 is ADR-locked; palette work must be chart-only."
    evidence: "feature-discovery...md:FD-013; docs/accessibility/WCAG-AA-Primary-Color-Analysis.md"
    lens_note: "Top-10 synthesizer must fence 'palette' to data-viz, not theme primary."
  - severity: P1
    finding: "FD-018 Bilingual Parent Dashboard (he/ar) is SHIP — consistent with code. But doc hints at Russian/Amharic expansion; locale scope needs an ADR before those land."
    evidence: "feature-discovery...md:FD-018"
    lens_note: "Same finding as AXIS 4 review."
  - severity: P1
    finding: "The index does not carry a dedicated Mother-Tongue Hint (lang-attribute) finding. The concept appears under translanguaging in AXIS 8 F6, but as an a11y lang-attribute requirement it has no FD slot. Synthesizer should create one."
    evidence: "feature-discovery...md (no dedicated FD for mother-tongue hint a11y contract)"
    lens_note: "New FD-xxx: 'Per-paragraph lang attribute for multilingual content'."
  - severity: P1
    finding: "Index does not call out admin/full-version a11y gap. All teacher/parent features will route through admin; admin currently lacks the a11y scanners student-web has."
    evidence: "feature-discovery...md (no admin-a11y FD); src/admin/full-version/ (no tests/a11y/ directory visible)"
    lens_note: "Top-10 should include extending scanners to admin."
  - severity: P2
    finding: "Index uses '55 findings after dedup' but several items still duplicate at the persona-review level (FD-014 vs AXIS 3 F7 vs AXIS 8 F4). Synthesizer dedup must coalesce with code-reality."
    evidence: "feature-discovery...md executive summary"
    lens_note: "Multiplicity is itself an a11y risk because competing impls regress."
  - severity: P2
    finding: "Index mentions Tamar (accessibility reviewer) cross-examined — good. But Tamar's findings don't surface as FDs in the SHIP list (e.g., no FD for prefers-reduced-motion, no FD for keyboard-only coverage gates). Those are treated as implicit, not first-class."
    evidence: "feature-discovery...md:L5"
    lens_note: "Making a11y gates first-class in the synthesis prevents them from slipping."
