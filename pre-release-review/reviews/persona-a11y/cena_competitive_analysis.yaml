  - "axis3...md: Feature 7 Arabic RTL Math (ties to F10 math keyboard)"
  - "AXIS_4_Parent_Engagement_Cena_Research.md: F3 parent-teacher bridge (dup of F6)"
  - "feature-discovery-2026-04-20.md: FD Socratic tutor entries"
extracted_tasks:
  - title: "ADR + POC: TTS voice quality for Hebrew/Arabic math"
    priority: P0
    estimate: M
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Decide TTS strategy for F9. Options: (a) Web Speech API (free, variable quality), (b) Cloud TTS with glossary (paid, predictable), (c) Pre-rendered audio for canned math phrases + live for prose. Run a POC with 20 Bagrut-style sentences in he/ar and have native speakers rate intelligibility.
      ## Files
      - new: docs/adr/0040-tts-strategy-he-ar.md
      - throwaway POC under scripts/tts-eval/
      ## Definition of Done
      - ADR decides strategy with voice-quality evidence
      - Fallback path for browsers without chosen voice
      - FinOps cost estimate for 10k-student ceiling
      ## Reporting
      decision committed; PR merged
    source_doc_lines: [F9 section]
  - title: "Math keyboard: Arabic variable names and RTL-aware layout (F10)"
    priority: P0
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Extend MathInput.vue to offer a mode that exposes Arabic math variable names (س, ص, ع) alongside or instead of Latin letters for Arabic-locale students. Layout mirrors for RTL (common symbols on right side in RTL).
      ## Files
      - src/student/full-version/src/components/session/MathInput.vue
      - src/student/full-version/src/components/session/StepInput.vue
      - tests for Arabic variable round-trip to SymPy normalizer
      ## Definition of Done
      - Arabic mode selectable per student
      - س/ص/ع map to canonical x/y/z in SymPy via ArabicMathNormalizer
      - Keyboard layout mirrors under RTL locale
      - No change to CAS validation path
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [F10 section]
  - title: "LLM-output <bdi> post-processor for Socratic tutor outputs"
    priority: P1
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Any LLM-generated text rendered in RTL locales must be post-processed to wrap detected math in <bdi dir="ltr">. A client-side or server-side helper scans for math-looking substrings (e.g., /[a-zA-Z]\\^?\\d|\\\\frac\\{|\\$[^$]+\\$/) and wraps them.
      ## Files
      - new: src/student/full-version/src/utils/bidiMathWrap.ts
      - consumers: Socratic tutor panel, hint panel, feedback panel components
      - tests/unit/bidiMathWrap.spec.ts
      ## Definition of Done
      - Pure function with 100% test coverage on canonical cases
      - LLM output rendering components invoke the helper
      - Scanner test: no raw math in RTL content without <bdi>
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [F1, F3 sections]
  - title: "Virtual manipulative (F5) keyboard+SR accessibility contract"
    priority: P1
    estimate: L
    suggested_assignee: claude-subagent-a11y
    queue_body: |
      ## Goal
      Before any DreamBox-style canvas manipulative ships, define an a11y contract: keyboard navigation, semantic ARIA roles, and a MathML/text summary alternative.
      ## Files
      - new: docs/accessibility/manipulatives-a11y-contract.md
      - reference Khan Academy's approach (cited in doc)
      ## Definition of Done
      - Contract pinned before build
      - Every manipulative passes keyboard-only walkthrough
      - Screen-reader can answer the problem via text alternative
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-a11y --result "<branch>"
    source_doc_lines: [F5 section]
verdict: revise
verdict_reason: "Competitive features are useful but several need a11y/l10n contracts before build: TTS voice quality, math keyboard Arabic support, LLM output bidi post-processing, manipulative keyboard access."
