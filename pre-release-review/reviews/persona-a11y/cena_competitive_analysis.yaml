doc_path: pre-release-review/cena_competitive_analysis.md
reviewer: persona-a11y
reviewed_at: 2026-04-20
doc_summary: |
  10 adaptable features from EdTech competitive landscape: Socratic AI tutor,
  real-time scaffolding, stuck-ask button, at-risk alerts, virtual manipulatives,
  auto-translation parent comms, learning portfolio, Bagrut practice engine,
  TTS + highlighting, context-aware math keyboard. Several have direct a11y/l10n
  surface (F6, F9, F10).
system_purpose_fit: 4
  rationale:
    - F6 auto-translation parent comms aligns with l10n policy
    - F9 TTS + highlighting is a core a11y feature
    - F10 context-aware math keyboard supports motor-impaired and dyscalculic
    - F1/F2/F3 Socratic tutors need bidi+math-LTR contracts
code_reality_check:
  claims_verified_in_code:
    - "i18n scaffold for he/ar/en: src/student/full-version/src/plugins/i18n/"
    - "Math input exists: src/student/full-version/src/components/session/MathInput.vue, StepInput.vue"
    - "Bagrut alignment backend referenced in repo (syllabus mapping)"
  claims_contradicted_by_code: []
  claims_unverifiable:
    - "TTS infrastructure (F9) — not in repo"
    - "At-risk alert UI (F4) — not prototyped"
adr_alignment:
  honored:
    - "ADR-0004 figure rendering for F5 virtual manipulatives"
    - "ADR-0002 for F1/F8 CAS-backed correctness"
  violated: []
  missing_adr_needed:
    - "ADR for TTS vendor choice and locale voice coverage (he/ar)"
non_negotiable_violations: []
persona_findings:
  - severity: P0
    finding: "F9 TTS + highlighting — Hebrew and Arabic TTS voice quality varies wildly by vendor. OS-level voices (iOS AVSpeechSynthesis, Android TTS) have better Hebrew/Arabic than many cloud vendors but require native integration. PWA-first policy means Web Speech API with possibly poor voice quality. No plan is specified."
    evidence: "cena_competitive_analysis.md:F9 section"
    lens_note: "A TTS feature that sounds robotic or unclear in Hebrew/Arabic is actively worse for blind students than ARIA-labeled text."
  - severity: P0
    finding: "F10 context-aware math keyboard must support Hebrew + Arabic variable names (س, ص, ع) and right-handed keyboard layout (large keys on RTL-appropriate side). Doc cites MathGPT.ai which is English-only."
    evidence: "cena_competitive_analysis.md:F10 section"
    lens_note: "A math keyboard that forces Latin variables in Arabic UI is cultural friction. Arabic math uses local variable names."
  - severity: P1
    finding: "F1/F3 Socratic tutors generate text that mixes Hebrew/Arabic with math. Every generated message with inline math must be post-processed to insert <bdi> around equations."
    evidence: "cena_competitive_analysis.md:F1, F3 sections"
    lens_note: "LLM output is the most common place <bdi> gets dropped. Post-processing or render-time wrapping required."
  - severity: P1
    finding: "F6 auto-translation parent communications — which translation engine? If Google Translate, math terminology (derivative, integral) is often mistranslated. Doc mentions ClassDojo 190+ languages but that's generic."
    evidence: "cena_competitive_analysis.md:F6 section"
    lens_note: "Glossary-backed MT (he↔ar math glossary) or human review for a small set of core math terms."
  - severity: P1
    finding: "F5 virtual manipulatives (DreamBox, Brilliant.org style) are typically canvas-based and inaccessible to screen-reader users. Must provide a keyboard-navigable, semantic equivalent."
    evidence: "cena_competitive_analysis.md:F5 section"
    lens_note: "Khan Academy rebuilt their graphing exercises for keyboard; Cena should follow that lead, not DreamBox's canvas approach."
  - severity: P1
    finding: "F4 at-risk alerts use color traffic-light. Must have shape+text for CVD parents/teachers."
    evidence: "cena_competitive_analysis.md:F4 section"
    lens_note: "Recurring theme: color-coded alerts without redundancy."
  - severity: P2
    finding: "F7 student portfolio may include student writing in Hebrew/Arabic. Export must preserve direction and not flatten to LTR."
    evidence: "cena_competitive_analysis.md:F7 section"
    lens_note: "Teacher viewing a portfolio must see Arabic/Hebrew writing in correct direction."
already_built:
  - feature: "Math input UI with <bdi> wrapping"
    evidence: "src/student/full-version/src/components/session/MathInput.vue; StepInput.vue"
    note: "F10 should extend these, not greenfield"
  - feature: "Arabic/Hebrew locale scaffolding"
    evidence: "src/student/full-version/src/plugins/i18n/"
    note: "F1/F3/F6 all depend on it"
duplicates_of_other_docs:
