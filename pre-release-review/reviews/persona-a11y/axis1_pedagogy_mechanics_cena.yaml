    queue_body: |
      ## Goal
      Before any pedagogy-mechanic doc ships new student-facing prompts (self-explanation, retrieval check, hint, elaborative question), extend the existing bidi/a11y scanner to cover those component files. Prevents regressions where a new prompt forgets <bdi> for math or aria-live for dynamic steps.
      ## Files
      - src/student/full-version/tests/a11y/math-ltr-wrapper.spec.ts (extend allowlist)
      - src/student/full-version/tests/a11y/aria-live-on-dynamic.spec.ts (extend)
      - new: src/student/full-version/tests/a11y/prompt-i18n-coverage.spec.ts
      ## Definition of Done
      - Any .vue file under src/components/session/ that renders math in a prompt is covered by the scanner
      - Any newly added he/ar locale key has parity across locales/{he,ar,en}.json (asserted in test)
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L270-L440]
verdict: adopt
verdict_reason: "Pedagogy mechanics are largely algorithmic; a11y exposure is limited to ensuring new prompts honor existing <bdi> + aria-live patterns. No non-negotiable violations."
