verdict: revise
verdict_reason: |
  Motivation axis is shipgate-compliant in intent but leaks two Ministry-
  lens concerns — prediction-without-evidence on wise-feedback and
  plan-without-prereq-guard on reflective-study-plan. Fix those two and
  the rest is adopt-grade.
cross_lens_handoff:
  - to: persona-cogsci
    about: |
      Effect-size audits on F7/F8 (d=0.69-1.00, d=0.71) — cogsci lens
      owns evidence-integrity calls.
  - to: persona-ethics
    about: |
      F6 process-praise / F7 SRL prompts border motivation-vs-coercion
      — ethics lens is canonical for those calls.
  - to: persona-educator
    about: |
      Whether Socratic self-explanation (F1) aligns with how Israeli math
      teachers actually scaffold — educator owns that.
