doc_path: pre-release-review/axis3_accessibility_accommodations_findings.md
reviewer: persona-ministry
reviewed_at: 2026-04-20
doc_summary: |
  Eight accessibility/accommodations features (dyscalculia subitizing trainer,
  interactive number line, digital graph paper, ADHD session builder, color-
  blind palette, MathML screen reader, Arabic RTL math renderer, anxiety-
  reducing UI). Ministry lens: accommodations are directly Bagrut-relevant
  because the Bagrut exam itself grants extended-time / TTS / graph-paper
  accommodations to students with recognized diagnoses — what Cena offers
  should parallel what the exam allows, so prep mirrors conditions.
system_purpose_fit: 4
  rationale:
    - Accommodations parity with Bagrut exam accommodations is a legitimate
      defensibility argument — a Ministry inspector auditing our platform
      would expect TTS + extended time + MathML (Feature 6) to mirror the
      exam''s permitted accommodations.
    - RTL math renderer (F7) is non-negotiable for Arabic-medium Bagrut
      prep — it is arguably already a shipped requirement (math-always-LTR
      inside RTL per memory:feedback_math_always_ltr.md).
    - Features 1–3 (subitizing, number line, graph paper) are pedagogically
      valuable but below Bagrut grade level (foundational number sense).
      They are remediation, not exam prep. Not wrong — just clearly label
      scope so we don''t confuse a 3U/4U/5U track student.
code_reality_check:
  claims_verified_in_code:
    - 'Math-inside-RTL bdi-dir-ltr pattern is load-bearing: CLAUDE.md + memory:feedback_math_always_ltr.md'
    - 'Arabic math lexicon doc exists: docs/content/arabic-math-lexicon.md'
    - 'Translation gap tracking: docs/content/translation-gap-2026-04-15.md and translation-gap-2026-04-19.md'
  claims_contradicted_by_code: []
  claims_unverifiable:
    - 'F6 MathML-native screen-reader pipeline — code paths not inspected here; likely partial at best'
    - 'F5 color-blind palette — Vuexy primary #7367F0 is locked; any palette work must respect that (memory:project_primary_color_locked)'
adr_alignment:
  honored:
    - 'Bidi math (F7) aligns with memory:feedback_math_always_ltr rule (non-negotiable #6)'
    - 'Session-scoped accommodation preferences don''t accumulate psych profile (ADR-0003)'
  violated: []
  missing_adr_needed:
    - 'Accommodations-parity ADR — an explicit statement that Cena''s runtime accommodation set is a superset of Ministry-recognized Bagrut exam accommodations (extended time, TTS, graph paper, enlarged print). Without this, inspectors cannot map our offering to theirs.'
non_negotiable_violations: []
persona_findings:
  - severity: P1
    finding: |
      Feature 7 "Arabic RTL Math Renderer with Direction Isolation" is
      Ministry-critical for Arabic-medium Bagrut prep but doc frames it as
      one of eight co-equal features. It is not. It is a shippable
      precondition for serving the Arabic cohort at all. Elevate from
      SHIP to "already-committed / must-have", and verify the existing
      `<bdi dir="ltr">` pattern (non-negotiable #6) is honored everywhere
      math renders, not just KaTeX components.
    evidence: 'axis3_accessibility_accommodations_findings.md:L166 (SHIP verdict); CLAUDE.md (non-negotiable #6); memory:feedback_math_always_ltr.md'
    lens_note: |
      Ministry lens: Arabic-medium Bagrut is a Ministry-recognized track.
      If our renderer doesn''t handle it correctly, we cannot claim
      Arabic-cohort parity. Everything else is secondary.
  - severity: P1
    finding: |
      Feature 6 "MathML-Native Screen Reader Pipeline" is the accommodation
      most closely mirroring what the Ministry allows in Bagrut exams for
      blind / low-vision students. Its SHORTLIST verdict understates its
      Ministry defensibility value. Without MathML + SpokenMath, we cannot
      credibly say we support the Bagrut accommodations framework.
    evidence: 'axis3_accessibility_accommodations_findings.md:L167 (SHORTLIST)'
    lens_note: |
      Ministry lens: the accommodation list on the Ministry side is
      codified. We must match it to be defensibly "Bagrut prep".
  - severity: P2
    finding: |
      Features 1–3 (subitizing trainer, number line, graph paper) are
      below Bagrut grade level. They are valid remediation but must not
      be presented to a 5U student as "practice" — that would be a mis-
      targeting with Ministry-lens visibility. The doc does not specify
      how these features are gated by student grade/track/diagnosed
      dyscalculia.
    evidence: 'axis3_accessibility_accommodations_findings.md:L174-L180 (Feature 1 description); axis3_accessibility_accommodations_findings.md:L180 (claim: "these are prerequisites for Bagrut-level mathematics, yet most platforms skip them")'
    lens_note: |
      Ministry lens: remediation content must be clearly labeled as
      remediation. Mixing it into main progression confuses inspectors.
  - severity: P2
    finding: |
      Accommodation preferences (extended time, TTS, graph paper) touch
      student-profile data. Must they persist? Yes — these are not
      misconception data; they are student-provided accommodation settings
      mirroring a Ministry-recognized diagnosis. ADR-0003 does not ban
      this but the doc does not explicitly distinguish. Ministry lens
      wants a clear policy: accommodations = durable profile setting;
      misconceptions = session-scoped.
    evidence: 'axis3_accessibility_accommodations_findings.md (across Features 4, 8); docs/adr/0003-misconception-session-scope.md'
    lens_note: |
      Ministry lens: inspectors expect accommodations to be durable and
      auditable. That is not a misconception leak — the categories must
      be kept distinct in storage + audit log.
already_built:
  - feature: Arabic math lexicon + translation gap tracking
    evidence: docs/content/arabic-math-lexicon.md, docs/content/translation-gap-2026-04-19.md
    note: |
      The terminology base for F7 renderer localization already exists —
      doc should extend not duplicate.
  - feature: LTR-math-inside-RTL rule as non-negotiable
    evidence: CLAUDE.md non-negotiable #6 + memory:feedback_math_always_ltr.md
    note: |
      F7 is partly "already a rule we ship"; proposal should focus on
      gap-closure (all math surfaces verified), not greenfield.
