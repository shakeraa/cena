verdict: adopt
verdict_reason: |
  Accommodations axis is Ministry-aligned by nature; just needs (a) an
  ADR codifying parity and (b) elevation of F6 MathML + F7 RTL from
  SHORTLIST/SHIP to "committed precondition". No guardrail violations.
