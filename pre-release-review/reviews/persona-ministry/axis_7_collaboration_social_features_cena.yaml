      Close the ADR-0002 hole in F1 Anonymized Peer Explanation Circles
      (and F7 Collaborative Whiteboard). Peer-generated math content
      reaching another student must either (a) pass a lightweight CAS
      equivalence check against the canonical solution for the
      problem, or (b) be teacher-moderated before delivery.

