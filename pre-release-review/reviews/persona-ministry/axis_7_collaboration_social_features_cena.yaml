verdict: revise
verdict_reason: |
  F1 and F7 are P0 must-revise before ship — peer math content cannot
  reach students unverified. F3 needs a shipgate audit. F2/F4/F5/F6
  are adopt-grade with minor Ministry-text-exclusion note.
cross_lens_handoff:
  - to: persona-privacy
    about: |
      Two-sided consent / DPIA gate / ephemeral retention — privacy lens
      is canonical for RDY-076.
  - to: persona-redteam
    about: |
      Peer channels are an attack surface (impersonation, bullying,
      prompt injection via peer-authored content).
  - to: persona-ethics
    about: |
      F3 competition framing — ethics is canonical for persuasion-vs-
      coercion line.
