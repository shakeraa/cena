extracted_tasks:
  - title: Reframe F4 "Bagrut-Readiness Tracking" to non-predictive coverage view
    priority: P0
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Remove any numeric/ordinal prediction from F4 "Bagrut-Readiness
      Tracking". Replace with deterministic coverage signals:
      - Chapters mastered (per ADR-0034 StudentAdvancement aggregate)
      - Chapters remaining on the Ministry 3U/4U/5U syllabus
      - First-attempt accuracy on mock items (no bayesian uplift, no
        theta estimate shown to teacher until RDY-080 concordance study
        lands)

      ## Files
      - pre-release-review/cena_axis5_teacher_workflow_features.md
        (revise F4 spec)
      - docs/adr/00XX-teacher-surface-bagrut-readiness-framing.md (new)
      - docs/engineering/shipgate.md (scanner patterns for teacher copy)

      ## Definition of Done
      - F4 spec revised — "tracking" limited to coverage + mock
        accuracy; no "on track for Nu" language
      - ADR drafted and linked
      - Shipgate scanner additions land

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: [L263]
  - title: Bind lesson-planner output to ChapterDocument prereq DAG
    priority: P1
    estimate: M
    suggested_assignee: claude-subagent-lesson-planner-prereq
    queue_body: |
      ## Goal
      Ensure F1 "Smart Lesson Planner" never recommends a lesson on a
      chapter whose prereqs are not majority-mastered by the class.

      ## Files
      - src/api/Cena.Admin.Api/Teacher/LessonPlannerService.cs (new or
        existing — check first)
      - src/actors/Cena.Actors/Mastery/TopicPrerequisiteGraph.cs (expose
        read API suitable for class-aggregate filtering)
      - Tests in src/api/Cena.Admin.Api.Tests/Teacher/

      ## Definition of Done
      - Recommendation engine filters candidate chapters by
        (class-aggregate prereq-mastery threshold configurable, default 70%)
      - Test: class with 0% mastery of prereqs → recommender returns
        only the prereq chapter, never the downstream chapter
      - Full sln build green

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-lesson-planner-prereq --result "<branch>"
    source_doc_lines: [L271-L300]
verdict: revise
verdict_reason: |
  F4 is P0 — must be reframed before any teacher-facing surface advertises
  "Bagrut readiness". F1 needs prereq-DAG binding. Rest are adopt-grade
  with syllabus-ground checks.
