      ## Goal
      Codify a citation-integrity policy: every quantitative claim
      (effect size, accuracy %, participation rate, time-savings %)
      in docs/marketing/UI must cite a source + retrieval date +
      verification SHA. Add a CI scanner that flags numeric claims
      without anchored citations.

      ## Files
      - docs/adr/00XX-citation-integrity.md (new)
      - scripts/citation-scanner.py or equivalent (new)
      - .github/workflows/shipgate-job.yml (add citation scan step)

      ## Definition of Done
      - ADR drafted
      - Scanner catches obvious violations in fixture content
      - Passes on current main branch

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: [L1-L69]
verdict: adopt
