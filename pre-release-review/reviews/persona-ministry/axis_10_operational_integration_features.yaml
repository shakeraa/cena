    estimate: M
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Define and enforce which signals may be written to Google
      Classroom / Mashov (F7). Whitelist: scores on actual student-
      taken mock exams (a single submission, timestamped). Blacklist:
      readiness %, predicted Bagrut score, mastery %, chapter-coverage
      %. Architecture test fails if passback payload contains banned
      fields.

      ## Files
