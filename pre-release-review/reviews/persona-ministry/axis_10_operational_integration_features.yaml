        (new or check)
      - src/integrations/GoogleClassroom.Tests/
        GradePassbackPayloadWhitelistTest.cs (new)

      ## Definition of Done
      - ADR drafted
      - Whitelist + blacklist encoded as explicit DTO fields
      - Architecture test passes on empty implementation

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
