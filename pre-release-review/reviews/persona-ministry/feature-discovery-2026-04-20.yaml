      YAMLs traces back here. Ministry-lens concerns are well-
      represented in the BORDERLINE table (L1677-L1693): RDY-080 on
      FD-004/FD-025/FD-031, ADR-0003 on FD-003/FD-029, raw-Bagrut-text
      implicitly handled (no FD proposes this).
    - Top-10 ranks FD-036 Cultural Problems #1 (d=0.4-0.6 corrected),
      FD-014 RTL Renderer #4 (non-negotiable), FD-040 Rubric Engine
      #7, FD-048 Mashov #10 — all Ministry-aligned.
    - Doc explicitly records Rami''s corrections to prior overclaims
      (L1710-L1712) — exactly what Ministry-lens wanted.
