doc_summary: |
  1727-line mega-index: 55 deduplicated findings (FD-001..FD-055) across
  10 axes + competitive landscape + cross-domain innovation, merged from
  97 raw findings via 12 parallel research streams. Cross-examined by
  Dr. Nadia (pedagogy) and Dr. Rami (honesty). Ships 18 SHIP, 22 SHORTLIST,
  12 DEFER, 3 REJECT. Includes a Top-10 shortlist and a Borderline-with-
  tension table that lines up directly with Ministry-lens concerns.
