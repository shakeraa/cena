persona_findings:
  - severity: P1
    finding: |
      BORDERLINE table (L1677-L1693) correctly captures the RDY-080
      prediction-risk pattern across FD-004, FD-025, FD-031. Mitigations
      listed are text-level ("disclaimer", "framing") — Ministry-lens
      wants architecture-level enforcement (no theta in student/parent
      DTOs, no predicted score in any passback payload, no "on track
      for Nu" copy shippable). See axis_6, axis_4, axis_5, axis_10
      tasks for arch tests.
    evidence: 'feature-discovery-2026-04-20.md:L1680-L1687 (BORDERLINE table)'
    lens_note: |
      Ministry lens: "disclaimer" is the 2005 compliance approach.
      2026 shipping means architecture tests.
  - severity: P1
    finding: |
      Top-10 ranks FD-025 "Bagrut-Readiness Tracker" at rank #5
      equivalent (via FD-022 Smart Lesson Planner pair). Ministry-lens
      wants FD-025 demoted or reframed (see axis_5 F4 task) —
      "readiness tracker" implies prediction; should be "coverage
      tracker".
    evidence: 'feature-discovery-2026-04-20.md:L1665 (rank 5 FD-022 mentions Bagrut tracker), L1684 (FD-025 BORDERLINE row)'
    lens_note: |
      Ministry lens: Top-10 is where stakeholders focus; keep the
      prediction-risk items out or reframed.
  - severity: P1
    finding: |
      FD-011 Subitizing (accessibility) and FD-012 ADHD Chunking appear
      in the dyscalculia / accessibility coverage matrix. Ministry-
      lens reminder (from axis_3): these are remediation content,
      below Bagrut grade level. Must not be surfaced into the main
      Bagrut progression for 3U/4U/5U students. Coverage matrix does
      not mention this constraint.
    evidence: 'feature-discovery-2026-04-20.md:L1639 (3+ dyscalculia features — FD-011, FD-012, FD-013); axis3_accessibility_accommodations_findings.md (same concern)'
    lens_note: |
      Ministry lens: labeling scope prevents inspectors from seeing
      foundational-level content presented to a 12th-grade 5U student.
  - severity: P2
    finding: |
      The "BORDERLINE with tension discussion" column for FD-024
      Homework Auto-Generator lists "misconception data retention"
      with mitigation "Weekly recalculation; 2-week max retention for
      level profiles". 2-week retention drifts close to ADR-0003''s
      session-scope rule. Ministry-lens wants clarification: are
      these "level profiles" misconception data (session-scoped) or
      calibration data (aggregate, allowed)? If misconception, 2 weeks
      is an ADR-0003 breach.
    evidence: 'feature-discovery-2026-04-20.md:L1683 (FD-024 row)'
    lens_note: |
      Ministry lens: retention periods need ADR anchoring. 2 weeks
      for "level profiles" is probably fine if it''s per-student
      aggregate mastery; not fine if it''s misconception details.
  - severity: P2
    finding: |
      FD-048 Mashov Sync Top-10 rank #10 correctly flags unofficial
      API. Ministry-lens task (axis_10) adds kill-switch + legal-
      posture doc; this doc''s mitigation is only "abstraction layer
      for migration; defensive coding" (L1693). Extend mitigation to
      include the legal-posture doc.
    evidence: 'feature-discovery-2026-04-20.md:L1669 (rank 10); L1693 (BORDERLINE mitigation)'
    lens_note: |
      Ministry lens: abstraction ≠ legal posture. Both needed.
