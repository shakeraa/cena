extracted_tasks:
  - title: Elevate BORDERLINE RDY-080 mitigations from UI copy to architecture tests
    priority: P1
    estimate: L
    suggested_assignee: claude-subagent-rdy080-arch-tests
    queue_body: |
      ## Goal
      For every BORDERLINE finding flagged RDY-080 (FD-004, FD-025,
      FD-031, and any Bagrut-passback in FD-048/FD-054), convert the
      text-level "disclaimer / framing" mitigation into an enforced
      architecture test. No readiness/theta/prediction field may
      appear in:
      - Student-facing API DTOs
      - Parent-facing API DTOs
      - Teacher-facing API DTOs (teacher coverage view allowed;
        teacher-facing prediction not)
      - Any external grade-passback payload

      ## Files
      - src/actors/Cena.Actors.Tests/Architecture/
        RDY080PredictionSurfaceTest.cs (new)
      - src/api/Cena.*.Tests/Architecture/ (audit all endpoints)
      - Reuses the axis_6 theta-isolation task

      ## Definition of Done
      - Test asserts no DTO field name matches /theta|readiness|
        predicted|likelihood|probability[- ]pass|on[- ]track/i on
        student/parent surfaces
      - Passes on main (likely most such fields don''t exist yet)

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-rdy080-arch-tests --result "<branch>"
    source_doc_lines: [L1680-L1687]
  - title: Clarify FD-024 "level profile" retention vs ADR-0003
    priority: P2
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Resolve whether FD-024 Homework Auto-Generator''s "level
      profiles" (2-week retention mitigation) are per-student
      misconception data (→ ADR-0003 violation, must be session-
      scoped) or aggregate calibration data (→ allowed). If
      misconception, revise mitigation. If aggregate, document as
      such.

      ## Files
      - pre-release-review/feature-discovery-2026-04-20.md (revise
        FD-024 BORDERLINE row)
      - docs/adr/0003-misconception-session-scope.md (clarify scope
        if needed)

      ## Definition of Done
      - FD-024 row revised with unambiguous retention semantics
      - If misconception, retention reduced to session; if aggregate,
        add architecture-test reference

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: [L1683]
  - title: Label remediation content (FD-011, FD-012) as below-Bagrut scope
    priority: P2
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Ensure FD-011 Subitizing Support + FD-012 ADHD Chunking + any
      foundational-number-sense remediation content is tagged
      `content_level: remedial` (below 3U entry) and filtered out of
      main Bagrut progression for students on 3U/4U/5U tracks unless
      the student has an explicit dyscalculia accommodation flag.

      ## Files
      - src/shared/Cena.Infrastructure/Documents/ (add ContentLevel
        enum if absent)
      - src/actors/Cena.Actors/Mastery/AdaptiveScheduler.cs (filter
        remedial content from non-accommodation students)
      - Architecture test

      ## Definition of Done
      - ContentLevel enum (Remedial / Bagrut3U / Bagrut4U / Bagrut5U)
      - Scheduler respects content level + student accommodation
      - Test: non-accommodation 5U student never receives remedial
        content

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: [L1639, L1646]
verdict: adopt
