      Extend F8 "Cena Transparency Report" spec to cover curriculum-
      fidelity metrics as first-class fields:
      - CAS verification coverage ratio (cena_cas_binding_coverage_ratio)
      - Per-track rubric version in use
      - Coverage gap vs Ministry syllabus (from ContentCoverageService)
      - Accommodations parity checklist (from the new ministry-
        accommodations ADR once landed)

      ## Files
      - pre-release-review/axis9_data_privacy_trust_mechanics.md (F8
        section, revise)
      - docs/adr/00XX-annual-transparency-report.md (new)
      - src/api/Cena.Admin.Api/Transparency/TransparencyReportService.cs
        (scaffolding if F8 moves forward)

      ## Definition of Done
      - Report schema documented including curriculum-fidelity fields
      - ADR drafted
