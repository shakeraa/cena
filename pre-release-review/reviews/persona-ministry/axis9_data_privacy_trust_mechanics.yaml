        gauges

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: [L453]
  - title: Reference Ministry chapter + prereq in F1 "Why This Problem" templates
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Every F1 "Why This Problem" student-facing explanation template
      must cite: (a) the current ChapterDocument.Name + syllabus track,
      (b) the prereq ChapterDocument.Name that drove the recommendation.

      ## Files
      - src/api/Cena.Student.Api.Host/Endpoints/ExplanationEndpoints.cs
        (new or check)
      - Template schema must reference chapter_id from ChapterDocument

      ## Definition of Done
      - Architecture test: explanation response DTOs include chapter_id
      - Test: explanation for a given recommendation resolves to an
        extant ChapterDocument

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L461-L495]
verdict: adopt
verdict_reason: |
  Privacy-focused axis is largely outside lens, but F8 (transparency
  report) and F1 (explainability) have direct Ministry-defensibility
  value once widened to include curriculum-fidelity signals. No
  violations.
cross_lens_handoff:
  - to: persona-privacy
    about: |
      All F1-F8 details on consent, erasure, COPPA, PPL, DP — privacy
      lens is canonical.
  - to: persona-redteam
    about: |
      F6 data-provenance trail attack surface (can it leak cross-tenant
      data?) — redteam owns.
  - to: persona-enterprise
    about: |
      F2 "My Cena Profile" data-transparency dashboard bounded-context
      placement; event sourcing surfacing.
