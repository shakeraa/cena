non_negotiable_violations: []
persona_findings:
  - severity: P1
    finding: |
      Rami flags FD-008 "Yu et al. 2026" as an unverifiable /
      fabricated citation (L24). Ethics lens: shipping a feature
      (AI Partial-Credit Grading) whose primary evidence is
      fabricated is a form of marketing manipulation — parents and
      schools will be told "90%+ agreement with human TAs" based on
      a nonexistent paper. This fails informed-consent of the
      institutional buyer. Until citation is verified/replaced, the
      feature cannot be marketed with the 90% claim, and the
      spec/marketing materials must be flagged.
    evidence: finding_assessment_dr_rami.md:L24
    lens_note: |
      Statistical honesty is an ethics floor. Shipgate should add a
      rule that every "Evidence class" claim in feature specs must
      cite a verifiable DOI/URL — CI can flag non-resolving URLs.
  - severity: P1
    finding: |
      Rami flags FD-003 "95% misconception resolution" as unsupported
      (L19). Ethics concern: this figure likely to appear in
      marketing decks aimed at school administrators. Selling a
      product to parents of minors on an inflated claim is a dark
      pattern distinct from — but parallel to — the engagement ones
      shipgate bans. Evidence-honesty is an ethical baseline.
    evidence: finding_assessment_dr_rami.md:L19
    lens_note: |
      Ethics lens strongly supports Rami's REJECT here. The
      "informed buyer" test extends to schools and parents, not just
      the student.
  - severity: P2
    finding: |
      Rami flags FD-011 ES=1.16 as cherry-picked (L27). Same marketing-
      honesty concern. If the feature ships with "cultural context
      has a 1.16 effect size" claim to schools, and the real meta-
      analytic range is 0.4-0.6, this is inflated promise-making.
      Ethics lens supports Rami's REJECT of the ES claim while the
      underlying feature (culturally-contextualized problems) can
      still ship — just with honest effect-size framing.
    evidence: finding_assessment_dr_rami.md:L27
    lens_note: |
      Feature is ethically valuable even with smaller effect size.
      The cherry-pick is the ethics problem, not the feature.
  - severity: P2
    finding: |
      Rami flags FD-006 selective citation of Foster (doc cites
      Foster but does not disclose Foster 2021 null-achievement
      finding) (L22). Ethics lens: this is the same informed-
      consent issue applied to product positioning. Feature F8
      Confidence Calibration should be positioned as metacognitive
      tool (Rami's recommendation), not achievement booster — and
      the ethics lens adds CBM subtractive-scoring concern (see
      Axis 6 F8 finding).
    evidence: finding_assessment_dr_rami.md:L22
    lens_note: |
      Converges with Axis 6 ethics finding. Positioning honesty +
      structural non-subtraction = full fix.
