extracted_tasks:
  - title: "Feature-spec citation verifiability rule"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Add a CI rule: every feature spec under pre-release-review/ or
      docs/ that cites an "Evidence class: PEER-REVIEWED" must
      include a DOI or resolvable URL. CI fetches the URL and fails
      on 404 or unresolvable DOI.
      ## Files
      - scripts/shipgate/citation-check.mjs (new)
      - .github/workflows/citation-check.yml (new)
      ## Definition of Done
      - CI blocks merge of any feature-spec .md with unresolvable DOIs
      - Retries + caching to avoid flakiness
      - Allowlist for pre-prints / in-press with explicit justification
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L19, L24, L27]
  - title: "Marketing claim floor: no effect-size claim without meta-analytic mean citation"
    priority: P2
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Any marketing / school-sales material referencing feature
      effect sizes must cite the meta-analytic MEAN, not single-
      study maximums. Specs under pre-release-review/ that cite
      single-study ES must also present meta-analytic mean where
      available. Add to design-review checklist.
      ## Files
      - docs/engineering/design-review-checklist.md
      - docs/marketing-claims-policy.md (new)
      ## Definition of Done
      - Policy accepted
      - Rami's flagged specs (FD-001, FD-011) updated to include meta-means
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: [L17, L27]
verdict: adopt
verdict_reason: |
  Rami's lens is statistical integrity; ethics lens adopts his
  REJECTs and WARNINGs where they overlap with evidence-honesty.
  Primary ethics-lens addition: add CI infrastructure for citation
  verifiability. Rami's review is mostly out-of-lens for me — no new
  ethics findings beyond marketing-integrity concern.
