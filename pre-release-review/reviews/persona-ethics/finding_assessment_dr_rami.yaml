doc_path: pre-release-review/finding_assessment_dr_rami.md
reviewer: persona-ethics
reviewed_at: 2026-04-20
doc_summary: |
  Dr. Rami's statistical-honesty / measurement-integrity meta-review of the
  20 SHIP-recommended findings. Flags cherry-picking, fabricated citations,
  and RDY-080 Bagrut-prediction violations. 9 PASS / 8 WARNING / 3 REJECT.
system_purpose_fit: 4
  rationale:
    - Rami's lens (statistical honesty) is adjacent to but distinct from
      ethics lens
    - Where it overlaps: fabricated claims / cherry-picked effect sizes
      also fail the "informed student" ethical-persuasion test because
      they mislead stakeholders about expected outcomes
    - Strong ethics-adjacent finding: FD-008 Yu et al. 2026 AI-grading
      citation appears fabricated — a marketing/research integrity
      failure that ethics lens supports retiring
    - FD-003 misconception-resolution 95% claim flagged as fabricated —
      directly affects product promises made to schools/parents
