extracted_tasks:
  - title: "Offline sync conflict: surface to student, never silent-discard"
    priority: P1
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F4 offline progress sync conflicts:
      - No silent server-overwrite
      - Student shown "review offline work" panel with diff
      - Student chooses keep-local / keep-server / merge
      - Discarded data retained 7 days recoverable
      ## Files
      - src/student-web/src/features/offline-sync/*
      - src/actors/SessionGrain/*
      ## Definition of Done
      - Conflict review panel rendered when delta detected
      - Retention job purges discarded data after 7 days
      - E2E test: offline attempt + conflict + student chooses local
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L255, L308]
  - title: "Google Classroom passback: only explicit assignments, student-visible"
    priority: P1
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
