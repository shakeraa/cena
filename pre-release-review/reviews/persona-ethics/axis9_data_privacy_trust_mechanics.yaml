    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F3 "Delete My Journey" must honor deletion requests without
      cooling-off period. Allow post-deletion restoration within 7
      days via a separate parental request for under-16 (not an
      automatic delay before deletion).
      ## Files
      - src/actors/PrivacyActor/DeletionGrain.cs
      - src/student-web/src/features/account-delete/*
      ## Definition of Done
      - Deletion scheduled immediately on confirmation
      - Restoration endpoint requires separate parent request
      - Deletion certificate emailed immediately
      - E2E test: confirm -> 2 seconds later data is gone from student-facing surfaces
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L123]
  - title: "Provenance trail copy: system-reasoning framing, not student-judgment"
    priority: P2
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F6 provenance sentences use "the system recommended this because
      the data showed X" framing, never "you spent extra time" or
      "you took longer than average" — student cannot disagree with
      a judgment about themselves, only with a description of data.
      ## Files
      - src/student-web/src/features/why-this/*
      - src/student-web/src/locales/*.json
      ## Definition of Done
      - Shipgate lint rejects "you spent / you took / you showed"
        in why-this-problem namespace
      - Copy reviewed with 3 sample students for tone
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L223]
  - title: "Transparency report: add banned-mechanic compliance section"
    priority: P2
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
