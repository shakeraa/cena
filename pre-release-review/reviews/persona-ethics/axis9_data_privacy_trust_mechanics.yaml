persona_findings:
  - severity: P1
    finding: |
      F3 "Delete My Journey" (L103-138) proposes 72h response time with
      a 24-hour cooling-off period (L123). Ethics concern: cooling-off
      periods on data deletion requests are a known dark pattern even
      when well-intended (FTC scrutinized this in FTC v. Epic). For
      minors' data, a cooling-off period reverses the "as easy to
      delete as to create" principle. Recommend:
      (a) No cooling-off period on deletion — honored immediately on
          confirmation
      (b) Restoration allowed within 7 days post-deletion via
          separate parental request (for under-16)
      (c) Deletion certificate sent immediately, not "within 72 hours"
    evidence: axis9_data_privacy_trust_mechanics.md:L123
    lens_note: |
      ICO 2025 erasure guidance: deletion must be "without undue delay"
      (typically 1 month max, immediate when feasible). Adding a
      cooling-off period is friction that favors the platform over
      the data subject.
  - severity: P2
    finding: |
      F6 "How Did You Know That?" Data Provenance Trail (L220-255) is
      ethically excellent. One note: the evidence sentences like "You
      spent extra time on division with remainders — let's practice
      more" (L223) are diagnostic pronouncements about the student's
      learning state. Framing should be non-pronouncement ("the system
      recommended this because you spent extra time on...") so the
      student can disagree without confronting a judgment.
    evidence: axis9_data_privacy_trust_mechanics.md:L223
    lens_note: |
      Provenance framing should be about the system's reasoning, not
      about the student. Subtle but important.
  - severity: P2
    finding: |
      F8 Cena Transparency Report (L298-332) proposes periodic
      public reports. Excellent. Ethics lens adds: include a
      dedicated section on banned-mechanic compliance — every
      quarterly report should reaffirm that no streaks, no variable-
      ratio rewards, no loss-aversion copy shipped in that period,
      with CI scanner result summaries. This creates external
      accountability for shipgate.
    evidence: axis9_data_privacy_trust_mechanics.md:L300-L303
    lens_note: |
      Public transparency about what's NOT in the product is as
      important as what is.
