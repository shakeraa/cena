doc_summary: |
  Proposes 8 privacy/trust features (explainable AI recommendation,
  student data transparency dashboard, delete-my-journey erasure,
  consent-revocation UX, age-appropriate privacy copy, data provenance
  trail, differential privacy analytics, transparency report). Axis 9 is
  the privacy-lens twin of the ethics lens.
system_purpose_fit: 5
  rationale:
    - Axis 9 is structurally ethics-aligned — it's the "trust" axis. Every
      feature increases transparency, autonomy, and informed consent.
    - F4 Consent-Revocation UX (L142-178) directly enforces "as easy to
      withdraw as to give" — Cialdini-consent ethical baseline.
    - F5 Age-Appropriate Privacy Copy passes the informed-student test
      by design.
    - No shipgate violations, no dark patterns, no banned mechanics.
    - The ethics lens can REINFORCE these proposals as non-negotiable
      infrastructure, not "nice to have."
