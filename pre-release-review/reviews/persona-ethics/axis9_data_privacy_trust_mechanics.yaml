      - Allowlist changes with justification
      - Any incident where a banned pattern reached production
      - Quarterly public reaffirmation: no streaks, no loss-aversion
        copy, no variable-ratio rewards
      ## Files
      - docs/transparency-report-template.md (new)
      ## Definition of Done
      - Template drafted
