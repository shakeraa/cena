persona_findings:
  - severity: P1
    finding: |
      Nadia's FD-016 review (L256-269) says Team Challenges "milestone-
      based design (Bronze/Silver/Gold) avoids shame if implemented
      correctly — all tiers must be framed positively with no public
      display of which tier other teams reached." Ethics lens disagrees
      with "avoids shame if framed positively." Bronze/Silver/Gold is
      tier-based comparison by definition; framing is not the load-
      bearing piece; the structural pattern is. This is a pedagogy-
      lens blind spot. See Axis 7 F3 P0 finding.
    evidence: cena_dr_nadia_pedagogical_review_20_findings.md:L265-L269
    lens_note: |
      Pedagogy can accept a pattern that shipgate bans. The reviews
      are independent and the shipgate bans win under the 9 non-
      negotiables.
  - severity: P2
    finding: |
      FD-009 Socratic Tutor review (L155-167) requires "escape hatch
      to full worked solutions must be always available and prominently
      displayed." Ethics lens agrees and strengthens: escape hatch
      must be EQUALLY prominent as the Socratic prompt, not a
      secondary option. See axis1 / competitive-analysis finding on
      help-seeking.
    evidence: cena_dr_nadia_pedagogical_review_20_findings.md:L165-L167
    lens_note: |
      Equal-prominence is an autonomy requirement. "Prominently
      displayed" is vague enough to drift.
  - severity: P2
    finding: |
      FD-014 Explainable AI review (L227-239) recommends minimal
      embedding ("<15 words") and A/B test before investing. Ethics
      lens adds: explanations must use system-reasoning framing, not
      student-judgment framing ("the system recommended this because
      the data showed X" vs "you spent extra time on X"). Same
      finding as Axis 9 F6.
    evidence: cena_dr_nadia_pedagogical_review_20_findings.md:L235
    lens_note: |
      Pedagogy says "keep it short;" ethics adds "keep it about the
      system, not the student."
  - severity: P2
    finding: |
      FD-011 Cultural Context review (L186-196) requires "community
      review board with cohort representatives" as CRITICAL
      GUARDRAIL. Ethics lens upgrades this from mitigation to hard
      requirement; see Axis 8 F5.
    evidence: cena_dr_nadia_pedagogical_review_20_findings.md:L195-L196
    lens_note: |
      Pedagogy and ethics converge here. Must be governance-level.
