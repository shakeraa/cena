  rationale:
    - This is a pedagogical-lens meta-review; not a proposal doc
    - Ethics lens agrees with most verdicts; Nadia's WARNINGs on
      FD-009 (Socratic tutor autonomy), FD-014 (Explainable AI evidence),
      FD-016 (Cooperative Competitions engineering) each touch ethics
      dimensions my lens would independently flag
    - Nadia is pedagogy-lens only — misses the Axis 7 confetti/collapse
      ship-gate violations (FD-016 line item)
    - Nadia's "Intrinsic Motivation Risk Map" (L345-351) is ethics-
      aligned — assigns HIGH to no features, MEDIUM to FD-009/014/016
