extracted_tasks:
  - title: "Crisis Mode red/green UX revision + copy lockdown"
    priority: P1
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F7 Crisis Mode (and Axis 4 F8): replace "topics secured / topics
      at risk" with "topics mastered / topics to focus next." Remove
      red progress coloring (reserve red for errors + accessibility
      only). Pass shipgate lint forbidding "at risk," "running out,"
      "only X left," "crisis."
      ## Files
      - src/student-web/src/features/exam-proximity/*
      - scripts/shipgate/banned.json
      - src/student-web/src/locales/*.json
      ## Definition of Done
      - Shipgate lint passes
      - Visual regression: no red in progress indicators
      - E2E: all locales render without banned phrases
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L262, L283-L284]
  - title: "CBM scoring: default additive, subtractive mode opt-in + ADR"
    priority: P1
    estimate: M
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      F8 Confidence Calibration:
      (a) Default scoring: sum(confidence_correct) only — additive,
          no subtraction.
      (b) Subtractive "certainty-based marking" mode offered only as
          explicit student opt-in with plain-language explanation of
          what it does and why.
      (c) Write ADR that cites Foster 2021 null-achievement finding and
          explains the design choice.
      (d) Update shipgate.md to explicitly address CBM (allowlist the
          opt-in subtractive mode only, not the default).
      ## Files
      - docs/adr/00NN-cbm-scoring-policy.md (new)
      - docs/engineering/shipgate.md
      - src/actors/Assessment/ConfidenceScorer.cs
      - src/student-web/src/features/calibration/*
      ## Definition of Done
      - ADR accepted
      - Default mode additive; subtractive mode gated on opt-in
      - User-facing copy explains both modes neutrally
      - Test coverage for both modes + opt-in guard
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: [L299-L334]
  - title: "Misconception tag UI: diagnostic-offer framing, dismissible"
    priority: P2
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F6 real-time misconception tag UI:
      - Phrasing: "Want a quick note about why this often trips people
        up?" (not "You might be making misconception X")
      - Dismissible with no penalty; no record of dismissal
      - At most one tag per problem
      ## Files
      - src/student-web/src/features/misconception-tip/*
      - src/student-web/src/locales/*.json
      ## Definition of Done
      - Shipgate lint forbids "you are / you might be" diagnosis copy
        in misconception-tip namespace
      - E2E: dismiss within session, no persistence
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L243-L247]
  - title: "Per-session error report: symmetric positive + negative framing"
    priority: P2
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F5 Per-Session Error Analysis Report must show both:
      - "What went well" — at least 1 affirmation per session
      - "What to practice next" — existing error view
      Plus "try different topic" escape hatch always visible.
      ## Files
      - src/student-web/src/features/session-report/*
      ## Definition of Done
      - Report renders both panels regardless of accuracy
      - Escape hatch click routes to topic picker
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L205-L208]
