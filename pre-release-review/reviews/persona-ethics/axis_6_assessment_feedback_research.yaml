persona_findings:
  - severity: P1
    finding: |
      F7 Crisis Mode Compression Schedule (L259-294) uses "topics
      secured (green) vs. topics at risk (red)" framing (L283-L284).
      "At risk" + red coloring + Bagrut countdown context = direct
      loss-aversion UX. Author explicitly flags RDY-080 (no Bagrut
      prediction) but misses the GD-004 ship-gate angle. Ethics lens:
      (a) "at risk" must become "needs-more-practice" or "next-focus";
      (b) red coloring reserved only for accessibility requirements,
      not progress framing; (c) countdown/urgency copy must pass the
      same shipgate lockdown as Axis 4 F8 (same task).
    evidence: AXIS_6_Assessment_Feedback_Research.md:L262, L283-L284
    lens_note: |
      "At risk" is loss-aversion copy GD-004 was written to stop.
      Feature must be revised not retired — the spaced-practice
      compression schedule is legitimate; the framing is not.
  - severity: P1
    finding: |
      F8 Confidence Calibration with Certainty-Based Marking (L299-334)
      scores students as sum(confidence_correct) - sum(confidence_
      incorrect). Author mounts an explicit GD-004 defense (L328-331)
      citing Foster 2021 and arguing "pedagogical, not punitive." BUT
      Dr. Rami's review (finding_assessment_dr_rami.md L22) flags that
      Foster 2021 found NO achievement effect. Ethics lens: subtracting
      points is mechanically loss-aversion. Even if Foster shows
      students experience it as engaging, the mechanism is the banned
      one. Recommend:
      (a) Default scoring formula should be sum(confidence_correct)
          only — additive, not subtractive.
      (b) Negative-component (subtraction) mode, if offered, must be
          explicit student opt-in with a plain-language explanation.
      (c) Shipgate must explicitly allow-list or forbid the
          subtractive variant; silence is not acceptable.
    evidence: AXIS_6_Assessment_Feedback_Research.md:L299-L334
    lens_note: |
      Shipgate GD-004 bans "loss-aversion copy" and "variable-ratio
      rewards on answer correctness." CBM applies a deterministic
      penalty for wrong+confident — this is loss-aversion by formula,
      even if transparent. The fact that students report liking it
      does not exempt it (Cialdini: reciprocity consent can coexist
      with manipulation). Product decision required.
  - severity: P2
    finding: |
      F6 Real-Time Misconception Tagging (L220-255) shows the student
      "It looks like you might be subtracting the smaller number from
      the larger regardless of order" style labels. Session-scoped
      architecture is well-designed. Ethics concern: the student-facing
      label ITSELF may feel shaming even when data is ephemeral.
      Mitigation: (a) label phrased as a diagnostic offer, not a
      pronouncement ("Want to see why this often trips people up?");
      (b) student can dismiss without engaging; (c) never show more
      than one tag per problem.
    evidence: AXIS_6_Assessment_Feedback_Research.md:L243-L247
    lens_note: |
      ADR-0003 governs data; it does not govern UX framing. A
      session-scoped label is still a label in the moment. The ethics
      concern is mirror-image of ADR-0003's privacy concern.
  - severity: P2
    finding: |
      F3/F4 AI Partial-Credit Grading uses LLM-evaluated reasoning
      (L129) with CAS validation underneath (L130). Ethics concern:
      when LLM disagrees with CAS, whose judgment is presented first
      to the student? Per the CAS-oracle ADR, CAS wins on math
      truth. But the student-facing UI order matters — an LLM-
      authored critique of reasoning shown before the CAS verdict can
      create harsh feedback loops. Recommend: CAS verdict shown first;
      LLM commentary shown only as optional "see reasoning feedback"
      expandable section.
    evidence: AXIS_6_Assessment_Feedback_Research.md:L129-L137
    lens_note: |
      LLM grading of reasoning style is inherently subjective; giving
      it primary billing over deterministic CAS verdict shifts power
      from objective math to model opinion. Ethics lens prefers the
      transparent ground-truth layer first.
  - severity: P2
    finding: |
      F5 Per-Session Error Analysis Report (L181-215) generates a
      pie-chart of error types (L206). Well-designed otherwise. One
      concern: the "Practice Similar Problems" button (L207) risks
      creating a deficit-practice loop. Student who had 3 conceptual
      errors today is pushed toward more of the same difficulty class
      — which can compound frustration. Mitigation: always pair with
      at least one "what you did well" affirmation and an easy
      "switch topic" escape hatch.
    evidence: AXIS_6_Assessment_Feedback_Research.md:L205-L208
    lens_note: |
      Session-end reports that only show errors are deficit-framed.
      Ethical-persuasion research requires symmetric positive framing.
