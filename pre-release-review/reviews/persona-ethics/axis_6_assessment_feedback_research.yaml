doc_summary: |
  Proposes 8 assessment/feedback features (formative-summative split,
  IRT-CAT placement, AI partial-credit grading, free-response CAS grading,
  per-session error analysis, real-time misconception tagging, Crisis Mode
  compression schedule, confidence calibration with certainty-based marking).
system_purpose_fit: 2
  rationale:
    - Several features are strong under ethics lens (F1 signal split, F5
      per-session error analysis, F6 session-scoped misconception tagging)
    - Two significant ethics hotspots: F7 "Crisis Mode" (same pattern as Axis 4
      F8) and F8 CBM negative-marking scheme
    - F6 real-time misconception tagging displays labels in-UI that, even if
      session-scoped, can feel shaming ("you have misconception X")
    - F7 uses "topics secured / topics at risk" framing — red/green terms
      that are loss-aversion adjacent
