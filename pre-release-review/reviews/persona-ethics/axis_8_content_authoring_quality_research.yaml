    source_doc_lines: [L131-L132]
verdict: revise
verdict_reason: |
  Content-authoring axis is mostly infrastructure with two ethics
  hotspots: F7 selective-comparison (P1, must remove) and F5 cultural
  wrappers (P1, need stronger governance). F1, F2, F3, F4, F6, F8 ship
  after F3 copy fix.
