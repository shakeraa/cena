  claims_verified_in_code: []
  claims_contradicted_by_code: []
  claims_unverifiable:
    - "Zayyadi 2024 ES=1.16 -> Rami flagged as cherry-picked"
    - "Koenig 2025 84% bias reduction -> Rami flagged misattribution"
adr_alignment:
  honored:
