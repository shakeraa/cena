persona_findings:
  - severity: P1
    finding: |
      F7 Self-Efficacy-Calibrated Difficulty Presentation (L279-319)
      proposes "displays peer comparison only when student is above
      median to avoid demotivation" (L282). This is deceptive-by-design:
      the system hides information (you are below median) that the
      student has an interest in knowing, while selectively surfacing
      it when favorable. This fails the "informed student" test
      (ethical-persuasion-research.md:L34): if the student knew the
      system was gating their comparison view on whether it flattered
      them, they would not appreciate the technique. It is also
      operationally problematic — the moment a student is shown
      comparison information and then STOPS being shown it, they
      correctly infer they dropped below median, reintroducing the
      demotivation the feature claimed to avoid.
    evidence: AXIS_8_Content_Authoring_Quality_Research.md:L282
    lens_note: |
      Correct patterns: (a) never show peer comparison at all, or
      (b) show honestly with supportive framing. Selective-suppression
      is a dark pattern even when well-intended.
  - severity: P1
    finding: |
      F5 Culturally-Contextualized Problem Generator (L191-232) has
      extraordinary effect-size claims (cited ES=1.16, Rami flagged as
      cherry-picked). The ethics concern is separate from effect size:
      the feature creates per-cohort problem wrappers (Palestinian
      tatreez, Ethiopian buna, Russian Soviet olympiad style). Risk:
      students auto-routed to their "cultural" wrapper by language or
      demographic signal may perceive segregated content streams.
      Author flags stereotyping concern (L228) with "community review
      board" mitigation. Ethics lens requires this to be hard
      requirement, not mitigation:
      (a) Community review board per cohort, with sign-off documented
          in code repository
      (b) Routing decided by explicit student preference, never
          inferred
      (c) Student can always view "standard" (non-culturally-wrapped)
          problems alongside or instead
      (d) Cross-cohort browsing enabled and encouraged (student sees
          tatreez + buna + Soviet contexts as options)
    evidence: AXIS_8_Content_Authoring_Quality_Research.md:L228
    lens_note: |
      Culturally-authentic content is a powerful engagement lever. It
      is also a segregation-amplification risk if routed by demographic
      inference. Belt AND suspenders required.
  - severity: P2
    finding: |
      F6 Mother-Tongue-Mediated Hint System (L235-276) is sound. One
      ethics note: "Store only language preference, not interaction
      analytics. No cross-session language-profile tracking" (L272) is
      the right policy. Add explicit ADR entry or shipgate rule
      forbidding language-profile derivation from keystroke patterns,
      dwell-time, or code-switching frequency — the obvious next-step
      temptation for an ML team.
    evidence: AXIS_8_Content_Authoring_Quality_Research.md:L272
    lens_note: |
      Language-proficiency inference of minors is regulated data
      under Israeli PPL and under GDPR special-category-adjacent
      protections. Explicit architectural ban is cheap insurance.
  - severity: P2
    finding: |
      F3 Bagrut-Aligned Partial Credit Rubric Engine (L104-143):
      proposes (L132) "Student sees step-by-step scoring on review;
      'Why did I lose points?' breakdown." The "lost points" framing
      is loss-aversion copy. Recommend: "How this scored / What
      strengthened your answer / What to focus next" framing.
    evidence: AXIS_8_Content_Authoring_Quality_Research.md:L131-L132
    lens_note: |
      Rubric transparency is good; "you lost points" phrasing is
      the shipgate-adjacent drift.
