extracted_tasks:
  - title: "F7 peer-comparison: remove selective-display-when-flattering logic"
    priority: P1
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      F7 Self-Efficacy-Calibrated Difficulty Presentation must not
      include selective peer-comparison display. Options:
      (a) Remove peer comparison entirely (preferred)
      (b) Show consistently with supportive framing regardless of
          student's relative position
      Selective-display-when-favorable is banned as deceptive-by-design.
      ## Files
      - docs/adr/00NN-no-selective-comparison-display.md (new)
      - AXIS_8 spec revision
      ## Definition of Done
      - ADR accepted
      - F7 spec revised
      - Shipgate lint forbids conditional-visibility logic on comparison components
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: [L282]
  - title: "F5 cultural wrappers: hard requirements for community review + student choice"
    priority: P1
    estimate: M
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Before any culturally-contextualized problem ships:
      - Community review board established for each cohort (Arab,
        Ethiopian, Russian, etc.) with documented sign-off
      - Routing ALWAYS by student explicit preference, never from
        inferred demographic data
      - "Standard" (non-wrapped) view available at all times
      - Cross-cohort browsing enabled by default
      - Annual review of which wrappers are being used by whom
      ## Files
      - docs/adr/00NN-cultural-wrapper-governance.md (new)
      - docs/research/cultural-wrapper-review-board.md (new)
      ## Definition of Done
      - ADR accepted
      - Board membership documented
      - Routing code path inspectable: no demographic inference
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: [L228]
  - title: "F6 explicit ban on language-proficiency inference"
    priority: P2
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Add shipgate / architecture rule: no code path may infer a
      student's language proficiency from keystroke patterns, dwell
      time, code-switching frequency, or hint-language toggles.
      Language preference is student-set only.
      ## Files
      - docs/adr/00NN-no-language-proficiency-inference.md (new)
      - scripts/shipgate/scan.mjs (add rule)
      ## Definition of Done
      - ADR accepted
      - Shipgate blocks any commit with `language_proficiency_score` field
      - Code review checklist updated
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L272]
  - title: "F3 rubric review: 'how this scored' framing, not 'lost points'"
    priority: P2
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F3 Bagrut rubric review UI: replace "why I lost points" with
      "how this scored / what strengthened this / what to focus on
      next" framing. Shipgate lint adds "lost points" to banned list
