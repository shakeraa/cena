reviewer: persona-ethics
reviewed_at: 2026-04-20
doc_summary: |
  Proposes 8 content-authoring & quality features (Bayesian IRT small-sample
  calibration, SymPy CAS variation engine, Bagrut rubric engine, Arabic RTL
  renderer, culturally-contextualized problem generator, mother-tongue hints,
  self-efficacy-calibrated difficulty presentation, hybrid Elo+expert
  calibration).
system_purpose_fit: 3
  rationale:
    - Most features are infrastructure / authoring — low direct ethics surface
    - F5 (cultural context) and F7 (self-efficacy difficulty presentation) have
      specific ethics concerns
    - F7 proposes "displays peer comparison only when student is above median
      to avoid demotivation" — this is deceptive-by-design, fails the
      informed-student test
    - F5 cultural context generator is ethically sound IF community review is
      enforced; current proposal leaves this as "mitigation" not requirement
