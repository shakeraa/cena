persona_findings:
  - severity: P1
    finding: |
      The "cross-examination" process at L7 (Nadia pedagogy + Rami
      statistics) omits an ethics/dark-pattern lens. This is why
      FD-035 Team Challenges (Axis 7 F3) passes the index's filter
      while containing explicit shipgate violations (confetti,
      "pyramid collapses" loss-framing, Bronze/Silver/Gold tiers).
      Recommendation: future discovery cycles must include an
      ethics reviewer (persona-ethics or equivalent) in the cross-
      examination panel.
    evidence: feature-discovery-2026-04-20.md:L5, L21
    lens_note: |
      Process gap. Three-lens review (pedagogy + statistics +
      ethics) is the minimum for a minor-education product with a
      shipgate.
  - severity: P1
    finding: |
      FD-050 Learning Energy Tracker (L1473) and FD-051 Calm
      Breathing Opener (L1500) both touch mood/affect of minors.
      Index lists them as "Quick wins <2 engineer-weeks" (L19).
      Ethics lens strongly advises these are NOT quick wins until
      PPA consultation and DPIA completed (see axis3, cross_domain
      findings). Velocity ranking in the index masks regulatory
      work.
    evidence: feature-discovery-2026-04-20.md:L19
    lens_note: |
      Engineering effort is not the only effort. Legal/privacy
      work for mood data on minors is substantial.
  - severity: P2
    finding: |
      The Top-10 Shortlist (L1658-L1669) ranks FD-036 Cultural
      Context #1 but does not carry forward Dr. Rami's REJECT of
      the 1.16 effect size. The reader of the index may take the #1
      ranking as an endorsement of the claim, not just the feature.
      Add provenance note: "Ranked #1 for equity impact; effect
      size claim under revision per Rami (see finding_assessment_
      dr_rami.md)."
    evidence: feature-discovery-2026-04-20.md:L1660
    lens_note: |
      Summary rankings lose context unless explicitly carrying
      critique.
  - severity: P2
    finding: |
      Executive summary (L21) claims "8 BORDERLINE features"
      deserve explicit discussion. Ethics lens audit of the 55
      findings identifies BORDERLINE flags in: FD-003 (ADR-0003),
      FD-004 (RDY-080), FD-009 (autonomy), FD-012 (ADHD),
      FD-014 (XAI evidence), FD-017-21 (parent surveillance
      vectors), FD-025 (Bagrut readiness pressure), FD-028 (AI
      grading DPA §7), FD-031 (Crisis Mode UX), FD-035 (P0 shipgate
      — cooperative competition), FD-046 (student XAI framing),
      FD-050/051 (mood data). That's ~12-15, not 8.
    evidence: feature-discovery-2026-04-20.md:L21
    lens_note: |
      Under-counting BORDERLINEs suggests the review pipeline
      doesn't catch all of them; ethics lens adds ~4-7 more.
