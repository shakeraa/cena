doc_summary: |
  Mega-index of 55 findings (FD-001 through FD-055) synthesizing the 10 axis
  research docs + competitive + cross-domain. Executive summary L11-21 claims
  18 SHIP / 22 SHORTLIST / 12 DEFER / 3 REJECT after cross-examination.
system_purpose_fit: 3
  rationale:
    - This is the index — ethics findings are distributed across the axis
      YAMLs I've already written. Per SUPERPROMPT L123: "Don't duplicate
      feature-discovery-2026-04-20.md findings into axis docs if the index
      covers them — mark as duplicates_of_other_docs."
    - The reverse also applies: findings I raised on axis docs ARE the
      authoritative ethics-lens findings on their FD-XXX counterparts here
    - One ethics-lens note specific to the index: its cross-examination
      process (Dr. Nadia + Dr. Rami) did NOT include an ethics/dark-pattern
      reviewer. Axis 7 Feature 3 (FD-035 here) proposes confetti — Nadia
      and Rami both missed this because they don't review shipgate; ethics
      lens catches it.
