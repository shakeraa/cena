doc_path: pre-release-review/axis3_accessibility_accommodations_findings.md
reviewer: persona-ethics
reviewed_at: 2026-04-20
doc_summary: |
  Proposes 8 accessibility features (dyscalculia subitizing trainer, audio-
  haptic number line, digital graph paper, ADHD focus session builder,
  color-blind palette, MathML screen reader, Arabic RTL renderer, calm UI).
  Guardrail table at L96-102, L274-281, L532-538 screens each feature.
system_purpose_fit: 4
  rationale:
    - Accessibility features are intrinsically aligned with ethical persuasion —
      they expand autonomy for students who otherwise face coercive defaults
    - F8 "Anxiety-Reducing Predictable UI" (L482-541) is essentially a
      codification of calm-UX principles the shipgate doc endorses
    - F4 ADHD session builder self-flags a variable-ratio risk (energy tracker)
      and proposes mitigation
    - Small concern: "body doubling" ambient video (L228) needs explicit review
      for parasocial / surveillance framing
code_reality_check:
  claims_verified_in_code: []
  claims_contradicted_by_code: []
  claims_unverifiable:
    - "Calcularis 2.0 efficacy -> cogsci lens"
    - "ModMath 970K+ downloads -> competitive, not my lens"
adr_alignment:
  honored:
    - "GD-004 shipgate (explicit guardrail tables throughout)"
    - "ADR-0003 session-scope (F1 dyscalculia trainer has 90-day anonymize flag at L100)"
  violated: []
