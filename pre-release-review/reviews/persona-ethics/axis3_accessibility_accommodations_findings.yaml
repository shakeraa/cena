extracted_tasks:
  - title: "Body-doubling mode: ban real-minor recordings, require AI-stock label"
    priority: P1
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Before F4 body-doubling ambient video ships, adopt ADR:
      - Never use recordings of real students (any age)
      - Ambient video must be (a) non-human nature/object OR (b)
        clearly-labeled AI-generated stock with visible "AI-generated
        ambient scene — no real people" banner
      - Parental consent required for any human-likeness ambient video
      ## Files
      - docs/adr/00NN-body-doubling-policy.md (new)
      ## Definition of Done
      - ADR accepted
      - F4 spec revised accordingly
      - Shipgate scanner adds rule rejecting "real student" recording in video assets
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: [L228]
  - title: "Energy tracker: explicit confirm before difficulty adjustment"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Prevent silent difficulty adjustment. When a student's
      pre-session energy rating < 3, surface an opt-in dialog:
      "Want to start with lighter warm-ups?" — adjust only on
      explicit Yes. Log the consent.
      ## Files
      - src/student-web/src/features/focus/EnergyGate.vue (new)
      - src/actors/SessionGrain/SessionPlannerActor.cs
      ## Definition of Done
      - No code path adjusts difficulty based on energy rating without explicit confirmation
      - Consent logged (student_id, session_id, rating, consented, timestamp)
      - E2E test: low-energy tap + decline => difficulty unchanged
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L255-L260]
  - title: "No-timer mode default for dyscalculia subitizing trainer"
    priority: P2
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F1 Subitizing Trainer must default to no-timer mode for any
      student with a dyscalculia accommodation flag; timer mode is an
      explicit opt-in ("I want speed practice") control.
      ## Files
      - src/student-web/src/features/dyscalculia/SubitizingTrainer.vue
      - src/actors/AccommodationActor/AccommodationGrain.cs
      ## Definition of Done
      - Accommodation flag disables timer by default
      - Opt-in toggle visible with neutral copy
      - a11y + WCAG 2.2 AA
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L85-L92]
verdict: revise
verdict_reason: |
  Accessibility is an ethics ally, not a tension. Revise to fix
  body-doubling policy, silent-adjustment in energy tracker, and
  timer-first default in subitizing trainer. F5/F7/F8 ship as designed.
