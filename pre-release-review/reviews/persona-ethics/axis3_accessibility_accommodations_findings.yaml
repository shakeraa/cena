non_negotiable_violations: []
persona_findings:
  - severity: P1
    finding: |
      F4 ADHD Focus Session Builder (L225-284) proposes "Body Doubling
      Mode — optional virtual study partner feature showing a calming
      ambient video of another student studying." Ethics concerns:
      (a) whose video? Real minor's recording = consent/CSAM risk
      escalation. (b) AI-generated ambient student = deceptive by
      default (student thinks it's a peer). (c) parasocial attachment
      risk for neurodivergent minors. Needs hard constraint:
      ambient video must be (i) non-human (plant, cafe window, clock)
      OR (ii) clearly labeled AI-generated stock footage with no
      identifiable individuals.
    evidence: axis3_accessibility_accommodations_findings.md:L228
    lens_note: |
      Shipgate bans manipulation of relatedness needs. A fake "peer
      studying" trades on social-proof and relatedness without the
      student's informed consent that they're not with a real person.
      Fails the "informed student" test.
  - severity: P1
    finding: |
      F4 Energy Tracker (L228, guardrail flag at L277) already flagged
      BORDERLINE by author for variable-ratio risk. Ethics lens adds:
      the adjustment "if energy < 3, reduce problem complexity by 1
      tier" (L259) is a silent difficulty manipulation the student
      hasn't opted into. Student should SEE and CONFIRM each
      adjustment, not have the system adjust silently based on a
      mood-emoji tap. Silent adaptation == manipulation.
    evidence: axis3_accessibility_accommodations_findings.md:L255-L260, L277
    lens_note: |
      Autonomy requires transparency. A student who taps "energy: low"
      should see "Want to start with lighter warm-ups? [Yes/No]" —
      not have the session invisibly altered.
  - severity: P2
    finding: |
      F8 Anxiety-Reducing UI (L482-541) specifies "success indicated
      with subtle green + checkmark (no celebration animations)"
      (L485). Excellent. However, F4's circular visual timer animation
      (L261) and F1's subitizing adaptive algorithm (L87-92) are not
      held to the same no-animation standard. Inconsistency risks
      anxiety-trigger UI sneaking in via subitizing drills.
    evidence: axis3_accessibility_accommodations_findings.md:L85-L92, L260-L264, L485
    lens_note: |
      The "<200ms animation" rule from F8 should be a design-system
      commitment that binds F1/F4 too.
  - severity: P2
    finding: |
      F1 Subitizing Trainer (L48-105) uses "presentation time" and
      "response time" as difficulty inputs (L88). For a dyscalculic
      minor, time-pressure difficulty is anxiety-inducing by design.
      Needs a "no-timer mode" as a first-class option, not an
      afterthought — especially since this is the mode most likely to
      be used by the very students the rest of the doc protects from
      time-pressure UIs.
    evidence: axis3_accessibility_accommodations_findings.md:L85-L92
    lens_note: |
      Accommodation-by-default is the ethical-persuasion ideal;
      timer-first-no-timer-optional is the inverse of that.
