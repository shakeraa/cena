verdict: revise
verdict_reason: |
  The doc is largely ethics-aligned — its own Rejected-Features
  section is textbook shipgate compliance. But P0 "practice streaks"
  wording in Feature 7 must be fixed immediately; countdown framing
  in Feature 8 shares revision with Axis 4/6; Feature 3 animation
  and Feature 4 at-risk terminology need minor clean-up.
