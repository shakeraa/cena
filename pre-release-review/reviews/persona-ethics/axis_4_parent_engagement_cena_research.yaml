extracted_tasks:
  - title: "Rename 'Crisis Mode' + make countdown/parent-share explicit opt-in"
    priority: P1
    estimate: M
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Before any exam-proximity dashboard ships (F8 here, F7 Axis 6):
      1. Replace "Crisis Mode" branding with neutral language ("Final
         Stretch," "Focus Weeks," or student-selectable)
      2. Countdown display must be collapsible; collapsed by default;
         no animation; no color alarming
      3. Parent visibility of countdown + priority topics requires
         per-semester explicit student opt-in, logged
      4. Shipgate scanner banned-phrase list adds: "running out of time,"
         "only X days left," "crisis," "urgent"
      ## Files
      - docs/adr/00NN-exam-proximity-ui-policy.md (new)
      - scripts/shipgate/banned.json
      - src/student-web/src/features/exam-proximity/*
      - src/actors/ParentSharing/*
      ## Definition of Done
      - ADR accepted
      - Shipgate scanner rejects banned phrases in any locale
      - Parent dashboard shows countdown only after per-semester student opt-in
      - E2E test confirms default-off + opt-in path
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: [L309-L345]
  - title: "Parent SMS/WhatsApp nudge policy: 2/week cap, dark-time, opt-in confirm"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Implement product-level nudge policy for F6 growth-framed nudges:
      - 2 per parent per rolling 7 days max (not "recommended")
      - 21:00-08:00 quiet hours in parent's local timezone
      - First message is one-line opt-in confirmation, no content
      - One-tap "pause 30 days" link on every message
      - Audit log of all sends
      ## Files
      - src/notifications/ParentNudgePolicy.cs (new)
      - src/actors/ParentEngagement/NudgeGrain.cs
      - tests/parent-nudge-policy.test.cs
      ## Definition of Done
      - Policy enforced server-side (bypass impossible via admin toggle)
      - Dark-time test: sends scheduled 22:00-07:00 queue until 08:00
      - Cap test: 3rd send in 7 days rejected
      - Opt-in test: first send = confirmation only
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L230, L253-L262]
  - title: "Cultural parent-view profile: affirmative opt-in, never inferred"
    priority: P1
    estimate: M
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      F7 cultural-profile selection must be:
      - Never inferred from language, ethnicity, or name
      - Offered as a self-description preference, not a demographic label
      - "Standard view" is a first-class option, not default fallback
      - Copy reviewed by community representatives from each affected cohort
        before ship
      - Switchable at any time from a single settings page
      ## Files
      - src/parent-web/src/features/profile/CulturalPreference.vue
      - docs/research/parent-view-cultural-ux-validation.md (new)
      ## Definition of Done
