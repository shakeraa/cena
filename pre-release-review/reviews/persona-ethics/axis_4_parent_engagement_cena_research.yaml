doc_path: pre-release-review/AXIS_4_Parent_Engagement_Cena_Research.md
reviewer: persona-ethics
reviewed_at: 2026-04-20
doc_summary: |
  Proposes 8 parent-engagement features (explainability card, bilingual
  dashboard, parent-teacher bridge messages, privacy-preserving cohort
  context, weekly 3-2-1 snapshot, growth-framed SMS nudges, culturally-
  localized views, Bagrut countdown "Crisis Mode"). Multiple BORDERLINE
  flags for cultural stereotyping and countdown anxiety.
system_purpose_fit: 3
  rationale:
    - F1, F2, F3, F5, F6 are well-designed parent-engagement tools consistent
      with autonomy and transparency
    - F8 "Crisis Mode" countdown (L309-345) is a significant ethics concern:
      countdown timers + "crisis" framing toward minors' families creates
      surveillance-pressure pipeline
    - F7 "Culturally-Localized Views" (L269-305) has stereotyping risk the
      author flags but does not sufficiently mitigate
    - F6 growth-framed SMS nudges (L227-265) need hard frequency caps
    - The axis as a whole risks drifting parent-engagement into
      parent-surveillance
code_reality_check:
  claims_verified_in_code: []
  claims_contradicted_by_code: []
  claims_unverifiable: []
adr_alignment:
  honored:
    - "ADR-0003 session-scope (F1, F4, F5 all session-only)"
    - "No-profiling principle from ADR-0003 (F4 differential privacy pipeline)"
  violated: []
  missing_adr_needed:
    - "ADR needed for 'crisis mode' activation UX — triggers, countdown display,
      parent-visibility of student exam date, dark-time respect"
    - "ADR for cultural-profile selection UX — self-selected, not auto-inferred,
      with explicit anti-stereotyping copy"
non_negotiable_violations: []
persona_findings:
  - severity: P1
    finding: |
      F8 "Crisis Mode — Bagrut Countdown Dashboard" (L309-345) is the
      ethics hotspot of this axis. Multiple concerns:
      (a) "Crisis" branding itself is loss-aversion copy — ship-gate
          definition: "FOMO urgency." The label should be "Final
          Stretch," "Focus Mode," or student-selectable.
      (b) Countdown timer to exam date (L312) is literally a
          decreasing-number stressor. If shown, it must be collapsible
          by default, not default-visible, and never animated.
      (c) Parent-visible countdown creates a parent-to-student pressure
          pipeline that undermines student autonomy.
      (d) "Priority Topics ranked by exam weight × gap severity" (L312)
          surfaces the student's weaknesses to the parent, weaponizing
          the deficit view.
      Author's mitigation (L342) acknowledges the tension but keeps the
      countdown. Ethics lens: countdown must be student-opt-in to share
      with parents (not the default), and "Crisis" must be renamed.
    evidence: AXIS_4_Parent_Engagement_Cena_Research.md:L309-L345
    lens_note: |
      Shipgate GD-004: "FOMO urgency" and "guilt/shame push
      notifications" are banned. A parent-facing countdown titled
      "Crisis" tied to a minor's exam date is exactly the pattern the
      ban was written against. Even with mitigations, the name + default
      parent-visibility cannot survive the informed-student test.
  - severity: P1
    finding: |
      F6 "Encouragement Nudges (Growth-Framed SMS)" (L227-265) proposes
      "2-3 times per week" SMS/WhatsApp nudges. Author flags nagging
      risk (L262). Ethics lens requires:
      (a) Hard cap enforced server-side at 2/week (not "recommended").
      (b) Dark-time block: no sends between 21:00-08:00 local.
      (c) Every message has one-tap "pause 30 days" link.
      (d) First message must be an explicit opt-in confirmation, not
          begin substantive nudging.
      Without these, "encouragement" becomes an anxiety-delivery pipeline
      that parents cannot easily escape once activated via a school flow.
    evidence: AXIS_4_Parent_Engagement_Cena_Research.md:L230, L253-L262
    lens_note: |
      Digital wellbeing research requires push notifications to minors'
      family devices to respect notification-fatigue and dark-time. The
      proposal lacks enforcement.
  - severity: P1
    finding: |
      F7 "Culturally-Localized Parent Views" (L269-305) proposes
      different default UI profiles per cultural background. Author
      flags (L302) stereotyping risk. Ethics lens: this must be
      user-selected (never inferred from name, language, or ethnicity),
      the selection UI must be explicitly labeled as preference-not-
      demographic ("which style feels most natural to you?"), and
      there must be a "standard view" as a first-class default — not
      a fallback.
    evidence: AXIS_4_Parent_Engagement_Cena_Research.md:L269-L305
    lens_note: |
      Auto-inferring cultural profile from language preference (L293)
      is the exact pattern that creates segregated UIs and reinforces
      stereotypes. Must be affirmative opt-in only.
  - severity: P2
    finding: |
      F4 "Privacy-Preserving Cohort Context" (L146-183) frames student
      progress against anonymized cohort data ("Students with similar
      starting points typically need X sessions"). Even anonymized,
      comparison framing can induce anxiety. Author mitigates (L179)
      but doesn't forbid negative-framing copy ("your child is behind
      the average"). Add shipgate rule: cohort-context strings may use
      only positive-frame patterns ("on track," "typical range"), never
      deficit patterns.
    evidence: AXIS_4_Parent_Engagement_Cena_Research.md:L149-L179
    lens_note: |
      Cohort comparison with differential privacy is technically clean
      but rhetorically still a percentile. Shipgate should guard
      parent-facing copy templates explicitly.
  - severity: P2
    finding: |
      F3 "Parent-Teacher Bridge Messages" (L106-143) attaches a child's
      "Cena analytics snippet" (L109) to parent-initiated teacher
      messages. Ethics lens: student must see and approve the snippet
      content before it's forwarded to a teacher by their parent.
      Otherwise the feature bypasses the student's own agency over
      their learning narrative.
    evidence: AXIS_4_Parent_Engagement_Cena_Research.md:L109
    lens_note: |
      Parent-teacher communication about a minor's learning is
      legitimate but should not bypass the minor entirely. Self-
      Determination Theory autonomy requires the student to remain in
      the loop for any third-party disclosure of their data.
