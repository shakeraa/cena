verdict: revise
verdict_reason: |
  Parent-engagement is high-value but risks drifting into surveillance /
  pressure patterns. Revise F8 (rename Crisis, opt-in countdown), F6
  (hard-cap nudges), F7 (affirmative profile), F4 (copy lockdown), F3
  (student preview). F1, F2, F5 ship as designed.
