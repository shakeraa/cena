verdict: revise
verdict_reason: |
  Cross-domain inspiration is risky by nature — patterns that work
  in gambling / social / wellness apps become dark when applied to
  minor-education. Author self-screens well but several borderline
  features need stronger guardrails (F5, F7) or copy/framing fixes
  (F2, F3, F4, F6, F8). F1 ships clean.
