doc_path: pre-release-review/cena_cross_domain_feature_innovation.md
reviewer: persona-ethics
reviewed_at: 2026-04-20
doc_summary: |
  Proposes 8 features from non-EdTech domains (Obsidian concept graph,
  Calm/Headspace breathing ritual, Fabulous habit journeys, Tetris-style
  flow difficulty, Woebot-style companion bot, Discord study circles,
  Sanvello mood tracker, Nike workout menu). Guardrail summary at
  L213-225 shows each feature's screening.
system_purpose_fit: 3
  rationale:
    - Cross-domain borrowing is a known dark-pattern vector (Duolingo
      streaks come from addictive-game design)
    - Author explicitly guardrail-checks each feature — good discipline
    - Several features edge toward reward inflation, parasocial attachment,
      or therapy-territory (F5 Companion Bot flagged BORDERLINE)
    - F7 Learning Energy Tracker pattern of mood tracking on minors needs
      stronger framing than the doc provides
code_reality_check:
  claims_verified_in_code: []
  claims_contradicted_by_code: []
  claims_unverifiable:
    - "Woebot 2017 RCT effect sizes -> cogsci"
    - "Fabulous behavioral science backing -> cogsci"
adr_alignment:
  honored:
    - "GD-004 shipgate — each feature rule-checked at L22, L43, L65, L87, L109, L131, L153, L175"
    - "ADR-0003 — session-local framing (F2 L43, F7 L153)"
    - "COPPA under-13 consent gates noted throughout"
  violated: []
  missing_adr_needed:
    - "ADR on 'companion bot / chat buddy' features — when does it cross
      into therapy territory? Cena needs a clear boundary spec."
