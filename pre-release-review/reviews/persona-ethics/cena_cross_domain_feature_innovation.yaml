  - title: "Ban reward-inflation emoji (🔥, ⚡) in learning UI"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Shipgate scanner rejects 🔥 (U+1F525) and ⚡ (U+26A1) and "on
      fire" / "fire streak" phrasing in any student-facing learning-
      feedback locale namespace. Allowlist allowed only for literal
      physics/chemistry content.
      ## Files
      - scripts/shipgate/banned.json
      - scripts/shipgate/scan.mjs
      ## Definition of Done
      - Lint fails on banned unicode codepoints in non-content namespaces
      - Allowlist requires justification per entry
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L88, L106, L172]
  - title: "F7 Learning Energy Tracker: architectural scope lock + PPA review"
    priority: P1
    estimate: M
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Before F7 ships:
      - Architecture: mood data stored in Redis session-scoped only;
        cannot be queried across sessions; auto-purge on session end
      - UI: no insight surfaced that reads as mental-health inference
        (time-of-day / day-of-week correlations only, never mood
        trends)
      - No parent visibility
      - Israeli PPA consultation documented
      - Student-initiated full delete at any time
      ## Files
      - docs/adr/00NN-mood-data-scope.md (new)
      - docs/privacy/mood-tracker-dpia.md (new)
      ## Definition of Done
      - ADR accepted; PPA sign-off recorded
      - Architecture enforces scope
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: [L142-L161]
  - title: "F2 breathing opener: confirm-before-route on mood tap"
