persona_findings:
  - severity: P1
    finding: |
      F5 Cena Companion (L98-116) already flagged BORDERLINE by author
      (L109) for therapy-territory risk. Ethics lens additional
      concerns:
      (a) Avatar with "5-6 emotional states" (L110) creates parasocial
          attachment risk for minors — the companion appears to have
          feelings about the student's performance.
      (b) "You're on fire today! 🔥" template (L106) is reward inflation.
      (c) "Struggle detection (3 wrong in a row): 'That topic is
          tricky!'" (L110) — a bot reacting emotionally to struggle
          is the exact pattern that generates over-reliance.
      (d) "All responses are rule-based templates, not generative AI"
          (L110) is good BUT template libraries of emotional response
          still create parasocial dynamics.
      Recommend:
      - Remove avatar emotional states; use neutral icon only
      - Replace emotional reactions with neutral navigation
        ("Want a hint, a video, or try something different?" — just
        the options, no "That topic is tricky!" framing)
      - No fire emoji, no emotional-reaction copy
      - Feature remains SHORTLIST pending full ethics+legal review
    evidence: cena_cross_domain_feature_innovation.md:L98-L116
    lens_note: |
      Woebot's own research (Fitzpatrick 2017) is an anxiety/depression
      study for college students, not a math-prep study for minors.
      Transferring the "empathetic bot" pattern to minor-math-prep is
      a category error that the BORDERLINE flag correctly catches.
  - severity: P1
    finding: |
      F4 Adaptive Flow Sessions (L76-94) proposes (L88) "Great pace!
      🔥" messaging and "Let's take it step by step 💡" feedback.
      Emoji-fire and dopamine-response copy tied to pace is reward
      inflation (shipgate Rule 5 inspired). Recommend: neutral copy,
      no emoji with fire/energy connotations. "Moving quickly"
      instead of "Great pace! 🔥."
    evidence: cena_cross_domain_feature_innovation.md:L88
    lens_note: |
      Fire emoji 🔥 is the universal "you're on a streak" signifier.
      Shipgate spirit bans the emoji even if the word "streak" isn't
      present.
  - severity: P1
    finding: |
      F7 Learning Energy Tracker (L142-161) asks minors to self-rate
      mood after each session. Author frames this as "learning energy
      and study optimization, not mental health" (L153). Ethics lens:
      the framing is the ethics risk. If Cena collects mood data from
      minors at scale, it is a mental-health-adjacent dataset
      regardless of what Cena calls it. Safeguards required:
      (a) Mood data never leaves session scope (author promises this
          at L153 — must be architecturally enforced)
      (b) No correlation surfaced that could be read as a mental-
          health insight ("You're strongest at algebra on Sunday
          mornings" is fine; "Your mood drops after 8 PM" is not)
      (c) Hard delete on student request (author offers this at L154)
      (d) No parent visibility
      (e) Israeli PPA consultation before launch
    evidence: cena_cross_domain_feature_innovation.md:L142-L161
    lens_note: |
      Framing does not change regulatory classification. A mood
      dataset is a mood dataset. The feature may ship but needs
      legal + PPA sign-off that framing survives.
  - severity: P2
    finding: |
      F3 Learning Journeys (L54-72) is well-designed. One concern:
      "animated character progresses along a visual path" (L62) +
      "daily micro-sessions" (L62) + "Completion badge
      (celebratory, not competitive)" (L66). Even without explicit
      streak language, a daily animated-character path creates
      implicit rhythm pressure. Mitigations:
      - Character should be a simple marker, no animation
      - "Daily" must be suggested, not required — "missing a day
        simply means the next step waits" (L65) must be visible to
        student ("no pressure — this pauses while you're away")
      - Completion badge text-only, no animation or sound
    evidence: cena_cross_domain_feature_innovation.md:L62-L66
    lens_note: |
      Fabulous / habit-tracker patterns are the inspiration. The
      exact pattern that becomes a daily streak without the
      vocabulary.
  - severity: P2
    finding: |
      F2 Focus Ritual breathing opener (L32-50) is well-designed.
      Concern: mood check-in "adjusts session opening difficulty"
      (L40, L44) — 😰 routes to review, 🙂 routes to challenge.
      Automatic difficulty routing based on mood tap is the same
      silent-adjustment concern as Axis 3 F4 energy tracker. Recommend:
      show "Want to warm up first? [Yes/No]" after low-mood tap,
      not silently route.
    evidence: cena_cross_domain_feature_innovation.md:L40, L44
    lens_note: |
      Same pattern, same fix. Autonomy requires the student to see
      and confirm.
  - severity: P2
    finding: |
      F8 Session Type Menu (L164-182) proposes "⚡ Challenge Round
      (15 min, above-level problems with hints)" (L172). "Challenge
      Round" + lightning emoji invokes game-show / high-stakes
      framing. Recommend: "Stretch Session" or "Try-Something-
      Harder" — avoid competitive/arena language.
    evidence: cena_cross_domain_feature_innovation.md:L172
    lens_note: |
      Fitness-app metaphor is fine; game-show arena framing is not.
  - severity: P2
    finding: |
      F6 Study Circles (L120-139) proposes "weekly 'most helpful
      answer' celebrated with a non-competitive badge" (L132).
      "Most helpful" is a comparison by definition. Badge framing
      identical to Axis 7 F4 "helpfulness tokens" (P0 there).
      Recommend: retire the weekly highlight entirely; surface-sort
      by upvotes is enough.
    evidence: cena_cross_domain_feature_innovation.md:L132
    lens_note: |
      "Non-competitive badge" is an oxymoron when it selects one
      student out of many.
