extracted_tasks:
  - title: "Notification policy: cap, dark-time, opt-out for SMS/WhatsApp reminders"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Enforce three product-level rules for any push/SMS/WhatsApp
      reminder sent to a student account:
        1. Max 3 per student per rolling 7 days
        2. Quiet hours 21:00-07:00 local time (per student locale)
        3. Every message includes tap-to-mute link that mutes for 30 days
      ## Files
      - src/notifications/NotificationPolicy.cs (new)
      - tests/Cena.Notifications.Tests/PolicyTests.cs
      - docs/engineering/notification-policy.md
      ## Definition of Done
      - Policy enforced at send-time (not at UI layer)
      - Unit tests cover cap/clock/opt-out paths
      - Policy doc linked from shipgate.md
      - E2E test sends 5 rapid reminders and asserts only 3 delivered
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L67, L89-L95]
  - title: "User research: Arab-Israeli review of 'wise feedback' persona templates"
    priority: P1
    estimate: M
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Before any Arabic-persona feedback template ships (Feature 3),
      commission 8-12 interviews with Arab-Israeli Bagrut students to
      validate whether collective-achievement framing ("your preparation
      matters for your future and your community") resonates as
      supportive or patronizing. Exclusion criterion: if >=3/12
      participants flag it as culturally tone-deaf, the
      collective-achievement track is dropped from F3 entirely.
      ## Files
      - docs/research/arab-cohort-feedback-template-study.md (new)
      ## Definition of Done
      - IRB-equivalent consent process documented
      - Interview protocol reviewed by Arab-speaking educator
      - Findings published in docs/research/
      - Ship/revise/retire decision on Arabic feedback templates recorded
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: [L104-L108, L133-L136]
  - title: "Confidence calibration UI: no trait labels, session-only framing"
    priority: P2
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Ensure the F5 Metacognitive Confidence Check-in UI never
      displays trait-like labels ("you are overconfident") and always
      frames calibration as a session-level pattern with a one-tap
      reset. Forbid cross-session trait persistence at the UI layer.
      ## Files
      - src/student-web/src/components/session/CalibrationCard.vue
      - src/student-web/src/locales/*.json (copy lockdown)
      ## Definition of Done
      - Linter rejects strings matching /you (are|tend to be) (over|under)confident/
      - UI shows "this session" badge on any calibration chart
      - Reset button clears the chart; no trait persists past session end
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L183, L207-L213]
  - title: "Weekly summaries opt-in only, per-share parent disclosure"
    priority: P2
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Change F6 weekly process-praise summaries to on-demand only (no
      scheduled push). Change F8 parent plan sharing to per-week
      opt-in (not account-level).
      ## Files
      - src/student-web/src/features/summary/*.vue
      - src/actors/ParentSharing/ShareGrainActor.cs
      - tests/parent-sharing/PerWeekConsent.test.ts
      ## Definition of Done
      - No cron/scheduled summary job exists
      - Parent share requires per-week student confirmation
      - Audit log records each share event with timestamp + student-initiated flag
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L246-L248, L307-L308, L335-L336]
