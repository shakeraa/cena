doc_path: pre-release-review/axis2_motivation_self_regulation_findings.md
reviewer: persona-ethics
reviewed_at: 2026-04-20
doc_summary: |
  Proposes 8 motivation & self-regulation features (self-explanation prompts,
  if-then planners, wise feedback, non-loss mastery path, confidence check-ins,
  process praise, SRL micro-prompts, reflective plan generator). Explicitly
  guard-railed against streak/loss-aversion/variable-ratio (L6).
system_purpose_fit: 5
  rationale:
    - This is the axis most directly aligned with ethical-persuasion research
    - Every feature builds on autonomy (If-Then = student-authored plans),
      competence (process praise, calibration feedback), relatedness (wise
      feedback + cultural framing)
    - Feature 4 "Mastery Path (Non-Loss Visualization)" (L142-176) is the
      textbook anti-streak UI — accumulation only, no decay, no "days missed"
    - Feature 6 process-praise explicitly cites Dweck/Hattie and frames as
      "feedback design" not "mindset intervention" (L252-253) — honest
      positioning that survives the informed-student test
    - One soft concern: mid-session prompts (F7, L264-268) can interrupt flow
      state; already mitigated
