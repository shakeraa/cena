persona_findings:
  - severity: P1
    finding: |
      Feature 2 "If-Then Session Planner" (L64-98) proposes WhatsApp/SMS
      reminder scheduling based on student-set triggers. Author flags
      (L95) "frame positively." Ethics lens requires stronger guardrails:
      (a) hard-cap reminder frequency at 3/week per student; (b) every
      message must include a one-tap opt-out link; (c) no reminder may
      be sent between 21:00-07:00 local time (dark-time respect).
      Without these, good-intent reminders become notification spam for
      minors who cannot disable push on school-issued devices.
    evidence: axis2_motivation_self_regulation_findings.md:L67, L89-L95
    lens_note: |
      Digital wellbeing research (docs/ethical-persuasion-digital-wellbeing-research.md)
      is clear: any notification system aimed at minors must have
      frequency caps, dark-time respect, and friction-free opt-out. The
      current design leaves these to runtime policy — they need to be
      product-level commitments, not admin toggles.
  - severity: P1
    finding: |
      Feature 3 "Wise Feedback Engine" (L102-138) proposes
      persona-targeted feedback templates and optional
      "collective-achievement lens" for Arabic-speaking students
      ("Your preparation matters for your future and your community",
      L105). BORDERLINE: framing minority-group students with
      collective-identity messages is ethically sensitive — it can
      reinforce in-group/out-group distinctions even with good intent.
      Needs explicit user-research review with Arab-Israeli students
      before ship, not just "user-test with Arabic-speaking students"
      (L135).
    evidence: axis2_motivation_self_regulation_findings.md:L104-L108, L133-L136
    lens_note: |
      Culturally-targeted motivational messaging risks becoming a
      stereotype-reinforcement pattern. The ethical-persuasion
      "informed student" test applies: would an Arab-Israeli student
      appreciate knowing the system is routing them a different
      motivation template than a Jewish-Israeli peer?
  - severity: P2
    finding: |
      Feature 5 "Metacognitive Confidence Check-ins" (L180-216) stores
      per-problem confidence ratings (L208). Even if stored session-
      locally, the aggregate "calibration chart" (L207) creates a
      persistent self-image as "overconfident" or "underconfident" — a
      label that can become self-fulfilling. Mitigation: the chart
      should include an always-visible disclaimer that calibration is
      a session-level pattern, not a trait, and an easy "reset" button.
    evidence: axis2_motivation_self_regulation_findings.md:L183, L207-L213
    lens_note: |
      Labels create identity (cf. Dweck growth-mindset research cited
      in the doc itself). A "Your Calibration Score: underconfident"
      label applied to a minor violates the self-image-neutrality
      principle even if data is session-scoped.
  - severity: P2
    finding: |
      Feature 6 "Process-Praise Response System" (L220-257) is
      well-designed but proposes (L247) a "weekly summary highlighting
      process improvements." A weekly cadence creates a soft
      expectation of weekly engagement — a de-facto streak without the
      banned vocabulary. Recommend: no scheduled weekly summary;
      summary available on-demand only.
    evidence: axis2_motivation_self_regulation_findings.md:L246-L248
    lens_note: |
      GD-004 bans explicit streak counters, but the intent is to ban
      loss-framed rhythm pressure. A "we missed you this week" implicit
      in a weekly summary is the same dark pattern in different
      clothing.
  - severity: P2
    finding: |
      Feature 8 "Reflective Study Plan Generator" (L305-339) proposes
      parent-visible weekly plan sharing (L308). Parent visibility is
      opt-in (L336 mitigation) but the default state is not stated.
      Ethics lens requires: default must be student-only; parent
      sharing must be per-plan opt-in (not account-level) so the
      student retains agency over each weekly disclosure.
    evidence: axis2_motivation_self_regulation_findings.md:L307-L308, L335-L336
    lens_note: |
      Parent-engagement surveillance is a known EdTech dark-pattern
      (AXIS_4 docs reinforce this). Granular per-share consent is the
      baseline autonomy requirement.
