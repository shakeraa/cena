verdict: revise
verdict_reason: |
  Axis 7 has the strongest ethics-architecture foundation of any axis
  (DPIA gates, two-sided consent, ephemeral data) AND the most
  egregious shipgate violations (F3 confetti + collapse framing, F4
  helpfulness tokens). Revise to ship the architecture; retire the
  dark-pattern mechanics. F5 is near-shippable after k-anonymity fix.
