  - to: persona-redteam
    about: "F6 matching algorithm — ability-level inference via skill profile; F7 WebSocket real-time attack surface"
  - to: persona-sre
    about: "F3 Team Challenges WebSocket + real-time scoring engine SLOs and rollback"
  - to: persona-a11y
