extracted_tasks:
  - title: "Exit Ticket student-share copy lockdown (no comparisons, no medians)"
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F4 Exit Ticket results shared to students must pass shipgate
      lint forbidding: "class average," "your rank," "others in your
      class," "median," "percentile," "top X%," "bottom X%."
      Student-shared view is strictly "you" statements.
      ## Files
      - scripts/shipgate/banned.json
      - src/teacher-web/src/features/exit-ticket/StudentShareCopy.ts
      ## Definition of Done
      - Lint fails on any comparative phrase in exit-ticket-student-* namespace
      - Existing templates pass
      - Test fixture covers 10 violating and 10 valid strings
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L131, L156-L160]
  - title: "Student-preview requirement for conference prep briefs"
    priority: P1
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F6 Conference Prep briefs: add mandatory student-preview step.
      Before a teacher finalizes a brief, the student receives a
      read-only preview with an "add your note" text box (optional).
      The teacher sees the student's note appended (or blank) in the
      final brief.
      ## Files
      - src/actors/ConferencePrep/*
      - src/student-web/src/features/conference-preview/*
      ## Definition of Done
      - No brief can be marked "final" without student preview window
      - Preview window has 72h response time before brief auto-finalizes
        with a clearly-labeled "student did not review in time" notice
      - Audit log records preview + response
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L199-L230]
  - title: "Gate F8 'what-if' projections behind dept-head activation"
    priority: P1
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      F8 Bagrut-Readiness what-if projections disabled by default; each
      school's department head must explicitly enable per-semester.
      ADR-level policy: no individual teacher can enable what-if views
      without dept-head sign-off.
      ## Files
      - docs/adr/00NN-bagrut-readiness-what-if-policy.md (new)
      - src/teacher-web/src/features/readiness/WhatIf.vue (gated flag)
      ## Definition of Done
      - ADR accepted
      - Feature flag controlled by department-head role only
      - E2E test: individual teacher cannot self-enable
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: [L273-L299]
  - title: "Remove student-facing stream labels (Core/Progress/Stretch)"
    priority: P2
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F2 Homework Auto-Generator: students receive problems without any
      stream label ("Core," "Progress," "Stretch") visible in
      student-facing UI or copy. Teacher UI may keep labels for
      differentiation; student UI shows neutral "this week's practice."
      ## Files
      - src/student-web/src/features/homework/*
      - src/student-web/src/locales/*.json
      ## Definition of Done
      - Grep finds no stream label in student-web strings
      - Teacher dashboard preserves stream view
      - Snapshot tests confirm student UI neutrality
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L57-L89]
verdict: revise
verdict_reason: |
  Teacher-workflow features are mostly ethics-positive (time-savings,
  privacy-first pulse). Revise F4 copy lockdown, F6 student preview, F8
  what-if gating, F2 remove stream labels. F1, F3, F5, F7 ship.
