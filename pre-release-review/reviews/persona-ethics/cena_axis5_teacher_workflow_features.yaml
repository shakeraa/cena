doc_path: pre-release-review/cena_axis5_teacher_workflow_features.md
reviewer: persona-ethics
reviewed_at: 2026-04-20
doc_summary: |
  Proposes 8 teacher-workflow features (smart lesson planner, homework
  auto-generator, in-class diagnostic sprint, exit ticket, Bagrut rubric
  alignment, conference prep, class health pulse, Bagrut-readiness tracker).
  All guardrail tables self-check against banned mechanics.
system_purpose_fit: 3
  rationale:
    - Teacher-facing axis with low direct-to-student ethics surface area
    - Three features (F4 Exit Ticket, F6 Conference Prep, F8 Bagrut-Readiness
      Tracker) create indirect student-ethics risk: student data aggregated by
      teachers and routed to parents without student agency
    - F7 Class Health Pulse is well-designed and privacy-first
    - F4 Exit Ticket shared-with-students framing (L131) edges toward
      comparison/shame if not carefully implemented
    - Overall axis is ethically sound with four revision points
code_reality_check:
  claims_verified_in_code: []
  claims_contradicted_by_code: []
  claims_unverifiable:
    - "STEP platform effect-size claims -> cogsci"
    - "OpenEduCat 'under 2 minutes' timing -> out of lens"
adr_alignment:
  honored:
    - "GD-004 shipgate (L326)"
    - "ADR-0003 — 2-week recalc for homework profiles (L86)"
  violated: []
  missing_adr_needed:
    - "ADR clarifying student agency in teacher-authored conference prep briefs,
      parent-shared exit ticket results, and Bagrut readiness targeting"
non_negotiable_violations: []
persona_findings:
  - severity: P1
    finding: |
      F4 Exit Ticket Auto-Generator (L128-161) proposes (L131) teachers
      can share results with students as "You mastered X / You might
      want to review Y." Author notes "framed as encouragement, not
      shame" but BORDERLINE flag (L158) admits comparison risk. Ethics
      lens: if shared, must be strictly individual ("you, to your
      yesterday") — absolutely no class-median reference, no color-
      coded groups, no "where you rank." Shipgate should enforce this
      at locale level.
    evidence: cena_axis5_teacher_workflow_features.md:L131, L156-L160
    lens_note: |
      "You mastered X / you might want to review Y" is acceptable; a
      teacher tempted to broaden to "most of your class got Y" crosses
      the banned-comparative-percentile line. Without a copy lockdown
      rule, the teacher UI will drift.
  - severity: P1
    finding: |
      F6 Student Conference Prep (L199-230) auto-generates talking
      points about each student for parent-teacher conferences. Author
      flags (L227) that briefs are teacher-facing only. Ethics lens
      requires stronger: the student must be offered an opt-in preview
      of their own brief BEFORE the conference ("this is what will be
      discussed — anything to add or correct?"). Otherwise the feature
      enables teachers and parents to discuss the student's data
      without the student's participation — a violation of autonomy for
      14-18 year olds.
    evidence: cena_axis5_teacher_workflow_features.md:L199-L230
    lens_note: |
      Self-Determination Theory + Israeli PPL (for minors approaching
      adulthood) both support student access to data discussed about
      them. Teacher-only briefs about minors who are 2-4 years from
      legal adulthood erode autonomy by design.
  - severity: P1
    finding: |
      F8 Bagrut-Readiness Tracker (L271-301) proposes a
      students-by-units matrix with red/yellow/green cells. Author
      flags BORDERLINE (L298). Ethics lens: the matrix itself is
      teacher-facing, which is fine. But the "what-if scenario"
      projection ("If I assign extra homework, which students would
      move to on-track?") (L273) creates a gaming-the-student-toward-
      a-target UX that treats the student as an optimization variable.
      This is the kind of view that justifies teacher pressure calls
      home. Recommend: what-if projections disabled by default, require
      department-head activation + annual review.
    evidence: cena_axis5_teacher_workflow_features.md:L273-L299
    lens_note: |
      Teacher dashboards that let a teacher simulate which homework
      increase would move a student from yellow to green on Bagrut
      readiness create incentive to increase homework load on already-
      struggling students. Ethics lens flags this as an indirect
      coercion amplifier.
  - severity: P2
    finding: |
      F2 Homework Auto-Generator (L57-89) streams students into
      Core/Progress/Stretch based on inferred level. Author flags
      (L85-87) that profiles are recalc'd weekly. Ethics lens: the
      student must see their assigned stream label is not visible to
      them ("Core" vs "Stretch") — or if visible, must be neutralized
      to avoid tracking/labeling effect (Rosenthal-Jacobson). Better:
      no student-facing stream label, just problems.
    evidence: cena_axis5_teacher_workflow_features.md:L57-L89
    lens_note: |
      Ability-group labels that reach the student (even subtly via
      "Your set" naming) activate stereotype-threat research
      well-documented since Rosenthal 1968.
  - severity: P2
    finding: |
      F5 Bagrut Rubric Alignment (L164-196) is pedagogically sound.
      One concern: author proposes "parent view showing readiness"
      (L191 implicit in F8 but referenced here via Parent-readiness
      note L290). Parent visibility of Bagrut readiness mapping
      requires per-semester student opt-in, consistent with Axis 4
      finding.
    evidence: cena_axis5_teacher_workflow_features.md:L191, L290
    lens_note: |
      Same autonomy principle as Axis 4 F8 — parent visibility of
      readiness is a significant disclosure, must be student-gated.
already_built: []
duplicates_of_other_docs:
