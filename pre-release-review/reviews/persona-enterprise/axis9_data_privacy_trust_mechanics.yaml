doc_path: pre-release-review/axis9_data_privacy_trust_mechanics.md
reviewer: persona-enterprise
reviewed_at: 2026-04-20
doc_summary: |
  Eight privacy/trust features for minors: data-export, consent ledger, granular opt-ins,
  audit trail, session scoping UI, parent-visibility switches, deletion/forgetting, PII-in-prompts
  guardrails.
system_purpose_fit: 4
  rationale:
    - Features align with ADR-0003 and non-negotiable 2 (session-scoped misconceptions).
    - Consent-ledger + audit-trail belong in their own bounded context; doc implies but doesn't name.
    - Deletion/forgetting is the event-sourcing consistency nightmare — must be designed, not retrofitted.
code_reality_check:
  claims_verified_in_code:
    - "GDPR resource guard exists -> src/shared/Cena.Infrastructure/Compliance/GdprResourceGuard.cs"
    - "Resource ownership guard exists -> src/shared/Cena.Infrastructure/Auth/ResourceOwnershipGuard.cs"
    - "Cross-tenant write-enforcement tests exist -> src/api/Cena.Admin.Api.Tests/CrossTenantWriteEnforcementTests.cs"
  claims_contradicted_by_code:
    - "Doc treats audit trail as missing; GdprResourceGuard indicates partial audit infrastructure."
  claims_unverifiable:
    - "Consent ledger presence — no ConsentEvents.cs located in this pass."
adr_alignment:
  honored:
    - "ADR-0003 (session-scope for misconception)"
  violated: []
  missing_adr_needed:
    - "Event-sourced deletion policy (tombstone + projection rebuild vs cryptographic erasure)"
    - "Consent-ledger aggregate + event schema"
non_negotiable_violations: []
persona_findings:
  - severity: P0
    finding: |
      Event-sourced deletion is architecturally incompatible with naive "hard delete". Options are (a) crypto-shredding
      (store PII encrypted, discard key on deletion), (b) tombstone events that nullify fields in projections, (c)
      stream removal (destroys audit trail). Doc calls for "right-to-be-forgotten" without picking. Must pick before
      any deletion UI ships, or first DSAR will corrupt history.
    evidence: "axis9_data_privacy_trust_mechanics.md:L~300-L~400 (deletion features); ADR literature"
    lens_note: Enterprise — event-sourcing + forgetting requires deliberate architecture.
  - severity: P1
    finding: |
      Consent must be event-sourced (when was consent granted, withdrawn, by whom, for what). Doc hints at consent
      ledger but doesn't scope it to an aggregate. Candidate: ConsentAggregate per (subject, purpose) tuple, stream
      key `consent-{subjectId}-{purpose}`.
    evidence: "axis9_data_privacy_trust_mechanics.md:L~100-L~200; src/actors/Cena.Actors/ (no ConsentEvents.cs visible)"
    lens_note: Enterprise — consent is an aggregate, not a column.
  - severity: P1
    finding: |
      "PII in prompts" guardrail must be enforced at the LLM Gateway boundary. LlmGatewayActor exists; policy must
      be added as middleware that strips/rejects PII before any LLM call. Otherwise every new LLM caller site is a
      potential leak.
    evidence: "src/actors/Cena.Actors/Gateway/ (LlmGateway); axis9_data_privacy_trust_mechanics.md:L~350"
    lens_note: Enterprise — enforce at the gateway, not at N caller sites.
  - severity: P2
    finding: |
      Granular opt-ins risk consent fatigue + inconsistent application. A single ConsentPolicy per-enrollment with
      typed flags is better than N boolean columns.
    evidence: axis9_data_privacy_trust_mechanics.md:L~150
    lens_note: Enterprise — design for consistency, not feature-by-feature flags.
already_built:
  - feature: "GDPR resource guard"
    evidence: src/shared/Cena.Infrastructure/Compliance/GdprResourceGuard.cs
    note: "Existing infrastructure; extend rather than author parallel."
  - feature: "Cross-tenant write enforcement tests"
    evidence: src/api/Cena.Admin.Api.Tests/CrossTenantWriteEnforcementTests.cs
    note: "Pattern to extend for new privacy tests."
