  rationale:
    - Competitive doc is a benchmarking artifact, not a feature proposal; enterprise lens treats it as architectural inspiration rather than a backlog.
    - Several competitor patterns (Khanmigo chat, DreamBox adaptive path) would push Cena toward new bounded contexts.
