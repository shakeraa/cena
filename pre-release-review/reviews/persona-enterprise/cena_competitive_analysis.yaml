non_negotiable_violations: []
persona_findings:
  - severity: P1
    finding: |
      Doc implicitly suggests adopting Khanmigo-style free-form chat. Free-form chat is a known PII-leakage surface
      and does not fit ADR-0003's session-scope discipline. Any adoption requires explicit gateway-level PII
      guard + session-scoped chat context, not a general chatbot.
    evidence: "cena_competitive_analysis.md:L~200 (Khanmigo); docs/adr/0003-misconception-session-scope.md"
    lens_note: Enterprise — copying competitor chat UX is an architecture commitment, not a feature.
  - severity: P1
    finding: |
      Doc references DreamBox/iReady persistent-profile adaptive models. Those platforms persist misconception history
      across sessions — which Cena cannot replicate without ADR-0003 violation. Worth a note that Cena's advantage
      (session-scoped) is architectural, not a gap.
    evidence: "cena_competitive_analysis.md:L~300 (DreamBox, iReady)"
    lens_note: Enterprise — frame session-scope as competitive moat, not limitation.
  - severity: P2
    finding: |
      Several competitors (Mashov, GOOL) are Israeli-specific. Integration targets for axis-10 are implied here;
      mirror those findings into the integrations ADR rather than leaving them in the competitive doc.
    evidence: "cena_competitive_analysis.md:L~80-L~120 (Israeli platforms)"
    lens_note: Enterprise — ensure architectural ADRs reference the competitive doc's integration targets.
