  - title: "Add idempotency key to classroom enrollment creation"
    priority: P0
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      EnrollmentCreated_V1 has no idempotency key. Any re-applied CSV import would create duplicates. Add a client-
      supplied idempotency key (hash of (studentId, classroomId, externalRosterId)) and dedupe at write.

      ## Files
      - src/actors/Cena.Actors/Events/EnrollmentEvents.cs (add IdempotencyKey field — schema evolution V2)
      - Enrollment write path (grep for `EnrollmentCreated_V1`)
      - Upcaster for V1 -> V2

      ## Definition of Done
      - V2 event lands with idempotency key.
      - Upcaster covers legacy V1.
      - Unit test proving duplicate writes collapse.

      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L~300]
  - title: "Retire 'new heatmap' proposal — extend existing projection"
    priority: P2
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
