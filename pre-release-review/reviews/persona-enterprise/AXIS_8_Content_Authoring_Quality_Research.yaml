non_negotiable_violations: []
persona_findings:
  - severity: P0
    finding: |
      Item-bank versioning is architecturally unclear. Questions mutate (typo fixes, improved distractors) but are
      also referenced by frozen session attempts. ItemVersionFreeze exists under Sessions/ but policy is not written
      down. Without policy, content edits silently invalidate in-flight session attempts.
    evidence: "src/actors/Cena.Actors/Sessions/ItemVersionFreeze.cs; architecture-audit C5 gap"
    lens_note: Enterprise — item-bank mutation + session freeze is a classic event-sourcing consistency trap.
  - severity: P1
    finding: |
      Arabic-medium pipeline writes new QuestionLocale events per translation. Each translation pass is an LLM call
      needing tier routing (ADR-026). Doc silent on tier + cost envelope.
    evidence: "src/actors/Cena.Actors/Events/QuestionLocaleEvents.cs; CLAUDE.md ADR-026"
    lens_note: Enterprise — LLM calls need tier routing.
  - severity: P1
    finding: |
      CAS-gated variation requires a worker pool (SymPy is Python; we're .NET). Failure modes of the Python sidecar
      (timeouts, OOM on complex expressions) become a production-grade concern — item authoring blocks on SymPy being
      healthy. Needs a degraded-mode path (reject, not pass, on SymPy failure).
    evidence: "src/actors/Cena.Actors/Cas/ (directory); docs/adr/0002-sympy-correctness-oracle.md"
    lens_note: Enterprise — external-process dependency; must fail closed.
  - severity: P2
    finding: |
      Provenance tracking (who authored, when, through which tool, with which LLM model) is a governance-critical
      audit trail. No ADR formalizes the provenance schema; each axis adds ad-hoc fields. Centralize.
    evidence: AXIS_8_Content_Authoring_Quality_Research.md:L~200
    lens_note: Enterprise — audit schema fragmentation leads to incomplete trails.
