    about: WCAG 2.2 AA detail and RTL/bdi implementation correctness.
  - to: persona-privacy
    about: Medical/IEP accommodation data is sensitive PII — retention/consent rules required.
  - to: persona-ministry
    about: Extended-time on exam simulation must not leak Bagrut reference text.
