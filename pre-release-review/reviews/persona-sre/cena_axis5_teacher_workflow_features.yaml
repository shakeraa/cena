      - CI test proves suppression at N<15
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "branch:kimi-coder/aggregate-guard"
    source_doc_lines: []
  - title: Load-test in-class diagnostic sprint hub at 50 classes x 30 students
    priority: P1
    estimate: M
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Prove SignalR hub + projection keep p95 aggregation latency <= 1s under synthetic sprint load.
      ## Files
      .github/workflows/e2e-load-nightly.yml
      src/student/full-version/tests/e2e/ (new: sprint-load.spec.ts)
      deploy/helm/cena/templates/actors-hpa.yaml (if needed)
      docs/ops/runbooks/ (new: diagnostic-sprint.md)
