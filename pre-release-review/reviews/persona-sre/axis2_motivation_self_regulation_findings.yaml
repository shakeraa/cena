      - Sample-violation PR blocked
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "branch:kimi-coder/shipgate-axis2"
    source_doc_lines: []
verdict: revise
verdict_reason: |
  Intent aligns with non-negotiables; requires explicit degraded-mode + CI enforcement before SHIP.
