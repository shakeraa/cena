      - Alert on sustained degraded mode
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "branch:kimi-coder/llm-degraded"
    source_doc_lines: [L35-L55]
  - title: Extend shipgate scanner to cover the axis-2 motivation vocabulary
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Add explicit regex rules for axis-2 banned copy ("streak", "don't break", "combo", "chance") and fail CI on match.
      ## Files
      docs/engineering/ci-prohibited-metrics-rules.md
      scripts/ (or existing shipgate scanner)
      .github/workflows/ci.yml
      ## Definition of Done
