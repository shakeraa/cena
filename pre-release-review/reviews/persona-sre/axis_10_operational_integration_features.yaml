doc_summary: |
  Eight operational / integration features (Google SSO, Mashov sync read-only, CSV bulk roster, offline-first practice,
  multi-device sync, school IT admin dashboard, Google Classroom grade passback, data portability export). This doc is entirely
  in my lens — I can be direct.
