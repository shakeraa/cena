  - title: ADR for offline-first sync conflict resolution + durable server timestamp
    priority: P0
    estimate: S
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      Adopt an ADR specifying: durable monotonic server timestamp as tiebreaker, idempotency keys required on every replay,
      telemetry on discarded local writes, and a 30-day envelope for client-side encrypted local data.
      ## Files
      docs/adr/ (new ADR number)
      docs/engineering/offline-sync-design.md (extend)
      ## Definition of Done
      - ADR merged
      - Telemetry spec finalized
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "branch:sre/offline-adr"
    source_doc_lines: [L220-L266]
