persona_findings:
  - severity: P0
    finding: |
      Feature 2 (Mashov) stores teacher credentials at rest and runs daily unattended sync. Requirements: AES-256 + Vault/Secret
      Manager, zero credential in logs, rotation runbook, abuse monitor (unexpected volume), and a hard kill-switch. Without all
      four, credential storage for 1550 schools is an incident-waiting.
    evidence: AXIS_10_Operational_Integration_Features.md:L100-L128
    lens_note: Stored third-party credentials are the highest-value target; operate accordingly.
  - severity: P0
    finding: |
      Feature 4 (Offline-First) sketch labels "adaptive algorithm client-side" and "last-write-wins" conflict resolution. LWW is
      acceptable only if every write has a durable server timestamp — not a client clock. Without this, students lose answers on
      clock skew. Need an explicit conflict-resolution ADR + telemetry on "discarded local writes".
    evidence: AXIS_10_Operational_Integration_Features.md:L220-L266
    lens_note: Offline data loss is the feature's silent failure mode.
  - severity: P1
    finding: |
      Feature 5 (Multi-Device sync) event stream contains "detailed interaction data" and explicitly says "Must NOT use this for
      ML training". Need a log-sink scrubber + prompt-injection guard before events hit long-term storage.
    evidence: AXIS_10_Operational_Integration_Features.md:L296-L328
    lens_note: Event-stream governance needs a sink-side control, not just a client-side rule.
  - severity: P1
    finding: |
      Feature 7 (Google Classroom grade passback) is one-way. If Cena scores are wrong and we have passed them back, we need
      a "grade-recall" runbook + proper retry-on-429 handling. Google Classroom rate limits are strict; peak-hour bursts will fail.
    evidence: AXIS_10_Operational_Integration_Features.md:L400-L462
    lens_note: Any one-way external write needs a named recall procedure.
  - severity: P1
    finding: |
      Feature 6 (School IT admin dashboard) surfaces "error logs" to non-technical admins. Any unredacted raw error could leak
      other tenants or student PII. Must route through ExceptionScrubber + a tenant-isolation filter.
    evidence: AXIS_10_Operational_Integration_Features.md:L333-L397; src/shared/Cena.Infrastructure.Tests/Observability/ExceptionScrubberTests.cs
    lens_note: Admin-facing error panes are a classic leak vector.
  - severity: P2
    finding: |
      Feature 8 (Data portability export) 7-day retention + secure link is sensible; need to add audit ("who downloaded when") and
      rate-limit on export generation to prevent export-bombing a tenant.
    evidence: AXIS_10_Operational_Integration_Features.md:L464-L541
    lens_note: Self-serve exports are a cheap DoS vector.
