    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Grade passback goes through a durable queue with exponential backoff for 429, plus a runbook step to recall a bad grade
      (Cena -> GC patch with corrected value) and a sampled audit of successful writes.
      ## Files
      src/api/Cena.Admin.Api/ (new GoogleClassroomPassbackWorker)
      docs/ops/runbooks/ (new: grade-passback.md)
      ## Definition of Done
      - Chaos test: 20% 429s -> no lost writes
      - Recall procedure integration-tested
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "branch:kimi-coder/gc-passback"
    source_doc_lines: [L400-L462]
