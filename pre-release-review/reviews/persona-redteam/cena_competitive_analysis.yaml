    priority: P1
    estimate: M
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      F4 as described requires longitudinal per-student trajectories.
      Redesign as per-session "intervention needed" signal with no
      cross-session tag, OR mark the proposal retired.
      ## Files
      - pre-release-review/cena_competitive_analysis.md (doc revise)
      ## Definition of Done
      - [ ] Spec respects ADR-0003
      - [ ] Teacher view shows this-session signals, not historical profile
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: [L160-L230]
  - title: Expand TutorSafetyGuard answer-leak patterns + add long-numeric filter
    priority: P1
    estimate: S
    suggested_assignee: claude-subagent-sec
    queue_body: |
      ## Goal
      Add output-side filters to reject tutor replies that contain long
      numeric strings or >= 3 digits immediately after an equals sign.
      Extend injection pattern list with new variants observed in red-team
      logs.
      ## Files
      - src/actors/Cena.Actors/Tutoring/TutorSafetyGuard.cs
      - src/actors/Cena.Actors.Tests/Tutoring/TutorSafetyGuardTests.cs
      ## Definition of Done
      - [ ] New tests cover "= 42" bare-answer, long decimal strings
      - [ ] Injection corpus grew by ≥ 10 phrases
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-sec --result "<branch>"
    source_doc_lines: [L40-L120]
verdict: revise
verdict_reason: |
  Half of this doc is already covered by the axis docs / the index. Unique
  red-team concern is F4 At-Risk alert vs ADR-0003 and the answer-leak
  hardening on F1/F3.
