doc_path: pre-release-review/cena_axis5_teacher_workflow_features.md
reviewer: persona-redteam
reviewed_at: 2026-04-20
doc_summary: |
  Eight teacher workflow features (smart lesson planner, homework auto-gen,
  conference prep, Bagrut-readiness tracking, class health pulse, LMS export,
  misconception-triage dashboard, student conference notes). Adds substantial
  server-scoped analytics surface — teacher role boundary + misconception
  retention are the two main risks.
system_purpose_fit: 3
  rationale:
    - Heavy reliance on class-level aggregation → if aggregation over small N,
      reveals individual students
    - Several features imply persistent misconception state (ADR-0003 stress)
    - Teacher role has the widest tenant-read privilege; horizontal privilege
      escalation into other classes must be checked
code_reality_check:
  claims_verified_in_code:
    - "Heatmap scope guard exists for teacher console -> src/api/Cena.Admin.Api.Tests/TeacherConsole/TeacherHeatmapScopeGuardTests.cs"
    - "Teacher heatmap endpoint uses institute filter -> src/api/Cena.Admin.Api/Features/TeacherConsole/HeatmapEndpoint.cs"
    - "ClassMasteryHeatmapProjection exists -> src/actors/Cena.Actors/Projections/ClassMasteryHeatmapProjection.cs"
  claims_contradicted_by_code:
    - "F7 'Misconception Triage Dashboard' implies persistent per-student misconception data — contradicts ADR-0003 unless explicitly session-scoped"
  claims_unverifiable:
    - "F4 Bagrut-Readiness Tracking 'target unit level mapping' — RDY-080 prohibits numeric Bagrut prediction without calibrated concordance"
adr_alignment:
  honored:
    - "ADR-0001 — teacher endpoints already scoped via TenantScope"
  violated:
    - "ADR-0003 (probable) — F7 misconception triage must be rewritten to session-scope, not per-student trend"
  missing_adr_needed:
    - "Minimum-cell-size policy for class aggregates (k-anonymity) — needs ADR if class < 5 students"
non_negotiable_violations:
  - "4 (Bagrut reference-only) — F4 readiness mapping risks becoming Bagrut prediction; also RDY-080 in Dr. Rami"
  - "2 (misconception session scope) — F7 unless explicitly session-scoped"
persona_findings:
  - severity: P0
    finding: |
      F7 "Misconception Triage Dashboard" accumulates per-student misconception
      data for teacher review. ADR-0003 forbids this. If it ships as a
      multi-session view, it creates a de-facto student deficit profile —
      exactly what ADR-0003 bans, and exactly what Dr. Rami flagged on FD-003.
    evidence: pre-release-review/cena_axis5_teacher_workflow_features.md Feature 7; docs/adr/0003-misconception-session-scope.md
    lens_note: ADR-0003 is a non-negotiable. Teacher convenience cannot override it.
  - severity: P1
    finding: |
      Class Health Pulse + Lesson Planner aggregate "class weakness profiles."
      For classes < 5 students (common in small religious/Arab schools) the
      aggregate effectively reveals individual performance — a re-identification
      attack on "anonymized" data. Need a minimum-cell-size gate (e.g., suppress
      any cell with n<5).
    evidence: pre-release-review/cena_axis5_teacher_workflow_features.md F1, F5 "Guardrail Tension: BORDERLINE"
    lens_note: Doc acknowledges the risk but proposes no numeric threshold — that's a ship-blocker detail.
  - severity: P1
    finding: |
      F2 Homework Auto-Generator assigns problems to students. If the assignment
      API keys off teacher+classId but doesn't verify classId ∈ teacher's
      institute via TenantScope, a teacher in School A can push assignments
      into School B by tampering with classId. Existing heatmap scope guard
      proves the pattern exists; must be applied to every new aggregate endpoint.
    evidence: pre-release-review/cena_axis5_teacher_workflow_features.md F2; src/shared/Cena.Infrastructure/Tenancy/TenantScope.cs
    lens_note: Copy-paste endpoints without the scope guard are the most common vuln in this codebase.
  - severity: P1
    finding: |
      F4 Bagrut-Readiness Tracking — producing numeric readiness crosses into
      Bagrut prediction (RDY-080). A motivated parent or journalist will
      reverse-engineer a "predicted Bagrut score" from the readiness number.
      Must ship with hard upper bound framing (e.g., "track topics, not
      scores") or not at all.
    evidence: pre-release-review/cena_axis5_teacher_workflow_features.md Feature 4; memory project_bagrut_reference_only.md
    lens_note: Reputational + regulatory, not technical. Still a red-team concern.
  - severity: P2
    finding: |
      F3 Student Conference Prep surfaces "strength-first talking points"
      generated by LLM from session data. If session transcripts (containing
      student-authored text) are fed verbatim into the LLM prompt, a student
      can inject instructions that appear in the teacher's talking-point
      suggestions. Indirect prompt injection via the transcript.
    evidence: pre-release-review/cena_axis5_teacher_workflow_features.md Feature 3
    lens_note: Second-order injection — known pattern in summarization LLMs.
already_built:
  - feature: Teacher scope guard tested end-to-end
    evidence: src/api/Cena.Admin.Api.Tests/TeacherConsole/TeacherHeatmapScopeGuardTests.cs
    note: Every new teacher endpoint MUST ship with an equivalent test.
  - feature: Heatmap projection exists
    evidence: src/actors/Cena.Actors/Projections/ClassMasteryHeatmapProjection.cs
    note: F5 Class Health Pulse should extend this rather than duplicate.
duplicates_of_other_docs:
  - "feature-discovery-2026-04-20.md: FD-003 (misconception tagging) contradicts F7"
  - "AXIS_6_Assessment_Feedback_Research.md: F1 formative-summative overlaps F4 readiness"
extracted_tasks:
  - title: Add minimum-cell-size (k-anonymity) gate to class aggregates
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Any class-level aggregate returned to a teacher must suppress cells with
      n < 5. Implement in the projection layer so UI cannot opt out.
      ## Files
      - src/actors/Cena.Actors/Projections/ClassMasteryHeatmapProjection.cs
      - src/api/Cena.Admin.Api/Features/TeacherConsole/HeatmapEndpoint.cs
      - new tests
      ## Definition of Done
      - [ ] Cells with n<5 return `suppressed: true` with no numeric value
      - [ ] Test: class of 3 students returns suppressed heatmap
      - [ ] Metric `cena_heatmap_cell_suppressed_total`
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L30-L60, L140-L200]
  - title: Redesign F7 misconception triage as session-only view (ADR-0003)
    priority: P0
    estimate: M
    suggested_assignee: human-architect
    queue_body: |
      ## Goal
      F7 as written persists student-level misconception trends, which
      violates ADR-0003. Rewrite the spec so the dashboard shows only
      within-the-current-session misconceptions with 30-day hard TTL and no
      per-student historical view.
      ## Files
      - pre-release-review/cena_axis5_teacher_workflow_features.md (doc revise)
      - docs/adr/0003-misconception-session-scope.md (cross-ref)
      ## Definition of Done
      - [ ] Spec revised
      - [ ] No misconception table keyed student_id × concept lives > 30 days
      - [ ] Retention worker covers the new store
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker human-architect --result "<branch>"
    source_doc_lines: [L260-L320]
  - title: Scope-guard test template applied to every new teacher endpoint
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      Clone TeacherHeatmapScopeGuardTests as a template and make its pattern
      mandatory for every new teacher-facing endpoint in axis5 features.
      ## Files
      - src/api/Cena.Admin.Api.Tests/TeacherConsole/ (new test per endpoint)
      - optional: arch-test to enforce presence
      ## Definition of Done
      - [ ] Arch-test fails if a /api/teacher/* endpoint lacks a matching scope-guard test
      - [ ] Template lives in docs/engineering/
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [all]
verdict: revise
verdict_reason: |
  F1/F2/F5 ship with k-anonymity + scope-guard tests. F7 must be redesigned
  under ADR-0003. F4 needs a Bagrut-prediction disclaimer. F3 needs LLM
  indirect-injection guard on transcripts.
cross_lens_handoff:
  - to: persona-privacy
    about: Minimum-cell-size policy — exact k value, k-anonymity vs l-diversity choice
  - to: persona-ministry
    about: F4 readiness vs RDY-080 Bagrut prediction risk
  - to: persona-enterprise
    about: Extending ClassMasteryHeatmapProjection vs creating parallel projections
