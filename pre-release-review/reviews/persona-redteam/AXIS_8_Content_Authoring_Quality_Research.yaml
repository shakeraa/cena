extracted_tasks:
  - title: Sandbox SymPy template evaluation in problem-variation engine
    priority: P1
    estimate: M
    suggested_assignee: claude-subagent-sec
    queue_body: |
      ## Goal
      Any SymPy template ingested from the authoring UI MUST be parsed in
      expression-only mode (no `eval`, no `__import__`, no arbitrary
      attribute access). Use `sympify(s, evaluate=False)` with an allow-list
      of symbols + operations. Reject templates that fail parsing in the
      restricted mode.
      ## Files
      - Future authoring service (src/api/Cena.Admin.Api or src/actors)
      - Tests under src/actors/Cena.Actors.Tests
      ## Definition of Done
      - [ ] Template `__import__('os')` rejected with 400
      - [ ] Allow-list covers +, -, *, /, **, sin, cos, log, exp, sqrt, piecewise, symbols
      - [ ] Perf: parse <50ms p95
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker claude-subagent-sec --result "<branch>"
    source_doc_lines: [L60-L140]
  - title: Pre-publication content-safety gate for cultural-context generator
    priority: P1
    estimate: M
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F5-generated problem bodies must pass a toxicity/stereotype filter plus
      human review before reaching any student. Reuse the moderation pipeline
      primitives already deployed for photo uploads.
      ## Files
      - src/api/Cena.Admin.Api/ContentModerationService.cs
      - new generation path (future)
      ## Definition of Done
      - [ ] Generator output gated behind moderation verdict
      - [ ] Human-review queue required for any flag
      - [ ] Arabic + Hebrew test corpus covers known sensitive contexts
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L220-L300]
  - title: Wire Mother-Tongue hint generator through TutorSafetyGuard
    priority: P1
    estimate: S
    suggested_assignee: kimi-coder
    queue_body: |
      ## Goal
      F6 hint service output flows through existing TutorSafetyGuard before
      reaching student. Language-specific tests for Hebrew and Arabic
      blocked phrases.
      ## Files
      - new F6 service
      - src/actors/Cena.Actors.Tests/Tutoring/TutorSafetyGuardTests.cs
      ## Definition of Done
      - [ ] Integration test: generator returns Hebrew injection phrase -> guard blocks
      - [ ] Same for Arabic
      ## Reporting
      complete via: node .agentdb/kimi-queue.js complete <id> --worker kimi-coder --result "<branch>"
    source_doc_lines: [L310-L370]
verdict: revise
verdict_reason: |
  Content authoring features align well with CAS invariants. Three concrete
  security hardening tasks needed (template sandbox, content-safety gate,
  hint guard wiring). Dr. Rami's FD-011 cherry-picked effect size for F5 is
  an evidence-quality problem tracked elsewhere.
