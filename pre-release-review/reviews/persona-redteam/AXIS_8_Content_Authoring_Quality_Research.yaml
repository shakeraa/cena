doc_path: pre-release-review/AXIS_8_Content_Authoring_Quality_Research.md
reviewer: persona-redteam
reviewed_at: 2026-04-20
doc_summary: |
  Eight content-authoring/quality features (Bayesian IRT calibration, SymPy
  CAS-gated variation engine, Bagrut rubric engine, Arabic RTL renderer,
  culturally-contextualized generator, mother-tongue hint system, self-
  efficacy difficulty presentation, Elo + expert hybrid calibration). Direct
  touchpoints with the CAS gate + ingestion pipeline — the heart of ADR-0002
  enforcement.
system_purpose_fit: 4
  rationale:
    - F2 CAS-gated variation engine aligns perfectly with ADR-0002/0032
    - F5 Culturally-contextualized generator must produce CAS-verifiable
      problems; templated generation + SymPy verification is the right pattern
    - F6 Mother-tongue hint system adds L12N surface for LLM hints — must pass
      through TutorSafetyGuard
code_reality_check:
  claims_verified_in_code:
    - "Single CAS writer invariant is enforced -> docs/adr/0032-cas-gated-question-ingestion.md §16.1"
    - "Stem solution extractor exists per RDY-038 -> ADR-0032 §17"
    - "LaTeXSanitizer exists -> src/shared/Cena.Infrastructure/Security/LaTeXSanitizer.cs"
    - "AiGenerationService integrates CAS gate in batch flow -> ADR-0032 §12"
  claims_contradicted_by_code: []
  claims_unverifiable:
    - "F1 'Bayesian IRT' requires PyMC/Stan — no such sidecar in repo today"
    - "F5 cultural-contextualization LLM generator: no existing cultural-safety filter"
adr_alignment:
  honored:
    - ADR-0002 / ADR-0032 — F2/F8 design conforms
    - ADR-0003 — calibration doesn't depend on identified student trajectories
  violated: []
  missing_adr_needed:
    - "Cultural-safety filter ADR for F5 — preventing stereotype amplification & offensive content in generated problems"
    - "Expert-judge identity/provenance ADR for F8 — who is an 'expert' and how is collusion prevented"
non_negotiable_violations: []
persona_findings:
  - severity: P1
    finding: |
      F2 Problem Variation Engine is excellent but Dr. Rami flagged FD-002 as
      PASS only when the template is author-owned. If an authoring UI lets
      less-trusted authors submit raw SymPy templates, a template can run
      arbitrary Python via SymPy's `sympify(eval=True)` or custom methods.
      Templates MUST be parsed in a restricted expression-only mode; never
      exec'd. Doc doesn't mention sandboxing.
    evidence: pre-release-review/AXIS_8_Content_Authoring_Quality_Research.md Feature 2
    lens_note: `sympy.sympify("__import__('os').system('...')")` is the canonical attack.
  - severity: P1
    finding: |
      F5 Culturally-Contextualized Problem Generator — LLM prompted with
      cultural context creates a stereotype-amplification + offensive-content
      risk. Worst case: problems generated for Arab cohort contain biased or
      insensitive contexts. Need a pre-publication content-safety gate
      (human review + LLM judge + toxicity filter) distinct from the math
      CAS gate.
    evidence: pre-release-review/AXIS_8_Content_Authoring_Quality_Research.md Feature 5
    lens_note: Political + press risk; very high in the IL/AR context.
  - severity: P1
    finding: |
      F6 Mother-Tongue-Mediated Hint System — hints generated in Arabic/Hebrew
      by LLM must pass through TutorSafetyGuard with the Hebrew + Arabic
      blocklists already present at TutorSafetyGuard.cs:59-80. If the hint
      service is new, ensure it actually wires the guard and doesn't skip
      because it's "trusted system output."
    evidence: pre-release-review/AXIS_8_Content_Authoring_Quality_Research.md Feature 6; src/actors/Cena.Actors/Tutoring/TutorSafetyGuard.cs:59
    lens_note: Indirect injection via the multi-lingual path is a specific worry.
  - severity: P2
    finding: |
      F1 Bayesian IRT introduces a new sidecar (PyMC/Stan). Must follow the
      circuit-breaker + timeout pattern from RDY-012 and must not be reachable
      from the public network. Plus: response data feeds into the prior update
      loop — confirm that student_id is stripped before entering the
      calibration store (ADR-0003 spirit).
    evidence: pre-release-review/AXIS_8_Content_Authoring_Quality_Research.md Feature 1
    lens_note: New sidecars = new SSRF / pod-network misconfig risk.
  - severity: P2
    finding: |
      F8 Hybrid Elo + Expert Judgment — "expert" ratings entered by named
      humans become a collusion surface (experts pre-rate their own
      questions). Need: (a) expert identity bound to Firebase role with audit,
      (b) quorum requirement (≥ 2 experts), (c) rating tamper detection.
    evidence: pre-release-review/AXIS_8_Content_Authoring_Quality_Research.md Feature 8
    lens_note: Low odds, but easy to design the integrity check up-front.
already_built:
  - feature: Single CAS writer (CasGatedQuestionPersister)
    evidence: docs/adr/0032-cas-gated-question-ingestion.md §16.1
    note: F2/F5/F8 all feed into this — no new write paths permitted.
  - feature: Hebrew/Arabic prompt-injection blocklist
    evidence: src/actors/Cena.Actors/Tutoring/TutorSafetyGuard.cs:59
    note: Directly applicable to F6 Mother-Tongue Hints.
  - feature: Stem-driven CAS equivalence (RDY-038)
    evidence: docs/adr/0032-cas-gated-question-ingestion.md §17
    note: F2/F5 generated items inherit the Verified-vs-Unverifiable distinction.
