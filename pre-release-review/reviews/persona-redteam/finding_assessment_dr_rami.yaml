persona_findings:
  - severity: P0
    finding: |
      FD-008 REJECT (Yu et al. 2026 non-existent citation) is both an
      evidence integrity issue AND a security governance issue. Shipping a
      feature with fabricated academic backing is a litigation/press risk in
      a regulated exam-prep market and, if the feature is AI grading, feeds
      student data into a pipeline with no real provenance for the 90%
      agreement claim. RED-TEAM POSITION: hard block until citation replaced
      with a verifiable one AND DPA §7 impact assessment completed.
    evidence: pre-release-review/finding_assessment_dr_rami.md FD-008
    lens_note: Audit trail hygiene; regulators notice fabricated citations faster than users.
  - severity: P0
    finding: |
      FD-003 REJECT — aligns with ADR-0003 enforcement. Red-team extension:
      any "real-time misconception tagging" that is NOT backed by a
      RetentionWorker-registered store with strict TTL should be blocked at
      code review. This is the enforcement side of Dr. Rami's verdict.
    evidence: pre-release-review/finding_assessment_dr_rami.md FD-003
    lens_note: Pairs with my axis6 P1 RetentionWorker-coverage task.
  - severity: P1
    finding: |
      FD-004 WARNING on IRT-CAT Bagrut prediction — RDY-080 is authoritative.
      Red-team extension: any numeric readiness output that can be
      reverse-engineered into a Bagrut score prediction is a reputational
      attack surface. Must be bounded to ordinal/categorical (e.g., "ready /
      nearly / not yet") with no numeric value exposed.
    evidence: pre-release-review/finding_assessment_dr_rami.md FD-004
    lens_note: Data-shape control as security control.
  - severity: P2
    finding: |
      FD-011 REJECT (cherry-picked ES 1.16) — cultural context generator. Red
      team cross-ref: axis8 F5 cultural context has a separate stereotype
      risk. Evidence quality problem is tracked by Dr. Rami; stereotype
      problem is tracked in my axis8.
    evidence: pre-release-review/finding_assessment_dr_rami.md FD-011
    lens_note: Two separate risks; both must be addressed.
