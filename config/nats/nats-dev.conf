# =============================================================================
# Cena Platform -- NATS Server Configuration (Development)
# REV-002: Authentication, subject ACLs, and JetStream
#
# Passwords are injected via environment variables with dev defaults in
# docker-compose.yml. Production will use account-based auth (INF-011).
# =============================================================================

port: 4222
http_port: 8222

authorization {
  users = [
    { user: "actor-host",  password: $NATS_ACTOR_PASSWORD,  permissions: {
      publish:   ["cena.events.>", "cena.system.>", "cena.durable.dlq.>", "cena.cas.verify.sympy", "cena.cas.health.sympy"]
      subscribe: ["cena.session.>", "cena.mastery.>", "_INBOX.>"]
    }}
    { user: "cena_api_user", password: $NATS_API_PASSWORD, permissions: {
      publish:   ["cena.session.>", "cena.mastery.>", "cena.cas.verify.sympy", "cena.cas.health.sympy"]
      subscribe: ["cena.events.>", "cena.events.student.>", "_INBOX.>"]
    }}
    { user: "emulator",    password: $NATS_EMU_PASSWORD,    permissions: {
      publish:   ["cena.session.>", "cena.mastery.>", "cena.events.focus.>"]
      subscribe: ["cena.events.>"]
    }}
    { user: "nats-setup",  password: $NATS_SETUP_PASSWORD,  permissions: {
      publish:   ["$JS.API.>"]
      subscribe: ["$JS.API.>", "_INBOX.>"]
    }}
    # Sympy sidecar: serves CAS verification requests. It subscribes on the
    # verify + health subjects and replies via _INBOX.* per NATS request/reply.
    { user: "sympy-sidecar", password: $NATS_SYMPY_PASSWORD, permissions: {
      publish:   ["_INBOX.>"]
      subscribe: ["cena.cas.verify.sympy", "cena.cas.health.sympy"]
    }}
  ]
}

jetstream {
  store_dir: /data
  max_mem: 256MB
  max_file: 10GB
}
