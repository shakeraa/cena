# =============================================================================
# Cena Platform -- NATS Server Configuration (Development)
# REV-002: Authentication, subject ACLs, and JetStream
#
# Passwords are injected via environment variables with dev defaults in
# docker-compose.yml. Production will use account-based auth (INF-011).
# =============================================================================

port: 4222
http_port: 8222

authorization {
  users = [
    { user: "actor-host",  password: $NATS_ACTOR_PASSWORD,  permissions: {
      # actor-host publishes the durable event outbox to JetStream (NatsOutboxPublisher).
      # Needs publish permission on every cena.durable.{category}.* subject the
      # publisher routes to, not just dlq. Subjects declared in
      # src/actors/Cena.Actors/Infrastructure/NatsOutboxPublisher.GetDurableSubject.
      # Also needs $JS.API.> for the JetStream publish-reply round-trip.
      # _INBOX.> on publish is required so actor-host can REPLY to request/reply
      # calls incoming on cena.session.> / cena.mastery.> — NATS request/reply
      # round-trips the response via an ephemeral _INBOX subject.
      publish:   ["cena.events.>", "cena.system.>", "cena.durable.>", "cena.cas.verify.sympy", "cena.cas.health.sympy", "$JS.API.>", "_INBOX.>"]
      subscribe: ["cena.session.>", "cena.mastery.>", "_INBOX.>"]
    }}
    { user: "cena_api_user", password: $NATS_API_PASSWORD, permissions: {
      # Admin/Student APIs subscribe on the durable streams (NatsEventSubscriber)
      # and publish command/query subjects. Needs subscribe on cena.durable.>
      # so API-side handlers can tail the JetStream streams.
      #
      # TASK-E2E-A-01-BE-02: student-api also publishes per-student lifecycle
      # events that originate from HTTP endpoints (StudentOnboardedV1 from
      # /api/auth/on-first-sign-in; ParentChildBoundV1 from /api/parent/bind).
      # The events are not "actor-emitted" — they're a direct side-effect of
      # an authenticated request — so the API host owns the publish.
      publish:   ["cena.session.>", "cena.mastery.>", "cena.cas.verify.sympy", "cena.cas.health.sympy", "cena.events.student.*.onboarded", "cena.events.parent.*.bound", "$JS.API.>"]
      subscribe: ["cena.events.>", "cena.events.student.>", "cena.durable.>", "_INBOX.>"]
    }}
    { user: "emulator",    password: $NATS_EMU_PASSWORD,    permissions: {
      publish:   ["cena.session.>", "cena.mastery.>", "cena.events.focus.>"]
      subscribe: ["cena.events.>"]
    }}
    { user: "nats-setup",  password: $NATS_SETUP_PASSWORD,  permissions: {
      publish:   ["$JS.API.>"]
      subscribe: ["$JS.API.>", "_INBOX.>"]
    }}
    # Sympy sidecar: serves CAS verification requests. It subscribes on the
    # verify + health subjects and replies via _INBOX.* per NATS request/reply.
    { user: "sympy-sidecar", password: $NATS_SYMPY_PASSWORD, permissions: {
      publish:   ["_INBOX.>"]
      subscribe: ["cena.cas.verify.sympy", "cena.cas.health.sympy"]
    }}
  ]
}

jetstream {
  store_dir: /data
  max_mem: 512MB
  # Dev-only: ceiling raised so all streams declared in
  # src/infra/docker/nats-setup.sh fit without "insufficient storage"
  # errors. LEARNER_EVENTS + PEDAGOGY_EVENTS + ANALYTICS_EVENTS alone
  # ask for 30GB combined. Prod NATS sizing uses account-based limits
  # (INF-011), not this file.
  max_file: 50GB
}
