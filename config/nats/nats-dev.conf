# =============================================================================
# Cena Platform -- NATS Server Configuration (Development)
# REV-002: Authentication, subject ACLs, and JetStream
#
# Passwords are injected via environment variables with dev defaults in
# docker-compose.yml. Production will use account-based auth (INF-011).
# =============================================================================

port: 4222
http_port: 8222

authorization {
  users = [
    { user: "actor-host",  password: $NATS_ACTOR_PASSWORD,  permissions: {
      publish: ["cena.events.>", "cena.system.>", "cena.durable.dlq.>"]
      subscribe: ["cena.session.>", "cena.mastery.>"]
    }}
    { user: "admin-api",   password: $NATS_API_PASSWORD,    permissions: {
      publish: ["cena.session.>", "cena.mastery.>"]
      subscribe: ["cena.events.>", "cena.events.student.>"]
    }}
    { user: "emulator",    password: $NATS_EMU_PASSWORD,    permissions: {
      publish: ["cena.session.>", "cena.mastery.>", "cena.events.focus.>"]
      subscribe: ["cena.events.>"]
    }}
    { user: "nats-setup",  password: $NATS_SETUP_PASSWORD,  permissions: {
      publish: ["$JS.API.>"]
      subscribe: ["$JS.API.>", "_INBOX.>"]
    }}
  ]
}

jetstream {
  store_dir: /data
  max_mem: 256MB
  max_file: 10GB
}
