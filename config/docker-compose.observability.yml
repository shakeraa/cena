# ═══════════════════════════════════════════════════════════════════════
# Cena Platform — Observability Stack (RES-002)
# Usage: docker compose -f docker-compose.yml -f config/docker-compose.observability.yml up
# ═══════════════════════════════════════════════════════════════════════

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: cena-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      # PRR-434: Critical-alert rules + self-resolving routing.
      - ./prometheus/rules:/etc/prometheus/rules:ro
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 3

  # PRR-434: Alertmanager receives Prometheus alerts and routes them.
  alertmanager:
    image: prom/alertmanager:latest
    container_name: cena-alertmanager
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: cena-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-cena_dev_grafana}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/cena-actors.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: cena-otel-collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: cena-jaeger
    ports:
      - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

volumes:
  grafana_data:
