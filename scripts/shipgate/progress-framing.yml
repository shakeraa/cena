# =============================================================================
# Ship-gate rule pack: progress framing / scores-as-identity (prr-091 / EPIC-PRR-D D3)
# =============================================================================
# Source:  tasks/pre-release-review/TASK-PRR-091 absorbed into EPIC-PRR-D
# Policy:  Student-visible progress framing must NOT collapse the student's
#          identity into a score or a cohort rank. Two failure modes:
#
#            1. Scores-as-identity: "you are a B-level student", "your rank",
#               "top N% in your class", "#1 this week", leaderboard phrasing.
#               These framings make performance == identity, which
#               (a) is developmentally harmful for teenagers, (b) collapses
#               the growth-mindset posture Cena is built around, and
#               (c) creates a social-comparison dependency that reduces
#               intrinsic motivation (Deci & Ryan, SDT meta-analyses).
#
#            2. Uncalibrated progress claims: any student-visible progress
#               number (accuracy %, mastery %, etc.) without a CI range
#               attached. R-28 decided that honest numbers with CIs beat
#               soft euphemism — a bare "73% accuracy" without its CI
#               hides how much evidence backs the claim, which is the same
#               epistemological failure as an uncited effect size.
#
# Whitelist discipline: admin/educator-facing analytics surfaces are allowed
# to rank and compare; this pack is STUDENT-FACING ONLY. The whitelist names
# the admin bundles + the known-legit analytics paths.
#
# Locale coverage: en / he / ar. Hebrew and Arabic patterns are best-effort
# machine translations; review by native-speaker team before enforcement.
#
# Rule shape: see banned-citations.yml header.
# =============================================================================

rules:
  # --------------------------------------------------------------------------
  # prr-091 — scores-as-identity (English)
  # --------------------------------------------------------------------------
  - id: you-are-x-level-student
    reason: "Banned 'you are an X-level student' framing (prr-091 — scores-as-identity)"
    pattern: "you(?:'re|\\s+are)\\s+(?:an?\\s+)?[a-g]\\s*(?:[-+])?[- ]?level\\s+student"
    flags: i

  - id: your-rank
    reason: "Banned 'your rank' student-facing rank framing (prr-091 — scores-as-identity)"
    pattern: "\\byour\\s+(rank|ranking|class\\s+rank|cohort\\s+rank)\\b"
    flags: i

  - id: top-n-percent
    reason: "Banned 'top N%' / 'top N% in class' student-facing (prr-091 — scores-as-identity)"
    pattern: "\\btop\\s+\\d{1,3}\\s*%"
    flags: i

  - id: number-one-in-class
    reason: "Banned '#1 in class/this week' leaderboard framing (prr-091 — scores-as-identity)"
    pattern: "(#\\s*1|number\\s+one|no\\.?\\s*1)\\s+(in\\s+(your\\s+)?(class|cohort)|this\\s+week|today|this\\s+month)"
    flags: i

  - id: leaderboard-position
    reason: "Banned 'leaderboard' / 'on the leaderboard' student-facing (prr-091 — scores-as-identity)"
    pattern: "\\bleader(?:board|boards)\\b"
    flags: i

  - id: class-rank-n-of-m
    reason: "Banned 'rank N of M in class' framing (prr-091 — scores-as-identity)"
    pattern: "\\brank(?:ed)?\\s+\\d+\\s+(?:of|out\\s+of)\\s+\\d+"
    flags: i

  - id: beat-your-classmates
    reason: "Banned 'beat your classmates/peers' competition framing (prr-091 — scores-as-identity)"
    pattern: "\\bbeat\\s+(your\\s+)?(classmates|peers|friends|cohort|the\\s+class)"
    flags: i

  - id: better-than-n-percent
    reason: "Banned 'better than N% of (students|classmates|peers)' (prr-091 — scores-as-identity)"
    pattern: "better\\s+than\\s+\\d{1,3}\\s*%\\s+of\\s+(students|classmates|peers|your\\s+cohort|the\\s+class)"
    flags: i

  # --------------------------------------------------------------------------
  # prr-091 — uncalibrated progress numbers (English)
  # Flag a bare percentage-accuracy claim that does NOT carry an adjacent
  # "95% CI" / "confidence interval" / "±" range. This mirrors ADR-0049's
  # effect-size citation gate for internal progress numbers.
  # --------------------------------------------------------------------------
  - id: bare-accuracy-percent
    reason: "Banned bare accuracy-% without a CI range (prr-091 — R-28 honest-number posture)"
    near:
      a: "\\b\\d{1,3}\\s*%\\s+(accuracy|accurate|mastery|correct|right|mastered)"
      b: "^(?!.*(?:95\\s*%\\s*CI|confidence\\s+interval|±|\\+\\/?-|\\+-)).*$"
    flags: i

  - id: bare-mastery-percent
    reason: "Banned bare 'mastery N%' / 'N% mastered' without a CI range (prr-091 — R-28)"
    near:
      a: "(mastery\\s+(of\\s+)?\\d{1,3}\\s*%|\\d{1,3}\\s*%\\s+mastered)"
      b: "^(?!.*(?:95\\s*%\\s*CI|confidence\\s+interval|±|\\+\\/?-|\\+-)).*$"
    flags: i

  # --------------------------------------------------------------------------
  # Hebrew variants (best-effort; verify with native-speaker team)
  # --------------------------------------------------------------------------
  - id: he-your-rank
    reason: "Hebrew 'your rank/ranking' (prr-091 — verify w/ native speaker)"
    pattern: "הדירוג\\s+שלך"
    flags: u
    locale: he

  - id: he-top-n-percent
    reason: "Hebrew 'top N%' (prr-091 — verify w/ native speaker)"
    pattern: "\\d{1,3}\\s*%\\s+המובילים"
    flags: u
    locale: he

  - id: he-leaderboard
    reason: "Hebrew 'leaderboard' (prr-091 — verify w/ native speaker)"
    pattern: "(לוח\\s+המובילים|טבלת\\s+הדירוג)"
    flags: u
    locale: he

  # --------------------------------------------------------------------------
  # Arabic variants (best-effort; verify with native-speaker team)
  # --------------------------------------------------------------------------
  - id: ar-your-rank
    reason: "Arabic 'your rank/ranking' (prr-091 — verify w/ native speaker)"
    pattern: "ترتيبك"
    flags: u
    locale: ar

  - id: ar-top-n-percent
    reason: "Arabic 'top N%' (prr-091 — verify w/ native speaker)"
    pattern: "أفضل\\s+\\d{1,3}\\s*%"
    flags: u
    locale: ar

  - id: ar-leaderboard
    reason: "Arabic 'leaderboard' (prr-091 — verify w/ native speaker)"
    pattern: "(لوحة\\s+المتصدرين|قائمة\\s+المتصدرين)"
    flags: u
    locale: ar
