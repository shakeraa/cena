# =============================================================================
# Ship-gate whitelist: banned-mechanics rule pack
# =============================================================================
# Files that legitimately need to reference the banned mechanics (policy docs,
# task bodies that ban the patterns, retirement logs, positive-test fixtures).
# Everything else is scanned.
# =============================================================================

whitelist:
  - path: "docs/engineering/shipgate.md"
    reason: "Ship-gate policy doc: enumerates the banned mechanics"

  - path: "docs/engineering/ci-prohibited-metrics-rules.md"
    reason: "CI rules doc: catalogs prohibited metric patterns (policy, not implementation)"

  - path: "docs/engineering/feature-success-metrics.md"
    reason: "Metrics policy doc: cites banned copy to describe what's blocked"

  - path: "docs/engineering/mastery-trajectory-honest-framing.md"
    reason: "Honest-framing design doc: pairs banned copy with target copy (policy)"

  - path: "docs/engineering/offline-sync-design.md"
    reason: "Design doc: states UX explicitly avoids countdown (negation context)"

  - path: "docs/design/SESSION-UX-002-progressive-disclosure.md"
    reason: "Design doc: explicit ban statement"

  - path: "docs/design/compression-diagnostic-design.md"
    reason: "Design doc: anti-pattern description for review"

  - path: "docs/design/daily-community-puzzle.md"
    reason: "Design doc: explicit ban statement"

  - path: "docs/design/microinteractions-emotional-design.md"
    reason: "Design doc: describes banned timer countdown in rejection context"

  # Test assertions that verify banned-copy does NOT render — legit references
  - path: "src/actors/Cena.Actors.Tests/**"
    reason: "Test assertions may reference banned copy in DoesNotContain checks"

  - path: "src/api/**/*Tests*/**"
    reason: "API test projects may assert banned copy is absent"

  - path: "src/api/**/*.Tests/**"
    reason: "API test projects (dotted variant) may assert banned copy is absent"

  # Actor-code comments that EXPLAIN why a countdown is banned (policy context)
  - path: "src/actors/Cena.Actors/ParentalControls/TimeBudget.cs"
    reason: "Source comment explains the banned countdown pattern in rationale"

  - path: "src/actors/Cena.Actors/Accommodations/AccommodationProfile.cs"
    reason: "Source comment explains UI hides countdown (legit rationale)"

  # Technical session-counter comments (NOT student-facing; decrementing-N-sessions, not a wall-clock deadline)
  - path: "src/actors/Cena.Actors/Teacher/ScheduleOverride/TeacherOverrideState.cs"
    reason: "Doc-comment on ActivePin record: 'countdown' describes a decrementing integer counter of pinned sessions (RemainingSessions), not a student-facing time-pressure mechanic. Not rendered to any surface."

  - path: "src/actors/Cena.Actors/Teacher/ScheduleOverride/Events/PinTopicRequested_V1.cs"
    reason: "Event-comment describes pin replacement semantics — 'countdown' is internal term-of-art for the session-counter (LATEST-ACTIVE-WINS). Not student-facing copy."

  # SMS outbound shipgate is the ENFORCEMENT policy itself — regex list encodes banned patterns
  - path: "src/actors/Cena.Actors/Notifications/OutboundSms/SmsShipgatePolicy.cs"
    reason: "This file IS the SMS-side ban enforcement (mirrors banned-mechanics.yml for SMS copy); its regex list quotes every banned term by construction."

  # Student-web UI files that include negation comments
  - path: "src/student/full-version/src/components/session/QuestionCard.vue"
    reason: "Component comment states the UI does NOT show a countdown (negation)"

  - path: "src/student/full-version/src/components/InstallPrompt.vue"
    reason: "Component comment documents absence of urgency/countdown"

  - path: "docs/adr/**"
    reason: "ADRs may describe banned mechanics in rationale / what-we-rejected sections"

  - path: "docs/design/exam-prep-positive-framing.md"
    reason: "Positive-framing reference: pairs anti-patterns with target copy"

  - path: "docs/research/**"
    reason: "Research notes analyse mechanics (pre-production)"

