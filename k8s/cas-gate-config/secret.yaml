# Super-admin override flag + pre-pilot wipe gate. Kept in a Secret (not a
# ConfigMap) so they can't be read by ordinary service accounts. Default
# to "false" in both cases — production must never ship with either true.
#
# Apply with an explicit kubectl create secret command OR a sealed-secrets
# manifest; this file is the schema, not the value carrier.
apiVersion: v1
kind: Secret
metadata:
  name: cena-cas-gate-operator
  namespace: cena-platform
  labels:
    app.kubernetes.io/part-of: cena
    app.kubernetes.io/component: cas-gate
type: Opaque
stringData:
  CENA_CAS_OVERRIDE_ENABLED: "false"
  CENA_ALLOW_PREPILOT_WIPE:  "false"
