name: Taxonomy Validator

on:
  push:
    branches: [main]
    paths:
      - 'scripts/bagrut-taxonomy.json'
      - 'scripts/taxonomy-validator.ts'
      - '.github/workflows/taxonomy-validator.yml'
  pull_request:
    paths:
      - 'scripts/bagrut-taxonomy.json'
      - 'scripts/taxonomy-validator.ts'

# RDY-019a (Phase 3):
# Blocks any PR that breaks the Bagrut taxonomy schema, introduces an
# orphan concept id, or drifts the validation counters.
jobs:
  taxonomy-validator:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run taxonomy validator
        run: npx tsx scripts/taxonomy-validator.ts
