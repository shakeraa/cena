name: Student Web CI

on:
  pull_request:
    paths:
      - 'src/student/full-version/**'
  push:
    branches: [main]
    paths:
      - 'src/student/full-version/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/student/full-version
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
      
      - name: i18n plural form lint
        run: npm run check:i18n-plurals

      - name: Unit tests
        run: npm run test:unit

      - name: A11y static rules (advisory until RDY-030b)
        continue-on-error: true
        run: npm run test:a11y

      - name: Build
        run: npm run build
      
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      
      - name: E2E tests
        run: npm run test:e2e
