name: Backend CI

on:
  push:
    branches: [main]
    paths: ['src/actors/**', 'src/api/**', 'src/shared/**', 'src/emulator/**']
  pull_request:
    branches: [main]
    paths: ['src/actors/**', 'src/api/**', 'src/shared/**', 'src/emulator/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: |
          dotnet restore src/actors/Cena.Actors.Host/Cena.Actors.Host.csproj
          dotnet restore src/api/Cena.Api.Host/Cena.Api.Host.csproj
          dotnet restore src/api/Cena.Admin.Api/Cena.Admin.Api.csproj
          dotnet restore src/api/Cena.Student.Api.Host/Cena.Student.Api.Host.csproj
          dotnet restore src/emulator/Cena.Emulator.csproj
          dotnet restore src/actors/Cena.Actors.Tests/Cena.Actors.Tests.csproj
          dotnet restore src/api/Cena.Admin.Api.Tests/Cena.Admin.Api.Tests.csproj
          dotnet restore src/shared/Cena.Infrastructure.Tests/Cena.Infrastructure.Tests.csproj

      - name: Build (Release)
        run: |
          dotnet build src/actors/Cena.Actors.Host/ -c Release --no-restore
          dotnet build src/api/Cena.Api.Host/ -c Release --no-restore
          dotnet build src/api/Cena.Admin.Api/ -c Release --no-restore
          dotnet build src/api/Cena.Student.Api.Host/ -c Release --no-restore
          dotnet build src/emulator/ -c Release --no-restore
          dotnet build src/actors/Cena.Actors.Tests/ -c Release --no-restore
          dotnet build src/api/Cena.Admin.Api.Tests/ -c Release --no-restore
          dotnet build src/shared/Cena.Infrastructure.Tests/ -c Release --no-restore

      - name: Run Actor Tests
        run: dotnet test src/actors/Cena.Actors.Tests/ -c Release --no-build --logger "trx;LogFileName=actors.trx"

      - name: Run Admin API Tests
        run: dotnet test src/api/Cena.Admin.Api.Tests/ -c Release --no-build --logger "trx;LogFileName=admin-api.trx"

      - name: Run Infrastructure Tests (incl. SQLi regression suite)
        run: dotnet test src/shared/Cena.Infrastructure.Tests/ -c Release --no-build --logger "trx;LogFileName=infrastructure.trx"

      - name: Check for vulnerable packages
        run: |
          dotnet list src/actors/Cena.Actors.Host/ package --vulnerable --include-transitive 2>&1 | tee vuln.txt
          dotnet list src/api/Cena.Api.Host/ package --vulnerable --include-transitive 2>&1 | tee -a vuln.txt
          dotnet list src/api/Cena.Admin.Api/ package --vulnerable --include-transitive 2>&1 | tee -a vuln.txt
          dotnet list src/emulator/ package --vulnerable --include-transitive 2>&1 | tee -a vuln.txt
          if grep -q "has the following vulnerable packages" vuln.txt; then
            echo "::warning::Vulnerable packages detected — see vuln.txt for details"
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/*.trx'
