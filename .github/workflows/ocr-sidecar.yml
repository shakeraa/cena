name: OCR Sidecar Container

on:
  push:
    branches: [main]
    paths:
      - 'docker/ocr-sidecar/**'
      - 'k8s/ocr-sidecar/**'
      - '.github/workflows/ocr-sidecar.yml'
  pull_request:
    paths:
      - 'docker/ocr-sidecar/**'
      - 'k8s/ocr-sidecar/**'
  workflow_dispatch:

# RDY-OCR-SIDECAR-CONTAINER (Phase 4):
# Lints the Dockerfile, scans the image, validates the K8s manifests, and
# on main merges pushes to GHCR with SHA + latest tags.
jobs:
  lint-dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/ocr-sidecar/Dockerfile
          ignore: DL3008,DL3013   # apt + pip unpinned versions are intentional here

  validate-k8s:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: kubectl dry-run
        run: |
          set -euo pipefail
          curl -sSLo kubectl https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          kubectl kustomize k8s/ocr-sidecar > /tmp/rendered.yaml
          kubectl apply --dry-run=client -f /tmp/rendered.yaml

  build-image:
    runs-on: ubuntu-latest
    needs: [lint-dockerfile, validate-k8s]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + (optionally) push
        uses: docker/build-push-action@v5
        with:
          context: docker/ocr-sidecar
          file: docker/ocr-sidecar/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/cena-ocr-sidecar:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/cena-ocr-sidecar:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy-scan:
    runs-on: ubuntu-latest
    needs: [build-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/cena-ocr-sidecar:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
