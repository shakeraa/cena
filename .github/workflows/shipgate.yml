name: Ship-gate scanners

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Dark-pattern ship-gate per docs/engineering/shipgate.md.
# Two scanners run in series:
#   1. scripts/shipgate/scan.mjs         — baked-in locale + i18n rules
#   2. scripts/shipgate/rulepack-scan.mjs — YAML rule packs (citations + mechanics)
# The rule-pack scanner starts in --advisory mode so CI reports hits without
# blocking; flip to strict by removing --advisory once the historical-scan
# follow-ups in pre-release-review/reviews/banned-*-historical-scan.md clear.

jobs:
  shipgate:
    name: shipgate / scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Lexicon-lock gate (Arabic lexicon terms)
        run: node scripts/shipgate/lexicon-lock-gate.mjs

      - name: Rule-pack scanner (banned-citations + banned-mechanics, advisory)
        run: node scripts/shipgate/rulepack-scan.mjs --advisory

      - name: Rule-pack fixture self-test (strict — every rule must fire)
        run: |
          node --test tests/shipgate/banned-citations.spec.mjs \
                      tests/shipgate/banned-mechanics.spec.mjs
