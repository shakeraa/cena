name: Translation QA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  translation-qa:
    name: Canonical Translation QA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run translation QA checks
        run: node scripts/translation-qa.mjs --verbose
