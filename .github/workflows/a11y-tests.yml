# =============================================================================
# RDY-030: Accessibility Test Automation
# Three parallel jobs: static rules, component axe, full-page E2E axe.
# Component + E2E are continue-on-error (advisory) until baseline is clean.
# =============================================================================

name: A11y Tests

on:
  pull_request:
    paths:
      - 'src/student/full-version/**'
      - '.github/workflows/a11y-tests.yml'
  push:
    branches: [main]
    paths:
      - 'src/student/full-version/**'

concurrency:
  group: a11y-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-rules:
    name: Static a11y rules (vitest node)
    runs-on: ubuntu-latest
    # RDY-030b sub-task 4: baseline now clean across all three rules
    # (reduced-motion, aria-live-on-dynamic, math-ltr-wrapper). Blocking.
    defaults:
      run:
        working-directory: src/student/full-version
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run static a11y rules
        run: npm run test:a11y

  component-axe:
    name: Component-level axe (vitest jsdom)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: src/student/full-version
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run component a11y specs
        run: npx vitest run tests/unit/*.a11y.spec.ts

  e2e-axe:
    name: Full-page axe scan (Playwright)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: src/student/full-version
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright
        run: npx playwright install --with-deps chromium
      - name: Run axe E2E scan
        run: npx playwright test tests/e2e/a11y-full-page-scan.spec.ts
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-playwright-report
          path: src/student/full-version/playwright-report/
          retention-days: 14
