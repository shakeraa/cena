name: CD — Deploy to Kubernetes

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: "Image tag to deploy (e.g. sha-abc1234 or v1.2.3)"
        required: true
        type: string

env:
  HELM_CHART_PATH: deploy/helm/cena
  RELEASE_NAME: cena

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Step 1: Validate chart
  # ─────────────────────────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Helm lint
        run: helm lint ${{ env.HELM_CHART_PATH }}

      - name: Helm template (dry-run)
        run: |
          helm template ${{ env.RELEASE_NAME }} ${{ env.HELM_CHART_PATH }} \
            --set migrator.image.tag=${{ inputs.image_tag }} \
            --set student.image.tag=${{ inputs.image_tag }} \
            --set admin.image.tag=${{ inputs.image_tag }}

  # ─────────────────────────────────────────────────────────────────────────
  # Step 2: Deploy via Helm (migrator hook runs first automatically)
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.RELEASE_NAME }} ${{ env.HELM_CHART_PATH }} \
            --namespace cena-${{ inputs.environment }} \
            --create-namespace \
            --set migrator.image.tag=${{ inputs.image_tag }} \
            --set student.image.tag=${{ inputs.image_tag }} \
            --set admin.image.tag=${{ inputs.image_tag }} \
            --values ${{ env.HELM_CHART_PATH }}/values.yaml \
            --timeout 10m \
            --wait \
            --atomic

      - name: Verify student rollout
        run: |
          kubectl rollout status deployment/${{ env.RELEASE_NAME }}-student \
            --namespace cena-${{ inputs.environment }} \
            --timeout=300s

      - name: Verify admin rollout
        run: |
          kubectl rollout status deployment/${{ env.RELEASE_NAME }}-admin \
            --namespace cena-${{ inputs.environment }} \
            --timeout=300s

      - name: Post-deploy smoke test
        run: |
          echo "Checking student health endpoint..."
          kubectl exec -n cena-${{ inputs.environment }} \
            deploy/${{ env.RELEASE_NAME }}-student -- \
            wget -q -O- http://localhost:5051/health/ready || true

          echo "Checking admin health endpoint..."
          kubectl exec -n cena-${{ inputs.environment }} \
            deploy/${{ env.RELEASE_NAME }}-admin -- \
            wget -q -O- http://localhost:5052/health/ready || true

  # ─────────────────────────────────────────────────────────────────────────
  # Rollback job (manual trigger only)
  # ─────────────────────────────────────────────────────────────────────────
  rollback:
    if: failure()
    needs: deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Rollback to previous release
        run: |
          echo "Deploy failed — rolling back to previous Helm release..."
          helm rollback ${{ env.RELEASE_NAME }} \
            --namespace cena-${{ inputs.environment }} \
            --wait \
            --timeout 5m
          echo "Rollback complete."
