# ═══════════════════════════════════════════════════════════════════════
# Cena Platform — Dev hot-reload overlay (RDY-056)
#
# Swaps every backend service container's entrypoint for a file-watching
# equivalent and bind-mounts the host source so edits on your laptop
# propagate into the running container without a rebuild.
#
# Loaded BY DEFAULT by scripts/cena-up.sh (the canonical bring-up entry
# point). The 2026-05-03 staleness bug — fresh `/enhance-text` endpoint
# returning 404 from a baked image until somebody manually rebuilt —
# happened because this overlay was opt-in and easy to forget. cena-up.sh
# now loads it unless `--prod-image` is passed.
#
# Usage:
#   scripts/cena-up.sh                                    # default path
#
#   # Or directly via compose, e.g. for the e2e-flow harness:
#   docker compose -f docker-compose.yml -f docker-compose.app.yml \
#                  -f docker-compose.hotreload.yml up -d
#
# What this overlay changes
#   - .NET services (admin-api, student-api, actor-host): build the
#     `dev` target of each service's prod Dockerfile (SDK image + same
#     OCR toolchain as prod runtime) and run `dotnet watch run`. Host
#     src/, db/, docker/, config/ are mounted read-write so C# edits
#     trigger an in-process restart. Building the `dev` target (rather
#     than pulling vanilla sdk:9.0) keeps dev and prod on an identical
#     OS layer — no drift on tesseract / poppler / curl / language
#     packs. See docker-ocr-parity task (t_8755d78dab87).
#   - sympy-sidecar: bind-mount the Python worker. Restart the container
#     after edits (`docker restart cena-sympy-sidecar`) — nats-py is a
#     sync subscriber, no reload-on-change story out of the box.
#   - SPAs already bind-mounted in docker-compose.app.yml for Vite HMR.
#     No further change here — listed for completeness.
#
# What this overlay does NOT change
#   - Production / CI builds (docker-compose.yml + docker-compose.app.yml
#     alone keep their prod-shape multi-stage images). Dev-only. Never
#     load this in a deployed environment.
#   - Ports, env vars, health checks, networking — inherited.
#
# NuGet caches are PER-SERVICE (nuget_admin_api / nuget_student_api /
# nuget_actor_host). A shared cache races between siblings on first boot
# and corrupts the package store — symptom is "Could not find file
# /root/.nuget/packages/<pkg>/<ver>/<hash>" during dotnet watch startup.
# ═══════════════════════════════════════════════════════════════════════

services:
  # ── .NET: Admin API ───────────────────────────────────────────────
  admin-api:
    build:
      context: .
      dockerfile: src/api/Cena.Admin.Api.Host/Dockerfile
      target: dev
    image: cena-admin-api:dev
    working_dir: /src
    environment:
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=true
    volumes:
      - ./src:/src/src
      - ./db/migrations:/src/db/migrations
      - ./docker/ocr-sidecar/app:/src/docker/ocr-sidecar/app
      - ./config:/src/config
      - ./contracts:/src/contracts
      - /src/src/api/Cena.Admin.Api.Host/bin
      - /src/src/api/Cena.Admin.Api.Host/obj
      - nuget_admin_api:/root/.nuget/packages
    entrypoint: []
    command:
      - sh
      - -c
      - "dotnet restore src/api/Cena.Admin.Api.Host/Cena.Admin.Api.Host.csproj /p:SkipOpenApiGeneration=true && exec dotnet watch --project src/api/Cena.Admin.Api.Host/Cena.Admin.Api.Host.csproj --non-interactive --no-hot-reload run --no-launch-profile /p:SkipOpenApiGeneration=true"
    # Hot-reload first-boot does `dotnet restore` (cold NuGet cache) + watch
    # build + Marten schema warm before Kestrel binds 5052 — typically
    # 3-6 min on Apple Silicon. The prod-image start_period of 90s in the
    # base file is far too tight for that path; extend it here so compose
    # doesn't fail dependents (admin-spa) with "container is unhealthy"
    # while watch is still compiling. Steady-state edits are fast — the
    # interval/timeout/retries don't need to change.
    healthcheck:
      start_period: 600s

  # ── .NET: Student API ─────────────────────────────────────────────
  student-api:
    build:
      context: .
      dockerfile: src/api/Cena.Student.Api.Host/Dockerfile
      target: dev
    image: cena-student-api:dev
    working_dir: /src
    environment:
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=true
    env_file:
      # EPIC-PRR-I PRR-301: Stripe sandbox env file (generated by
      # scripts/stripe/bootstrap-sandbox.sh; required:false so CI and
      # environments without Stripe keys still start cleanly with
      # Cena falling back to the sandbox checkout provider.
      - path: .env.stripe.local
        required: false
    volumes:
      - ./src:/src/src
      - ./db/migrations:/src/db/migrations
      - ./docker/ocr-sidecar/app:/src/docker/ocr-sidecar/app
      - ./config:/src/config
      - ./contracts:/src/contracts
      - /src/src/api/Cena.Student.Api.Host/bin
      - /src/src/api/Cena.Student.Api.Host/obj
      - nuget_student_api:/root/.nuget/packages
    entrypoint: []
    command:
      - sh
      - -c
      - "dotnet restore src/api/Cena.Student.Api.Host/Cena.Student.Api.Host.csproj /p:SkipOpenApiGeneration=true && exec dotnet watch --project src/api/Cena.Student.Api.Host/Cena.Student.Api.Host.csproj --non-interactive --no-hot-reload run --no-launch-profile /p:SkipOpenApiGeneration=true"
    healthcheck:
      start_period: 600s   # cold dotnet-watch boot; see admin-api block.

  # ── .NET: Actor Host ──────────────────────────────────────────────
  actor-host:
    build:
      context: .
      dockerfile: src/actors/Cena.Actors.Host/Dockerfile
      target: dev
    image: cena-actor-host:dev
    working_dir: /src
    environment:
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=true
      # The dev SDK image bakes ASPNETCORE_HTTP_PORTS=8080, which beats the
      # appsettings.json Kestrel endpoint that binds the prod-image actor-
      # host on 5050. admin-api / student-api set ASPNETCORE_URLS in
      # docker-compose.app.yml, but actor-host's block didn't (the prod
      # binary just honors appsettings.json hard-coded). Pin the URL here
      # so the dev container binds 5050 and the existing /health/ready
      # probe + sibling-service service_healthy waits still resolve.
      - ASPNETCORE_URLS=http://+:5050
      - ASPNETCORE_HTTP_PORTS=
    volumes:
      - ./src:/src/src
      - ./db/migrations:/src/db/migrations
      - ./docker/ocr-sidecar/app:/src/docker/ocr-sidecar/app
      - ./config:/src/config
      - ./contracts:/src/contracts
      - /src/src/actors/Cena.Actors.Host/bin
      - /src/src/actors/Cena.Actors.Host/obj
      - nuget_actor_host:/root/.nuget/packages
    entrypoint: []
    command:
      - sh
      - -c
      - "dotnet restore src/actors/Cena.Actors.Host/Cena.Actors.Host.csproj /p:SkipOpenApiGeneration=true && exec dotnet watch --project src/actors/Cena.Actors.Host/Cena.Actors.Host.csproj --non-interactive --no-hot-reload run --no-launch-profile /p:SkipOpenApiGeneration=true"
    healthcheck:
      start_period: 600s   # cold dotnet-watch boot; see admin-api block.

  # ── Python: SymPy Sidecar ─────────────────────────────────────────
  sympy-sidecar:
    volumes:
      - ./docker/sympy-sidecar/sympy_worker.py:/app/sympy_worker.py

volumes:
  nuget_admin_api:
  nuget_student_api:
  nuget_actor_host:
