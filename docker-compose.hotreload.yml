# ═══════════════════════════════════════════════════════════════════════
# Cena Platform — Dev-only hot-reload overlay (RDY-056)
#
# Dev-time escape hatch that swaps every service container's entrypoint
# for a file-watching equivalent, and bind-mounts the host source so
# edits on your laptop propagate into the running container without a
# rebuild.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.app.yml \
#                  -f docker-compose.hotreload.yml up -d
#
# What this overlay changes
#   - .NET services (admin-api, student-api, actor-host): swap the
#     prod-shape multi-stage runtime image for the SDK image and run
#     `dotnet watch run`. Host src/, db/, docker/, config/ are mounted
#     read-write so C# edits trigger an in-process restart.
#   - sympy-sidecar: bind-mount the Python worker. Restart the container
#     after edits (`docker restart cena-sympy-sidecar`) — nats-py is a
#     sync subscriber, no reload-on-change story out of the box.
#   - SPAs already bind-mounted in docker-compose.app.yml for Vite HMR.
#     No further change here — listed for completeness.
#
# What this overlay does NOT change
#   - Production / CI builds (docker-compose.yml + docker-compose.app.yml
#     alone keep their prod-shape multi-stage images). Dev-only. Never
#     load this in a deployed environment.
#   - Ports, env vars, health checks, networking — inherited.
#
# NuGet caches are PER-SERVICE (nuget_admin_api / nuget_student_api /
# nuget_actor_host). A shared cache races between siblings on first boot
# and corrupts the package store — symptom is "Could not find file
# /root/.nuget/packages/<pkg>/<ver>/<hash>" during dotnet watch startup.
# ═══════════════════════════════════════════════════════════════════════

services:
  # ── .NET: Admin API ───────────────────────────────────────────────
  admin-api:
    build: !reset null
    image: mcr.microsoft.com/dotnet/sdk:9.0
    working_dir: /src
    environment:
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=true
    volumes:
      - ./src:/src/src
      - ./db/migrations:/src/db/migrations
      - ./docker/ocr-sidecar/app:/src/docker/ocr-sidecar/app
      - ./config:/src/config
      - /src/src/api/Cena.Admin.Api.Host/bin
      - /src/src/api/Cena.Admin.Api.Host/obj
      - nuget_admin_api:/root/.nuget/packages
    entrypoint: []
    command:
      - sh
      - -c
      - "dotnet restore src/api/Cena.Admin.Api.Host/Cena.Admin.Api.Host.csproj /p:SkipOpenApiGeneration=true && exec dotnet watch --project src/api/Cena.Admin.Api.Host/Cena.Admin.Api.Host.csproj --non-interactive --no-hot-reload run --no-launch-profile /p:SkipOpenApiGeneration=true"

  # ── .NET: Student API ─────────────────────────────────────────────
  student-api:
    build: !reset null
    image: mcr.microsoft.com/dotnet/sdk:9.0
    working_dir: /src
    environment:
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=true
    volumes:
      - ./src:/src/src
      - ./db/migrations:/src/db/migrations
      - ./docker/ocr-sidecar/app:/src/docker/ocr-sidecar/app
      - ./config:/src/config
      - /src/src/api/Cena.Student.Api.Host/bin
      - /src/src/api/Cena.Student.Api.Host/obj
      - nuget_student_api:/root/.nuget/packages
    entrypoint: []
    command:
      - sh
      - -c
      - "dotnet restore src/api/Cena.Student.Api.Host/Cena.Student.Api.Host.csproj /p:SkipOpenApiGeneration=true && exec dotnet watch --project src/api/Cena.Student.Api.Host/Cena.Student.Api.Host.csproj --non-interactive --no-hot-reload run --no-launch-profile /p:SkipOpenApiGeneration=true"

  # ── .NET: Actor Host ──────────────────────────────────────────────
  actor-host:
    build: !reset null
    image: mcr.microsoft.com/dotnet/sdk:9.0
    working_dir: /src
    environment:
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - DOTNET_WATCH_RESTART_ON_RUDE_EDIT=true
    volumes:
      - ./src:/src/src
      - ./db/migrations:/src/db/migrations
      - ./docker/ocr-sidecar/app:/src/docker/ocr-sidecar/app
      - ./config:/src/config
      - /src/src/actors/Cena.Actors.Host/bin
      - /src/src/actors/Cena.Actors.Host/obj
      - nuget_actor_host:/root/.nuget/packages
    entrypoint: []
    command:
      - sh
      - -c
      - "dotnet restore src/actors/Cena.Actors.Host/Cena.Actors.Host.csproj /p:SkipOpenApiGeneration=true && exec dotnet watch --project src/actors/Cena.Actors.Host/Cena.Actors.Host.csproj --non-interactive --no-hot-reload run --no-launch-profile /p:SkipOpenApiGeneration=true"

  # ── Python: SymPy Sidecar ─────────────────────────────────────────
  sympy-sidecar:
    volumes:
      - ./docker/sympy-sidecar/sympy_worker.py:/app/sympy_worker.py

volumes:
  nuget_admin_api:
  nuget_student_api:
  nuget_actor_host:
