# =============================================================================
# Approved-citations manifest — ADR-0049 (citation integrity / effect-size
# communication)
# =============================================================================
# Source of truth for every effect-size claim that may appear in Cena's
# student-facing UI copy, admin copy, marketing surfaces, or feature specs that
# feed production copy.
#
# Seeded from Dr. Rami's 2026-04-20 citation-integrity assessment
# (pre-release-review/finding_assessment_dr_rami.md). Only PASS-verdict
# findings that have a defensible meta-analytic mean earn an entry at MVP.
# WARNING / REJECT verdicts must be reworked and re-reviewed before earning a
# manifest slot.
#
# Schema — every entry MUST have all of:
#   id:                      — unique slug referenced by citation_id= in copy
#   authors:                 — display-safe author string
#   year:                    — publication year (int)
#   title:                   — quoted full title
#   source_type:             — primary | meta-analysis | review
#   meta_analytic_mean:      — reported meta-analytic mean effect size (float)
#   reported_ci_low:         — lower bound of the reported 95% CI
#   reported_ci_high:        — upper bound of the reported 95% CI
#   max_cited_es:            — hard cap for any claim citing this entry (float)
#   notes:                   — reviewer context, caveats, null-result flags
#   added_by:                — task id that added the entry
#   approved_on:             — ISO date of approval
#
# Rule: if the source literature reports a null or small effect, that is the
# number that goes in `meta_analytic_mean`. Do not cherry-pick an upper-tail
# primary study.
#
# Adding a new entry: see ADR-0049 § "Manifest schema".
# Retiring an entry: the ship-gate scanner (citation-integrity-scan.mjs) will
# flag every dangling `citation_id=` reference on the next run.
# =============================================================================

