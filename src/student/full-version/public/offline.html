<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cena — offline</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f7ff;
      color: #2b2b3a;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    .card {
      max-width: 420px;
      text-align: center;
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 12px 36px rgba(115, 103, 240, 0.12);
    }
    h1 { color: #7367F0; margin-top: 0; }
    p { line-height: 1.5; }
    button {
      background: #7367F0;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 1rem;
    }
    button:hover { background: #5e52d8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're offline</h1>
    <p>Cena needs an internet connection to sync your progress and load new sessions. Your recent work is still saved and will upload when you reconnect.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
