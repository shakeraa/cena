# =============================================================================
# Cena Platform — Helm values override for STAGING (RDY-025)
#
# Deploy:
#   helm upgrade --install cena deploy/helm/cena \
#     -f deploy/helm/cena/values-staging.yaml \
#     --namespace cena-staging --create-namespace
# =============================================================================

aspnetcoreEnvironment: Staging

logging:
  level: Debug

# Smaller footprint for staging
actors:
  replicaCount: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  pdb:
    minAvailable: 1     # allow rolling updates in staging

student:
  replicaCount: 1
  hpa:
    minReplicas: 1
    maxReplicas: 3
  pdb:
    enabled: false

admin:
  replicaCount: 1
  hpa:
    enabled: false

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-staging
  hosts:
    - host: staging.cena.example.com
      paths:
        - path: /api/student
          pathType: Prefix
          service: student
        - path: /api/admin
          pathType: Prefix
          service: admin
  tls:
    - secretName: cena-staging-tls
      hosts:
        - staging.cena.example.com
