apiVersion: v1
kind: Service
metadata:
  name: {{ include "cena.fullname" . }}-admin
  labels:
    {{- include "cena.componentLabels" (dict "root" . "component" "admin") | nindent 4 }}
spec:
  type: {{ .Values.admin.service.type }}
  ports:
    - port: {{ .Values.admin.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cena.selectorLabels" (dict "root" . "component" "admin") | nindent 4 }}
