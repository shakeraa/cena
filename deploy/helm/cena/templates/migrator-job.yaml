apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cena.fullname" . }}-migrator
  labels:
    {{- include "cena.componentLabels" (dict "root" . "component" "migrator") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrator.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrator.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "cena.selectorLabels" (dict "root" . "component" "migrator") | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- include "cena.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "cena.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrator
          image: "{{ .Values.migrator.image.repository }}:{{ .Values.migrator.image.tag }}"
          imagePullPolicy: {{ .Values.migrator.image.pullPolicy }}
          command: ["dotnet", "Cena.Db.Migrator.dll"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: CENA_MIGRATOR_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key: connection-string-migrator
          resources:
            {{- toYaml .Values.migrator.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
