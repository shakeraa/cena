apiVersion: v1
kind: Service
metadata:
  name: {{ include "cena.fullname" . }}-actors
  labels:
    {{- include "cena.componentLabels" (dict "root" . "component" "actors") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.actors.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: gossip
      port: {{ .Values.actors.service.gossipPort }}
      targetPort: gossip
      protocol: TCP
  selector:
    {{- include "cena.selectorLabels" (dict "root" . "component" "actors") | nindent 4 }}
---
# RDY-025: Headless service for Proto.Actor cluster gossip.
# Pods resolve each other via SRV records against this endpoint.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cena.fullname" . }}-actors-headless
  labels:
    {{- include "cena.componentLabels" (dict "root" . "component" "actors") | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: gossip
      port: {{ .Values.actors.service.gossipPort }}
      targetPort: gossip
      protocol: TCP
  selector:
    {{- include "cena.selectorLabels" (dict "root" . "component" "actors") | nindent 4 }}
