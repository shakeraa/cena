# =============================================================================
# Cena Platform — Helm values override for PRODUCTION (RDY-025)
#
# Deploy:
#   helm upgrade --install cena deploy/helm/cena \
#     -f deploy/helm/cena/values-production.yaml \
#     --namespace cena --create-namespace
# =============================================================================

aspnetcoreEnvironment: Production

logging:
  level: Information

# Actor Host: 3 replicas for cluster quorum survival on single-node drain
actors:
  replicaCount: 3
  resources:
    requests:
      cpu: 1
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi
  pdb:
    enabled: true
    minAvailable: 2
  terminationGracePeriodSeconds: 120   # extra time for actor drain in prod

student:
  replicaCount: 3
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 30
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 75
  pdb:
    enabled: true
    minAvailable: 2

admin:
  replicaCount: 2
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
  pdb:
    enabled: true
    minAvailable: 1

# Anti-affinity: spread pods across nodes
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/part-of: cena-platform
          topologyKey: kubernetes.io/hostname

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.cena.example.com
      paths:
        - path: /student
          pathType: Prefix
          service: student
        - path: /admin
          pathType: Prefix
          service: admin
  tls:
    - secretName: cena-production-tls
      hosts:
        - api.cena.example.com
