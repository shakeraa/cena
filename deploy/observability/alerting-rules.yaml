# Cena Platform — Alerting Rules for deployment health
# Import into Prometheus/Alertmanager or Grafana alerting

groups:
  - name: cena-deploy-health
    rules:
      # Migrator job failure — page on-call immediately
      - alert: CenaMigratorJobFailed
        expr: kube_job_status_failed{job_name=~".*-migrator.*"} > 0
        for: 0m
        labels:
          severity: critical
          team: cena-platform
        annotations:
          summary: "Cena migrator job failed"
          description: >-
            The database migrator job {{ $labels.job_name }} has failed.
            This blocks all host deployments. Check migrator pod logs immediately.
          runbook_url: "https://github.com/cena-platform/cena/blob/main/docs/operations/deploy-runbook.md#migrator-failure"

      # Schema assert error on any host startup — page on-call
      - alert: CenaSchemaAssertError
        expr: sum(rate(aspnetcore_healthcheck_status{name="schema_assert", status="Unhealthy"}[5m])) by (app) > 0
        for: 1m
        labels:
          severity: critical
          team: cena-platform
        annotations:
          summary: "Schema assertion failed on {{ $labels.app }}"
          description: >-
            The health check AssertDatabaseMatchesConfiguration is failing on {{ $labels.app }}.
            This means the running code expects a schema that does not match the database.
            Either the migrator did not run or a migration is missing.
          runbook_url: "https://github.com/cena-platform/cena/blob/main/docs/operations/deploy-runbook.md#schema-assert-failure"

      # Host stuck in CrashLoopBackOff for > 5 min — page on-call
      - alert: CenaHostCrashLoop
        expr: >-
          sum(increase(kube_pod_container_status_restarts_total{container=~"student|admin"}[5m])) by (container, pod) > 3
        for: 5m
        labels:
          severity: critical
          team: cena-platform
        annotations:
          summary: "{{ $labels.container }} pod {{ $labels.pod }} is crash-looping"
          description: >-
            Pod {{ $labels.pod }} (container {{ $labels.container }}) has restarted more than
            3 times in the last 5 minutes. Likely CrashLoopBackOff. Check pod logs and events.
          runbook_url: "https://github.com/cena-platform/cena/blob/main/docs/operations/deploy-runbook.md#crash-loop-backoff"

      # Migrator job running too long (> 5 min)
      - alert: CenaMigratorSlow
        expr: >-
          time() - kube_job_status_start_time{job_name=~".*-migrator.*"} > 300
          and kube_job_status_succeeded{job_name=~".*-migrator.*"} == 0
          and kube_job_status_failed{job_name=~".*-migrator.*"} == 0
        for: 0m
        labels:
          severity: warning
          team: cena-platform
        annotations:
          summary: "Cena migrator job is running longer than 5 minutes"
          description: >-
            The migrator job {{ $labels.job_name }} has been running for over 5 minutes
            without completing. This may indicate a stuck migration or connectivity issue.
